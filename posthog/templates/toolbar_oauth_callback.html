<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toolbar authorization</title>
</head>
<body>
    <p id="toolbar-oauth-callback-status">Finishing authorization...</p>
    {{ payload|json_script:"toolbar-oauth-payload" }}
    <script nonce="{{ request.csp_nonce }}">
        (function () {
            var payloadElement = document.getElementById("toolbar-oauth-payload")
            var statusElement = document.getElementById("toolbar-oauth-callback-status")
            if (!payloadElement || !statusElement) {
                return
            }

            var payload = JSON.parse(payloadElement.textContent || "{}")
            var openerWindow = window.opener
            var targetOrigin = "{{ target_origin|escapejs }}"

            if (openerWindow && !openerWindow.closed) {
                openerWindow.postMessage(payload, targetOrigin)
                window.close()
                return
            }

            statusElement.textContent = "Authorization complete. You can close this window."
        })()
    </script>
</body>
</html>
