{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<p>Upload a signals JSON file (one JSON array per line, exported from the embeddings table) to ingest via emit_signal().</p>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div style="margin: 20px 0;">
        <label for="signals_file" style="display: block; margin-bottom: 5px; font-weight: bold;">Signals JSON file:</label>
        <input type="file" id="signals_file" name="signals_file" accept=".json" required />
    </div>
    <div style="margin-top: 20px;">
        <input type="submit" class="default" value="Ingest signals" style="padding: 10px 20px;" />
        <a href="{% url 'admin:posthog_team_change' team.pk %}" style="margin-left: 10px;">Cancel</a>
    </div>
</form>
{% endblock %}
