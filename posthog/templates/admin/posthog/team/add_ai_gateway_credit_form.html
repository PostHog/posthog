{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<p>Add prepaid credit to <strong>{{ team.name }}</strong>'s AI gateway wallet. This appends a top-up entry to the gateway ledger and increases the team's spendable balance immediately.</p>

<form method="post" onsubmit="this.querySelector('input[type=submit]').disabled = true;">
    {% csrf_token %}
    <input type="hidden" name="form_nonce" value="{{ form_nonce }}" />
    <div style="margin: 20px 0;">
        <label for="amount_usd" style="display: block; margin-bottom: 5px; font-weight: bold;">Amount (USD):</label>
        <input type="text" id="amount_usd" name="amount_usd" placeholder="e.g. 25.00" style="width: 200px; padding: 8px;" required />
    </div>
    <div style="margin: 20px 0;">
        <label for="reason" style="display: block; margin-bottom: 5px; font-weight: bold;">Reason:</label>
        <input type="text" id="reason" name="reason" style="width: 400px; padding: 8px;" required />
    </div>
    <div style="margin-top: 20px;">
        <input type="submit" class="default" value="Add credit" style="padding: 10px 20px;" />
        <a href="{% url 'admin:posthog_team_change' team.pk %}" style="margin-left: 10px;">Cancel</a>
    </div>
</form>
{% endblock %}
