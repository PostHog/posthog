            - name: product
              type: LowCardinality(String)
            - name: document_type
              type: LowCardinality(String)
            - name: rendering
              type: LowCardinality(String)
            - name: document_id
              type: String
            - name: timestamp
              type: "DateTime64(3, 'UTC')"
            - name: inserted_at
              type: "DateTime64(3, 'UTC')"
            - name: content
              type: String
              default_expression: "''"
              default_kind: DEFAULT
            - name: metadata
              type: String
              default_expression: "'{}'"
              default_kind: DEFAULT
            - name: embedding
              type: Array(Float64)
            - name: _timestamp
