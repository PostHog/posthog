    # --- Legacy unsharded table (kept for historical data per migration 0183) ---
    posthog_document_embeddings:
        engine: ReplicatedReplacingMergeTree
        sharded: false
        on_nodes: DATA
        order_by:
            - team_id
            - 'toDate(timestamp)'
            - product
