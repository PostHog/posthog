[pytest]
pythonpath = . common tools/hogli-commands
env =
    DEBUG=1
    TEST=1
DJANGO_SETTINGS_MODULE = posthog.settings
addopts = -p no:warnings --reuse-db --ignore=posthog/user_scripts --ignore=services/llm-gateway --ignore=services/stripe-mock --ignore=common/ingestion/acceptance_tests --ignore=tools/hogli --ignore=tools/hogli-commands --ignore=tools/traffic-sim

markers =
    ee
    clickhouse_only
    skip_on_multitenancy
    async_migrations
    requires_secrets: test needs internal secrets or infra and is skipped on external PRs
    temporal_container: test needs the real Temporal docker container; deselected from the Core CI segment and run in the TemporalCore segment (see posthog/test/test_temporal_container_dependencies.py)

asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
asyncio_default_test_loop_scope = module
