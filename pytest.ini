[pytest]
pythonpath = . common tools/hogli-commands tools/query-performance-ai
env =
    DEBUG=1
    TEST=1
DJANGO_SETTINGS_MODULE = posthog.settings
# --pytest-durations=0 disables the pytest-durations plugin by default; CI shard steps re-enable it explicitly
addopts = -p no:warnings --reuse-db --pytest-durations=0 --ignore=posthog/user_scripts --ignore=services/llm-gateway --ignore=services/stripe-mock --ignore=common/ingestion/acceptance_tests --ignore=tools/hogli --ignore=tools/hogli-commands --ignore=tools/traffic-sim --ignore=tools/query-performance-ai

markers =
    ee
    clickhouse_only
    skip_on_multitenancy
    async_migrations
    requires_secrets: test needs internal secrets or infra and is skipped on external PRs
    integration: test requires external services (e.g. a Playwright browser binary) and is excluded from default CI runs

asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
asyncio_default_test_loop_scope = module
