[pytest]
# Sandboxed evals run cooperatively in a single event loop via
# pytest-asyncio-cooperative — every eval_* test gets the
# ``asyncio_cooperative`` marker auto-applied in conftest.py. The plugin is
# mutually exclusive with pytest-asyncio, so we disable the latter for this
# pytest invocation via ``-p no:asyncio``. The shared parent
# ``ee/hogai/eval/pytest.ini`` still uses pytest-asyncio (auto mode) for the
# ``ci/`` evals, so don't run sandboxed and ci suites through the same
# pytest call.
python_files = eval_*.py
python_classes = Eval*
python_functions = eval_*
env =
    DEBUG=1
    TEST=1
    IN_EVAL_TESTING=1
DJANGO_SETTINGS_MODULE = posthog.settings
addopts = -p no:warnings -p no:asyncio --reuse-db -s -rfEp
# The cooperative plugin defaults to a 600s timeout per test, but sandboxed
# evals can take 15–60 min. Bump to match SandboxedEval's 60 min ceiling.
asyncio_task_timeout = 3600
