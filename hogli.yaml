core:
    quickstart:
        click: hogli_commands.quickstart:quickstart
        description: Show getting started with PostHog development
    categories:
        description: Show all available commands grouped by category
    dev:up:
        description: Start full PostHog dev stack via mprocs
        hidden: true
    dev:demo-data:
        cmd: python manage.py generate_demo_data
        description: Generate demo data for local testing
        services:
            - postgresql
            - clickhouse
    dev:bootstrap-project:
        cmd: python manage.py bootstrap_local_project
        description: Bootstrap a local project from an S3 events/persons dump (batch-export format)
        services:
            - postgresql
            - clickhouse
            - django
    dev:sync-flags:
        cmd: python manage.py sync_feature_flags
        description: Sync feature flags from configuration
        services:
            - postgresql
    dev:sync-hog-templates:
        cmd: python manage.py sync_hog_function_templates
        description: Sync hog function templates from configuration
        services:
            - postgresql
    dev:sync-user-settings:
        cmd: python manage.py sync_user_settings
        description: Sync your user settings from PostHog cloud to local dev environment.
            Requires API key.
        services:
            - postgresql
    dev:shell-plus:
        cmd: python manage.py shell_plus
        description: Launch Django shell with auto-imported models and utilities
        services:
            - postgresql
            - clickhouse
            - django
    dev:reset:
        steps:
            - docker:services:remove
            - docker:services:up
            - setup:python
            - services:ready
            - hogli: db:restore-schema
              prompt: Restore pre-migrated schema from CI? (faster than migrations)
              else: migrations:run
            # Skip demo-data's own network flag sync (us.posthog.com) — the
            # dev:sync-flags step below enables all flags from constants.tsx locally.
            - name: dev:demo-data
              cmd: python manage.py generate_demo_data --skip-flag-sync
            - dev:sync-flags
            - ensure:local:setup
        description: Full reset - wipe volumes, migrate, load demo data, sync flags
        prompt: true
    dev:api-key:
        cmd: python manage.py setup_local_api_key
        description: Creates a personal API key that's always the same, so you don't need
            to manually create a new one every time you reset the stack.
        services:
            - postgresql
health_checks:
