            kafka, etc)
        hidden: true
    check:video-deps:
        bin_script: check_video_deps
        description: Install and verify Playwright browsers and FFmpeg dependencies
        hidden: true
    services:ready:
        bin_script: wait-for-docker
        description: Wait for all Docker Compose services to pass health checks
start:
    start:
        bin_script: start
        description: Launch all dev services via phrocs (interactive TUI, or `-d` for detached mode)
        needs_secrets: true
        services:
            - phrocs
            - mprocs
            - docker
            - django
            - frontend
            - celery
            - nodejs
            - ingestion
            - postgresql
            - redis
            - kafka
            - clickhouse
            - temporal
    up:
        extends: start
        description: Alias for `hogli start`; use `-d` for optional detached mode
    wait:
        cmd: phrocs wait
        description: Block until the detached dev stack is ready
        preserve_exit_code: true
    stop:
        cmd: phrocs stop
        description: Stop the detached dev stack gracefully
        preserve_exit_code: true
    down:
        cmd: phrocs stop
        description: Alias for `hogli stop`
        preserve_exit_code: true
    start:backend:
        bin_script: start-backend
        description: Run Django development server on port 8000 with auto-reload
        # Django runtime — Max / AI features / Stripe billing all read keys
        # from .env.local at request time.
        needs_secrets: true
        services:
            - django
            - postgresql
            - redis
        hidden: true
    start:agent-proxy:
        cmd: pnpm --filter @posthog/agent-proxy dev
        description: Run the agent-proxy Node service for task-run live streaming with auto-reload
        services:
            - redis
        hidden: true
    start:celery:
        bin_script: start-celery
        description: Start Celery worker or beat scheduler with auto-reload
        # Celery jobs hit AI providers (session summaries, batch exports, ...).
        needs_secrets: true
        services:
            - celery
            - redis
            - kafka
        hidden: true
    start:frontend:
        bin_script: start-frontend
        description: Install dependencies and start frontend with Vite dev server
        services:
            - frontend
            - docker
        hidden: true
    start:frontend-vite:
        bin_script: start-frontend-vite
        description: Start Vite dev server for frontend (runs pnpm start-vite)
        hidden: true
    start:worker:
        bin_script: start-worker
        description: Launch all background workers (Celery worker, beat scheduler, nodejs, ingestion)
        # Workers run AI / billing / ingestion code paths that touch external
        # providers — they need the runtime keys resolved.
        needs_secrets: true
        services:
            - celery
            - nodejs
            - ingestion
            - kafka
            - temporal
            - redis
        hidden: true
    start:rust-service:
        bin_script: start-rust-service
        description: Build and run live Rust microservice with auto-restart on crash
        # Rust services include batch-import-worker etc. that talk to Stripe
        # and other external endpoints.
        needs_secrets: true
        hidden: true
    start:go:service:
        bin_script: start-go-service
        description: Build and run Go microservices with auto-restart on crash
        needs_secrets: true
        hidden: true
deploy:
    deploy:hobby:
        bin_script: deploy-hobby
        description: Interactive installer for single-instance PostHog deployment on remote
            server
    deploy:upgrade-hobby:
        bin_script: upgrade-hobby
        description: Upgrade existing hobby deployment with data loss warnings and volume
            checks
        prompt: true
    deploy:migrate-recordings:
        bin_script: migrate-session-recordings-hobby
        description: Migrate session recordings from MinIO to SeaweedFS for hobby deployments
    deploy:migrate-storage:
        bin_script: migrate-minio-to-seaweedfs
        description: "Migrate or sync object storage between MinIO and SeaweedFS\n\nServices:\
            \ session-recordings, session-recordings-lts, query-cache, \n         media-uploads,\
            \ exports, source-maps\n\nModes:\n  --mode migrate  One-way copy (default)\n\
            \  --mode sync     Bidirectional sync\n\nExamples:\n  hogli deploy:migrate-storage\
            \ --service query-cache --mode sync --dry-run\n  hogli deploy:migrate-storage\
            \ --service media-uploads --mode migrate"
        prompt: true
    deploy:migrate-storage-hobby:
        bin_script: migrate-storage-hobby
        description: "Hobby: Migrate or sync ALL services between MinIO and SeaweedFS\
            \ via docker-compose\n\nExamples:\n  hogli deploy:migrate-storage-hobby    \
            \           # Sync all services\n  hogli deploy:migrate-storage-hobby --mode\
            \ migrate # One-way migrate all (MinIO \u2192 SeaweedFS)\n  hogli deploy:migrate-storage-hobby\
            \ exports -n     # Dry run exports only"
        prompt: true
    deploy:upgrade-objectstorage:
        bin_script: upgrade-objectstorage
        description: "Dev: salvage objectstorage data from the old MinIO volume into the\
            \ running SeaweedFS (interactive)\n\nExamples:\n  hogli deploy:upgrade-objectstorage\
            \              # Detect and copy the orphaned MinIO volume\n  hogli deploy:upgrade-objectstorage\
            \ --list       # List all MinIO volumes"
        services:
            - docker
        prompt: true
build:
    build:
        click: hogli_commands.build:build
        description: Run code generation pipelines (smart change detection by default)
    build:frontend:
        cmd: pnpm --filter=@posthog/frontend build
        description: Build frontend packages and run TypeScript compilation
        services:
            - frontend
    build:schema-json:
        cmd: pnpm --filter=@posthog/frontend run schema:build:json
        description: Generate schema.json from frontend
    build:schema-python:
        bin_script: build-schema-python.sh
        description: Generate Pydantic schema.py from schema.json with datamodel-codegen
    build:schema-latest-versions:
        bin_script: build-schema-latest-versions.py
        description: Extract latest schema versions and generate frontend JSON config
    build:taxonomy-json:
        bin_script: build-taxonomy-json.py
        description: Generate core filter definitions taxonomy JSON for frontend
    build:bot-definitions:
        cmd: python livestream/bot/generate_definitions.py
        description: Generate livestream bot definitions JSON from bot_definitions.py
    build:schema:
        steps:
            - build:schema-json
            - build:schema-python
            - build:schema-latest-versions
        description: Generate all schema definitions (frontend JSON, Python, latest versions)
    build:openapi-schema:
        cmd: 'mkdir -p frontend/tmp && DEBUG=1 OPENAPI_INCLUDE_INTERNAL=1 OPENAPI_MOCK_INTERNAL_API_SECRET=1
            python manage.py spectacular --file frontend/tmp/openapi.json --format openapi-json --fail-on-warn
            && echo "OpenAPI schema written to frontend/tmp/openapi.json"

            '
        description: Generate OpenAPI schema from Django backend (writes to gitignored
            temp location)
        services:
            - postgresql
            - clickhouse
            - django
    build:schema-mcp:
        cmd: cd services/mcp && npx tsx scripts/generate-tool-schema.ts && pnpm exec oxfmt
            schema/tool-inputs.json
        description: Generate MCP tool-inputs.json schema from Zod definitions
    build:widget-types:
        steps:
            - cmd: python bin/build-dashboard-widget-types.py
            - cmd: pnpm --filter=@posthog/frontend exec node
                  ../products/dashboards/frontend/bin/generate-widget-config-zod.mjs
        description: Generate dashboard widget config codegen artifacts (enum preflight, Zod)
    build:openapi-types:
        cmd: pnpm --filter=@posthog/frontend run openapi:types
        description: Generate TypeScript API types from the backend OpenAPI schema
    build:openapi-mcp-types:
        cmd: pnpm --filter=@posthog/mcp run generate-mcp-types
        description: Generate full TypeScript type namespace for MCP from OpenAPI schema
    build:openapi-mcp:
        cmd: pnpm --filter=@posthog/mcp run generate-orval-schemas
        description: Generate Orval Zod schemas for MCP tool handlers
    build:openapi-mcp-tools:
        cmd: pnpm --filter=@posthog/mcp run generate-tools
        description: Generate MCP tool handlers from YAML definitions + Orval schemas
    build:openapi-mcp-scopes:
        bin_script: build-mcp-oauth-scopes.py
        description: Generate OAUTH_SCOPES_SUPPORTED for the MCP protected-resource
            metadata from posthog/scopes.py
    build:openapi-cli-agent-scopes:
        cmd: pnpm --filter=@posthog/mcp run generate-cli-agent-scopes
        description: Generate the CLI `agent` login use-case scope list from the MCP
            tool definitions (must run after build:openapi-mcp-tools)
    build:openapi:
        steps:
            - build:openapi-schema
            - build:widget-types
            - build:openapi-types
            - build:openapi-mcp-types
            - build:openapi-mcp
            - build:openapi-mcp-tools
            - build:openapi-mcp-scopes
            - build:openapi-cli-agent-scopes
        description: Generate OpenAPI schema and TypeScript types from the backend
    build:grammar:
        cmd: pnpm grammar:build
        description: Generate HogQL grammar definitions (C++)
    build:products:
        cmd: pnpm --filter=@posthog/frontend run build:products
        description: Build products manifest from TypeScript/JSX files
    build:skills:
        cmd: python products/posthog_ai/scripts/build_skills.py
        description: Build agent skills from products/*/skills/ into dist/skills/ and
            dist/skills.zip
    init:skill:
        cmd: python products/posthog_ai/scripts/build_skills.py --init
        description: Scaffold a new agent skill directory with SKILL.md boilerplate
    sync:skill:
        cmd: python products/posthog_ai/scripts/build_skills.py --sync
        description: Build a product skill and sync to .agents/skills/ for local testing
    unsync:skill:
        cmd: python products/posthog_ai/scripts/build_skills.py --sync --clean
        description: Remove a previously synced skill from .agents/skills/
