config:
    description: Unified developer experience for the PostHog monorepo.
    commands_dir: tools/hogli-commands/hogli_commands
    # Imported once at startup to register precheck handlers, telemetry property
    # hooks, and post-command hooks. Keep these modules cheap to import — heavy
    # dependencies must live behind lazy imports inside handler bodies.
    boot_modules:
        - hogli_commands.prechecks
        - hogli_commands.telemetry_props
        - hogli_commands.hint_hook
    scripts_exclude:
        - mprocs.yaml
        - mprocs-test.yaml
        - sandbox-entrypoint.py
        - lint-feature-flag-sorting.mjs
        # Locally-built, gitignored binary (tools/phrocs). Referenced via cmd:/process
        # name, not bin_script:, so exclude it from auto-discovery to stop the manifest
        # regenerating a stub entry on every hogli run.
        - phrocs
    env:
        files:
            - .env.development
            - .env.services
        secrets:
            file: .env.local
            marker: 'op://'
            wrap: [op, run, --env-file, '{file}', --]
    telemetry:
        # Write-only project token for PostHog's internal hogli project.
        # It cannot read data; safe to commit. Standalone hogli users get a blank
        # default and telemetry stays disabled unless they set their own key.
        api_key: phc_JYFXrbqdzueOYb0wFUTnCglFKZuC4xRXBW790ewdcvn
        host: https://us.i.posthog.com

metadata:
    devbox:
        coder_url: https://coder.dev.posthog.dev
    categories:
        - key: devenv
          title: Intent-based dev environment
        - key: core
          title: Core development commands
        - key: start
          title: Start services and background workers
        - key: health_checks
          title: Verify infrastructure readiness
        - key: migrations
          title: Database migrations
        - key: db
          title: Database operations
        - key: tests
          title: Run tests
        - key: quality
          title: Code quality and formatting
        - key: build
          title: Build and generate code
        - key: docker
          title: Docker-based service orchestration
        - key: deploy
          title: Deploy PostHog to remote instances
        - key: auth
          title: Authenticate to internal services
        - key: tools
          title: Developer tools and utilities
        - key: devex
          title: Developer experience feedback
        - key: utilities
          title: Git worktrees and admin
        - key: devbox
          title: Remote development environment (devbox)
        - key: environment
          title: Environment and shell
    services:
        flox:
            name: Flox
            about: Manages reproducible development environments. All developers get the
                same exact versions of tools and dependencies.
        docker:
            name: Docker
            about: Isolates services and dependencies in containers to match production
                without requiring local installation. Orbstack strongly recommended over Docker
                Desktop.
        migration:
            name: Database migrations
            about: Schema updates and data migrations across PostgreSQL, ClickHouse, and
                async systems.
        clickhouse:
            name: ClickHouse
            about: Analytics database used for metrics, events, and funnel analysis throughout
                PostHog.
        postgresql:
            name: PostgreSQL
            about: Primary relational database for application data, authentication, and
                feature flags.
        redis:
            name: Redis
            about: In-memory cache and queue backend for fast data access and job processing.
        kafka:
            name: Kafka
            about: Event streaming platform for reliable event processing and data pipelines.
        temporal:
            name: Temporal
            about: Workflow orchestration engine for reliable, long-running background jobs
                and retries.
        testing:
            name: Testing
            about: Automated test suites (unit, integration, E2E) to ensure code quality
                and prevent regressions.
        celery:
            name: Celery
            about: Distributed task queue for running background jobs like async exports,
                scheduled tasks, and email sending.
        nodejs:
            name: Node.js
            about: CDP workflows, session recordings, logs ingestion, and evaluation scheduler.
                Ingestion runs as a separate process (see ingestion unit).
        ingestion:
            name: Ingestion
            about: Event ingestion pipeline that processes incoming events and writes to
                Kafka (then ClickHouse). Runs as IngestionGeneralServer.
        django:
            name: Django
            about: Python web framework powering PostHog's backend API, admin interface,
                and business logic.
        frontend:
            name: Frontend
            about: React-based web application providing PostHog's user interface. Built
                with TypeScript, Vite, and Kea for state management.
        mprocs:
            name: mprocs
            about: Process orchestrator that runs all dev services in parallel with live
                output and easy process management.
        phrocs:
            name: phrocs
            about: PostHog's custom process runner (replaces mprocs).
