packages:
    - '.'
    - common/esbuilder
    - common/hogvm/typescript
    - common/plugin_transpiler
    - common/storybook
    - common/replay-shared
    - common/replay-headless
    - common/tailwind
    - packages/quill
    - packages/quill/apps/*
    - packages/quill/packages/*
    - frontend
    - playwright
    - nodejs
    - nodejs/src/scripts
    - products/*
    - products/agent_platform/services/*
    - products/agent_platform/packages/*
    - docs/onboarding
    - services/agent-proxy
    - services/oauth-proxy
    - services/mcp
    - services/stripe-app
    - tools/*
    - '!tools/hedgebox-dummy'
    - rust/cyclotron-node
    - rust/common/hogvm/node
    - rust/replay-anonymizer-node

blockExoticSubdeps: true
trustPolicy: no-downgrade

catalog:
    # Kea ecosystem - state management
    kea: ^4.0.0-pre.5
    kea-forms: ^3.2.0
    kea-loaders: ^3.1.1
    kea-localstorage: ^3.1.0
    kea-router: ^3.4.1
    kea-subscriptions: ^3.0.1
    kea-test-utils: ^0.2.4
    kea-waitfor: ^0.2.1
    kea-window-values: ^3.0.1
    # PostHog packages
    '@posthog/icons': ^0.37.4
    '@posthog/brand': 0.6.0
    '@posthog/react': ^1.9.0
    posthog-js: ^1.398.2
    # Build tools
    '@parcel/packager-ts': 2.16.4
    '@parcel/transformer-typescript-types': 2.16.4
    typescript: 6.0.3
    oxfmt: ^0.35.0
    # Testing
    jest: ^29.7.0
    jest-junit: ^16.0.0
    '@types/jest': ^29.5.12
    '@types/node': ^22.13.14
    '@playwright/test': 1.60.0
    # Storybook
    '@storybook/react': ^10.4.3
    '@storybook/react-vite': ^10.4.3
    storybook: ^10.4.3
    # Common utilities
    fast-deep-equal: ^3.1.3
    fuse.js: ^7.1.0
    ts-pattern: '4.3'
    use-debounce: ^9.0.3
    # React types
    '@types/react': ^18.3.27
    '@types/react-dom': ^18.3.7
    '@base-ui/react': 1.5.0
    # Other shared
    husky: ^7.0.4
    lint-staged: ~15.4.3
    concurrently: ^5.3.0
    yaml: ^2.8.2

# PostHog packages are released by our own workflows. posthog-js is also
# uploaded to the browser SDK CDN from the posthog-js release workflow, so
# dependency automation should not delay these package updates.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
    - posthog-js
    - posthog-js-lite
    - posthog-node
    - '@posthog/*'
    - kea@4.0.0-pre.5
    - '@earendil-works/*'
    - typebox
    - chartjs-plugin-stacked100@1.7.1
    - torph@0.0.5
    - oxfmt@0.35.0
    - '@oxfmt/*'
    - bloommx@1.0.3
    - '@shadcn/react'
    - mermaid@11.15.0
    - '@mermaid-js/*'
    - kea-typegen
    # The TS 7.0 native compiler ships as daily builds under @typescript/native-preview
    # (main + per-platform binary subpackages). We track it closely, so exempt the whole
    # scope from the release-age window.
    - '@typescript/*'
    - shiki
    - shadcn
    - '@shikijs/*'
