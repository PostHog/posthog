            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1d1f27;

        .replayer-mouse.active::after { animation: click .2s ease-in-out 1; }
        .replayer-mouse-tail { position: absolute; pointer-events: none; }
