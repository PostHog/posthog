# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Activity logs
feature: activity_logs
url_prefix: /activity
tools:
    activity-logs-list:
        operation: activity_log_list
        enabled: true
        scopes:
            - activity_log:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List activity logs
        description: >
            List recent activity logs for the project. Shows who changed what and when.
            Use scope parameter to filter by resource type. Use item_id to filter changes
            for a specific resource. Returns results ordered by most recent first.

            Available scopes: FeatureFlag, Insight, Dashboard, Experiment, Cohort, Survey,
            Notebook, Action, HogFunction, Person, Replay, Comment, BatchExport, Team,
            Project, ErrorTrackingIssue, EarlyAccessFeature, Annotation, AlertConfiguration.

            Common activities: created, updated, deleted, exported, logged_in, logged_out.

            Each result includes: user (who performed the action with first_name and email),
            activity (e.g. "created", "updated", "deleted"), scope (entity type), item_id
            (ID of the affected resource), detail (structured JSON with name, short_id, and
            a changes array where each change has type, action, field, before, and after
            values), and created_at timestamp.
        mcp_version: 1
        exclude_params:
            - page
        ui_resource_uri: ui://posthog/activity-log-list.html
