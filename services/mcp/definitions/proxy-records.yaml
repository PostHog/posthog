# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Reverse proxy
feature: reverse_proxy
url_prefix: /settings/organization-proxy
tools:
    proxy-list:
        operation: proxy_records_list
        enabled: true
        scopes:
            - organization:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List reverse proxies
        description: >
            List all managed reverse proxies configured for the current organization.
            Returns each proxy's domain, CNAME target, provisioning status, and the
            maximum number of proxies allowed by the current plan.
            Use this to check whether a reverse proxy is set up before recommending one.
    proxy-get:
        operation: proxy_records_retrieve
        enabled: true
        scopes:
            - organization:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get reverse proxy details
        description: >
            Get full details of a specific reverse proxy by ID. Returns the domain,
            CNAME target (the DNS record value the user needs to configure),
            current provisioning status, and any error or warning messages.
            Use this to debug why a proxy isn't working or to check DNS verification status.
    proxy-create:
        operation: proxy_records_create
        enabled: true
        scopes:
            - organization:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create reverse proxy
        description: >
            Create a new managed reverse proxy for a custom domain.
            Provide the domain (e.g. 'e.example.com') that will proxy requests to PostHog.
            The response includes the CNAME target — the user must add a CNAME DNS record
            pointing their domain to this target. Once DNS propagates, the proxy is
            automatically verified and an SSL certificate is issued.
            The proxy starts in 'waiting' status until DNS is verified.
        exclude_params:
            - target_cname
            - status
            - message
            - created_at
            - updated_at
            - created_by
    proxy-retry:
        operation: proxy_records_retry_create
        enabled: true
        scopes:
            - organization:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Retry reverse proxy provisioning
        description: >
            Retry provisioning a reverse proxy that has failed. Only works for proxies
            in 'erroring' or 'timed_out' status. Resets the proxy to 'waiting' and
            restarts the DNS verification and certificate provisioning workflow.
    proxy-delete:
        operation: proxy_records_destroy
        enabled: true
        scopes:
            - organization:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete reverse proxy
        description: >
            Delete a managed reverse proxy. For proxies still being set up (waiting,
            erroring, timed_out), the record is removed immediately. For active proxies,
            a cleanup workflow is started to remove the provisioned infrastructure.
