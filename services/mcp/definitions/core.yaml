    user-get:
        operation: users_retrieve
        enabled: true
        scopes:
            - user:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get user
        description: >
            Retrieve the authenticated user's own profile and settings — identity (id, uuid, distinct_id, email, name),
            security/auth state, preferences, and notification settings. Pass `@me` as the UUID to fetch the
            authenticated user; non-staff callers may only access their own account. This tool deliberately does NOT
            return organization or project configuration: the nested `organization`, `team`, and `organizations` objects
            are trimmed to just `id` and `name` (no API tokens, members, available features, or project settings). Use
            `project-get` for full project details, and the organization-scoped tools for organization details.
        param_overrides:
            uuid:
                description: User UUID, or `@me` to target the authenticated user.
        response:
            include:
                - id
                - uuid
                - distinct_id
                - email
                - pending_email
                - is_email_verified
                - first_name
                - last_name
                - date_joined
                - is_staff
                - has_password
                - is_2fa_enabled
                - has_social_auth
                - has_sso_enforcement
                - passkeys_enabled_for_2fa
                - allow_impersonation
                - notification_settings
                - anonymize_data
                - toolbar_mode
                - events_column_config
                - theme_mode
                - hedgehog_config
                - allow_sidebar_suggestions
                - shortcut_position
                - role_at_organization
                - hide_mcp_hints
                - scene_personalisation
                - pending_invites
                - organization.id
                - organization.name
                - team.id
                - team.name
                - organizations.*.id
                - organizations.*.name
    user-settings-update:
        operation: users_partial_update
        enabled: true
        scopes:
            - user:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Update user settings
        description: >
            Update the authenticated user's profile and settings using PATCH semantics — only the fields included in the
            request body are changed. Pass `@me` as the UUID; non-staff callers may only update their own account. Use
            `user-get` first to inspect current settings. `notification_settings` merges key-by-key; changing `email`
            triggers a verification flow; changing `password` also requires `current_password`. Always confirm changes
            with the user before applying.
        exclude_params:
            - date_joined
            - uuid
            - distinct_id
            - pending_email
            - is_email_verified
            - has_password
            - id
            - is_staff
            - is_impersonated
            - is_impersonated_until
            - is_impersonated_read_only
            - sensitive_session_expires_at
            - team
            - organization
            - organizations
            - has_social_auth
            - has_sso_enforcement
            - is_2fa_enabled
            - scene_personalisation
        param_overrides:
            uuid:
                description: User UUID, or `@me` to target the authenticated user.
