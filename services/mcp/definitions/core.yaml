    desktop-file-system-create:
        operation: desktop_file_system_create
        enabled: true
        scopes:
            - file_system:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create desktop channel
        description: >
            Create a new channel (folder) on the desktop surface. Pass a slash-delimited `path` (parent folders are
            created automatically) and `type: folder`. A blank instruction set is created for the channel automatically;
            use the desktop-file-system-instructions-partial-update tool to fill it in.
        param_overrides:
            path:
                description: >
                    Slash-delimited location of the channel, e.g. "Marketing/Q1 Campaigns". Intermediate folders are
                    created automatically.
            type:
                description: Use "folder" to create a channel.
    desktop-file-system-destroy:
        operation: desktop_file_system_destroy
        enabled: false
    desktop-file-system-instructions-destroy:
        operation: desktop_file_system_instructions_destroy
        enabled: false
    desktop-file-system-instructions-partial-update:
        operation: desktop_file_system_instructions_partial_update
        enabled: true
        scopes:
            - file_system:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Update channel instructions
        description: >
            Publish a new version of a channel's markdown instructions, describing what the channel contains. The `id`
            is the channel (folder) id. Each call creates a new version. To erase a channel's instructions, publish
            empty `content` — this clears the text while keeping the instruction set in place (the instruction set
            itself cannot be deleted).
        param_overrides:
            id:
                description: ID of the channel (desktop folder) whose instructions to update.
            content:
                description: >
                    Full markdown instructions to publish. Pass an empty string to erase the channel's instructions
                    while keeping the instruction set.
    desktop-file-system-instructions-retrieve:
        operation: desktop_file_system_instructions_retrieve
        enabled: true
        scopes:
            - file_system:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get channel instructions
        description: |
            Get the latest markdown instructions for a channel (desktop folder).
        param_overrides:
            id:
                description: ID of the channel (desktop folder) whose instructions to fetch.
