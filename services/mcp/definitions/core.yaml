# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Core
feature: core
url_prefix: /
ui_apps:
    debug:
        type: custom
        app_name: MCP Apps Debug
        description: Debug app for testing MCP Apps SDK integration
    query-results:
        type: custom
        app_name: Query Results
        description: Interactive visualization for PostHog query results
    render-ui:
        type: custom
        app_name: PostHog Render UI
        description: Renders the visualization for a PostHog MCP tool result
