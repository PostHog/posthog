# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Agent stack
feature: agent_platform
url_prefix: /agent_applications
ui_apps: {}
tools:
    agent-applications-approvals-decide:
        operation: agent_applications_approvals_decide
        enabled: false
    agent-applications-approvals-list:
        operation: agent_applications_approvals_list
        enabled: false
    agent-applications-approvals-retrieve:
        operation: agent_applications_approvals_retrieve
        enabled: false
    agent-applications-create:
        operation: agent_applications_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create an agent application
        description: >
            Create a new agent. Requires `name` + `slug` (unique within the team). The fresh application has no
            revisions; create a draft via `agent-applications-revisions-create`, populate its bundle, then freeze +
            promote.
    agent-applications-destroy:
        operation: agent_applications_destroy
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Archive an agent application
        description: >
            Soft-delete: `archived=true`, `archived_at` stamped. Existing revisions stay queryable for audit; further
            CRUD on this app is blocked until you create a new app with the same slug (the unique constraint is scoped
            to `archived=false`).
    agent-applications-env-keys-clear:
        operation: agent_applications_env_keys_clear
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Clear one secret
        description: >
            Remove one key from the encrypted env. No-op when the key wasn't set. Use this when a secret is no longer
            required by the spec or after a credential is known to be compromised. Does NOT trigger session restarts —
            in-flight sessions keep the value they resolved at start.
    agent-applications-env-keys-get:
        operation: agent_applications_env_keys_get
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Check whether one secret is set
        description: >
            Returns `{ key, is_set }` for one name. The value is never returned. Use as a pre-check before asking the
            user to set or rotate a key, and again after the user completes the punch-out flow to confirm the write
            landed.
    agent-applications-env-keys-list:
        operation: agent_applications_env_keys_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List the names of secrets currently set
        description: >
            Returns `{ keys: [name, ...] }` — names only, never values. Use to know which declared secrets are already
            populated so you don't ask the user to set something that's already set. Pair with
            `agent-applications-revisions-retrieve` (`spec.secrets[]`) to spot which declared keys are still unset.
    agent-applications-env-keys-set:
        operation: agent_applications_env_keys_set
        enabled: false
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Set or rotate one secret (raw value — disabled by default)
        description: >
            Body `{ value: "…" }`. Merges into the encrypted env without touching siblings. **Disabled for the standard
            MCP surface** — agents should never see raw secret values in their tool-call history. The standard path is
            to deep-link the user into the agent console's secret editor (see the `secrets-and-integrations` skill for
            the URL contract and callback flow); this endpoint exists for CI / scripts that already hold the value
            out-of-band.
    agent-applications-list:
        operation: agent_applications_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List agent applications
        description: >
            List every agent application in the project. Returns id, slug, name, description, live_revision, archived
            state. Use the slug to drive subsequent calls — it's stable and human-readable.
    agent-applications-partial-update:
        operation: agent_applications_partial_update
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update an agent application
        description: >
            Edit `name` / `description`. The env block is managed separately via `agent-applications-set-env-create`
            (never round-tripped through this endpoint), and `live_revision` is set by promoting a revision.
    agent-applications-preview-proxy:
        operation: agent_applications_preview_proxy
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Invoke a draft revision via the Django preview-proxy
        description: >
            Authoring-side proxy for invoking a non-live revision. Closes the anonymous-draft-invoke gap — the public
            ingress refuses draft invokes that don't carry a valid `x-agent-preview-token` (short-lived JWT bound to
            (app, revision)), and this proxy mints + attaches the token after authenticating the Django caller. Path
            `rest` is one of `run` (start a new session), `send` (append to an existing one), `cancel` (kill it),
            `listen` (SSE tail). `revision_id` query param is required and must be a non-live revision of this
            application. See docs/agent-platform/plans/draft-preview-auth.md.
    agent-applications-preview-proxy-get:
        operation: agent_applications_preview_proxy_get
        enabled: false
    agent-applications-preview-token:
        operation: agent_applications_preview_token
        enabled: false
    agent-applications-retrieve:
        operation: agent_applications_retrieve
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get an agent application
        description: >
            Fetch one application by id or slug (both unique within the team). Returns metadata only — to inspect the
            running spec or bundle, look up the live revision via `agent-applications-revisions-list` then call
            `agent-applications-revisions-retrieve` and `agent-applications-revisions-manifest-retrieve`.
    agent-applications-revisions-archive-create:
        operation: agent_applications_revisions_archive_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Archive a revision
        description: >
            Mark a revision archived. If it was the live revision, clears the parent application's `live_revision` (the
            app has no deployable version until another revision is promoted). Idempotent.
    agent-applications-revisions-bundle-retrieve:
        operation: agent_applications_revisions_bundle_retrieve
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Pull every file in a revision's bundle
        description: >
            Bulk download — returns `{ files: { path: utf-8 content, … } }` for every file in the bundle. Use when you
            want to edit the whole agent locally; mutate files, then push back via the bundle PUT (replace mode).
    agent-applications-revisions-bundle-update:
        operation: agent_applications_revisions_bundle_update
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Push a full bundle to a draft revision
        description: >
            Body `{ files: { path: content, … }, mode: "replace" | "merge" }`. `replace` wipes the existing bundle
            before writing the new set (use after a full edit); `merge` upserts (use for incremental adds). Only
            `state=draft` revisions accept this.
    agent-applications-revisions-clone-from-create:
        operation: agent_applications_revisions_clone_from_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Clone bundle from another revision
        description: >
            Copy every file in `source_revision_id`'s bundle into this (draft) revision. Use after
            `agent-applications-revisions-create` if you didn't go through `new-draft` for some reason. Both revisions
            must belong to the same team.
    agent-applications-revisions-create:
        operation: agent_applications_revisions_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create a draft revision
        description: >
            Create a new revision in state `draft`. Body shape mirrors the AgentRevision serializer — the only fields
            you typically set are `spec` (initial JSON) and `parent_revision` (optional, lets the diff UI show what
            you're changing). The bundle starts empty; use `agent-applications-revisions-clone-from-create` or
            `agent-applications-revisions-new-draft-create` to seed it from an existing revision.
    agent-applications-revisions-cron-fire-create:
        operation: agent_applications_revisions_cron_fire_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Manually fire one cron job
        description: >
            Fire a single cron job out-of-band, bypassing the scheduler's window logic. Use this to iterate on a cron
            agent's `prompt` (or to debug `external_key` placeholder expansion) without waiting for the next real
            firing. Required: `cron_name` (matches `spec.triggers[].config.name` on a `type: cron` trigger). Optional:
            `request_id` — pass a stable id per logical click so repeat fires resolve to the same session instead of
            stacking duplicates. Returns `{ ok, session_id, fired_at, idempotency_key }`; track the session via
            `agent-applications-sessions-retrieve` to read the conversation. Authoring-loop completion piece — without
            this, "did my prompt do the right thing?" is unanswerable until the cron actually fires.
    agent-applications-revisions-destroy:
        operation: agent_applications_revisions_destroy
        enabled: false
    agent-applications-revisions-file-destroy:
        operation: agent_applications_revisions_file_destroy
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete one file
        description: |
            Remove the file at `?path=…` from a draft revision. Idempotent — deleting an already-absent file is a no-op.
    agent-applications-revisions-file-retrieve:
        operation: agent_applications_revisions_file_retrieve
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Read one file
        description: >
            Returns `{ path, content }` for one file in the bundle. Pass `?path=…` (e.g. `?path=skills/research.md`).
            Works on any revision state.
    agent-applications-revisions-file-update:
        operation: agent_applications_revisions_file_update
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Write one file
        description: >
            Body `{ content: "…" }`. Creates or overwrites the file at `?path=…` in a draft revision. Use for targeted
            edits (one skill, one tool source); for bulk changes use the bundle PUT.
    agent-applications-revisions-freeze-create:
        operation: agent_applications_revisions_freeze_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Freeze a draft revision
        description: >
            Walks the bundle, computes a manifest sha256, stamps it on the row, flips state `draft → ready`. After this
            the bundle is immutable. Idempotent — freezing a `ready` revision is a no-op that returns the existing
            sha256.
    agent-applications-revisions-list:
        operation: agent_applications_revisions_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List revisions of an application
        description: >
            List every revision (draft, ready, live, archived) for one application, newest first. Use to find the
            current live revision id or pick a known-good revision to clone for an edit.
    agent-applications-revisions-manifest-retrieve:
        operation: agent_applications_revisions_manifest_retrieve
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List files in a revision's bundle
        description: >
            Returns `{ revision_id, state, bundle_sha256, files: [{ path, size, sha256 }, …] }`. Use to discover what's
            in a bundle without pulling all the bytes — sha256 lets you spot which files have changed since you last
            looked.
    agent-applications-revisions-new-draft-create:
        operation: agent_applications_revisions_new_draft_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Branch a new draft from an existing revision
        description: >
            One-shot helper: creates a draft revision under `application_id` and clones every file from
            `source_revision_id` into the new bundle in a single round-trip. Use this for the common "edit live"
            workflow — branch from the current live revision, mutate files, freeze, promote.
    agent-applications-revisions-partial-update:
        operation: agent_applications_revisions_partial_update
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update a revision's spec
        description: >
            Replace `spec` on a draft revision. Only `state=draft` revisions accept spec edits — promote bumps the
            revision to `ready` which freezes the spec. Validation against the AgentSpec zod schema runs on the runner
            side; an invalid spec will surface when the next session starts, not here.
    agent-applications-revisions-promote-create:
        operation: agent_applications_revisions_promote_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Promote a revision to live
        description: >
            Flips a `ready` revision to `live` and sets the parent application's `live_revision`. The previously live
            revision is archived automatically. Requires `state=ready` and `bundle_sha256` set (call `freeze` first).
            Idempotent: promoting an already-live revision is a no-op.
    agent-applications-revisions-retrieve:
        operation: agent_applications_revisions_retrieve
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get a revision
        description: >
            Fetch one revision's metadata: state, spec (the structural JSON), bundle_uri, bundle_sha256, parent revision
            id, timestamps. For the bundle contents see `agent-applications-revisions-manifest-retrieve` /
            `agent-applications-revisions-bundle-retrieve`.
    agent-applications-revisions-system-prompt:
        operation: agent_applications_revisions_system_prompt
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Preview the assembled system prompt for a revision
        description: >
            Returns the fully-assembled system prompt the runner would pass to the model at session start — framework
            preamble + agent.md (or `spec.entrypoint`) + skills index. Use to verify what the model actually sees before
            promoting; particularly useful for confirming `spec.framework_prompt.omit` opt-outs took effect or for
            debugging author-vs-framework precedence. Response also includes `framework_prompt_version` so you can tell
            whether a pin (`spec.framework_prompt.version_pin`) is in effect. Works on any revision state.
    agent-applications-revisions-update:
        operation: agent_applications_revisions_update
        enabled: false
    agent-applications-revisions-validate-create:
        operation: agent_applications_revisions_validate_create
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Validate a revision's bundle + spec
        description: >
            Pre-flight checks before deploying. Returns `{ ok, errors: [...] }`. Catches: missing entrypoint file,
            unknown native tool ids, custom tools missing `compiled.js` / `schema.json`, skill paths that don't exist in
            the bundle, declared secrets that aren't set in the application env. Works on any revision state — use this
            on a draft before calling `agent-applications-revisions-freeze-create`.
    agent-applications-session-logs:
        operation: agent_applications_session_logs
        enabled: false
    agent-applications-sessions-list:
        operation: agent_applications_sessions_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List sessions for an agent
        description: >
            Newest-first list of sessions for this agent across all revisions. Each summary carries id, state (queued /
            running / completed / closed / cancelled / failed), revision_id, principal, turn count, retry count,
            timestamps, a `preview` of the last assistant text (~120 chars), and `usage_total` (tokens + cost aggregated
            over the whole conversation). The transcript body is omitted — use `agent-applications-sessions-retrieve`
            for that. Filters: `state` (comma-separated for multiple, e.g. `completed,failed`), `revision_id` (UUID),
            `created_after` / `created_before` (ISO datetimes). Paging via `limit` (default 100, capped at 500) +
            `offset`. Filters AND together.
    agent-applications-sessions-retrieve:
        operation: agent_applications_sessions_retrieve
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get one session
        description: >
            Full `AgentSession` row: state, principal, conversation (user / assistant / toolResult messages),
            pending_inputs, retry_count, timestamps. Always includes a `usage_total` block (tokens + cost) aggregated
            over the entire session. Pass `last_n=<int>` to trim the response to the most recent N messages — useful for
            long sessions where you only care about the tail; `conversation_trimmed: true` plus
            `conversation_total_turns` tells you how much was hidden, and `usage_total` is still computed over the full
            untrimmed conversation so cost reporting stays accurate.
    agent-applications-set-env-create:
        operation: agent_applications_set_env_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Replace the application's env block
        description: >
            Body `{ env: { KEY: "value", … } }`. The whole env is replaced (not patched); pass the full set you want
            available to the runner. Encrypted at rest with the team's Fernet keys; the worker decrypts at session start
            and feeds the values to tool sandboxes as opaque nonces (raw secrets never leave Django).
    agent-applications-stats:
        operation: agent_applications_stats
        enabled: false
    agent-applications-update:
        operation: agent_applications_update
        enabled: false
    agent-custom-tool-templates-create:
        operation: agent_custom_tool_templates_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create a custom tool template (v1)
        description: >
            Create a new shared custom-tool template. Requires `source` (TypeScript), `compiled_js` (the bundler
            output), and `args_schema` (TypeBox / JSON Schema for the tool's args). The bundler runs client-side during
            authoring; the registry just stores the artifact pair.
    agent-custom-tool-templates-list:
        operation: agent_custom_tool_templates_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List custom tool templates
        description: >
            List the current (latest) version of every custom TypeScript tool template visible to the team. Use to
            discover existing tools before authoring a new one or wiring one into an agent's `spec.tools[]` via
            `from_template`.
    agent-custom-tool-templates-name-archive-create:
        operation: agent_custom_tool_templates_name_archive_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Archive a custom tool template
        description: >
            Soft-delete every version of this template. Frozen revisions that pin it keep working; new agents can no
            longer reference it.
    agent-custom-tool-templates-name-duplicate-create:
        operation: agent_custom_tool_templates_name_duplicate_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Duplicate a custom tool template
        description: |
            Copy a template's current source + compiled output under a new name. Produces v1 of the duplicate.
    agent-custom-tool-templates-name-publish-create:
        operation: agent_custom_tool_templates_name_publish_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Publish a new custom tool template version
        description: >
            Append a new version. Provide EITHER `source` (full overwrite) OR `edits[]` (structured find/replace);
            `compiled_js` must accompany either form because the bundler runs client-side. `args_schema` /
            `returns_schema` / `requires_secrets` are optional overrides — omit to keep the prior values.
    agent-custom-tool-templates-name-retrieve:
        operation: agent_custom_tool_templates_name_retrieve
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Retrieve a custom tool template
        description: >
            Fetch the latest version (default) or a specific version with `?version=N`. Returns the full `source` +
            `compiled_js` + schemas so the concierge can read before edit.
    agent-custom-tool-templates-name-usages-list:
        operation: agent_custom_tool_templates_name_usages_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Frozen agents pinning this custom tool template
        description: >
            Every frozen agent revision that pins this custom tool template (any version, or filter by
            `?pinned_version=N`). Use before archiving to see who'd be affected.
    agent-custom-tool-templates-name-versions-list:
        operation: agent_custom_tool_templates_name_versions_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Custom tool template version history
        description: |
            Every version row for this template name, newest first, with publisher + timestamp.
    agent-fleet-live-sessions:
        operation: agent_fleet_live_sessions
        enabled: false
    agent-fleet-stats:
        operation: agent_fleet_stats
        enabled: false
    agent-memory-create-file:
        operation: agent_memory_create_file
        enabled: false
    agent-memory-delete-file:
        operation: agent_memory_delete_file
        enabled: false
    agent-memory-get-file:
        operation: agent_memory_get_file
        enabled: false
    agent-memory-list-files:
        operation: agent_memory_list_files
        enabled: false
    agent-memory-search:
        operation: agent_memory_search
        enabled: false
    agent-memory-tree:
        operation: agent_memory_tree
        enabled: false
    agent-memory-update-file:
        operation: agent_memory_update_file
        enabled: false
    agent-native-tools-list:
        operation: agent_native_tools_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List native tools the runner knows
        description: >
            Read-only catalog of every `@posthog/*` native tool an agent can wire into `spec.tools`. Each entry includes
            the id, description, args schema (TypeBox-shaped), required integrations + scopes, and a cost hint (`cheap`
            / `medium` / `expensive`). Authoring flows use this to validate tool ids before writing them into a
            revision's spec.
    agent-skill-templates-create:
        operation: agent_skill_templates_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create a skill template (v1)
        description: >
            Create a new shared skill template under the active team. `name` is a slug (`research-flow`); the body is
            markdown (the SKILL.md), `files[]` are optional companion files (examples, schemas). Produces v1; later
            edits go through `agent-skill-templates-name-publish-create`.
    agent-skill-templates-list:
        operation: agent_skill_templates_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List skill templates
        description: >
            List the current (latest) version of every skill template visible to the team — both team-owned and
            canonical (`@posthog/*`) rows. Use to discover what's already on the shelf before authoring a new skill.
            `?search=<substring>` matches against name + description.
    agent-skill-templates-name-archive-create:
        operation: agent_skill_templates_name_archive_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Archive a skill template
        description: >
            Soft-delete every version of this template. Frozen revisions that still pin it keep working (the freeze copy
            is independent); new agents can no longer reference it.
    agent-skill-templates-name-duplicate-create:
        operation: agent_skill_templates_name_duplicate_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Duplicate a skill template
        description: >
            Copy a template's current body + companion files under a new name. Produces v1 of the duplicate; the
            source's version history is not carried over. Useful when a canonical `@posthog/*` template is the starting
            point for a team-specific skill.
    agent-skill-templates-name-files-create:
        operation: agent_skill_templates_name_files_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Add a companion file to a skill template
        description: >
            Attach a new file (path + content) to the latest version of this template. Path is relative; will land at
            `bundle/skills/<alias>/<path>` when an agent pins this skill at freeze time.
    agent-skill-templates-name-files-destroy:
        operation: agent_skill_templates_name_files_destroy
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Remove a companion file from a skill template
        description: >
            Drop a file by path from the latest version of this template. Affects future freezes; already-frozen
            revisions keep their copy.
    agent-skill-templates-name-files-rename-create:
        operation: agent_skill_templates_name_files_rename_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Rename a companion file
        description: >
            Move `from_path` → `to_path` for a companion file on the latest version. Use when restructuring an example
            tree, e.g. `examples/case-a.md` → `examples/onboarding/case-a.md`.
    agent-skill-templates-name-publish-create:
        operation: agent_skill_templates_name_publish_create
        enabled: true
        scopes:
            - agents:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Publish a new skill template version
        description: >
            Append a new version. Provide EITHER `body` (full overwrite) OR `edits[]` (structured find/replace where
            each `old` must match exactly once in the current body — mirrors LLMSkill's edit shape). Companion files
            carry forward unchanged. Returns the freshly-stamped v(n+1) row.
    agent-skill-templates-name-retrieve:
        operation: agent_skill_templates_name_retrieve
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Retrieve a skill template
        description: >
            Fetch a skill template's latest version (default) or a specific version with `?version=N`. Returns the full
            body + companion files, so the concierge can read before edit.
    agent-skill-templates-name-usages-list:
        operation: agent_skill_templates_name_usages_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Frozen agents pinning this skill template
        description: >
            Every frozen agent revision that pins this skill template (any version, or filter by `?pinned_version=N`).
            Each row carries the agent slug + name + revision short id + pinned version. Use before archiving to see
            who'd be affected.
    agent-skill-templates-name-versions-list:
        operation: agent_skill_templates_name_versions_list
        enabled: true
        scopes:
            - agents:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Skill template version history
        description: >
            Every version row for this template name, newest first, with publisher + timestamp. The single `is_latest:
            true` row marks the current version; older rows are read-only history.
