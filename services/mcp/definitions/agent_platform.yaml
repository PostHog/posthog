        title: List native tools the runner knows
        description: >
            Read-only catalog of every `@posthog/*` native tool an agent can wire into `spec.tools`. Each entry includes
            the id, description, args schema (TypeBox-shaped), required integrations + scopes, and a cost hint (`cheap`
            / `medium` / `expensive`). Authoring flows use this to validate tool ids before writing them into a
            revision's spec. Playbook: read the `authoring-new-agents` playbook via `agent-resolve-resource` for the
            end-to-end authoring flow.
