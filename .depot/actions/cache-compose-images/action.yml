name: Cache docker compose images
description: |
    Pre-pull docker compose service images on cache miss, save them as zstd
    tarballs to actions/cache, and load them back on subsequent runs. Works
    around slow cold docker image pulls on Depot CI runners by routing image
    bytes through Depot Cache instead of Docker Hub.

    Place this step BEFORE any `bin/ci-wait-for-docker launch` that uses the
    same compose files and profiles. Use the same COMPOSE_FILE and
    COMPOSE_PROFILES env vars as the downstream launch step.

inputs:
    compose-files:
        description: Colon-separated list of compose files, matching COMPOSE_FILE at launch time.
        required: true
    compose-profiles:
        description: Comma-separated list of compose profiles, matching COMPOSE_PROFILES at launch time.
        required: false
        default: ''
    services:
        description: Optional space-separated list of services to restrict the cache to. Default caches every service resolved by profiles.
        required: false
        default: ''
    cache-key-suffix:
        description: Suffix that scopes the cache to a workflow group (e.g. turbo-tests, django). Avoids churn across workflows that resolve slightly different image sets.
        required: true
    clickhouse-server-image:
        description: ClickHouse image override matching CLICKHOUSE_SERVER_IMAGE at launch time. Empty resolves the compose default. Required so the cached image set and key match the image the launch actually pulls.
        required: false
        default: ''

runs:
    using: composite
    steps:
        - name: Compute compose-image cache key
          id: key
          shell: bash
          env:
              COMPOSE_FILE: ${{ inputs.compose-files }}
              COMPOSE_PROFILES: ${{ inputs.compose-profiles }}
              SERVICES: ${{ inputs.services }}
              CLICKHOUSE_SERVER_IMAGE: ${{ inputs.clickhouse-server-image }}
              CACHE_KEY_SUFFIX: ${{ inputs.cache-key-suffix }}
              RUNNER_OS: ${{ runner.os }}
              RUNNER_ARCH: ${{ runner.arch }}
          run: |
              set -euo pipefail
              IFS=':' read -r -a files <<< "$COMPOSE_FILE"
              files_hash=$(
                  for f in "${files[@]}"; do
                      if [ -f "$f" ]; then
                          sha256sum "$f"
                      fi
                  done | sha256sum | awk '{print $1}'
              )
              payload=$(printf '%s|%s|%s|%s' "$files_hash" "$COMPOSE_PROFILES" "$SERVICES" "$CLICKHOUSE_SERVER_IMAGE")
              payload_hash=$(printf '%s' "$payload" | sha256sum | awk '{print $1}')
              echo "key=compose-images-v1-${CACHE_KEY_SUFFIX}-${RUNNER_OS}-${RUNNER_ARCH}-${payload_hash}" >> "$GITHUB_OUTPUT"
              echo "dir=${RUNNER_TEMP}/compose-images" >> "$GITHUB_OUTPUT"

        - name: Restore compose-image cache
          id: restore
          uses: actions/cache/restore@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
          with:
              path: ${{ steps.key.outputs.dir }}
              key: ${{ steps.key.outputs.key }}

        - name: Pull and save compose images on cache miss
          id: populate
          if: steps.restore.outputs.cache-hit != 'true'
          shell: bash
          env:
              COMPOSE_FILE: ${{ inputs.compose-files }}
              COMPOSE_PROFILES: ${{ inputs.compose-profiles }}
              SERVICES: ${{ inputs.services }}
              CLICKHOUSE_SERVER_IMAGE: ${{ inputs.clickhouse-server-image }}
              CACHE_DIR: ${{ steps.key.outputs.dir }}
          run: |
              set -euo pipefail
              mkdir -p "$CACHE_DIR"

              if [ -n "$SERVICES" ]; then
                  read -r -a service_args <<< "$SERVICES"
                  mapfile -t images < <(docker compose config --images "${service_args[@]}" | sort -u)
              else
                  mapfile -t images < <(docker compose config --images | sort -u)
              fi

              # Strip empty lines defensively
              filtered=()
              for image in "${images[@]}"; do
                  if [ -n "$image" ]; then
                      filtered+=("$image")
                  fi
              done
              images=("${filtered[@]}")

              if [ "${#images[@]}" -eq 0 ]; then
                  echo "No images resolved from compose config; skipping cache population."
                  exit 0
              fi

              echo "Resolved ${#images[@]} images to cache:"
              printf '  %s\n' "${images[@]}"

              # Parallel pull using compose (respects profiles). --ignore-pull-failures
              # keeps going if a floating tag (e.g. :master) is briefly missing.
              if [ -n "$SERVICES" ]; then
                  docker compose pull --parallel --ignore-pull-failures "${service_args[@]}"
              else
                  docker compose pull --parallel --ignore-pull-failures
              fi

              if command -v zstd >/dev/null 2>&1; then
                  compressor=(zstd -1 -T0 -q)
                  ext=.zst
              else
                  compressor=(gzip -1)
                  ext=.gz
              fi

              save_count=0
              for image in "${images[@]}"; do
                  if ! docker image inspect "$image" >/dev/null 2>&1; then
                      echo "Skip $image (not pulled)"
                      continue
                  fi
                  safe=$(printf '%s' "$image" | tr '/:@' '___')
                  out="$CACHE_DIR/${safe}.tar${ext}"
                  docker save "$image" | "${compressor[@]}" > "$out"
                  save_count=$((save_count + 1))
              done

              echo "Saved $save_count image tarballs to $CACHE_DIR"
              du -sh "$CACHE_DIR" 2>/dev/null || true

        - name: Save compose-image cache
          if: steps.restore.outputs.cache-hit != 'true' && steps.populate.outcome == 'success'
          uses: actions/cache/save@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
          with:
              path: ${{ steps.key.outputs.dir }}
              key: ${{ steps.key.outputs.key }}

        - name: Load compose images from cache
          if: steps.restore.outputs.cache-hit == 'true'
          shell: bash
          env:
              CACHE_DIR: ${{ steps.key.outputs.dir }}
          run: |
              set -euo pipefail
              shopt -s nullglob
              tarballs=("$CACHE_DIR"/*.tar.zst "$CACHE_DIR"/*.tar.gz)
              if [ "${#tarballs[@]}" -eq 0 ]; then
                  echo "Cache hit but no tarballs found in $CACHE_DIR; continuing with live pulls."
                  exit 0
              fi
              echo "Loading ${#tarballs[@]} cached image tarballs from $CACHE_DIR..."
              for t in "${tarballs[@]}"; do
                  case "$t" in
                      *.tar.zst) zstd -dc "$t" | docker load ;;
                      *.tar.gz)  gzip -dc "$t" | docker load ;;
                  esac
              done
