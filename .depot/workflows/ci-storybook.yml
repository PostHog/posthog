# Depot CI Migration
# Source: .github/workflows/ci-storybook.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: Storybook
on:
    pull_request:
    merge_group:
    push:
        branches:
            - master
concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    # Cancel in-progress runs on PRs when new commits are pushed
    # SHA verification ensures we don't commit stale snapshots if runs aren't cancelled in time
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions:
    contents: read
    pull-requests: write
jobs:
    # Job to decide if we should run storybook ci
    # See https://github.com/dorny/paths-filter#conditional-execution for more details
    changes:
        runs-on: depot-ubuntu-latest
        timeout-minutes: 5
        name: Determine need to run storybook checks
        if: github.event_name != 'merge_group'
        continue-on-error: true
        outputs:
            frontend: ${{ steps.filter.outputs.frontend || 'true' }}
            mode: ${{ steps.detect.outputs.mode }}
        steps:
            - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
              id: filter
              if: github.event_name != 'push' # Run all tests on master push
              with:
                  filters: |
                      frontend:
                        - 'frontend/**'
                        - 'products/**/*.{ts,tsx}'
                        - 'products/**/frontend/**'
                        - 'common/{esbuilder,mosaic,storybook,tailwind}/**'
                        - 'ee/frontend/**'
                        - '.storybook/**'
                        - 'package.json'
                        - '.depot/workflows/ci-storybook.yml'
                        - 'playwright.config.ts'
            - name: Detect snapshot mode
              id: detect
              env:
                  GH_TOKEN: ${{ github.token }}
              run: "if [ \"${{ github.event.pull_request.head.repo.full_name }}\" != \"${{ github.repository }}\" ]; then\n  echo \"mode=check\" >> $GITHUB_OUTPUT\n  echo \"Fork detected - running in CHECK mode (no commits allowed)\"\nelif [ -n \"${{ github.event.pull_request.number }}\" ] && gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels --jq '.[].name' | grep -q '^update-snapshots$'; then\n  echo \"mode=update\" >> $GITHUB_OUTPUT\n  echo \"::notice::\U0001F504 Running in UPDATE mode - 'update-snapshots' label detected\"\nelse\n  AUTHOR=\"${{ github.actor }}\"\n  echo \"Workflow triggered by: $AUTHOR\"\n\n  # Trusted bots that are allowed to run in update mode\n  # Add bot usernames here to allow snapshot auto-updates on their PRs\n  TRUSTED_BOTS=(\"mendral-app[bot]\" \"cursor[bot]\")\n\n  IS_TRUSTED=false\n  for bot in \"${TRUSTED_BOTS[@]}\"; do\n    if [[ \"$AUTHOR\" == \"$bot\" ]]; then\n      IS_TRUSTED=true\n      break\n    fi\n  done\n\n  if [[ \"$IS_TRUSTED\" == \"true\" ]]; then\n    echo \"mode=update\" >> $GITHUB_OUTPUT\n    echo \"::notice::\U0001F504 Trusted bot '$AUTHOR' - running in UPDATE mode\"\n  else\n    echo \"mode=check\" >> $GITHUB_OUTPUT\n    echo \"::notice::\U0001F50D Running in CHECK mode - add 'update-snapshots' label to enable snapshot updates\"\n  fi\nfi\n"
    build-storybook:
        name: Build Storybook
        runs-on: depot-ubuntu-latest
        continue-on-error: true
        timeout-minutes: 15
        needs: changes
        if: needs.changes.outputs.frontend == 'true'
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
                  repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
            - name: Install pnpm
              uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
            - name: Fix node-gyp permissions
              run: chmod +x ~/setup-pnpm/node_modules/.pnpm/pnpm@*/node_modules/pnpm/dist/node_modules/node-gyp/gyp/gyp_main.py
            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
                  cache-dependency-path: |
                      pnpm-lock.yaml
                      .depot/workflows/ci-storybook.yml
            - name: Install dependencies
              run: pnpm --filter=@posthog/storybook... install --frozen-lockfile
            - name: Restore webpack build cache
              uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
              with:
                  path: common/storybook/node_modules/.cache/
                  key: ${{ runner.os }}-webpack-storybook-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-webpack-storybook-
            - name: Build Storybook
              env:
                  NODE_OPTIONS: --max-old-space-size=32768
              run: |
                  bin/turbo --filter=@posthog/storybook prepare
                  pnpm --filter=@posthog/storybook build --test
