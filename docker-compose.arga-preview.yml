services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                COMMIT_HASH: ${ARGA_PREVIEW_COMMIT_SHA:-unknown}
        ports:
            - '8000:8000'
        environment:
            SITE_URL: ${ARGA_PREVIEW_URL_APP}
            JS_URL: ${ARGA_PREVIEW_URL_APP}
            LIVESTREAM_HOST: ${ARGA_PREVIEW_URL_APP}/livestream
            SECRET_KEY: ${POSTHOG_SECRET}
            ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS}
            DEPLOYMENT: hobby
            POSTHOG_SKIP_MIGRATION_CHECKS: '1'
            OTEL_SDK_DISABLED: 'true'
            FLAGS_REDIS_ENABLED: 'false'
            API_QUERIES_PER_TEAM: '{"1": 100}'
            OBJECT_STORAGE_ENABLED: 'true'
            OBJECT_STORAGE_ENDPOINT: http://objectstorage:19000
            OBJECT_STORAGE_PUBLIC_ENDPOINT: ${ARGA_PREVIEW_URL_APP}
            OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
            OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
            SESSION_RECORDING_V2_S3_ENDPOINT: http://objectstorage:19000
            SESSION_RECORDING_V2_S3_ACCESS_KEY_ID: object_storage_root_user
            SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY: object_storage_root_password
        depends_on:
            db:
                condition: service_healthy
            redis7:
                condition: service_healthy
            clickhouse:
                condition: service_healthy
            kafka:
                condition: service_healthy
            objectstorage:
                condition: service_started
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/_health'', timeout=3)"',
                ]
            interval: 10s
            timeout: 5s
            retries: 90
            start_period: 60s

    db:
        build:
            context: .
            dockerfile: Dockerfile.arga-postgres
        environment:
            POSTGRES_USER: posthog
            POSTGRES_DB: posthog
            POSTGRES_PASSWORD: posthog
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U posthog']
            interval: 5s
            timeout: 30s
            retries: 30
            start_period: 10s
        volumes:
            - postgres-data:/var/lib/postgresql/data

    redis7:
        image: redis:7.2-alpine
        command: redis-server --maxmemory-policy allkeys-lru --maxmemory 200mb
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 3s
            timeout: 10s
            retries: 10

    clickhouse:
        build:
            context: .
            dockerfile: Dockerfile.arga-clickhouse
        environment:
            CLICKHOUSE_SKIP_USER_SETUP: '1'
            KAFKA_HOSTS: kafka:9092
        depends_on:
            - kafka
            - zookeeper
        healthcheck:
            test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1']
            interval: 3s
            timeout: 10s
            retries: 30
            start_period: 30s
        volumes:
            - clickhouse-data:/var/lib/clickhouse

    zookeeper:
        image: zookeeper:3.7.0
        restart: on-failure
        volumes:
            - zookeeper-data:/data
            - zookeeper-datalog:/datalog
            - zookeeper-logs:/logs

    kafka:
        image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
        command:
            - redpanda
            - start
            - --kafka-addr
            - internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr
            - internal://kafka:9092,external://localhost:19092
            - --pandaproxy-addr
            - internal://0.0.0.0:8082,external://0.0.0.0:18082
            - --advertise-pandaproxy-addr
            - internal://kafka:8082,external://localhost:18082
            - --schema-registry-addr
            - internal://0.0.0.0:8081,external://0.0.0.0:18081
            - --rpc-addr
            - kafka:33145
            - --advertise-rpc-addr
            - kafka:33145
            - --mode
            - dev-container
            - --smp
            - '1'
            - --memory
            - 1G
            - --reserve-memory
            - 200M
            - --overprovisioned
            - --set
            - redpanda.empty_seed_starts_cluster=false
            - --seeds
            - kafka:33145
            - --set
            - redpanda.auto_create_topics_enabled=true
        environment:
            ALLOW_PLAINTEXT_LISTENER: 'true'
        depends_on:
            - zookeeper
        healthcheck:
            test: ['CMD-SHELL', 'curl -f http://localhost:9644/v1/status/ready || exit 1']
            interval: 3s
            timeout: 10s
            retries: 30
            start_period: 10s
        volumes:
            - redpanda-data:/var/lib/redpanda/data

    objectstorage:
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        entrypoint: sh
        command: -c 'mkdir -p /data/posthog /data/ai-blobs && minio server --address ":19000" --console-address ":19001" /data'
        environment:
            MINIO_ROOT_USER: object_storage_root_user
            MINIO_ROOT_PASSWORD: object_storage_root_password
        volumes:
            - objectstorage-data:/data

volumes:
    postgres-data:
    clickhouse-data:
    redpanda-data:
    zookeeper-data:
    zookeeper-datalog:
    zookeeper-logs:
    objectstorage-data:
