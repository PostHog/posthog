# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Notifications
feature: notifications
url_prefix: /notifications
ui_apps: {}
tools:
    notifications-list:
        operation: notifications_list
        enabled: true
        scopes:
            - notification:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List my notifications
        description: >
            List the real-time notifications the current user has in the PostHog dashboard, newest first. Each result
            includes the title, body, source URL, priority, whether the user has already read it, and what resource it
            points to (dashboard, alert, comment, approval, etc.). Use this to surface what PostHog is currently telling
            the user about — for example unread alerts firing on a dashboard, comment mentions, assigned issues, or
            pending approval requests.
    notifications-mark-all-read-create:
        operation: notifications_mark_all_read_create
        enabled: false
    notifications-mark-read-create:
        operation: notifications_mark_read_create
        enabled: false
    notifications-mark-unread-create:
        operation: notifications_mark_unread_create
        enabled: false
    notifications-send-concierge:
        operation: notifications_send_concierge_create
        enabled: true
        scopes:
            - notification:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Send concierge notification
        description: >
            STAFF ONLY. Send a real-time in-app concierge notification to one or more PostHog users. Equivalent to the
            Django admin "Send in-app notification to selected user(s)" action. Each target user receives the
            notification in their own current project. Returns the number of users that received the notification, a
            list of users that were skipped (with reasons — e.g. user has no current team, or delivery was suppressed by
            the real-time-notifications feature flag), and the IDs of the created notification events. Use sparingly —
            concierge notifications interrupt the user with a popover.
    notifications-unread-count-retrieve:
        operation: notifications_unread_count_retrieve
        enabled: false
