# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Logs
feature: logs
url_prefix: /logs
ui_apps: {}
tools:
    query-logs:
        operation: logs_query_create
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Query logs
        description_file: ./prompts/query-logs.md
        response:
            include:
                - results
    logs-attributes-list:
        operation: logs_attributes_retrieve
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List log attributes
        description: >
            List available log attribute names for filtering. Use attribute_type "log" for log-level attributes or
            "resource" for resource-level attributes (e.g. k8s labels).
        response:
            include:
                - results
                - count
    logs-attribute-values-list:
        operation: logs_values_retrieve
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List log attribute values
        description: >
            List values for a specific log attribute key. Use to discover what values exist for a given attribute before
            building filters.
        response:
            include:
                - results
    logs-explain-log-with-ai-create:
        operation: logs_explainLogWithAI_create
        enabled: false
