# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Logs
feature: logs
url_prefix: /logs
ui_apps: {}
tools:
    batch-exports-logs-retrieve:
        operation: batch_exports_logs_retrieve
        enabled: false
    batch-exports-runs-logs-retrieve:
        operation: batch_exports_runs_logs_retrieve
        enabled: false
    domains-scim-logs-retrieve:
        operation: domains_scim_logs_retrieve
        enabled: false
    hog-flow-templates-logs-retrieve:
        operation: hog_flow_templates_logs_retrieve
        enabled: false
    hog-flows-logs-retrieve:
        operation: hog_flows_logs_retrieve
        enabled: false
    hog-functions-logs-retrieve:
        operation: hog_functions_logs_retrieve
        enabled: false
    logs-alerts-create:
        operation: logs_alerts_create
        enabled: true
        scopes:
            - logs:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create log alert
        description: >
            Create a threshold-based alert on log streams. The alert periodically counts log entries matching the given
            filters and fires when the count crosses the threshold. Maximum 20 alerts per project.
        exclude_params:
            - id
            - state
            - check_interval_minutes
            - next_check_at
            - last_notified_at
            - last_checked_at
            - consecutive_failures
            - created_at
            - created_by
            - updated_at
        feature_flag: logs-alerting
        response:
            include:
                - id
                - name
                - enabled
                - state
                - filters
                - threshold_count
                - threshold_operator
                - window_minutes
                - check_interval_minutes
                - evaluation_periods
                - datapoints_to_alarm
                - cooldown_minutes
                - snooze_until
                - next_check_at
                - last_notified_at
                - last_checked_at
                - consecutive_failures
                - last_error_message
                - created_at
                - updated_at
    logs-alerts-destinations-create:
        operation: logs_alerts_destinations_create
        enabled: true
        scopes:
            - logs:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Attach alert destination
        description: >
            Attach a notification destination (Slack channel or webhook) to a log alert. Without a destination an alert
            evaluates silently and never notifies. One HogFunction is created per event kind (firing, resolved, broken,
            errored) atomically — the returned hog_function_ids identify the destination group.
        feature_flag: logs-alerting
        response:
            include:
                - hog_function_ids
    logs-alerts-destinations-delete-create:
        operation: logs_alerts_destinations_delete_create
        enabled: true
        scopes:
            - logs:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Detach alert destination
        description: >
            Remove a notification destination from a log alert by passing the hog_function_ids returned from
            logs-alerts-destinations-create. Destinations are deleted as one atomic group — partial deletion fails the
            call.
        feature_flag: logs-alerting
    logs-alerts-destroy:
        operation: logs_alerts_destroy
        enabled: true
        scopes:
            - logs:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete log alert
        description: |
            Permanently delete a log alert configuration by ID.
        feature_flag: logs-alerting
    logs-alerts-events-list:
        operation: logs_alerts_events_list
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List alert events
        description: >
            List historical events for a log alert — fires, resolves, errors, enable/disable toggles, threshold changes.
            Use to evaluate how an existing alert has behaved (firing cadence, error rate, flap pattern) before tuning
            thresholds. Quiet no-op check rows are filtered out server-side. Optional `kind` query param narrows to a
            single event kind.
        feature_flag: logs-alerting
        response:
            include:
                - id
                - created_at
                - kind
                - state_before
                - state_after
                - threshold_breached
                - result_count
                - error_message
                - query_duration_ms
    logs-alerts-list:
        operation: logs_alerts_list
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List log alerts
        description: >
            List log alert configurations in the current project, newest first. Returns alert name, state, threshold,
            filters, and scheduling details. Use this to review existing alerts before creating or modifying them.
        feature_flag: logs-alerting
        response:
            include:
                - id
                - name
                - enabled
                - state
                - threshold_count
                - threshold_operator
                - window_minutes
                - created_at
                - updated_at
    logs-alerts-partial-update:
        operation: logs_alerts_partial_update
        enabled: true
        scopes:
            - logs:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update log alert
        description: >
            Update a log alert configuration by ID. Only the fields you provide are changed. Use this to adjust
            thresholds, filters, enable/disable alerts, or snooze them.
        exclude_params:
            - id
            - state
            - check_interval_minutes
            - next_check_at
            - last_notified_at
            - last_checked_at
            - consecutive_failures
            - created_at
            - created_by
            - updated_at
        feature_flag: logs-alerting
        response:
            include:
                - id
                - name
                - enabled
                - state
                - filters
                - threshold_count
                - threshold_operator
                - window_minutes
                - check_interval_minutes
                - evaluation_periods
                - datapoints_to_alarm
                - cooldown_minutes
                - snooze_until
                - next_check_at
                - last_notified_at
                - last_checked_at
                - consecutive_failures
                - last_error_message
                - created_at
                - updated_at
    logs-alerts-reset-create:
        operation: logs_alerts_reset_create
        enabled: false
    logs-alerts-retrieve:
        operation: logs_alerts_retrieve
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get log alert
        description: >
            Get a log alert configuration by ID. Returns full details including current state, threshold settings,
            filters, and scheduling information.
        feature_flag: logs-alerting
        response:
            include:
                - id
                - name
                - enabled
                - state
                - filters
                - threshold_count
                - threshold_operator
                - window_minutes
                - check_interval_minutes
                - evaluation_periods
                - datapoints_to_alarm
                - cooldown_minutes
                - snooze_until
                - next_check_at
                - last_notified_at
                - last_checked_at
                - consecutive_failures
                - last_error_message
                - created_at
                - updated_at
    logs-alerts-simulate-create:
        operation: logs_alerts_simulate_create
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Simulate log alert
        description: >
            Run a draft alert configuration against historical logs and return per-bucket results from the full state
            machine — count, threshold_breached, state, notification (none/fire/resolve), reason. Use to validate
            threshold + N-of-M settings before creating an alert. Read-only; no alert records are written. Aim for
            fire_count between 0 and 3 over a `-7d` lookback for a healthy threshold.
        feature_flag: logs-alerting
        response:
            include:
                - buckets
                - fire_count
                - resolve_count
                - total_buckets
                - threshold_count
                - threshold_operator
    logs-alerts-update:
        operation: logs_alerts_update
        enabled: false
    logs-attribute-values-list:
        operation: logs_values_retrieve
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List log attribute values
        description: >
            List values for a specific log attribute key. Use to discover what values exist before building filters.
            Defaults to attribute_type "log" (log-level attributes). To get values for resource-level attributes (e.g.
            service.name, k8s.pod.name), you MUST explicitly pass attribute_type: "resource". Accepts optional
            serviceNames, dateRange, and filterGroup to narrow which logs are scanned.
        response:
            include:
                - results
    logs-attributes-list:
        operation: logs_attributes_retrieve
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List log attributes
        description: >
            List available log attribute names for filtering. Defaults to attribute_type "log" (log-level attributes).
            To search resource-level attributes (e.g. k8s.pod.name, k8s.namespace.name), you MUST explicitly pass
            attribute_type: "resource" — it will NOT return resource attributes unless you do. Accepts optional
            serviceNames, dateRange, and filterGroup to narrow which logs are scanned.
        response:
            include:
                - results
                - count
    logs-count:
        operation: logs_count_create
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Count logs
        description_file: ./prompts/logs-count.md
        response:
            include:
                - count
    logs-count-ranges:
        operation: logs_count_ranges_create
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Count logs by time bucket
        description_file: ./prompts/logs-count-ranges.md
        response:
            include:
                - ranges
                - interval
    logs-explain-log-with-ai-create:
        operation: logs_explainLogWithAI_create
        enabled: false
    logs-export-create:
        operation: logs_export_create
        enabled: false
    logs-has-logs-retrieve:
        operation: logs_has_logs_retrieve
        enabled: false
    logs-sampling-rules-create:
        operation: logs_sampling_rules_create
        enabled: false
    logs-sampling-rules-destroy:
        operation: logs_sampling_rules_destroy
        enabled: false
    logs-sampling-rules-list:
        operation: logs_sampling_rules_list
        enabled: false
    logs-sampling-rules-partial-update:
        operation: logs_sampling_rules_partial_update
        enabled: false
    logs-sampling-rules-reorder-create:
        operation: logs_sampling_rules_reorder_create
        enabled: false
    logs-sampling-rules-retrieve:
        operation: logs_sampling_rules_retrieve
        enabled: false
    logs-sampling-rules-simulate-create:
        operation: logs_sampling_rules_simulate_create
        enabled: false
    logs-sampling-rules-update:
        operation: logs_sampling_rules_update
        enabled: false
    logs-services-create:
        operation: logs_services_create
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List services with stats
        description: >
            Return the top-25 services by log volume in the window, each with log_count, error_count, and error_rate,
            plus a per-service sparkline. Use this as the entry point when triaging which services are worth alerting on
            — high volume × non-zero error_rate is the natural alert candidate. Far cheaper than walking
            attribute-values + per-service counts.
        response:
            include:
                - services
                - sparkline
    logs-sparkline-query:
        operation: logs_sparkline_create
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Query logs sparkline
        description_file: ./prompts/logs-sparkline.md
        response:
            include:
                - results
    logs-views-create:
        operation: logs_views_create
        enabled: false
    logs-views-destroy:
        operation: logs_views_destroy
        enabled: false
    logs-views-list:
        operation: logs_views_list
        enabled: false
    logs-views-partial-update:
        operation: logs_views_partial_update
        enabled: false
    logs-views-retrieve:
        operation: logs_views_retrieve
        enabled: false
    logs-views-update:
        operation: logs_views_update
        enabled: false
    plugin-configs-logs-list:
        operation: plugin_configs_logs_list
        enabled: false
    query-logs:
        operation: logs_query_create
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Query logs
        description_file: ./prompts/query-logs.md
        system_prompt_hint: Log filtering by severity/service/attribute
        response:
            include:
                - results
    tasks-runs-logs-retrieve:
        operation: tasks_runs_logs_retrieve
        enabled: false
