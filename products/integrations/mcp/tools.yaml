    integrations-linear-teams-retrieve:
        operation: integrations_linear_teams_retrieve
        enabled: false
    integrations-linkedin-ads-accounts-retrieve:
        operation: integrations_linkedin_ads_accounts_retrieve
        enabled: false
    integrations-linkedin-ads-conversion-rules-retrieve:
        operation: integrations_linkedin_ads_conversion_rules_retrieve
        enabled: false
    integrations-list:
        operation: integrations_list
        enabled: true
        scopes:
            - integration:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List integrations
        description: >
            List all third-party integrations configured in the current project. Returns each integration's type (kind),
            display name, non-sensitive configuration, error status, and creation metadata. Common kinds include slack,
            github, hubspot, salesforce, and various ad platforms. When authenticated via personal API key, only GitHub
            integrations are returned.
    integrations-twilio-phone-numbers-retrieve:
