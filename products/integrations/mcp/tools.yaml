# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Integrations
feature: integrations
url_prefix: /settings/integrations
ui_apps: {}
tools:
    integration-delete:
        operation: integrations_destroy
        enabled: true
        scopes:
            - integration:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete integration
        description: >
            Permanently delete an integration by ID. This removes the connection to the third-party service. Any
            features relying on this integration (alerts, workflow destinations, etc.) will stop working.
    integration-get:
        operation: integrations_retrieve
        enabled: true
        scopes:
            - integration:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get integration
        description: >
            Get a specific integration by ID. Returns full integration details including kind, display name, error
            status, and creation metadata. Does not expose sensitive credentials or raw configuration.
        response:
            include:
                - id
                - kind
                - display_name
                - errors
                - created_at
                - created_by
    integrations-anthropic-managed-agent-envs-retrieve:
        operation: integrations_anthropic_managed_agent_envs_retrieve
        enabled: false
    integrations-anthropic-managed-agent-vaults-retrieve:
        operation: integrations_anthropic_managed_agent_vaults_retrieve
        enabled: false
    integrations-anthropic-managed-agents-retrieve:
        operation: integrations_anthropic_managed_agents_retrieve
        enabled: false
    integrations-authorize-retrieve:
        operation: integrations_authorize_retrieve
        enabled: false
    integrations-channels-retrieve:
        operation: integrations_channels_retrieve
        enabled: true
        scopes:
            - integration:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List integration channels
        description: >
            List the Slack channels available for a Slack integration. Slack-only — non-Slack integration ids return an
            error (400 if the integration is otherwise visible, 404 if it isn't). Returns each channel's id, name,
            is_private, is_member, is_ext_shared, and is_private_without_access flags; use is_member to avoid picking
            channels the bot can't post to. Results are cached for 1 hour (no force-refresh exposed via MCP). Use this
            to find a channel_id when wiring up Slack delivery for an alert — pass the channel id into the
            cdp-functions-create inputs.channel.value field. Requires the Slack integration's id; use integrations-list
            (filter by kind=slack) to find it.
    integrations-clickup-lists-retrieve:
        operation: integrations_clickup_lists_retrieve
        enabled: false
    integrations-clickup-spaces-retrieve:
        operation: integrations_clickup_spaces_retrieve
        enabled: false
    integrations-clickup-workspaces-retrieve:
        operation: integrations_clickup_workspaces_retrieve
        enabled: false
    integrations-create:
        operation: integrations_create
        enabled: false
    integrations-domain-connect-apply-url-create:
        operation: integrations_domain_connect_apply_url_create
        enabled: false
    integrations-domain-connect-check-retrieve:
        operation: integrations_domain_connect_check_retrieve
        enabled: false
    integrations-email-partial-update:
        operation: integrations_email_partial_update
        enabled: false
    integrations-email-verify-create:
        operation: integrations_email_verify_create
        enabled: false
    integrations-environment-mapping-partial-update:
        operation: integrations_environment_mapping_partial_update
        enabled: false
    integrations-github-branches-retrieve:
        operation: integrations_github_branches_retrieve
        enabled: false
    integrations-github-link-existing-create:
        operation: integrations_github_link_existing_create
        enabled: false
    integrations-github-oauth-authorize-create:
        operation: integrations_github_oauth_authorize_create
        enabled: false
    integrations-github-repos-refresh-create:
        operation: integrations_github_repos_refresh_create
        enabled: false
    integrations-github-repos-retrieve:
        operation: integrations_github_repos_retrieve
        enabled: false
    integrations-google-accessible-accounts-retrieve:
        operation: integrations_google_accessible_accounts_retrieve
        enabled: false
    integrations-google-conversion-actions-retrieve:
        operation: integrations_google_conversion_actions_retrieve
        enabled: false
    integrations-jira-projects-retrieve:
        operation: integrations_jira_projects_retrieve
        enabled: false
    integrations-linear-teams-retrieve:
        operation: integrations_linear_teams_retrieve
        enabled: false
    integrations-linkedin-ads-accounts-retrieve:
        operation: integrations_linkedin_ads_accounts_retrieve
        enabled: false
    integrations-linkedin-ads-conversion-rules-retrieve:
        operation: integrations_linkedin_ads_conversion_rules_retrieve
        enabled: false
    integrations-list:
        operation: integrations_list
        enabled: true
        scopes:
            - integration:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List integrations
        description: >
            List all third-party integrations configured in the current project. Returns each integration's type (kind),
            display name, non-sensitive configuration, error status, and creation metadata. Common kinds include slack,
            github, hubspot, salesforce, and various ad platforms. Sensitive credentials (access tokens, secrets) are
            never serialized.
        response:
            include:
                - id
                - kind
                - display_name
                - created_at
                - created_by
    integrations-twilio-phone-numbers-retrieve:
        operation: integrations_twilio_phone_numbers_retrieve
        enabled: false
    role-external-references-create:
        operation: role_external_references_create
        enabled: false
    role-external-references-destroy:
        operation: role_external_references_destroy
        enabled: false
    role-external-references-list:
        operation: role_external_references_list
        enabled: false
    role-external-references-lookup-retrieve:
        operation: role_external_references_lookup_retrieve
        enabled: false
    users-integrations-github-branches-retrieve:
        operation: users_integrations_github_branches_retrieve
        enabled: false
    users-integrations-github-destroy:
        operation: users_integrations_github_destroy
        enabled: false
    users-integrations-github-repos-refresh-create:
        operation: users_integrations_github_repos_refresh_create
        enabled: false
    users-integrations-github-repos-retrieve:
        operation: users_integrations_github_repos_retrieve
        enabled: false
    users-integrations-github-start-create:
        operation: users_integrations_github_start_create
        enabled: false
    users-integrations-list:
        operation: users_integrations_list
        enabled: false
