# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Integrations
feature: integrations
url_prefix: /settings/integrations
ui_apps: {}
tools:
    integration-delete:
        operation: integrations_destroy
        enabled: true
        scopes:
            - integration:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete integration
        description: >
            Permanently delete an integration by ID. This removes the connection to the third-party service. Any
            features relying on this integration (alerts, workflow destinations, etc.) will stop working.
    integration-get:
        operation: integrations_retrieve
        enabled: true
        scopes:
            - integration:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get integration
        description: >
            Get a specific integration by ID. Returns the full integration details including kind, display name,
            non-sensitive configuration, error status, and creation metadata. Does not expose sensitive credentials.
    integrations-authorize-retrieve:
        operation: integrations_authorize_retrieve
        enabled: false
    integrations-channels-retrieve:
        operation: integrations_channels_retrieve
        enabled: false
    integrations-clickup-lists-retrieve:
        operation: integrations_clickup_lists_retrieve
        enabled: false
    integrations-clickup-spaces-retrieve:
        operation: integrations_clickup_spaces_retrieve
        enabled: false
    integrations-clickup-workspaces-retrieve:
        operation: integrations_clickup_workspaces_retrieve
        enabled: false
    integrations-create:
        operation: integrations_create
        enabled: false
    integrations-domain-connect-apply-url-create:
        operation: integrations_domain_connect_apply_url_create
        enabled: false
    integrations-domain-connect-check-retrieve:
        operation: integrations_domain_connect_check_retrieve
        enabled: false
    integrations-email-partial-update:
        operation: integrations_email_partial_update
        enabled: false
    integrations-email-verify-create:
        operation: integrations_email_verify_create
        enabled: false
    integrations-environment-mapping-partial-update:
        operation: integrations_environment_mapping_partial_update
        enabled: false
    integrations-github-branches-retrieve:
        operation: integrations_github_branches_retrieve
        enabled: false
    integrations-github-repos-refresh-create:
        operation: integrations_github_repos_refresh_create
        enabled: false
    integrations-github-repos-retrieve:
        operation: integrations_github_repos_retrieve
        enabled: false
    integrations-google-accessible-accounts-retrieve:
        operation: integrations_google_accessible_accounts_retrieve
