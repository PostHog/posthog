    tasks-active-wizard-run-retrieve:
        operation: tasks_active_wizard_run_retrieve
        enabled: false
    tasks-create:
        operation: tasks_create
        enabled: true
        scopes:
            - task:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Create task
        description: >
            Create an agent task in the current project — a unit of work an AI agent picks up and actions, such as
            investigating an inbox report, fixing an error, or opening a pull request. `description` is the prompt
            handed to the agent, so make it specific and actionable. Pass `repository` in `organization/repo` format for
            code tasks so the agent knows where to work; omit it for investigation-only tasks. This creates the task
            record only — it does not start the agent. Returns the created task including its URL; open that URL to
            start the run. Requires the calling token's organization to have Tasks access enabled.
        include_params:
            - title
            - description
            - repository
        param_overrides:
            description:
                description: >
                    The task for the agent to carry out, written as a direct prompt (e.g. "Investigate the spike in
                    $exception events on the checkout page and open a PR with a fix"). Passed verbatim to the agent as
                    its instructions, so be specific.
                required: true
        feature_flag: tasks
        response:
            include:
                - id
                - task_number
                - title
                - description
                - origin_product
                - repository
                - internal
                - created_at
                - updated_at
    tasks-destroy:
        operation: tasks_destroy
        enabled: false
    tasks-list:
        operation: tasks_list
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: List tasks
        description: >
            List agent tasks in the current project. Supports filtering by `origin_product`, `stage`, `organization`,
            `repository`, `created_by`, and `internal`. Returns lightweight task metadata only — call tasks-retrieve for
            the full task including its latest run, or tasks-runs-list for run history. Requires the calling token's
            organization to have Tasks access enabled.
        feature_flag: tasks
        response:
            include:
                - id
                - task_number
                - title
                - description
                - origin_product
                - repository
                - internal
                - created_at
                - updated_at
    tasks-partial-update:
        operation: tasks_partial_update
        enabled: false
    tasks-presence-create:
        operation: tasks_presence_create
        enabled: false
    tasks-presence-destroy:
        operation: tasks_presence_destroy
        enabled: false
    tasks-repositories-retrieve:
        operation: tasks_repositories_retrieve
        enabled: false
    tasks-repository-readiness-retrieve:
        operation: tasks_repository_readiness_retrieve
        enabled: false
    tasks-retrieve:
        operation: tasks_retrieve
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get task
        description: >
            Get a specific task by ID, including its description, repository, origin product, current stage, and latest
            run summary. Sandbox connection credentials and the presigned log URL are omitted from the embedded
            `latest_run`. Use tasks-runs-list or tasks-runs-retrieve to inspect past executions.
        feature_flag: tasks
        response:
            exclude:
                - latest_run.log_url
                - latest_run.state.sandbox_connect_token
                - latest_run.state.sandbox_url
