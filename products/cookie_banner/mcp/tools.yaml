# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Cookie banner
feature: cookie_banner
url_prefix: /cookie-banner
ui_apps: {}
tools:
    cookie-banner-create:
        operation: cookie_banner_create
        enabled: true
        scopes:
            - cookie_banner:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create cookie banner
        description: >
            Create the project's cookie consent banner. A project has at most one banner — if one already exists the
            call fails, so check with cookie-banner-list first and use cookie-banner-partial-update instead. Pass
            enabled: true to start serving the banner immediately, and an appearance object to tailor copy, art (PostHog
            logo or hedgehog art), position, and colors. Omitted appearance keys use the PostHog-styled defaults. The
            site must initialize posthog-js with opt_in_site_apps: true for the banner to render.
        feature_flag: cookie-banner
    cookie-banner-destroy:
        operation: cookie_banner_destroy
        enabled: false
    cookie-banner-list:
        operation: cookie_banner_list
        enabled: true
        scopes:
            - cookie_banner:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: Get cookie banner config
        description: >
            Get the project's cookie consent banner configuration. A project has at most one banner, so this returns
            zero or one entries. Use it to check whether a banner exists (and its id) before creating or updating one.
        feature_flag: cookie-banner
    cookie-banner-partial-update:
        operation: cookie_banner_partial_update
        enabled: true
        scopes:
            - cookie_banner:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Update cookie banner
        description: >
            Update the project's cookie consent banner. Pass {"enabled": true} or {"enabled": false} to turn the banner
            on or off, and/or an appearance object to change copy, art, position, colors, or white labelling. The
            appearance object replaces the stored one entirely, so include every key you want to keep. Get the banner id
            from cookie-banner-list.
        feature_flag: cookie-banner
    cookie-banner-retrieve:
        operation: cookie_banner_retrieve
        enabled: false
    cookie-banner-update:
        operation: cookie_banner_update
        enabled: false
