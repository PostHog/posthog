# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Dashboards
feature: dashboards
url_prefix: /dashboard
ui_apps: {}
tools:
    dashboard-create:
        operation: dashboards_create
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Create dashboard
        description: >
            Create a new dashboard. Provide a name and optional description, tags, and pinned status. Can also create
            from a template or duplicate an existing dashboard. This tool cannot attach insights — insights join a
            dashboard through their own `dashboards` field, so when building a dashboard of insights, create the
            dashboard first and pass its ID in `dashboards` on each insight-create (or add existing insights by
            appending it via insight-update). The returned tiles omit insight results to save context — use
            dashboard-insights-run to fetch the actual data for each insight. To add widget tiles after creation, see
            dashboard-widget-catalog-list for available widget types and dashboard-widgets-batch-add to add them.
        exclude_params:
            - creation_mode
            - effective_restriction_level
            - effective_privilege_level
            - is_shared
            - access_control_version
            - last_refresh
            - last_accessed_at
            - deleted
            - persisted_filters
            - persisted_variables
            - _create_in_folder
        response:
            exclude:
                - effective_restriction_level
                - effective_privilege_level
                - user_access_level
                - access_control_version
                - restriction_level
                - creation_mode
                - deleted
                - breakdown_colors
                - data_color_theme_id
                - quick_filter_ids
                - tiles.*.color
                - tiles.*.transparent_background
                - tiles.*.show_description
                - tiles.*.button_tile
                - tiles.*.insight.result
                - tiles.*.insight.hasMore
                - tiles.*.insight.columns
                - tiles.*.insight.hogql
                - tiles.*.insight.types
                - tiles.*.insight.query_status
                - tiles.*.insight.cache_target_age
                - tiles.*.insight.next_allowed_client_refresh
                - tiles.*.insight.filters_hash
                - tiles.*.insight.dashboards
                - tiles.*.insight.dashboard_tiles
                - tiles.*.insight.effective_restriction_level
                - tiles.*.insight.effective_privilege_level
                - tiles.*.insight.user_access_level
                - tiles.*.insight.filters
                - tiles.*.insight.is_sample
                - tiles.*.insight.saved
                - tiles.*.insight.order
                - tiles.*.insight.deleted
                - tiles.*.insight.alerts
                - tiles.*.insight.last_viewed_at
                - tiles.*.insight.timezone
                - tiles.*.insight.resolved_date_range
    dashboard-create-text-tile:
        operation: dashboards_create_text_tile_create
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{params.id}'
        title: Create dashboard text tile
        description: >
            Add a markdown text tile to a dashboard. Text tiles render as markdown blocks — useful as section headings,
            dividers, or annotations between insight tiles to give a dashboard structure. The desktop grid is 12 columns
            wide; a typical heading uses a thin full-width banner (e.g. `layouts.sm = {x: 0, y: 0, w: 12, h: 1}`). If
            `layouts` is omitted, the tile is placed using the default layout — use dashboard-reorder-tiles afterwards
            if you need precise placement.
        param_overrides:
            id:
                cast: string-int
    dashboard-delete:
        operation: dashboards_destroy
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Delete dashboard
        description: |
            Delete a dashboard by ID. The dashboard will be soft-deleted and no longer appear in lists.
        param_overrides:
            id:
                cast: string-int
        soft_delete: true
    dashboard-delete-tile:
        operation: dashboards_delete_tile
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        enrich_url: '{params.id}'
        title: Delete dashboard tile
        description: >
            Soft-delete a single tile (text, insight, widget, or button) from a dashboard. Behaves the same as the
            delete button in the UI — the underlying Insight, Text, ButtonTile, or widget row is preserved (so an
            insight that lives on multiple dashboards stays on the others), and the remaining tiles are automatically
            compacted upward to fill the gap left by the deleted tile (matching the dashboard grid's layout). Pass the
            DashboardTile id as `tile_id` (use dashboard-get to look up tile IDs). To remove the whole dashboard
            instead, use dashboard-delete.
        param_overrides:
            id:
                cast: string-int
    dashboard-get:
        operation: dashboards_retrieve
        enabled: true
        scopes:
            - dashboard:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get dashboard
        description: >
            Get a specific dashboard by ID. Returns the full dashboard including all tiles with their insights, widget
            configurations, and layout information. Widget tiles include a `widget` object with `widget_type` and
            `config` but no live data — use dashboard-widgets-run with tile IDs from this response. Insight results,
            filters, and query metadata are omitted to save context — use dashboard-insights-run to fetch the actual
            data for every insight on the dashboard in one call, or insight-query for a single insight. Supports
            variables_override and filters_override query params; on this endpoint they affect only the merged `filters`
            and `variables` fields in the response (preview). To execute insights with the same overrides, pass the same
            query params to dashboard-insights-run.
        param_overrides:
            id:
                cast: string-int
        response:
            exclude:
                - effective_restriction_level
                - effective_privilege_level
                - user_access_level
                - access_control_version
                - restriction_level
                - creation_mode
                - deleted
                - breakdown_colors
                - data_color_theme_id
                - quick_filter_ids
                - tiles.*.color
                - tiles.*.transparent_background
                - tiles.*.show_description
                - tiles.*.button_tile
                - tiles.*.insight.result
                - tiles.*.insight.hasMore
                - tiles.*.insight.columns
                - tiles.*.insight.hogql
                - tiles.*.insight.types
                - tiles.*.insight.query_status
                - tiles.*.insight.cache_target_age
                - tiles.*.insight.next_allowed_client_refresh
                - tiles.*.insight.filters_hash
                - tiles.*.insight.dashboards
                - tiles.*.insight.dashboard_tiles
                - tiles.*.insight.effective_restriction_level
                - tiles.*.insight.effective_privilege_level
                - tiles.*.insight.user_access_level
                - tiles.*.insight.filters
                - tiles.*.insight.is_sample
                - tiles.*.insight.order
                - tiles.*.insight.deleted
                - tiles.*.insight.alerts
                - tiles.*.insight.timezone
                - tiles.*.insight.resolved_date_range
    dashboard-insights-run:
        operation: dashboards_run_insights_retrieve
        enabled: true
        scopes:
            - query:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{params.id}'
        title: Run dashboard insights
        description: >
            Run all insights on a dashboard and return their results. Uses cached results by default (may be stale); set
            refresh to 'blocking' for fresh results. Set format to 'optimized' (default) for LLM-friendly text tables or
            'json' for raw query results. Supports variables_override and filters_override query params to run insights
            with one-off overrides without persisting; see the parameter descriptions for the exact JSON shape required.
        param_overrides:
            id:
                cast: string-int
    dashboard-reorder-tiles:
        operation: dashboards_reorder_tiles_create
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Reorder dashboard tiles
        description: >
            Reorder tiles on a dashboard by providing an array of tile IDs in the desired display order. First, use
            dashboard-get to see current tile IDs. By default existing tile widths and heights are preserved; see the
            layout parameter to force a 2-column or full-width grid instead.
    dashboard-templates-copy-between-projects-create:
        operation: dashboard_templates_copy_between_projects_create
        enabled: false
    dashboard-templates-create:
        operation: dashboard_templates_create
        enabled: false
    dashboard-templates-destroy:
        operation: dashboard_templates_destroy
        enabled: false
    dashboard-templates-json-schema-retrieve:
        operation: dashboard_templates_json_schema_retrieve
        enabled: false
    dashboard-templates-list:
        operation: dashboard_templates_list
        enabled: false
    dashboard-templates-partial-update:
        operation: dashboard_templates_partial_update
        enabled: false
    dashboard-templates-retrieve:
        operation: dashboard_templates_retrieve
        enabled: false
    dashboard-templates-update:
        operation: dashboard_templates_update
        enabled: false
    dashboard-tile-copy:
        operation: dashboards_copy_tile_create
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Copy dashboard tile
        description: >
            Copy an insight, text card, or widget tile from one dashboard to another. The path dashboard ID is the
            destination. Provide fromDashboardId (source dashboard) and tileId (tile to copy). Widget tiles require the
            dashboard-widgets feature flag and are deep-cloned with a new widget row.
        param_overrides:
            id:
                cast: string-int
    dashboard-update:
        operation: dashboards_partial_update
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Update dashboard
        description: >
            Update an existing dashboard by ID. Can update name, description, pinned status, tags, filters, and
            restriction level, and widget tile placement (layouts, show_description). To change a widget's own settings
            (config, name, description), prefer dashboard-widgets-batch-update, which takes just a tile_id per widget.
            You can also update widget tiles here by passing `tiles` with each tile's `id` and nested `widget.id` plus
            fields to change (`config`, `name`, `description`) from dashboard-get — the same PATCH path the UI uses. To
            add new widget tiles to this dashboard, use dashboard-widgets-batch-add instead. The returned tiles omit
            insight results to save context — use dashboard-insights-run to fetch the actual data for each insight.
        exclude_params:
            - creation_mode
            - effective_restriction_level
            - effective_privilege_level
            - is_shared
            - access_control_version
            - last_refresh
            - last_accessed_at
            - deleted
            - persisted_filters
            - persisted_variables
            - _create_in_folder
        param_overrides:
            id:
                cast: string-int
        response:
            exclude:
                - effective_restriction_level
                - effective_privilege_level
                - user_access_level
                - access_control_version
                - restriction_level
                - creation_mode
                - deleted
                - breakdown_colors
                - data_color_theme_id
                - quick_filter_ids
                - tiles.*.color
                - tiles.*.transparent_background
                - tiles.*.show_description
                - tiles.*.button_tile
                - tiles.*.insight.result
                - tiles.*.insight.hasMore
                - tiles.*.insight.columns
                - tiles.*.insight.hogql
                - tiles.*.insight.types
                - tiles.*.insight.query_status
                - tiles.*.insight.cache_target_age
                - tiles.*.insight.next_allowed_client_refresh
                - tiles.*.insight.filters_hash
                - tiles.*.insight.dashboards
                - tiles.*.insight.dashboard_tiles
                - tiles.*.insight.effective_restriction_level
                - tiles.*.insight.effective_privilege_level
                - tiles.*.insight.user_access_level
                - tiles.*.insight.filters
                - tiles.*.insight.is_sample
                - tiles.*.insight.order
                - tiles.*.insight.deleted
                - tiles.*.insight.alerts
                - tiles.*.insight.timezone
                - tiles.*.insight.resolved_date_range
    dashboard-update-text-tile:
        operation: dashboards_update_text_tile_create
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{params.id}'
        title: Update dashboard text tile
        description: >
            Update the markdown body, layout, or color of an existing text tile on a dashboard. Pass the DashboardTile
            id as `tile_id` (use dashboard-get to look up tile IDs). Only the fields you provide are updated; omitted
            fields are left unchanged.
        param_overrides:
            id:
                cast: string-int
    dashboard-widget-catalog-list:
        operation: dashboards_widget_catalog_retrieve
        enabled: true
        scopes:
            - dashboard:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List dashboard widget catalog
        description: >
            List registered dashboard widget types with labels, descriptions, and per-type config_schema. Use before
            dashboard-widgets-batch-add to pick a widget_type and shape config. Each type documents its own config keys
            under config_schema (shared keys include limit, orderBy, orderDirection, dateRange, filterTestAccounts, and
            optional widgetFilters).
    dashboard-widgets-batch-add:
        operation: dashboards_widgets_batch_create
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{params.id}'
        title: Add dashboard widgets
        description: >
            Add widget tiles to a dashboard atomically via POST .../widgets/batch/ (1–10 tiles). Call
            dashboard-widget-catalog-list first for valid widget_type values and config_schema. Pass `widgets` as an
            array of payloads (widget_type, config, optional name, description, layouts). Config shape is per
            widget_type (see catalog hints); widgetFilters when supported is a map of filter id to property filter
            entries. For a single tile, pass a one-element `widgets` array. Tiles stack at the bottom when layouts are
            omitted. Returns all created tiles; use dashboard-widgets-run to fetch live data. This only adds new tiles —
            to edit existing widget tiles, use dashboard-widgets-batch-update (no delete-and-re-add needed).
        param_overrides:
            id:
                cast: string-int
        feature_flag: dashboard-widgets
    dashboard-widgets-batch-update:
        operation: dashboards_update_widgets_batch
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{params.id}'
        title: Update dashboard widget settings
        description: >
            Update the settings of existing widgets in place atomically (1–10), without delete-and-re-add. Edits widget
            settings only — `config`, `name`, and `description`. Pass `widgets` as an array of payloads, each identified
            by its DashboardTile `tile_id` (use dashboard-get to look up widget tile IDs) plus the settings to change.
            Only the fields you provide per widget are updated; omitted fields are left unchanged. Optionally pass
            `widget_type` to get the typed config shape; widget_type is immutable. Config shape is per widget_type — see
            dashboard-widget-catalog-list. All updates succeed or fail together. Tile placement (layout,
            show_description) is not changed here — use dashboard-update or dashboard-reorder-tiles for that. To add new
            widgets, use dashboard-widgets-batch-add; to remove one, use dashboard-delete-tile.
        param_overrides:
            id:
                cast: string-int
        feature_flag: dashboard-widgets
    dashboard-widgets-run:
        operation: dashboards_run_widgets_retrieve
        enabled: true
        scopes:
            - dashboard:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{params.id}'
        title: Run dashboard widgets
        description: >
            Run live queries for dashboard widget tiles and return results. Requires the dashboard-widgets feature flag.
            Call dashboard-get first to find widget tile IDs (tiles with a widget field). Pass tile_ids as a
            comma-separated list. Each successful result is a widget-type-specific payload (see run_widgets OpenAPI
            response and dashboard-widget-catalog-list config_schema). Returns per-tile errors when the caller lacks
            product access for a widget type (see required_product_access on dashboard-widget-catalog-list). Not
            available on public/shared dashboard views.
        param_overrides:
            id:
                cast: string-int
        feature_flag: dashboard-widgets
    dashboards-bulk-update-tags-create:
        operation: dashboards_bulk_update_tags_create
        enabled: false
    dashboards-collaborators-create:
        operation: dashboards_collaborators_create
        enabled: false
    dashboards-collaborators-destroy:
        operation: dashboards_collaborators_destroy
        enabled: false
    dashboards-collaborators-list:
        operation: dashboards_collaborators_list
        enabled: false
    dashboards-copy-tile-create:
        operation: dashboards_copy_tile_create
        enabled: false
    dashboards-create-from-template-json-create:
        operation: dashboards_create_from_template_json_create
        enabled: false
    dashboards-create-unlisted-dashboard-create:
        operation: dashboards_create_unlisted_dashboard_create
        enabled: false
    dashboards-get-all:
        operation: dashboards_list
        enabled: true
        scopes:
            - dashboard:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: Get all dashboards
        description: >
            List dashboards in the project. The optional `search` parameter runs a fuzzy match against name and
            description using Postgres trigram word similarity (handles typos, transpositions, and prefix-as-you-type)
            and returns results ranked by relevance — use it to find a specific dashboard by name rather than paging
            through every dashboard. `search` is capped at 200 characters; longer queries return a 400 error. Optional
            filters by tag and pinned status are also supported. Returns name, description, pinned status, tags, and
            creation metadata. Tiles and insights are not included — use dashboard-get to fetch a dashboard's tiles,
            then dashboard-insights-run to fetch the actual data for each insight.
        param_overrides:
            limit:
                cast: string-int
            offset:
                cast: string-int
    dashboards-move-tile-create:
        operation: dashboards_move_tile_create
        enabled: false
    dashboards-move-tile-partial-update:
        operation: dashboards_move_tile_partial_update
        enabled: true
        scopes:
            - dashboard:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Move dashboard tile
        description: >
            Move a tile from the source dashboard (path ID) to another dashboard. Provide to_dashboard (destination
            dashboard ID) and tile.id (tile ID from dashboard-get). Works for insight, text, and widget tiles; widget
            tiles require the dashboard-widgets feature flag on the project.
        param_overrides:
            id:
                cast: string-int
    dashboards-stream-tiles-retrieve:
        operation: dashboards_stream_tiles_retrieve
        enabled: false
    dashboards-update:
        operation: dashboards_update
        enabled: false
    dashboards-widget-catalog-retrieve:
        operation: dashboards_widget_catalog_retrieve
        enabled: false
    dashboards-widgets-batch-create:
        operation: dashboards_widgets_batch_create
        enabled: false
    data-color-themes-create:
        operation: data_color_themes_create
        enabled: false
    data-color-themes-destroy:
        operation: data_color_themes_destroy
        enabled: false
    data-color-themes-list:
        operation: data_color_themes_list
        enabled: false
    data-color-themes-partial-update:
        operation: data_color_themes_partial_update
        enabled: false
    data-color-themes-retrieve:
        operation: data_color_themes_retrieve
        enabled: false
    data-color-themes-update:
        operation: data_color_themes_update
        enabled: false
