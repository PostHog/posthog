extend = "../pyproject.toml"
src = [".."]

[lint]
extend-select = ["ANN001", "ANN201", "ANN202", "ANN204"]

[lint.per-file-ignores]
"**/tests/**" = ["ANN"]
"**/test_*" = ["ANN"]
"**/migrations/**" = ["ANN"]
"**/management/**" = ["ANN"]
"**/skills/**" = ["ANN"]
"**/eval/**" = ["ANN"]
"**/dags/**" = ["ANN"]
"**/scripts/**" = ["ANN"]
# Autoresearch sandbox scripts: stdout is the protocol they speak to the
# orchestrator. The "no print" lint applies to long-running services, not
# to sandbox programs whose output is the result.
"query_performance_ai/autoresearch/**" = ["T201", "ANN"]
"query_performance_ai/scripts/**" = ["T201", "ANN"]
"**/stats/**" = ["ANN"]

