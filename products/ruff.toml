extend = "../pyproject.toml"
src = [".."]

[lint]
extend-select = ["ANN001", "ANN201", "ANN202", "ANN204"]

[lint.per-file-ignores]
"**/tests/**" = ["ANN"]
"**/test_*" = ["ANN"]
"**/migrations/**" = ["ANN"]
"**/management/**" = ["ANN"]
"**/skills/**" = ["ANN"]
"**/eval/**" = ["ANN"]
"**/dags/**" = ["ANN"]
"**/scripts/**" = ["ANN"]
"**/stats/**" = ["ANN"]

# autoresearch sandbox scripts use stdout as their orchestration protocol
# (pi-autoresearch's `METRIC name=value` parse format and the campaign init's
# human-readable banner) so the no-print lint doesn't apply.
"query_performance_ai/autoresearch/scripts/**" = ["T201"]
"query_performance_ai/autoresearch/templates/workspace/**" = ["T201"]
"query_performance_ai/scripts/run_campaign.py" = ["T201"]

