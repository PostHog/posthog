# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Business knowledge
feature: business_knowledge
url_prefix: /business-knowledge
ui_apps: {}
tools:
    business-knowledge-document-window-retrieve:
        operation: business_knowledge_documents_window_list
        enabled: true
        scopes:
            - business_knowledge:read
        feature_flag: product-business-knowledge
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Read business knowledge document context
        description: >
            Returns a window of content chunks from a business knowledge document, centered around a specific ordinal.
            Use after searching knowledge to get more surrounding context for a specific result.
    business-knowledge-sources-text-create:
        operation: business_knowledge_sources_create
        enabled: true
        scopes:
            - business_knowledge:write
        feature_flag: product-business-knowledge
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create text business knowledge source
        description: >
            Create a text-based business knowledge source. Provide a short name and the raw text to index
            (capped at 1 MB). The text is chunked, embedded, and made searchable. Returns the created source
            with its processing status.
    business-knowledge-sources-url-create:
        operation: business_knowledge_sources_create
        enabled: true
        scopes:
            - business_knowledge:write
        feature_flag: product-business-knowledge
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        input_schema: BusinessKnowledgeUrlSourceCreateSchema
        title: Create URL business knowledge source
        description: >
            Create a URL-based business knowledge source. Provide a name and a public HTTP(S) URL to fetch
            and index. The page content is fetched, parsed, chunked, and made searchable. Optionally set a
            refresh interval so the source is re-fetched automatically. Returns the created source with its
            processing status (initially "processing" while the URL is being fetched in the background).
    business-knowledge-sources-destroy:
        operation: business_knowledge_sources_destroy
        enabled: false
    business-knowledge-sources-list:
        operation: business_knowledge_sources_list
        enabled: true
        scopes:
            - business_knowledge:read
        feature_flag: product-business-knowledge
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List business knowledge sources
        description: >
            List all business knowledge sources in the project, with document/chunk counts, processing
            status, and refresh metadata.
        response:
            include:
                - id
                - name
                - source_type
                - status
                - error_message
                - document_count
                - chunk_count
                - source_url
                - has_unsafe_documents
                - refresh_interval
                - next_refresh_at
                - created_at
                - updated_at
    business-knowledge-sources-partial-update:
        operation: business_knowledge_sources_partial_update
        enabled: false
    business-knowledge-sources-refresh-create:
        operation: business_knowledge_sources_refresh_create
        enabled: false
    business-knowledge-sources-retrieve:
        operation: business_knowledge_sources_retrieve
        enabled: true
        scopes:
            - business_knowledge:read
        feature_flag: product-business-knowledge
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get business knowledge source
        description: >
            Get a single business knowledge source by ID, including processing status, document/chunk counts,
            and refresh metadata.
    business-knowledge-sources-text-retrieve:
        operation: business_knowledge_sources_text_retrieve
        enabled: false
