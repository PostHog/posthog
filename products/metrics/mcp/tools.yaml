# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Metrics
feature: metrics
url_prefix: /metrics
ui_apps: {}
tools:
    event-definitions-metrics-retrieve:
        operation: event_definitions_metrics_retrieve
        enabled: false
    event-filter-metrics-retrieve:
        operation: event_filter_metrics_retrieve
        enabled: false
    event-filter-metrics-totals-retrieve:
        operation: event_filter_metrics_totals_retrieve
        enabled: false
    groups-types-metrics-create:
        operation: groups_types_metrics_create
        enabled: false
    groups-types-metrics-destroy:
        operation: groups_types_metrics_destroy
        enabled: false
    groups-types-metrics-list:
        operation: groups_types_metrics_list
        enabled: false
    groups-types-metrics-partial-update:
        operation: groups_types_metrics_partial_update
        enabled: false
    groups-types-metrics-retrieve:
        operation: groups_types_metrics_retrieve
        enabled: false
    groups-types-metrics-update:
        operation: groups_types_metrics_update
        enabled: false
    hog-flows-metrics-global-retrieve:
        operation: hog_flows_metrics_global_retrieve
        enabled: false
    hog-flows-metrics-retrieve:
        operation: hog_flows_metrics_retrieve
        enabled: false
    hog-flows-metrics-totals-retrieve:
        operation: hog_flows_metrics_totals_retrieve
        enabled: false
    hog-functions-metrics-retrieve:
        operation: hog_functions_metrics_retrieve
        enabled: false
    hog-functions-metrics-totals-retrieve:
        operation: hog_functions_metrics_totals_retrieve
        enabled: false
    metric-names-list:
        operation: metrics_values_retrieve
        enabled: true
        scopes:
            - metrics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List metric names
        description_file: ./prompts/metric-names-list.md
        system_prompt_hint: Discover which server/infrastructure metrics exist before querying them
        feature_flag: metrics
        response:
            include:
                - results
    metrics-has-metrics-retrieve:
        operation: metrics_has_metrics_retrieve
        enabled: false
    query-metrics:
        operation: metrics_query_create
        enabled: true
        scopes:
            - metrics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Query metrics
        description_file: ./prompts/query-metrics.md
        system_prompt_hint: Server/infrastructure metrics (OTel/Prometheus) — time series, rates, quantiles, formulas
        feature_flag: metrics
        response:
            include:
                - results
