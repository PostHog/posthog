# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: User interview topics
feature: user_interviews
url_prefix: /user_interviews
ui_apps: {}
tools:
    user-interview-topics-create:
        operation: user_interview_topics_create
        enabled: true
        scopes:
            - user_interview:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create user interview topic
        description: >
            Plan a user interview by recording who you want to target and what product or idea you want to ask them
            about. `topic` is the free-text description of the question or product area. Targets can be specified as any
            combination of `interviewee_cohort` (optional cohort identifier), `interviewee_emails` (list of email
            addresses), and `interviewee_distinct_ids` (list of PostHog distinct IDs) — at least one target must be
            provided. Pass `agent_context` (free text) to give the voice agent extra background or instructions, and
            `questions` (list of strings) for the ordered set of questions the agent should work through.
        include_params:
            - interviewee_cohort
            - interviewee_emails
            - interviewee_distinct_ids
            - topic
            - agent_context
            - questions
        feature_flag: user-interviews
    user-interview-topics-destroy:
        operation: user_interview_topics_destroy
        enabled: false
    user-interview-topics-generate-links:
        operation: user_interview_topics_generate_links_create
        enabled: true
        scopes:
            - user_interview:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Generate public interview links for a topic
        description: >
            Generate one public, unauthenticated interview link per targeted interviewee on a user interview topic. For
            each identifier in the topic's `interviewee_emails` and `interviewee_distinct_ids`, materializes (or reuses)
            an IntervieweeContext row and an enabled SharingConfiguration, and returns the merged voice-agent context
            alongside the URL the interviewee should open. The URL hosts the call publicly — no PostHog login required.
            Calling this multiple times is safe: existing share links are reused.
        feature_flag: user-interviews
    user-interview-topics-interviewees-create:
        operation: user_interview_topics_interviewees_create
        enabled: true
        scopes:
            - user_interview:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Add per-interviewee context to a topic
        description: >
            Attach extra context for a single interviewee on a user interview topic. Use this to give the voice agent
            background it should know about this specific person — e.g. "uses the replay product but has never used
            summarization". `interviewee_identifier` is the email or PostHog distinct ID matching one of the entries in
            the parent topic's targeting fields. `agent_context` is free text. At most one row per (topic,
            interviewee_identifier) — calling create twice for the same pair will conflict.
        include_params:
            - interviewee_identifier
            - agent_context
        feature_flag: user-interviews
    user-interview-topics-interviewees-destroy:
        operation: user_interview_topics_interviewees_destroy
        enabled: false
    user-interview-topics-interviewees-list:
        operation: user_interview_topics_interviewees_list
        enabled: true
        scopes:
            - user_interview:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List per-interviewee contexts for a topic
        description: >
            List the per-interviewee context rows attached to a single user interview topic. Each row is
            (interviewee_identifier, agent_context). Use this to see who has extra context attached before adding more.
        feature_flag: user-interviews
    user-interview-topics-interviewees-partial-update:
        operation: user_interview_topics_interviewees_partial_update
        enabled: false
    user-interview-topics-interviewees-retrieve:
        operation: user_interview_topics_interviewees_retrieve
        enabled: false
    user-interview-topics-interviewees-update:
        operation: user_interview_topics_interviewees_update
        enabled: false
    user-interview-topics-list:
        operation: user_interview_topics_list
        enabled: true
        scopes:
            - user_interview:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List user interview topics
        description: >
            List planned user interview topics in the current project, newest first. Each result includes the topic,
            targeting (interviewee_cohort, interviewee_emails, interviewee_distinct_ids), and the voice agent setup
            (agent_context, questions). Supports `search` for substring match against the topic, and `limit`/`offset`
            for pagination.
        feature_flag: user-interviews
    user-interview-topics-partial-update:
        operation: user_interview_topics_partial_update
        enabled: false
    user-interview-topics-retrieve:
        operation: user_interview_topics_retrieve
        enabled: false
    user-interview-topics-send-invites:
        operation: user_interview_topics_send_invites_create
        enabled: true
        scopes:
            - user_interview:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Email interview invites to every targeted interviewee
        description: >
            Generate (if not yet created) and email a personalized public interview link to every targeted interviewee
            on a user interview topic whose identifier is an email address. The email includes a friendly greeting and a
            button linking to the public voice-interview page. Distinct-ID-only interviewees are skipped and surfaced in
            the response. Use this once a topic is finalized; safe to call repeatedly — invites are deduplicated per
            share via the messaging system's idempotency record, and a token rotation produces a fresh send key.
        include_params:
            - subject
            - reply_to
            - send_async
        feature_flag: user-interviews
    user-interview-topics-update:
        operation: user_interview_topics_update
        enabled: false
    user-interviews-create:
        operation: user_interviews_create
        enabled: false
    user-interviews-destroy:
        operation: user_interviews_destroy
        enabled: false
    user-interviews-list:
        operation: user_interviews_list
        enabled: false
    user-interviews-partial-update:
        operation: user_interviews_partial_update
        enabled: false
    user-interviews-retrieve:
        operation: user_interviews_retrieve
        enabled: false
    user-interviews-update:
        operation: user_interviews_update
        enabled: false
