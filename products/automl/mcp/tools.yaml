# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: AutoML
feature: automl
url_prefix: /automl
ui_apps: {}
tools:
    automl-archive:
        operation: automl_pipelines_archive_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        enrich_url: '{id}'
        title: Archive AutoML pipeline
        description: >
            Soft-archive a pipeline. Inference stops permanently and the pipeline disappears from the default list view.
            History (predictions, model versions, audit log) is preserved. Idempotent.
    automl-create:
        operation: automl_pipelines_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create AutoML pipeline
        description: >
            Create a new AutoML pipeline in draft state. Picks one of four task types (clustering, classification,
            regression, forecasting), describes the training and inference populations, and sets cadences and autonomy.
            The pipeline does not start training until automl-start is called.
        param_overrides:
            name:
                description: >
                    Human-readable label for the pipeline. Shows up in the UI and in property names. Keep it short and
                    unique within the team.
            task_type:
                description: >
                    One of "clustering", "classification", "regression", or "forecasting". Determines what kind of model
                    is trained and how predictions are surfaced.
            config:
                description: >
                    Task-type-specific configuration (target event, horizon, cluster count, forecasting window, etc.).
                    Shape depends on task_type. See the AutoML design doc for per-task fields.
            training_population:
                description: >
                    Population definition (HogQL or filter spec) describing which persons, groups, or events are
                    eligible to be drawn into the training set.
            inference_population:
                description: >
                    Population definition describing who the model is scored against on each scheduled run. Usually
                    broader than training_population.
            inference_cadence:
                description: >
                    How often inference runs after the pipeline is active. One of "hourly", "daily", "weekly",
                    "monthly", or "never" (manual only).
            retraining_cadence:
                description: >
                    How often the model is refit on a rolling window. One of "hourly", "daily", "weekly", "monthly", or
                    "never".
            autonomy:
                description: >
                    Output gate. "shadow_only" surfaces predictions internally but never writes person/group properties
                    or emits events. "champion_only" writes from the active champion model. "promote_eligible" lets
                    challenger models graduate to champion automatically when metrics pass thresholds.
            output_property_name:
                description: >
                    Name of the person or group property where predictions are written. Optional; if blank the pipeline
                    emits events only.
    automl-get:
        operation: automl_pipelines_retrieve
        enabled: true
        scopes:
            - automl:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Retrieve AutoML pipeline
        description: >
            Fetch one AutoML pipeline by id. Returns the full pipeline including task type, status, autonomy level,
            configured populations, cadences, and timestamps. Use this after automl-list to inspect a specific pipeline
            in detail.
    automl-list:
        operation: automl_pipelines_list
        enabled: true
        scopes:
            - automl:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: List AutoML pipelines
        description: >
            List all non-archived AutoML pipelines for the current team, newest first. Each pipeline captures a
            configured ML task (clustering, classification, regression, or forecasting) along with its populations,
            cadence, autonomy, and lifecycle status. Use this to discover what pipelines exist before fetching one by
            id.
    automl-pause:
        operation: automl_pipelines_pause_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Pause AutoML pipeline
        description: >
            Pause scheduled inference and retraining for an active pipeline. The model and history are kept; no new
            predictions are produced until automl-resume is called. Idempotent — pausing an already paused pipeline is a
            no-op.
    automl-get-active-model:
        operation: automl_pipelines_model_versions_active_retrieve
        enabled: true
        scopes:
            - automl:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get the active model version for a pipeline
        description: >
            Look up the model version currently holding a role on a pipeline. Defaults to champion. Returns 404 when no
            version holds the role — most commonly because the pipeline hasn't completed bootstrap. Use this from the
            bootstrap orchestration brief to check whether a champion already exists before promoting a freshly trained
            challenger.
        param_overrides:
            id:
                description: >
                    Pipeline UUID. The version is scoped to the pipeline — calling this against the wrong pipeline
                    returns 404 even if a version with that role exists on another pipeline.
            role:
                description: >
                    Role to look up. One of "champion", "challenger", "archived". Defaults to "champion" if omitted.
    automl-record-training-result:
        operation: automl_pipelines_model_versions_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Record an AutoML training result
        description: >
            Persist a completed training run as a new model version on a pipeline. Role defaults to "challenger" so a
            fresh run never auto-displaces the existing champion — promotion is a separate explicit step via
            automl-promote-model-version. Called by the bootstrap and retraining orchestration agents after the trainer
            returns; not typically called by humans directly.
        param_overrides:
            id:
                description: >
                    Pipeline UUID this training run belongs to. Versions are pipeline-scoped and never moved between
                    pipelines.
            metrics:
                description: >
                    Final evaluation metrics from the trainer (AutoGluon's leaderboard column names verbatim, e.g.
                    accuracy / roc_auc / log_loss for classification). Used by the promotion gate.
            leaderboard:
                description: >
                    Per-model leaderboard rows the trainer produced. List of dicts; shape is task-type-specific. Stored
                    for audit and surfaced in the outcome report.
            role:
                description: >
                    One of "champion" / "challenger" / "archived". Defaults to "challenger". Pipelines have at most one
                    champion + one challenger at a time (DB-enforced partial unique constraint).
            training_params:
                description: >
                    Parameters the trainer was invoked with — preset, time_limit_s, target column, training query.
                    Round-tripped on the version for reproducibility.
            artifact_uri:
                description: >
                    Pointer to the persisted model directory or archive (local path during dev, s3:// in production).
                    Not validated by the API; the inference workflow will need it to load the model later.
            features_hash:
                description: >
                    Short hash of the sorted feature column names. Used downstream to detect feature drift between
                    training runs without diffing schemas.
    automl-list-model-versions:
        operation: automl_pipelines_model_versions_list
        enabled: true
        scopes:
            - automl:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: List AutoML model versions
        description: >
            List every trained model version on a pipeline, newest first. Includes archived versions — they're part of
            the audit trail and the `$model_version_id` carried on past prediction events still needs to resolve. Use
            this to walk a pipeline's training history or find a specific version by metrics before promoting.
        param_overrides:
            id:
                description: Pipeline UUID. Returns 404 if the pipeline doesn't exist on the team.
    automl-promote-model-version:
        operation: automl_pipelines_model_versions_promote_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        enrich_url: '{id}'
        title: Promote a model version to champion
        description: >
            Make the specified version the champion for its pipeline. Atomic — the prior champion (if any and
            different) is archived in the same transaction the target is set to champion. Idempotent: promoting an
            already-champion version is a no-op. The bootstrap brief only calls this when no prior champion exists;
            head-to-head displacement runs through the retraining flow with realized-metric gates.
        param_overrides:
            id:
                description: >
                    Pipeline UUID. Used for URL routing only — the actual lookup is by version_id + team, and a version
                    can only be a champion on its own pipeline.
            version_id:
                description: >
                    UUID of the model version to promote. Must be a version on this pipeline; 404 otherwise.
    automl-resume:
        operation: automl_pipelines_resume_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Resume AutoML pipeline
        description: >
            Resume a paused pipeline. Scheduled inference and retraining restart on the configured cadence. Idempotent —
            resuming an already active pipeline is a no-op.
    automl-start:
        operation: automl_pipelines_start_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Start AutoML pipeline
        description: >
            Transition a draft pipeline into bootstrap-pending state, which queues the initial training run. Only valid
            from the "draft" state. Returns the updated pipeline. The actual Temporal training workflow is wired
            separately.
    automl-update:
        operation: automl_pipelines_partial_update
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Update AutoML pipeline
        description: >
            Apply partial config updates to an existing pipeline. All body fields are optional; only fields you pass are
            changed. Status transitions are NOT done here — use automl-start, automl-pause, automl-resume, or
            automl-archive instead, so the lifecycle stays explicit.
    automl-validate:
        operation: automl_pipelines_validate_create
        enabled: true
        scopes:
            - automl:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Validate AutoML pipeline config
        description: >
            Run preflight validation against a proposed pipeline config. Side-effect-free — no pipeline is created. Same
            body shape as automl-create; returns a structured report with findings tagged info / warn / block plus a
            summary of estimated training rows, inference rows, predicted events-per-day, and (for classification)
            positive base rate. Call this before automl-create so the user can see and acknowledge any warnings first.
        param_overrides:
            name:
                description: >
                    Human-readable label for the pipeline (only used by structural checks like output property name
                    conventions). Use the same value you intend to pass to automl-create.
            task_type:
                description: >
                    Task type the pipeline targets. Validation rules dispatch on this — classification runs the positive
                    base-rate check, forecasting counts distinct series, clustering sanity-checks cluster_count against
                    training-set size.
            config:
                description: >
                    Task-type-specific configuration to validate. Classification expects target_event + horizon_days.
                    Regression expects target_expression + horizon_days. Forecasting expects series_expression + grain +
                    horizon_steps. Clustering accepts cluster_count.
            training_population:
                description: >
                    Population definition to size for training. Only kind="hogql" populations are sized by data-touching
                    checks; other shapes are accepted but flagged as not-counted.
            inference_population:
                description: >
                    Population definition used to estimate events-per-day output. Same kind="hogql" constraint as
                    training_population.
            inference_cadence:
                description: >
                    How often inference runs. Used to project daily prediction event volume against the inference
                    population size.
            retraining_cadence:
                description: >
                    How often the model is refit. Compared against inference_cadence — info finding when retraining is
                    more frequent than inference.
            autonomy:
                description: >
                    Output gate. Validation doesn't gate on autonomy itself; it's accepted as part of the request body
                    so the same payload works for automl-create.
            output_property_name:
                description: >
                    Property name predictions are written to. Validation checks the naming convention (recommended
                    "automl_" prefix; reserved "$" prefix is blocked).
