# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: AutoML
feature: automl
url_prefix: /automl
tools:
    automl-list:
        operation: automl_pipelines_list
        enabled: true
        scopes:
            - automl:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List AutoML pipelines
        description: >
            List all non-archived AutoML pipelines for the current team, newest first. Each pipeline captures
            a configured ML task (clustering, classification, regression, or forecasting) along with its
            populations, cadence, autonomy, and lifecycle status. Use this to discover what pipelines exist
            before fetching one by id.
        list: true
        enrich_url: '{id}'
    automl-get:
        operation: automl_pipelines_retrieve
        enabled: true
        scopes:
            - automl:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Retrieve AutoML pipeline
        description: >
            Fetch one AutoML pipeline by id. Returns the full pipeline including task type, status, autonomy
            level, configured populations, cadences, and timestamps. Use this after automl-list to inspect a
            specific pipeline in detail.
        enrich_url: '{id}'
    automl-create:
        operation: automl_pipelines_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create AutoML pipeline
        description: >
            Create a new AutoML pipeline in draft state. Picks one of four task types (clustering,
            classification, regression, forecasting), describes the training and inference populations, and
            sets cadences and autonomy. The pipeline does not start training until automl-start is called.
        param_overrides:
            name:
                description: >
                    Human-readable label for the pipeline. Shows up in the UI and in property names. Keep it
                    short and unique within the team.
            task_type:
                description: >
                    One of "clustering", "classification", "regression", or "forecasting". Determines what
                    kind of model is trained and how predictions are surfaced.
            config:
                description: >
                    Task-type-specific configuration (target event, horizon, cluster count, forecasting
                    window, etc.). Shape depends on task_type. See the AutoML design doc for per-task fields.
            training_population:
                description: >
                    Population definition (HogQL or filter spec) describing which persons, groups, or events
                    are eligible to be drawn into the training set.
            inference_population:
                description: >
                    Population definition describing who the model is scored against on each scheduled run.
                    Usually broader than training_population.
            inference_cadence:
                description: >
                    How often inference runs after the pipeline is active. One of "hourly", "daily",
                    "weekly", "monthly", or "never" (manual only).
            retraining_cadence:
                description: >
                    How often the model is refit on a rolling window. One of "hourly", "daily", "weekly",
                    "monthly", or "never".
            autonomy:
                description: >
                    Output gate. "shadow_only" surfaces predictions internally but never writes person/group
                    properties or emits events. "champion_only" writes from the active champion model.
                    "promote_eligible" lets challenger models graduate to champion automatically when metrics
                    pass thresholds.
            output_property_name:
                description: >
                    Name of the person or group property where predictions are written. Optional; if blank
                    the pipeline emits events only.
    automl-update:
        operation: automl_pipelines_partial_update
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update AutoML pipeline
        description: >
            Apply partial config updates to an existing pipeline. All body fields are optional; only fields
            you pass are changed. Status transitions are NOT done here — use automl-start, automl-pause,
            automl-resume, or automl-archive instead, so the lifecycle stays explicit.
        enrich_url: '{id}'
    automl-start:
        operation: automl_pipelines_start_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Start AutoML pipeline
        description: >
            Transition a draft pipeline into bootstrap-pending state, which queues the initial training run.
            Only valid from the "draft" state. Returns the updated pipeline. The actual Temporal training
            workflow is wired separately.
        enrich_url: '{id}'
    automl-pause:
        operation: automl_pipelines_pause_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Pause AutoML pipeline
        description: >
            Pause scheduled inference and retraining for an active pipeline. The model and history are kept;
            no new predictions are produced until automl-resume is called. Idempotent — pausing an already
            paused pipeline is a no-op.
        enrich_url: '{id}'
    automl-resume:
        operation: automl_pipelines_resume_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Resume AutoML pipeline
        description: >
            Resume a paused pipeline. Scheduled inference and retraining restart on the configured cadence.
            Idempotent — resuming an already active pipeline is a no-op.
        enrich_url: '{id}'
    automl-archive:
        operation: automl_pipelines_archive_create
        enabled: true
        scopes:
            - automl:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Archive AutoML pipeline
        description: >
            Soft-archive a pipeline. Inference stops permanently and the pipeline disappears from the
            default list view. History (predictions, model versions, audit log) is preserved. Idempotent.
        enrich_url: '{id}'
