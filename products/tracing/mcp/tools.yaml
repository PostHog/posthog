# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Tracing
feature: tracing
url_prefix: /tracing
ui_apps:
    trace-span:
        type: detail
        view_prop: data
    trace-span-list:
        type: list
        detail_tool: apm-trace-get
        detail_args: '{ trace_id: item.trace_id }'
        item_name_field: name
        click_prop: onSpanClick
tools:
    apm-attribute-values-list:
        operation: tracing_spans_values_retrieve
        enabled: true
        scopes:
            - tracing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List tracing attribute values
        description: >
            List values for a specific span or resource attribute key. Use to discover what values exist for a given
            attribute before building filters.
        response:
            include:
                - results
    apm-attributes-list:
        operation: tracing_spans_attributes_retrieve
        enabled: true
        scopes:
            - tracing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List tracing span attributes
        description: >
            List available span or resource attribute names. Use attribute_type "span" for span-level attributes or
            "resource" for resource-level attributes (e.g. k8s labels). Use this to discover available attribute keys
            before building filters.
        response:
            include:
                - results
                - count
    apm-logs-signal-snapshot:
        operation: observability_signal_snapshot_create
        enabled: true
        scopes:
            - tracing:read
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: APM and logs signal snapshot
        description_file: ./prompts/apm-logs-signal-snapshot.md
        response:
            include:
                - resolvedDateRange
                - logServiceNames
                - traceServiceNames
                - serviceNamesOverlap
                - logOnlyServiceNames
                - traceOnlyServiceNames
                - logsTotal
                - logsWithJoinableTraceId
                - joinableTraceIdPercent
                - sampleJoinableTraceIds
    apm-services-list:
        operation: tracing_spans_service_names_retrieve
        enabled: true
        scopes:
            - tracing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List tracing service names
        description: >
            List distinct service names that have emitted trace spans. Use to discover available services before
            filtering spans by service name.
        response:
            include:
                - results
    apm-sparkline-query:
        operation: tracing_spans_sparkline_create
        enabled: true
        scopes:
            - tracing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Query tracing span sparkline
        description_file: ./prompts/apm-sparkline-query.md
        response:
            include:
                - results
    apm-trace-get:
        operation: tracing_spans_trace_create
        enabled: true
        scopes:
            - tracing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Retrieve trace spans
        description: >
            Fetch spans for a specific trace by its hex trace ID (parent-child relationships, timing, status). Responses
            are capped by maxSpans (default 2000); if truncated is true, raise maxSpans or narrow dateRange. Use after
            discovering a trace via query-apm-spans.
        ui_app: trace-span-list
        response:
            include:
                - results
                - truncated
                - maxSpans
    query-apm-spans:
        operation: tracing_spans_query_create
        enabled: true
        scopes:
            - tracing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Query tracing spans
        description_file: ./prompts/query-apm-spans.md
        ui_app: trace-span-list
        response:
            include:
                - results
                - hasMore
                - nextCursor
                - resultCount
                - warnings
                - resolvedDateRange
                - exemplarTraceIds
