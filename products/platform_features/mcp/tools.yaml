# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Platform Features
feature: platform_features
url_prefix: /
ui_apps: {}
tools:
    change-requests-list:
        operation: change_requests_list
        enabled: true
        scopes:
            - approvals:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List pending and resolved approval requests.
        description: >
            List approval requests (change requests) for the current project. Returns pending, approved, rejected, and
            expired requests with vote status and staleness info. Useful for understanding what governance actions are
            waiting for review.
    change-request-get:
        operation: change_requests_retrieve
        enabled: true
        scopes:
            - approvals:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get details of a specific approval request.
        description: >
            Get a specific change request by ID, including the full intent, policy snapshot, approval votes, and current
            state.
    approval-policies-list:
        operation: approval_policies_list
        enabled: true
        scopes:
            - approvals:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List approval policies for the project.
        description: >
            List all approval policies configured for this project. Shows which actions require approval, who can
            approve, and bypass rules.
    approval-policy-get:
        operation: approval_policies_retrieve
        enabled: true
        scopes:
            - approvals:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get a specific approval policy.
        description: >
            Get details of an approval policy including conditions, approver configuration, quorum requirements, and
            bypass rules.
    comments-list:
        operation: comments_list
        enabled: true
        scopes:
            - comment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List comments and discussion threads.
        description: >
            List comments across the project. Filter by scope (Dashboard, FeatureFlag, Insight, etc.) and item_id to
            find discussions on specific resources. Returns comment content, author, and threading info.
    comment-get:
        operation: comments_retrieve
        enabled: true
        scopes:
            - comment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get a specific comment.
        description: |
            Get a specific comment by ID including its content, rich content with mentions, and metadata.
    comment-thread:
        operation: comments_thread_retrieve
        enabled: true
        scopes:
            - comment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get all replies in a comment thread.
        description: |
            Get the full thread of replies for a parent comment. Useful for reading complete discussions on a resource.
    comment-count:
        operation: comments_count_retrieve
        enabled: true
        scopes:
            - comment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get comment counts.
        description: |
            Get the count of comments, optionally filtered by scope and item_id.
    activity-log-list:
        operation: activity_log_list
        enabled: true
        scopes:
            - activity_log:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List recent activity in the project.
        description: >
            List recent activity log entries for the project. Shows who did what and when — feature flag changes,
            dashboard edits, experiment launches, etc. Supports filtering by scope, user, and date range.
        param_overrides:
            page_size:
                default: 10
        url_prefix: /activity
        response:
            include:
                - id
                - user.id
                - user.first_name
                - user.last_name
                - user.email
                - activity
                - scope
                - item_id
                - detail.name
                - detail.short_id
                - detail.type
                - created_at
    advanced-activity-logs-list:
        operation: advanced_activity_logs_list
        enabled: true
        scopes:
            - activity_log:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List activity logs with advanced filtering.
        description: >
            List activity log entries with advanced filtering, sorting, and field-level diffs. Supports filtering by
            scope, activity type, user, date range, and search text.
        param_overrides:
            page_size:
                default: 10
        url_prefix: /activity
        response:
            include:
                - id
                - user.id
                - user.first_name
                - user.last_name
                - user.email
                - activity
                - scope
                - item_id
                - detail.name
                - detail.short_id
                - detail.type
                - detail.changes
                - created_at
    advanced-activity-logs-filters:
        operation: advanced_activity_logs_available_filters_retrieve
        enabled: true
        scopes:
            - activity_log:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get available activity log filter options.
        description: >
            Get the available filter options for activity logs — scopes, activity types, and users that have logged
            activity. Useful for building filter UIs or understanding what kinds of activity are tracked.
        url_prefix: /activity
    org-members-list:
        operation: members_list
        enabled: true
        scopes:
            - organization_member:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List organization members.
        description: >
            List all members of the current organization with their names, emails, membership levels (member, admin,
            owner), and last login times.
    roles-list:
        operation: roles_list
        enabled: true
        scopes:
            - organization:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List organization roles.
        description: >
            List all roles defined in the organization. Roles group members and can be used in approval policies and
            access control rules.
    role-get:
        operation: roles_retrieve
        enabled: true
        scopes:
            - organization:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get a specific role.
        description: |
            Get details of a specific role including its name, creation date, and creator.
    role-members-list:
        operation: roles_role_memberships_list
        enabled: true
        scopes:
            - organization:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List members of a role.
        description: |
            List all members assigned to a specific role. Shows who has which role in the organization.
    organizations-list:
        operation: list
        enabled: true
        list: true
        scopes:
            - organization:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List organizations.
        description: >
            List all organizations the user has access to. Returns org ID, name, slug, and membership level. Use the ID
            with organization-get for details or switch-organization to change context.
        response:
            include:
                - id
                - name
                - slug
                - membership_level
    organization-get:
        operation: retrieve
        enabled: true
        scopes:
            - organization:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get organization details.
        description: >
            Get details of an organization by ID including name, membership level, member count, teams, and projects. If
            no ID is provided, returns the active organization.
        param_overrides:
            id:
                optional: true
                fallback: orgId
                description: >
                    Organization ID. If omitted, uses the active organization.
        response:
            include:
                - id
                - name
                - slug
                - created_at
                - updated_at
                - membership_level
                - member_count
                - teams.*.id
                - teams.*.name
                - teams.*.project_id
                - projects.*.id
                - projects.*.name
    organizations-create:
        operation: create
        enabled: false
    organizations-update:
        operation: update
        enabled: false
    organizations-partial-update:
        operation: partial_update
        enabled: false
    organizations-destroy:
        operation: destroy
        enabled: false
    change-requests-approve:
        operation: change_requests_approve_create
        enabled: false
    change-requests-reject:
        operation: change_requests_reject_create
        enabled: false
    change-requests-cancel:
        operation: change_requests_cancel_create
        enabled: false
    approval-policies-create:
        operation: approval_policies_create
        enabled: false
    approval-policies-update:
        operation: approval_policies_update
        enabled: false
    approval-policies-partial-update:
        operation: approval_policies_partial_update
        enabled: false
    approval-policies-destroy:
        operation: approval_policies_destroy
        enabled: false
    comments-create:
        operation: comments_create
        enabled: false
    comments-update:
        operation: comments_update
        enabled: false
    comments-partial-update:
        operation: comments_partial_update
        enabled: false
    comments-destroy:
        operation: comments_destroy
        enabled: false
    advanced-activity-logs-export:
        operation: advanced_activity_logs_export_create
        enabled: false
    members-update:
        operation: members_update
        enabled: false
    members-partial-update:
        operation: members_partial_update
        enabled: false
    members-destroy:
        operation: members_destroy
        enabled: false
    members-scoped-api-keys:
        operation: members_scoped_api_keys_retrieve
        enabled: false
    roles-create:
        operation: roles_create
        enabled: false
    roles-update:
        operation: roles_update
        enabled: false
    roles-partial-update:
        operation: roles_partial_update
        enabled: false
    roles-destroy:
        operation: roles_destroy
        enabled: false
    role-memberships-create:
        operation: roles_role_memberships_create
        enabled: false
    role-membership-get:
        operation: roles_role_memberships_retrieve
        enabled: false
    role-memberships-destroy:
        operation: roles_role_memberships_destroy
        enabled: false
