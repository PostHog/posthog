# Reference recipe metadata (fixture bundle, slice 1).
# Declarative summary so the UI can show a comparable card across models without
# parsing the scripts. Informational only — train.py owns the real model choice.
model_class: sklearn.linear_model.LogisticRegression
model_params:
    C: 1.0
    max_iter: 200
    random_state: 42
features:
    source_sql: features.sql
    description: >
        Engagement aggregates (event totals, diversity, pageviews, uploads,
        downloads) plus recency, computed strictly before each user's cutoff.
labeling:
    # Framework-owned. The bundle does not compute labels; it fits on the
    # framework-provided (features, __label, __fold) split.
    rule: random_t0_v1
train:
    script: train.py
predict:
    script: predict.py
agent:
    description: >
        Slice-1 reference bundle. Hand-authored baseline used to prove the
        inference-in-sandbox path end-to-end before the agent produces bundles.
