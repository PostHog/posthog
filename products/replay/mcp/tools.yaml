# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Session recordings
feature: replay
url_prefix: /replay
tools:
    session-recordings-list:
        operation: session_recordings_list
        enabled: true
        scopes:
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: List session recordings
        description: >
            Search and list session recordings. Filter by session IDs, person UUID,
            distinct IDs, date range, and property filters on persons, sessions, events,
            and recordings. Returns recording metadata: duration, activity counts,
            start URL, person info, and a link to watch the recording.

            Common filters (passed as query params):
            - session_ids: JSON array of session IDs
            - person_uuid: filter by person UUID
            - date_from/date_to: date range (default last 3 days). Relative: '-7d', '-24h'. Absolute: '2024-01-01'
            - properties: JSON array of property filters. Each filter has key, type, value, operator.
              Types: person, session, event, recording, cohort, group.
              Example: [{"key":"$browser","type":"person","value":["Chrome"],"operator":"exact"}]
            - events: JSON array of event filters to match recordings containing specific events.
              Example: [{"id":"$pageview","type":"events","properties":[{"key":"$current_url","type":"event","value":"/pricing","operator":"icontains"}]}]
            - console_log_filters: JSON array for console log level filtering.
              Example: [{"key":"level","type":"log_entry","value":["error"],"operator":"exact"}]
            - order: start_time (default), duration, console_error_count, activity_score, click_count, etc.
            - filter_test_accounts: true to exclude test users

            Use the 'finding-session-recordings' skill for guidance on constructing filters from natural language.
        response:
            include:
                - id
                - distinct_id
                - viewed
                - recording_duration
                - active_seconds
                - inactive_seconds
                - start_time
                - end_time
                - click_count
                - keypress_count
                - console_error_count
                - start_url
                - person
                - activity_score
                - snapshot_source
    session-recordings-retrieve:
        operation: session_recordings_retrieve
        enabled: true
        scopes:
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get session recording
        description: >
            Retrieve a single session recording by its session ID. Returns full recording
            metadata including duration, activity counts, start URL, person info, viewer
            status, and a link to watch the recording.
    session-recordings-update:
        operation: session_recordings_update
        enabled: false
    session-recordings-partial-update:
        operation: session_recordings_partial_update
        enabled: false
    session-recordings-destroy:
        operation: session_recordings_destroy
        enabled: false
