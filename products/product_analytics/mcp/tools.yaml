# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Product analytics
feature: product_analytics
url_prefix: /insights
ui_apps:
    insight-actors:
        type: detail
        view_prop: data
        link_prop: openLink
tools:
    insights-list:
        operation: insights_list
        enabled: true
        scopes:
            - insight:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{short_id}'
        list: true
        title: Get all insights
        description: >
            List saved insights in the project with optional filtering by favorited status or search term. Returns
            metadata only (name, description, tags, dashboards, ownership) — NOT the query results. To retrieve the
            actual data for any insight in the list, call the insight-query tool with its `short_id` or numeric `id`.
        exclude_params:
            - basic
            - format
            - refresh
        response:
            include:
                - id
                - short_id
                - name
                - derived_name
                - description
                - tags
                - favorited
                - dashboards
                - created_at
                - created_by
                - last_modified_at
                - last_viewed_at
                - alerts
    insight-get:
        operation: insights_retrieve
        enabled: true
        scopes:
            - insight:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{short_id}'
        title: Get insight
        description: >
            Fetch a saved insight by its numeric `id` or 8-character `short_id`. Returns the insight metadata and query
            definition, but NOT the query results. To retrieve the actual data, call the insight-query tool with the
            same identifier.
        exclude_params:
            - format
            - refresh
            - from_dashboard
        response:
            exclude:
                - result
                - hasMore
                - columns
                - is_cached
                - query_status
                - hogql
                - types
    insight-create:
        operation: insights_create
        enabled: true
        scopes:
            - insight:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{short_id}'
        title: Create insight
        description: >
            Create a new saved insight from a name and query definition. Test queries with query-trends / query-funnel /
            query-retention / query-paths / query-stickiness / query-lifecycle first to confirm the shape, then save.
            Returns insight metadata only — after creating, call the insight-query tool with the returned `short_id` if
            you want to see the computed results.
        exclude_params:
            - query
        include_params:
            - name
            - description
            - tags
            - favorited
            - dashboards
        param_overrides:
            query:
                schema_ref: InsightQuery
            dashboards:
                description: >
                    Dashboard IDs this insight should belong to. This is a full replacement — always include all
                    existing dashboard IDs when adding a new one.
        response:
            exclude:
                - result
                - hasMore
                - columns
                - is_cached
                - query_status
                - hogql
                - types
    insight-update:
        operation: insights_partial_update
        enabled: true
        scopes:
            - insight:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{short_id}'
        title: Update insight
        description: >
            Update a saved insight by numeric `id` or `short_id`. Can update name, description, query, tags, favorited
            status, and dashboards. Returns insight metadata only — after updating the query, call the insight-query
            tool with the same identifier if you want to see the recomputed results.
        exclude_params:
            - query
        include_params:
            - name
            - description
            - tags
            - favorited
            - dashboards
        param_overrides:
            query:
                schema_ref: InsightQuery
            dashboards:
                description: >
                    Dashboard IDs this insight should belong to. This is a full replacement — always include all
                    existing dashboard IDs when adding a new one.
        response:
            exclude:
                - result
                - hasMore
                - columns
                - is_cached
                - query_status
                - hogql
                - types
    insight-delete:
        operation: insights_destroy
        enabled: true
        scopes:
            - insight:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete insight
        description: |
            Soft-delete an insight by ID. The insight will be marked as deleted and no longer appear in lists.
        soft_delete: true
    insights-update:
        operation: insights_update
        enabled: false
    insights-activity-retrieve:
        operation: insights_activity_retrieve
        enabled: false
    insights-activity-retrieve-2:
        operation: insights_activity_retrieve
        enabled: false
    insights-my-last-viewed-retrieve:
        operation: insights_my_last_viewed_retrieve
        enabled: false
    insights-trending-retrieve:
        operation: insights_trending_retrieve
        enabled: false
    insights-cancel-create:
        operation: insights_cancel_create
        enabled: false
    column-configurations-list:
        operation: column_configurations_list
        enabled: false
    column-configurations-create:
        operation: column_configurations_create
        enabled: false
    column-configurations-retrieve:
        operation: column_configurations_retrieve
        enabled: false
    column-configurations-update:
        operation: column_configurations_update
        enabled: false
    column-configurations-partial-update:
