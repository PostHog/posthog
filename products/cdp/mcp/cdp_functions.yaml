# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Functions
feature: hog_functions
url_prefix: /pipeline
ui_apps: {}
tools:
    cdp-functions-create:
        operation: hog_functions_create
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create function
        description: >
            Create a new function. Requires 'type' (destination, site_destination, internal_destination, source_webhook,
            warehouse_source_webhook, site_app, or transformation) and either 'hog' source code or a 'template_id' to
            derive code from a template. Provide 'inputs_schema' to define configurable parameters and 'inputs' with
            their values. Use 'filters' to control which events trigger the function. Transformations run during
            ingestion and have an 'execution_order' field.

            Recipe — deliver an insight alert to Slack or a webhook (canonical reference; alert-create / alert-update
            point here):

            1. Pick the integration. For Slack, call integrations-list (filter by kind=slack) to find the integration
               id, then call integrations-channels-retrieve with that id to list channels. For a webhook, the user
               provides the destination URL directly.

            2. Dedupe before creating. Call cdp-functions-list with type=internal_destination and limit=1000; the
               response now includes filters. Look for an existing function whose filters.properties has an entry
               with key=alert_id and value equal to <alert.id>. If one exists, call cdp-functions-partial-update on
               that id; if not, proceed to step 3. (Paginate until you have checked every page or found a match.)

            3. Create. Use type=internal_destination, template_id=template-slack (or template-webhook), and:
                 filters = {
                   "events": [{"id": "$insight_alert_firing", "type": "events"}],
                   "properties": [{"key": "alert_id", "value": "<alert.id>", "operator": "exact", "type": "event"}]
                 }
                 # Slack. Channel id is preferred (e.g. C0123ABC); "#general" is also accepted.
                 # Override text + blocks with the same shape the alert-wizard UI uses, so
                 # agent-created and UI-created alerts produce identical Slack messages.
                 # Source of truth: HOG_FUNCTION_SUB_TEMPLATES['insight-alert-firing'] for
                 # template-slack in frontend/src/scenes/hog-functions/sub-templates/sub-templates.ts.
                 inputs = {
                   "slack_workspace": {"value": <slack_integration_id_int>},
                   "channel": {"value": "<channel_id>"},
                   "text": {"value": "Alert triggered: {event.properties.insight_name}"},
                   "blocks": {"value": [
                     {"type": "header", "text": {"type": "plain_text",
                       "text": "Alert '{event.properties.alert_name}' firing for insight '{event.properties.insight_name}'"}},
                     {"type": "section", "text": {"type": "plain_text", "text": "{event.properties.breaches}"}},
                     {"type": "context", "elements": [{"type": "mrkdwn",
                       "text": "Project: <{project.url}|{project.name}>"}]},
                     {"type": "divider"},
                     {"type": "actions", "elements": [
                       {"type": "button", "text": {"type": "plain_text", "text": "View Insight"},
                        "url": "{project.url}/insights/{event.properties.insight_id}"},
                       {"type": "button", "text": {"type": "plain_text", "text": "View Alert"},
                        "url": "{project.url}/insights/{event.properties.insight_id}/alerts?alert_id={event.properties.alert_id}"}
                     ]}
                   ]}
                 }
                 # Webhook — must be an https:// URL.
                 inputs = {"url": {"value": "<destination_url>"}}

            4. $insight_alert_firing event properties available for templating: alert_id, alert_name, insight_name,
               insight_id (short_id), state (always "Firing" — the event is only emitted on a firing transition,
               not on recovery), last_checked_at (ISO 8601 string or null), breaches (human-readable summary, e.g.
               "Series A is below 1000"), and detector metadata: alert_mode (always present), detector_type and
               ensemble_operator (null for threshold alerts, set for anomaly detection). Project context is
               available as {project.url} (already includes /project/<team_id>), {project.id}, {project.name}. Do
               not reference value, threshold_lower, or insight_url — those are not emitted.
        exclude_params:
            - _create_in_folder
            - batch_export_id
            - bytecode
            - deleted
            - status
            - transpiled
            - filters.bytecode
            - filters.bytecode_error
            - filters.transpiled
            - inputs.*.bytecode
            - inputs.*.order
            - inputs.*.templating
            - inputs.*.transpiled
            - masking.bytecode
            - mappings.*.filters.bytecode
            - mappings.*.filters.bytecode_error
            - mappings.*.filters.transpiled
            - mappings.*.inputs.*.bytecode
            - mappings.*.inputs.*.order
            - mappings.*.inputs.*.templating
            - mappings.*.inputs.*.transpiled
            - inputs_schema.*.integration
            - inputs_schema.*.integration_field
            - inputs_schema.*.integration_key
            - inputs_schema.*.requiredScopes
            - inputs_schema.*.requires_field
            - mappings.*.inputs_schema.*.integration
            - mappings.*.inputs_schema.*.integration_field
            - mappings.*.inputs_schema.*.integration_key
            - mappings.*.inputs_schema.*.requiredScopes
            - mappings.*.inputs_schema.*.requires_field
        param_overrides:
            type:
                description: >
                    Function type. One of: destination, site_destination, internal_destination, source_webhook,
                    warehouse_source_webhook, site_app, transformation.
            template_id:
                description: >
                    ID of a HogFunctionTemplate to derive defaults from (code, inputs_schema, icon, name, description).
                    Use the cdp-function-templates-list tool to find available templates.
            hog:
                description: >
                    Source code for the function. For most types this is Hog code; for site_destination and site_app
                    types this is TypeScript. Required if no template_id is provided.
            enabled:
                description: Whether the function is active and processing events.
            execution_order:
                description: >
                    Execution priority for transformation functions (lower runs first). Only applies to
                    type=transformation. If omitted, the function is appended at the end.
    cdp-functions-delete:
        operation: hog_functions_destroy
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Delete function
        description: >
            Delete a function by ID (soft delete). The function will no longer appear in lists or process events, but
            historical data is preserved.
        soft_delete: true
    cdp-functions-enable-backfills-create:
        operation: hog_functions_enable_backfills_create
        enabled: false
    cdp-functions-icon-retrieve:
        operation: hog_functions_icon_retrieve
        enabled: false
    cdp-functions-icons-retrieve:
        operation: hog_functions_icons_retrieve
        enabled: false
    cdp-functions-invocations-create:
        operation: hog_functions_invocations_create
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Test-invoke function
        description: >
            Test-invoke a function with a mock event payload. Sends the function configuration and test data to the
            plugin server for execution and returns logs and status. Use 'mock_async_functions: true' (default) to
            simulate external calls like fetch() without making real HTTP requests.
    cdp-functions-list:
        operation: hog_functions_list
        enabled: true
        scopes:
            - hog_function:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List functions
        description: >
            List all functions (destinations, transformations, site apps, and source webhooks) in the project. Returns
            each function's name, type, enabled status, execution order, template info, and filters (the event/property
            filter expression that gates the function). Filter by type (destination, site_destination,
            internal_destination, source_webhook, warehouse_source_webhook, site_app, transformation) and enabled status
            via query parameters. Pagination caps at 100 per page by default — pass limit=1000 (max 1000) when scanning
            for an existing function by alert id, and follow the next link if more pages exist.
        response:
            include:
                - id
                - type
                - name
                - description
                - enabled
                - execution_order
                - icon_url
                - template.id
                - status
                - created_at
                - updated_at
                - created_by
                - filters
    cdp-functions-logs-retrieve:
        operation: hog_functions_logs_retrieve
        enabled: true
        scopes:
            - hog_function:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get function logs
        description: >
            Retrieve execution logs for a specific CDP function by ID. Returns log entries with timestamp, level (DEBUG,
            LOG, INFO, WARN, ERROR), and message. Use to debug why a destination or transformation is failing or not
            producing expected results. Supports filtering by log level, text search, time range (after/before), and
            pagination via limit.
    cdp-functions-metrics-retrieve:
        operation: hog_functions_metrics_retrieve
        enabled: true
        scopes:
            - hog_function:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get function metrics
        description: >
            Retrieve execution metrics for a specific CDP function by ID. Returns time-series data showing success and
            failure counts over a configurable interval (hour, day, or week). Use to understand function health,
            identify failure spikes, and monitor delivery reliability. Supports breakdown by metric kind
            (success/failure) or name, and time range filtering.
    cdp-functions-metrics-totals-retrieve:
        operation: hog_functions_metrics_totals_retrieve
        enabled: false
    cdp-functions-partial-update:
        operation: hog_functions_partial_update
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update function
        description: >
            Partially update a function. Can enable/disable the function, change its name, description, source code,
            inputs, filters, mappings, or masking config. The 'type' field cannot be changed after creation. To delete a
            function, use the cdp-functions-delete tool instead.
        exclude_params:
            - _create_in_folder
            - batch_export_id
            - bytecode
            - deleted
            - status
            - transpiled
            - filters.bytecode
            - filters.bytecode_error
            - filters.transpiled
            - inputs.*.bytecode
            - inputs.*.order
            - inputs.*.templating
            - inputs.*.transpiled
            - masking.bytecode
            - mappings.*.filters.bytecode
            - mappings.*.filters.bytecode_error
            - mappings.*.filters.transpiled
            - mappings.*.inputs.*.bytecode
            - mappings.*.inputs.*.order
            - mappings.*.inputs.*.templating
            - mappings.*.inputs.*.transpiled
            - inputs_schema.*.integration
            - inputs_schema.*.integration_field
            - inputs_schema.*.integration_key
            - inputs_schema.*.requiredScopes
            - inputs_schema.*.requires_field
            - mappings.*.inputs_schema.*.integration
            - mappings.*.inputs_schema.*.integration_field
            - mappings.*.inputs_schema.*.integration_key
            - mappings.*.inputs_schema.*.requiredScopes
            - mappings.*.inputs_schema.*.requires_field
        param_overrides:
            enabled:
                description: Set to true to activate or false to deactivate the function.
    cdp-functions-rearrange-partial-update:
        operation: hog_functions_rearrange_partial_update
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Reorder transformation execution
        description: >
            Update the execution order of transformation functions. Send an 'orders' object mapping function UUIDs to
            their new execution_order integer values. Only applies to functions with type=transformation. Returns the
            updated list of transformations.
    cdp-functions-retrieve:
        operation: hog_functions_retrieve
        enabled: true
        scopes:
            - hog_function:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get function
        description: >
            Get a specific function by ID. Returns the full configuration including source code, inputs schema, input
            values (secrets are masked), filters, mappings, masking config, and runtime status.
    cdp-functions-update:
        operation: hog_functions_update
        enabled: false
