# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Functions
feature: hog_functions
url_prefix: /pipeline
tools:
    environments-cdp-functions-list:
        operation: environments_hog_functions_list
        enabled: false
    environments-cdp-functions-create:
        operation: environments_hog_functions_create
        enabled: false
    environments-cdp-functions-retrieve:
        operation: environments_hog_functions_retrieve
        enabled: false
    environments-cdp-functions-update:
        operation: environments_hog_functions_update
        enabled: false
    environments-cdp-functions-partial-update:
        operation: environments_hog_functions_partial_update
        enabled: false
    environments-cdp-functions-destroy:
        operation: environments_hog_functions_destroy
        enabled: false
    environments-cdp-functions-enable-backfills-create:
        operation: environments_hog_functions_enable_backfills_create
        enabled: false
    environments-cdp-functions-invocations-create:
        operation: environments_hog_functions_invocations_create
        enabled: false
    environments-cdp-functions-logs-retrieve:
        operation: environments_hog_functions_logs_retrieve
        enabled: false
    environments-cdp-functions-metrics-retrieve:
        operation: environments_hog_functions_metrics_retrieve
        enabled: false
    environments-cdp-functions-metrics-totals-retrieve:
        operation: environments_hog_functions_metrics_totals_retrieve
        enabled: false
    environments-cdp-functions-icon-retrieve:
        operation: environments_hog_functions_icon_retrieve
        enabled: false
    environments-cdp-functions-icons-retrieve:
        operation: environments_hog_functions_icons_retrieve
        enabled: false
    environments-cdp-functions-rearrange-partial-update:
        operation: environments_hog_functions_rearrange_partial_update
        enabled: false
    cdp-functions-list:
        operation: hog_functions_list
        enabled: true
        scopes:
            - hog_function:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List functions
        description: >
            List all functions (destinations, transformations, site apps, and source webhooks) in the project.
            Returns each function's name, type, enabled status, execution order, and template info. Filter by type
            (destination, site_destination, internal_destination, source_webhook, warehouse_source_webhook, site_app,
            transformation) and enabled status via query parameters.
        mcp_version: 1
    cdp-functions-create:
        operation: hog_functions_create
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create function
        description: >
            Create a new function. Requires 'type' (destination, site_destination, internal_destination,
            source_webhook, warehouse_source_webhook, site_app, or transformation) and either 'hog' source code or a
            'template_id' to derive code from a template. Provide 'inputs_schema' to define configurable parameters and
            'inputs' with their values. Use 'filters' to control which events trigger the function. Transformations run
            during ingestion and have an 'execution_order' field.
        exclude_params:
            # Top-level auto-generated / irrelevant fields
            - _create_in_folder
            - batch_export_id
            - bytecode
            - deleted
            - status
            - transpiled
            # Nested auto-generated bytecode/transpiled fields
            - filters.bytecode
            - filters.bytecode_error
            - filters.transpiled
            - inputs.*.bytecode
            - inputs.*.order
            - inputs.*.templating
            - inputs.*.transpiled
            - masking.bytecode
            - mappings.*.filters.bytecode
            - mappings.*.filters.bytecode_error
            - mappings.*.filters.transpiled
            - mappings.*.inputs.*.bytecode
            - mappings.*.inputs.*.order
            - mappings.*.inputs.*.templating
            - mappings.*.inputs.*.transpiled
            # OAuth/integration UI fields (not usable via MCP)
            - inputs_schema.*.integration
            - inputs_schema.*.integration_field
            - inputs_schema.*.integration_key
            - inputs_schema.*.requiredScopes
            - inputs_schema.*.requires_field
            - mappings.*.inputs_schema.*.integration
            - mappings.*.inputs_schema.*.integration_field
            - mappings.*.inputs_schema.*.integration_key
            - mappings.*.inputs_schema.*.requiredScopes
            - mappings.*.inputs_schema.*.requires_field
        param_overrides:
            type:
                description: >
                    Function type. One of: destination, site_destination, internal_destination, source_webhook,
                    warehouse_source_webhook, site_app, transformation.
            template_id:
                description: >
                    ID of a HogFunctionTemplate to derive defaults from (code, inputs_schema, icon, name, description).
                    Use the cdp-function-templates-list tool to find available templates.
            hog:
                description: >
                    Source code for the function. For most types this is Hog code; for site_destination and site_app
                    types this is TypeScript. Required if no template_id is provided.
            enabled:
                description: Whether the function is active and processing events.
            execution_order:
                description: >
                    Execution priority for transformation functions (lower runs first). Only applies to
                    type=transformation. If omitted, the function is appended at the end.
    cdp-functions-retrieve:
        operation: hog_functions_retrieve
        enabled: true
        scopes:
            - hog_function:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get function
        description: >
            Get a specific function by ID. Returns the full configuration including source code, inputs schema,
            input values (secrets are masked), filters, mappings, masking config, and runtime status.
        mcp_version: 1
    cdp-functions-update:
        operation: hog_functions_update
        enabled: false
    cdp-functions-partial-update:
        operation: hog_functions_partial_update
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update function
        description: >
            Partially update a function. Can enable/disable the function, change its name, description, source code,
            inputs, filters, mappings, or masking config. The 'type' field cannot be changed after creation. To delete a
            function, use the cdp-functions-delete tool instead.
        exclude_params:
            # Top-level auto-generated / irrelevant fields
            - _create_in_folder
            - batch_export_id
            - bytecode
            - deleted
            - status
            - transpiled
            # Nested auto-generated bytecode/transpiled fields
            - filters.bytecode
            - filters.bytecode_error
            - filters.transpiled
            - inputs.*.bytecode
            - inputs.*.order
            - inputs.*.templating
            - inputs.*.transpiled
            - masking.bytecode
            - mappings.*.filters.bytecode
            - mappings.*.filters.bytecode_error
            - mappings.*.filters.transpiled
            - mappings.*.inputs.*.bytecode
            - mappings.*.inputs.*.order
            - mappings.*.inputs.*.templating
            - mappings.*.inputs.*.transpiled
            # OAuth/integration UI fields (not usable via MCP)
            - inputs_schema.*.integration
            - inputs_schema.*.integration_field
            - inputs_schema.*.integration_key
            - inputs_schema.*.requiredScopes
            - inputs_schema.*.requires_field
            - mappings.*.inputs_schema.*.integration
            - mappings.*.inputs_schema.*.integration_field
            - mappings.*.inputs_schema.*.integration_key
            - mappings.*.inputs_schema.*.requiredScopes
            - mappings.*.inputs_schema.*.requires_field
        param_overrides:
            enabled:
                description: Set to true to activate or false to deactivate the function.
    cdp-functions-delete:
        operation: hog_functions_destroy
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Delete function
        description: >
            Delete a function by ID (soft delete). The function will no longer appear in lists or process events,
            but historical data is preserved.
        soft_delete: true
    cdp-functions-enable-backfills-create:
        operation: hog_functions_enable_backfills_create
        enabled: false
    cdp-functions-invocations-create:
        operation: hog_functions_invocations_create
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Test-invoke function
        description: >
            Test-invoke a function with a mock event payload. Sends the function configuration and test data to the
            plugin server for execution and returns logs and status. Use 'mock_async_functions: true' (default) to
            simulate external calls like fetch() without making real HTTP requests.
    cdp-functions-logs-retrieve:
        operation: hog_functions_logs_retrieve
        enabled: false
    cdp-functions-metrics-retrieve:
        operation: hog_functions_metrics_retrieve
        enabled: false
    cdp-functions-metrics-totals-retrieve:
        operation: hog_functions_metrics_totals_retrieve
        enabled: false
    cdp-functions-icon-retrieve:
        operation: hog_functions_icon_retrieve
        enabled: false
    cdp-functions-icons-retrieve:
        operation: hog_functions_icons_retrieve
        enabled: false
    cdp-functions-rearrange-partial-update:
        operation: hog_functions_rearrange_partial_update
        enabled: true
        scopes:
            - hog_function:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Reorder transformation execution
        description: >
            Update the execution order of transformation functions. Send an 'orders' object mapping function UUIDs to
            their new execution_order integer values. Only applies to functions with type=transformation. Returns the
            updated list of transformations.
