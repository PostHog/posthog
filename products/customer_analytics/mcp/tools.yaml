# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Customer analytics
feature: customer_analytics
url_prefix: /customer-analytics
ui_apps: {}
tools:
    account-notes-list:
        operation: account_notes_list
        enabled: false
    account-relationship-definitions-create:
        operation: account_relationship_definitions_create
        enabled: false
    account-relationship-definitions-destroy:
        operation: account_relationship_definitions_destroy
        enabled: false
    account-relationship-definitions-list:
        operation: account_relationship_definitions_list
        enabled: false
    account-relationship-definitions-partial-update:
        operation: account_relationship_definitions_partial_update
        enabled: false
    account-relationship-definitions-retrieve:
        operation: account_relationship_definitions_retrieve
        enabled: false
    account-relationship-definitions-update:
        operation: account_relationship_definitions_update
        enabled: false
    accounts-create:
        operation: accounts_create
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create account
        description: >
            Create a new Customer Analytics account. An account is a logical container for assigning ownership across
            the customer-success org. Provide `name` (required), optional `external_id` (CRM ID or similar), optional
            `properties` to set role assignments (`csm`, `account_executive`, `account_owner`) and external system
            identifiers (`stripe_customer_id`, `hubspot_deal_id`, `billing_id`, `sfdc_id`, `zendesk_id`), and optional
            `tags` to categorize the account.
        param_overrides:
            properties:
                description: >
                    Typed account properties. `csm`, `account_executive`, `account_owner` are role assignments — each
                    takes `{id, email}` of an existing user. `stripe_customer_id`, `hubspot_deal_id`, `billing_id`,
                    `sfdc_id`, `zendesk_id` are optional string identifiers for the account in external systems. All
                    fields are optional.
            tags:
                description: >
                    Tag names to attach to the account. Tags are created on demand if they do not already exist for the
                    team.
        feature_flag: customer-analytics-csp
    accounts-custom-property-values-create:
        operation: accounts_custom_property_values_create
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Set account custom property value
        description: >
            Set the value of a custom property for a Customer Analytics account. This is an upsert: it replaces the
            account's current value for the given `definition`, keeping at most one active value per account and
            definition. Pass `definition` (the custom property definition UUID) and `value` matching the definition's
            type — a number for number/currency/percent, a boolean for boolean, an ISO-8601 string for date/datetime, or
            text for text. List or create definitions with `custom-property-definitions-list` and
            `custom-property-definitions-create`.
        feature_flag: customer-analytics-csp
    accounts-custom-property-values-list:
        operation: accounts_custom_property_values_list
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List account custom property values
        description: >
            List the current custom property values for a single Customer Analytics account. Each result pairs a custom
            property definition (via `definition_id`) with the account's `value` for it — typed per the definition's
            display_type (string, number, boolean, or ISO-8601 datetime) — plus `created_at` and who set it. Only
            current values are returned; superseded history is not. Resolve a `definition_id` to its name and type with
            `custom-property-definitions-list` or `custom-property-definitions-retrieve`.
        feature_flag: customer-analytics-csp
    accounts-destroy:
        operation: accounts_destroy
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete account
        description: |
            Permanently delete a Customer Analytics account by id.
        feature_flag: customer-analytics-csp
    accounts-list:
        operation: accounts_list
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List accounts
        description: >
            List Customer Analytics accounts in the project, ordered by most recently created. Each result includes the
            account `id`, `name`, `external_id`, typed `properties` (assignment fields csm, account_executive,
            account_owner and external identifiers stripe_customer_id, hubspot_deal_id, billing_id, sfdc_id,
            zendesk_id), `tags`, and creation/update metadata. Pass `tags` (JSON-encoded array, e.g.
            `["enterprise","priority"]`) to filter to accounts that have any of the listed tags. Use `accounts-retrieve`
            for a single account by id. To link a user to a specific account rather than the bare list, deep-link it
            with the path `/customer_analytics/accounts/<id>/<tab>` (using the account `id`; tab is optional — one of
            notes/users/usage/spend, e.g. `/customer_analytics/accounts/<id>/usage`). This filters the list to that
            account, expands it, and opens the tab.
        param_overrides:
            tags:
                description: >
                    JSON-encoded array of tag names to filter by, e.g. `["enterprise","priority"]`. Returns accounts
                    that have any of the listed tags.
        feature_flag: customer-analytics-csp
    accounts-notebooks-create:
        operation: accounts_notebooks_create
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create account notebook
        description: >
            Create a notebook attached to a Customer Analytics account. Use for persisting investigations, call notes,
            and other free-form context. Provide `title` and the note body as Markdown via `text_content` — the server
            converts it into a formatted notebook (headings `#` through `######`, bullet lists `-`, ordered lists `1.`,
            fenced code blocks, `**bold**`, `*italic*`, `` `code` ``, and `[label](url)` links). Pass `content`
            (ProseMirror JSON) only if you already have a structured document; in most cases leave it unset and write
            Markdown in `text_content`. The notebook is created with internal visibility so it does not appear in the
            global notebooks list.
        feature_flag: customer-analytics-csp
    accounts-notebooks-destroy:
        operation: accounts_notebooks_destroy
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete account notebook
        description: |
            Permanently delete an account notebook by its `short_id`.
        feature_flag: customer-analytics-csp
    accounts-notebooks-list:
        operation: accounts_notebooks_list
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List account notebooks
        description: >
            List notebooks attached to a Customer Analytics account, ordered by most recently modified. Each result
            includes the notebook `short_id`, `title`, `content`, and authorship metadata.
        feature_flag: customer-analytics-csp
    accounts-notebooks-retrieve:
        operation: accounts_notebooks_retrieve
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get account notebook
        description: >
            Fetch a single account notebook by its `short_id`. Returns the full notebook including `content`
            (ProseMirror JSON document structure) and authorship metadata.
        feature_flag: customer-analytics-csp
    accounts-partial-update:
        operation: accounts_partial_update
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update account
        description: >
            Update fields on an existing Customer Analytics account. Accepts a subset of fields; unspecified fields are
            left unchanged. Pass `tags` to replace the full set of tags on the account.
        param_overrides:
            properties:
                description: >
                    Typed account properties. The server replaces the `properties` object as a whole, so include any
                    existing values you want to preserve. Supported keys: `csm`, `account_executive`, `account_owner`
                    (each `{id, email}` of an existing user), plus `stripe_customer_id`, `hubspot_deal_id`,
                    `billing_id`, `sfdc_id`, `zendesk_id` (optional string identifiers for external systems).
            tags:
                description: >
                    Tag names to set on the account. Replaces the full existing tag set — pass the complete list, not a
                    delta. Tags are created on demand if they do not already exist for the team.
        feature_flag: customer-analytics-csp
    accounts-retrieve:
        operation: accounts_retrieve
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get account
        description: >
            Fetch a single Customer Analytics account by id. Returns the full account including typed `properties` (csm,
            account_executive, account_owner assignments plus stripe_customer_id, hubspot_deal_id, billing_id, sfdc_id,
            zendesk_id external identifiers) and `tags`. To link a user to this account rather than the bare list,
            deep-link it with the path `/customer_analytics/accounts/<id>/<tab>` (using the account `id`; tab is
            optional — one of notes/users/usage/spend, e.g. `/customer_analytics/accounts/<id>/usage`).
        feature_flag: customer-analytics-csp
    accounts-update:
        operation: accounts_update
        enabled: false
    custom-property-definitions-create:
        operation: custom_property_definitions_create
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create custom property definition
        description: >
            Create a Customer Analytics custom property definition — the shape of a custom account attribute. Provide
            `name` (required, unique within the team), optional `description`, `display_type` (required; one of text,
            number, currency, percent, date, datetime, boolean), and optional `is_big_number` to abbreviate large
            numeric values (e.g. 10,000 → 10K; only valid for numeric display types). Definitions are team-scoped and
            shared across all accounts; set the value a specific account holds via the account custom property value
            tools.
        feature_flag: customer-analytics-csp
    custom-property-definitions-destroy:
        operation: custom_property_definitions_destroy
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete custom property definition
        description: >
            Permanently delete a Customer Analytics custom property definition by id. Because values reference the
            definition, deleting it also removes the value every account holds for that property. The definition is
            team-scoped, so this affects all accounts.
        feature_flag: customer-analytics-csp
    custom-property-definitions-list:
        operation: custom_property_definitions_list
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List custom property definitions
        description: >
            List Customer Analytics custom property definitions for the project. A definition is the shape of a custom
            account attribute — its `name`, optional `description`, `display_type` (one of text, number, currency,
            percent, date, datetime, boolean), and `is_big_number` flag. Definitions are team-scoped and shared across
            all accounts; the value a specific account holds for a definition is managed separately via the account
            custom property value tools. Use `custom-property-definitions-retrieve` to fetch a single definition by id.
            To list or filter accounts by a custom property value in bulk, take a definition `id` from this tool and
            query it via HogQL against `system.accounts`, selecting ``custom_properties.values.`<definition_id>` ``
            (backtick-quote the id) and filtering it `IS NOT NULL`. The per-account value tools return one account at a
            time; this HogQL path scales to all accounts.
        feature_flag: customer-analytics-csp
    custom-property-definitions-partial-update:
        operation: custom_property_definitions_partial_update
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update custom property definition
        description: >
            Update fields on an existing Customer Analytics custom property definition. Accepts a subset of fields;
            unspecified fields are left unchanged. Updatable fields: `name` (must remain unique within the team),
            `description`, `display_type` (one of text, number, currency, percent, date, datetime, boolean), and
            `is_big_number` (only valid for numeric display types).
        feature_flag: customer-analytics-csp
    custom-property-definitions-retrieve:
        operation: custom_property_definitions_retrieve
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get custom property definition
        description: >
            Fetch a single Customer Analytics custom property definition by id. Returns its `name`, optional
            `description`, `display_type` (one of text, number, currency, percent, date, datetime, boolean), and
            `is_big_number` flag. A definition is the shape of a custom account attribute; the value a specific account
            holds for it is managed separately via the account custom property value tools.
        feature_flag: customer-analytics-csp
    custom-property-definitions-update:
        operation: custom_property_definitions_update
        enabled: false
    custom-property-sources-create:
        operation: custom_property_sources_create
        enabled: false
    custom-property-sources-destroy:
        operation: custom_property_sources_destroy
        enabled: false
    custom-property-sources-list:
        operation: custom_property_sources_list
        enabled: false
    custom-property-sources-partial-update:
        operation: custom_property_sources_partial_update
        enabled: false
    custom-property-sources-retrieve:
        operation: custom_property_sources_retrieve
        enabled: false
    custom-property-sources-update:
        operation: custom_property_sources_update
        enabled: false
    customer-journeys-create:
        operation: customer_journeys_create
        enabled: false
    customer-journeys-destroy:
        operation: customer_journeys_destroy
        enabled: false
    customer-journeys-list:
        operation: customer_journeys_list
        enabled: false
    customer-journeys-partial-update:
        operation: customer_journeys_partial_update
        enabled: false
    customer-journeys-retrieve:
        operation: customer_journeys_retrieve
        enabled: false
    customer-journeys-update:
        operation: customer_journeys_update
        enabled: false
    customer-profile-configs-create:
        operation: customer_profile_configs_create
        enabled: false
    customer-profile-configs-destroy:
        operation: customer_profile_configs_destroy
        enabled: false
    customer-profile-configs-list:
        operation: customer_profile_configs_list
        enabled: false
    customer-profile-configs-partial-update:
        operation: customer_profile_configs_partial_update
        enabled: false
    customer-profile-configs-retrieve:
        operation: customer_profile_configs_retrieve
        enabled: false
    customer-profile-configs-update:
        operation: customer_profile_configs_update
        enabled: false
    usage-metrics-create:
        operation: groups_types_metrics_create
        enabled: true
        scopes:
            - usage_metric:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create usage metric
        description: >
            Create a new usage metric for the project. The metric surfaces on both group and person Customer Analytics
            profile pages — usage metrics are not scoped to a specific group type. `filters` accepts two shapes:

            (1) Events (default) — HogFunction filter shape with an `events` array.

            (2) Data warehouse — set `source: "data_warehouse"` plus `table_name`, `timestamp_field`, `key_field`. Call
            `external-data-schemas-list` first to discover synced tables, and `execute-sql` (`SELECT * FROM <table>
            LIMIT 1`) to inspect column names. DW metrics currently render only on group profiles.

            When `math` is `sum`, `math_property` is required; when `math` is `count`, `math_property` must be empty.
            For DW SUM metrics, `math_property` is the column name (or HogQL expression) to sum on the table. Pass
            `group_type_index: 0`.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
            filters:
                input_schema: UsageMetricFiltersSchema
            math_property:
                description: >
                    Required when `math` is `sum`; must be empty when `math` is `count`. For events metrics this is an
                    event property name. For data warehouse metrics this is the column name (or HogQL expression) to sum
                    on the DW table.
    usage-metrics-destroy:
        operation: groups_types_metrics_destroy
        enabled: true
        scopes:
            - usage_metric:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete usage metric
        description: >
            Permanently delete a usage metric by id. Pass `group_type_index: 0` — usage metrics apply to both groups and
            persons regardless of this value.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
    usage-metrics-list:
        operation: groups_types_metrics_list
        enabled: true
        scopes:
            - usage_metric:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List usage metrics
        description: >
            List usage metrics defined for the project. Usage metrics apply to both groups and persons on Customer
            Analytics profile pages — they are NOT scoped to a specific group type despite the legacy URL shape. Returns
            each metric's id, name, format, interval (days), display mode, math aggregation, and filter definition. Pass
            `group_type_index: 0`.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
    usage-metrics-partial-update:
        operation: groups_types_metrics_partial_update
        enabled: true
        scopes:
            - usage_metric:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update usage metric
        description: >
            Update fields on an existing usage metric. Accepts a subset of fields; unspecified fields are left
            unchanged. `filters` accepts the events shape (default) or the data warehouse shape (`source:
            "data_warehouse"` plus `table_name`, `timestamp_field`, `key_field`). When switching to DW, call
            `external-data-schemas-list` to discover synced tables. Changing `math` to `sum` requires `math_property`;
            changing to `count` requires clearing `math_property`. For DW SUM metrics, `math_property` is the column
            name to sum. DW metrics currently render only on group profiles. Pass `group_type_index: 0` — usage metrics
            apply to both groups and persons regardless of this value.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
            filters:
                input_schema: UsageMetricFiltersSchema
            math_property:
                description: >
                    Required when `math` is `sum`; must be empty when `math` is `count`. For events metrics this is an
                    event property name. For data warehouse metrics this is the column name (or HogQL expression) to sum
                    on the DW table.
    usage-metrics-retrieve:
        operation: groups_types_metrics_retrieve
        enabled: true
        scopes:
            - usage_metric:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get usage metric
        description: >
            Fetch a single usage metric by id. Pass `group_type_index: 0` — usage metrics apply to both groups and
            persons regardless of this value.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
    usage-metrics-update:
        operation: groups_types_metrics_update
        enabled: false
