# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Customer analytics
feature: customer_analytics
url_prefix: /customer-analytics
ui_apps: {}
tools:
    accounts-create:
        operation: accounts_create
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create account
        description: >
            Create a new Customer Analytics account. An account is a logical container for assigning ownership across
            the customer-success org. Provide `name` (required), optional `external_id` (CRM ID or similar), optional
            `properties` to set role assignments (`csm`, `account_executive`, `account_owner`) and external system
            identifiers (`stripe_customer_id`, `hubspot_deal_id`, `billing_id`, `sfdc_id`, `zendesk_id`), and optional
            `tags` to categorize the account.
        param_overrides:
            properties:
                description: >
                    Typed account properties. `csm`, `account_executive`, `account_owner` are role assignments — each
                    takes `{id, email}` of an existing user. `stripe_customer_id`, `hubspot_deal_id`, `billing_id`,
                    `sfdc_id`, `zendesk_id` are optional string identifiers for the account in external systems. All
                    fields are optional.
            tags:
                description: >
                    Tag names to attach to the account. Tags are created on demand if they do not already exist for the
                    team.
        feature_flag: customer-analytics-csp
    accounts-destroy:
        operation: accounts_destroy
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete account
        description: |
            Permanently delete a Customer Analytics account by id.
        feature_flag: customer-analytics-csp
    accounts-list:
        operation: accounts_list
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List accounts
        description: >
            List Customer Analytics accounts in the project, ordered by most recently created. Each result includes the
            account `id`, `name`, `external_id`, typed `properties` (assignment fields csm, account_executive,
            account_owner and external identifiers stripe_customer_id, hubspot_deal_id, billing_id, sfdc_id,
            zendesk_id), `tags`, and creation/update metadata. Pass `tags` (JSON-encoded array, e.g.
            `["enterprise","priority"]`) to filter to accounts that have any of the listed tags. Use `accounts-retrieve`
            for a single account by id.
        param_overrides:
            tags:
                description: >
                    JSON-encoded array of tag names to filter by, e.g. `["enterprise","priority"]`. Returns accounts
                    that have any of the listed tags.
        mcp_version: 1
        feature_flag: customer-analytics-csp
    accounts-notebooks-create:
        operation: accounts_notebooks_create
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create account notebook
        description: >
            Create a notebook attached to a Customer Analytics account. Use for persisting investigations, call notes,
            and other free-form context. Provide `title` and optional `content` (ProseMirror JSON document structure).
            The notebook is created with internal visibility so it does not appear in the global notebooks list.
        feature_flag: customer-analytics-csp
    accounts-notebooks-destroy:
        operation: accounts_notebooks_destroy
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete account notebook
        description: |
            Permanently delete an account notebook by its `short_id`.
        feature_flag: customer-analytics-csp
    accounts-notebooks-list:
        operation: accounts_notebooks_list
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List account notebooks
        description: >
            List notebooks attached to a Customer Analytics account, ordered by most recently modified. Each result
            includes the notebook `short_id`, `title`, `content`, and authorship metadata.
        mcp_version: 1
        feature_flag: customer-analytics-csp
    accounts-notebooks-retrieve:
        operation: accounts_notebooks_retrieve
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get account notebook
        description: >
            Fetch a single account notebook by its `short_id`. Returns the full notebook including `content`
            (ProseMirror JSON document structure) and authorship metadata.
        mcp_version: 1
        feature_flag: customer-analytics-csp
    accounts-partial-update:
        operation: accounts_partial_update
        enabled: true
        scopes:
            - account:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update account
        description: >
            Update fields on an existing Customer Analytics account. Accepts a subset of fields; unspecified fields are
            left unchanged. Pass `tags` to replace the full set of tags on the account.
        param_overrides:
            properties:
                description: >
                    Typed account properties. The server replaces the `properties` object as a whole, so include any
                    existing values you want to preserve. Supported keys: `csm`, `account_executive`, `account_owner`
                    (each `{id, email}` of an existing user), plus `stripe_customer_id`, `hubspot_deal_id`,
                    `billing_id`, `sfdc_id`, `zendesk_id` (optional string identifiers for external systems).
            tags:
                description: >
                    Tag names to set on the account. Replaces the full existing tag set — pass the complete list, not a
                    delta. Tags are created on demand if they do not already exist for the team.
        feature_flag: customer-analytics-csp
    accounts-retrieve:
        operation: accounts_retrieve
        enabled: true
        scopes:
            - account:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get account
        description: >
            Fetch a single Customer Analytics account by id. Returns the full account including typed `properties` (csm,
            account_executive, account_owner assignments plus stripe_customer_id, hubspot_deal_id, billing_id, sfdc_id,
            zendesk_id external identifiers) and `tags`.
        mcp_version: 1
        feature_flag: customer-analytics-csp
    accounts-update:
        operation: accounts_update
        enabled: false
    customer-journeys-create:
        operation: customer_journeys_create
        enabled: false
    customer-journeys-list:
        operation: customer_journeys_list
        enabled: false
    customer-profile-configs-create:
        operation: customer_profile_configs_create
        enabled: false
    customer-profile-configs-list:
        operation: customer_profile_configs_list
        enabled: false
    usage-metrics-create:
        operation: groups_types_metrics_create
        enabled: true
        scopes:
            - usage_metric:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create usage metric
        description: >
            Create a new usage metric for the project. The metric surfaces on both group and person Customer Analytics
            profile pages — usage metrics are not scoped to a specific group type. `filters` accepts two shapes:

            (1) Events (default) — HogFunction filter shape with an `events` array.

            (2) Data warehouse — set `source: "data_warehouse"` plus `table_name`, `timestamp_field`, `key_field`. Call
            `external-data-schemas-list` first to discover synced tables, and `execute-sql` (`SELECT * FROM <table>
            LIMIT 1`) to inspect column names. DW metrics currently render only on group profiles.

            When `math` is `sum`, `math_property` is required; when `math` is `count`, `math_property` must be empty.
            For DW SUM metrics, `math_property` is the column name (or HogQL expression) to sum on the table. Pass
            `group_type_index: 0`.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
            filters:
                input_schema: UsageMetricFiltersSchema
            math_property:
                description: >
                    Required when `math` is `sum`; must be empty when `math` is `count`. For events metrics this is an
                    event property name. For data warehouse metrics this is the column name (or HogQL expression) to sum
                    on the DW table.
    usage-metrics-destroy:
        operation: groups_types_metrics_destroy
        enabled: true
        scopes:
            - usage_metric:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete usage metric
        description: >
            Permanently delete a usage metric by id. Pass `group_type_index: 0` — usage metrics apply to both groups and
            persons regardless of this value.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
    usage-metrics-list:
        operation: groups_types_metrics_list
        enabled: true
        scopes:
            - usage_metric:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List usage metrics
        description: >
            List usage metrics defined for the project. Usage metrics apply to both groups and persons on Customer
            Analytics profile pages — they are NOT scoped to a specific group type despite the legacy URL shape. Returns
            each metric's id, name, format, interval (days), display mode, math aggregation, and filter definition. Pass
            `group_type_index: 0`.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
        mcp_version: 1
    usage-metrics-partial-update:
        operation: groups_types_metrics_partial_update
        enabled: true
        scopes:
            - usage_metric:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update usage metric
        description: >
            Update fields on an existing usage metric. Accepts a subset of fields; unspecified fields are left
            unchanged. `filters` accepts the events shape (default) or the data warehouse shape (`source:
            "data_warehouse"` plus `table_name`, `timestamp_field`, `key_field`). When switching to DW, call
            `external-data-schemas-list` to discover synced tables. Changing `math` to `sum` requires `math_property`;
            changing to `count` requires clearing `math_property`. For DW SUM metrics, `math_property` is the column
            name to sum. DW metrics currently render only on group profiles. Pass `group_type_index: 0` — usage metrics
            apply to both groups and persons regardless of this value.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
            filters:
                input_schema: UsageMetricFiltersSchema
            math_property:
                description: >
                    Required when `math` is `sum`; must be empty when `math` is `count`. For events metrics this is an
                    event property name. For data warehouse metrics this is the column name (or HogQL expression) to sum
                    on the DW table.
    usage-metrics-retrieve:
        operation: groups_types_metrics_retrieve
        enabled: true
        scopes:
            - usage_metric:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get usage metric
        description: >
            Fetch a single usage metric by id. Pass `group_type_index: 0` — usage metrics apply to both groups and
            persons regardless of this value.
        param_overrides:
            group_type_index:
                description: >
                    Legacy URL parameter retained for backward compatibility. Pass `0`. The stored value does not scope
                    the metric — usage metrics apply to both groups and persons regardless of this value.
        mcp_version: 1
    usage-metrics-update:
        operation: groups_types_metrics_update
        enabled: false
