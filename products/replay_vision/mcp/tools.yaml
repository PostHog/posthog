# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Replay vision
feature: replay_vision
url_prefix: /replay-vision
ui_apps: {}
tools:
    vision-actions-create:
        operation: vision_actions_create
        enabled: false
    vision-actions-destroy:
        operation: vision_actions_destroy
        enabled: false
    vision-actions-list:
        operation: vision_actions_list
        enabled: false
    vision-actions-partial-update:
        operation: vision_actions_partial_update
        enabled: false
    vision-actions-retrieve:
        operation: vision_actions_retrieve
        enabled: false
    vision-actions-runs-list:
        operation: vision_actions_runs_list
        enabled: false
    vision-actions-runs-retrieve:
        operation: vision_actions_runs_retrieve
        enabled: false
    vision-observations-label-create:
        operation: vision_observations_label_create
        enabled: true
        scopes:
            - replay_scanner:write
            - session_recording:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Rate a scanner observation
        description: >
            Set or update the shared thumbs up/down rating on a replay scanner observation: `is_correct` true means the
            scanner got the session right (thumbs up), false means it got it wrong (thumbs down), plus optional written
            `feedback` explaining why (applies to both directions). One shared rating per observation, team-wide, last
            write wins; re-posting updates it in place. These ratings power the scanner's Quality tab: the
            quality-over-time chart and the AI prompt recommendations (see
            `vision-scanners-prompt-suggestions-generate`). Find observation IDs via `vision-scanners-observations-list`
            (filter `labeled=false` for unrated ones) or `vision-observations-list` for a session.
        feature_flag: replay-vision
    vision-observations-label-destroy:
        operation: vision_observations_label_destroy
        enabled: true
        scopes:
            - replay_scanner:write
            - session_recording:read
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Remove a scanner observation rating
        description: >
            Remove the shared thumbs up/down rating (and its feedback) from a replay scanner observation, returning it
            to unrated. Team-wide: this clears the rating for everyone.
        feature_flag: replay-vision
    vision-observations-list:
        operation: vision_observations_list
        enabled: true
        scopes:
            - replay_scanner:read
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List a session's replay vision observations
        description: >
            List every replay vision observation recorded for a single session, across all scanners the caller can read.
            This is the "what has Replay Vision found about this session?" lookup — pair it with the session-recording
            MCP tools or the investigating-replay skill while investigating a recording. The `session_id` query
            parameter is REQUIRED; without it the request is rejected. Each result includes the scanner that produced
            it, the observation `status` (pending/running/succeeded/failed/ineligible), the `error_reason` for terminal
            non-success statuses, and the `scanner_result` (LLM output) on success. To list observations for one
            specific scanner over time instead, use `vision-scanners-observations-list`.
        feature_flag: replay-vision
    vision-observations-retrieve:
        operation: vision_observations_retrieve
        enabled: true
        scopes:
            - replay_scanner:read
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get a session's replay vision observation
        description: >
            Get a single replay vision observation by ID, scoped to the scanners the caller can read. Returns the full
            `scanner_snapshot` (the scanner's configuration at run time) and `scanner_result` (the LLM output, with any
            event citations). Use `vision-observations-list` to find observation IDs for a session first.
        feature_flag: replay-vision
    vision-observations-retry-create:
        operation: vision_observations_retry_create
        enabled: false
    vision-quota-retrieve:
        operation: environment_vision_quota_retrieve
        enabled: true
        scopes:
            - replay_scanner:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get replay vision quota
        description: >
            Get the organization's monthly Replay Vision observation budget. Returns `monthly_quota`, `usage_this_month`
            (in-flight + succeeded observations counted against it), `remaining`, `exhausted`, and the
            `period_start`/`period_end` of the current calendar-month window. Check `remaining`/`exhausted` before
            creating a scanner or calling `vision-scanners-scan-session` — observations requested over quota are
            silently skipped until the next period. Pair with `vision-scanners-estimate-create` to size a new scanner
            against the remaining budget.
        feature_flag: replay-vision
    vision-scanners-create:
        operation: vision_scanners_create
        enabled: true
        scopes:
            - replay_scanner:write
            - session_recording:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create replay vision scanner
        description: >
            Create a replay vision scanner. Pick a `scanner_type` — `monitor` (open-ended observations), `classifier`
            (assign a tag from a fixed label set), `scorer` (numeric rubric), or `summarizer` (free-text summary with
            optional facet embeddings via `emits_embeddings`) — and fill `scanner_config` to match: all types need a
            `prompt`; classifiers also need `tags`; scorers also need `scale`; summarizers optionally set `length` and
            `emits_embeddings`. `query` is a `RecordingsQuery` shape that defines which sessions the scanner watches —
            `date_from` and `date_to` are ignored (the schedule controls time). `sampling_rate` is a 0..1 random
            downsample applied after the query matches (default 1.0). `model` chooses the LLM. Names must be unique
            within the team. Before creating a broad scanner (a permissive `query` and/or high `sampling_rate`), first
            call `vision-scanners-estimate-create` to project its monthly observation volume and `vision-quota-retrieve`
            to check the org's remaining budget — an enabled scanner sweeps matching recordings every 5 minutes, and
            creation itself does not check quota, so a too-broad scanner can exhaust the monthly budget on its first
            sweeps.
        exclude_params:
            - id
            - scanner_version
            - last_swept_at
            - created_at
            - created_by
            - updated_at
        requires_ai_consent: true
        feature_flag: replay-vision
    vision-scanners-creators-retrieve:
        operation: vision_scanners_creators_retrieve
        enabled: false
    vision-scanners-delete:
        operation: vision_scanners_destroy
        enabled: true
        scopes:
            - replay_scanner:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete replay vision scanner
        description: >
            Permanently delete a replay vision scanner by ID. The scanner stops scanning immediately and its scheduled
            Temporal jobs are removed by the reconciler. Past observations recorded by this scanner are deleted along
            with it. Use sparingly — to stop a scanner without losing its history, set `enabled: false` via
            `vision-scanners-update` instead.
        feature_flag: replay-vision
    vision-scanners-estimate-create:
        operation: vision_scanners_estimate_create
        enabled: true
        scopes:
            - replay_scanner:read
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Estimate replay vision scanner volume
        description: >
            Preview how many observations a proposed scanner would generate before saving it. Send a `query`
            (`RecordingsQuery` shape; `date_from`/`date_to` are ignored — the estimate uses a fixed 30-day lookback) and
            an optional `sampling_rate`. Returns `matched_sessions_in_window`, the `window_days` it was measured over,
            and `estimated_observations_per_month`. Enabled scanners sweep every 5 minutes, so a broad query can exhaust
            the monthly quota quickly — run this and compare against `vision-quota-retrieve` before
            `vision-scanners-create`.
        feature_flag: replay-vision
    vision-scanners-get:
        operation: vision_scanners_retrieve
        enabled: true
        scopes:
            - replay_scanner:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get replay vision scanner
        description: >
            Get a single replay vision scanner by ID. Returns the full configuration including `scanner_config` (the
            type-specific prompt and response schema parameters), the `RecordingsQuery` used to select sessions, and
            operational fields like `enabled`, `sampling_rate`, `provider`, `model`, `emits_signals`, `scanner_version`,
            and `last_swept_at`.
        feature_flag: replay-vision
    vision-scanners-list:
        operation: vision_scanners_list
        enabled: true
        scopes:
            - replay_scanner:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List replay vision scanners
        description: >
            List all replay vision scanners in the current project. A scanner watches a slice of session recordings
            (defined by its `query` and `sampling_rate`) and runs one of four LLM analyses against each matching
            session: `monitor` (open-ended observations), `classifier` (tag from a fixed label set), `scorer` (numeric
            rubric), or `summarizer` (free-text summary, optionally with facet embeddings for downstream search). Each
            scanner returns its current configuration, enabled state, sampling rate, and `last_swept_at` timestamp.
        feature_flag: replay-vision
    vision-scanners-observations-get:
        operation: vision_scanners_observations_retrieve
        enabled: true
        scopes:
            - replay_scanner:read
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get scanner observation
        description: >
            Get a single scanner observation by ID. Returns the full `scanner_snapshot` (the scanner's configuration as
            it was at run time, for reproducibility across `scanner_version` bumps) and the full `scanner_result`
            including any event citations linking the LLM output back to specific events in the originating session.
            Pair with the session-recording MCP tools or the investigating-replay skill to inspect the underlying
            recording.
        feature_flag: replay-vision
    vision-scanners-observations-label-create:
        operation: vision_scanners_observations_label_create
        enabled: false
    vision-scanners-observations-label-destroy:
        operation: vision_scanners_observations_label_destroy
        enabled: false
    vision-scanners-observations-list:
        operation: vision_scanners_observations_list
        enabled: true
        scopes:
            - replay_scanner:read
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List scanner observations
        description: >
            List the observations recorded by a single scanner. Each observation is one scan of one session and includes
            its `status` (pending/running/succeeded/failed/ineligible), `error_reason` (set on terminal non-success
            statuses, e.g. `too_short`/`no_recording` for ineligible or `provider_rejected`/`validation_failed` for
            failed — useful for triaging why a scan produced no result), `triggered_by` (`schedule` or `on_demand`),
            `workflow_id`, the `scanner_result` (the LLM output validated against the scanner's response schema for that
            scanner_type), and the `session_id` of the recording it analysed. Use this to inspect what a scanner has
            found over time; to see every scanner's observations for one session, use `vision-observations-list`.
        feature_flag: replay-vision
    vision-scanners-observations-retry-create:
        operation: vision_scanners_observations_retry_create
        enabled: false
    vision-scanners-observations-stats:
        operation: vision_scanners_observations_stats_retrieve
        enabled: true
        scopes:
            - replay_scanner:read
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get scanner observation stats
        description: >
            Aggregate statistics over one scanner's observations. Accepts the same filters as
            `vision-scanners-observations-list` plus `recent_days` (default 14, clamped 1..365) for the windowed series.
            Returns `status_counts` (totals and success rate), `coverage` (distinct sessions scanned), `labels` (thumbs
            up/down rating totals, a per-day accuracy series bucketed by scan day, per-day rating activity, and
            `version_markers`: each prompt version's first day, prompt text, and rating counts), plus per-type
            distributions (`monitor` verdict counts, `classifier` tag rankings, `scorer` score summary and histogram).
            Use it to judge scanner quality and rating coverage, e.g. before generating a prompt suggestion with
            `vision-scanners-prompt-suggestions-generate`.
        feature_flag: replay-vision
    vision-scanners-partial-update:
        operation: vision_scanners_partial_update
        enabled: false
    vision-scanners-prompt-suggestions-apply:
        operation: vision_scanners_prompt_suggestions_apply_create
        enabled: true
        scopes:
            - replay_scanner:write
            - session_recording:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Apply prompt suggestion
        description: >
            Apply a prompt suggestion to its scanner: writes the `suggested_prompt` into the scanner's config (bumping
            `scanner_version`) and marks the suggestion applied. Only the current (pending or dismissed) suggestion can
            be applied, and only while the scanner's prompt is unchanged since it was generated. Otherwise the call is
            rejected and you should generate a fresh one. This is a team-wide change: the scanner scans with the new
            prompt from its next sweep onward.
        feature_flag: replay-vision
    vision-scanners-prompt-suggestions-current:
        operation: vision_scanners_prompt_suggestions_current_retrieve
        enabled: true
        scopes:
            - replay_scanner:read
            - session_recording:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get current prompt suggestion
        description: >
            Get a scanner's newest AI prompt-rewrite suggestion, generated from the team's thumbs up/down ratings.
            Returns `suggestion` (null when none has been generated yet) with its `suggested_prompt`, the `base_prompt`
            it rewrote (for diffing), the `rationale`, and `status` (pending/applied/dismissed/superseded). Also returns
            `stale` (true when ratings changed since it was generated, so regenerating may give a better rewrite) and
            `rated_count` (rated observations available to generate from).
        feature_flag: replay-vision
    vision-scanners-prompt-suggestions-dismiss:
        operation: vision_scanners_prompt_suggestions_dismiss_create
        enabled: true
        scopes:
            - replay_scanner:write
            - session_recording:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Dismiss prompt suggestion
        description: >
            Dismiss a prompt suggestion without applying it. The scanner's prompt is unchanged and the suggestion stays
            in history. A dismissed suggestion can still be applied later with
            `vision-scanners-prompt-suggestions-apply` as long as the scanner's prompt hasn't changed since it was
            generated.
        feature_flag: replay-vision
    vision-scanners-prompt-suggestions-generate:
        operation: vision_scanners_prompt_suggestions_generate_create
        enabled: true
        scopes:
            - replay_scanner:write
            - session_recording:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Generate prompt suggestion from ratings
        description: >
            Generate a fresh AI prompt-rewrite suggestion for a scanner from the team's current thumbs up/down ratings
            and their written feedback. Requires at least one rated observation (check `rated_count` on
            `vision-scanners-prompt-suggestions-current`; create ratings with `vision-observations-label-create`). The
            previous pending suggestion becomes superseded. The LLM call runs inline, so expect the request to take a
            while. Review the returned suggestion, then apply it with `vision-scanners-prompt-suggestions-apply` or
            dismiss it with `vision-scanners-prompt-suggestions-dismiss`.
        requires_ai_consent: true
        feature_flag: replay-vision
    vision-scanners-prompt-suggestions-list:
        operation: vision_scanners_prompt_suggestions_list
        enabled: false
    vision-scanners-scan-session:
        operation: vision_scanners_observe_create
        enabled: true
        scopes:
            - replay_scanner:write
            - session_recording:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Run scanner against a session now
        description: >
            Trigger a scanner against a specific session immediately, bypassing the sampling rate and any scheduled
            sweep. Returns 202 with a `workflow_id`; the resulting observation appears under
            `vision-scanners-observations-list` once the Temporal workflow finishes (typically several minutes —
            rasterising the recording into video and calling the LLM is slow). Useful for ad-hoc scanning during an
            investigation: pick a scanner that matches the question you want answered, and point it at the session
            you're examining. A scanner can observe a given session only once — re-triggering it on a session that
            already has an observation (even a failed or ineligible one) is a no-op and will not produce a fresh scan.
        requires_ai_consent: true
        feature_flag: replay-vision
    vision-scanners-stats-retrieve:
        operation: vision_scanners_stats_retrieve
        enabled: false
    vision-scanners-suggest-tags-create:
        operation: vision_scanners_suggest_tags_create
        enabled: false
    vision-scanners-update:
        operation: vision_scanners_partial_update
        enabled: true
        scopes:
            - replay_scanner:write
            - session_recording:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update replay vision scanner
        description: >
            Partially update a replay vision scanner by ID. Send only the fields you want to change. Common changes:
            toggle `enabled` to pause/resume scanning, adjust `sampling_rate`, tweak the `scanner_config` prompt or
            tags, or refine the `query` to watch a different slice of sessions. `scanner_type` is locked after creation
            — to change it, delete and recreate. Editing any config field bumps `scanner_version`; existing observations
            keep a snapshot of the previous config for reproducibility. If you widen the `query` or raise
            `sampling_rate`, re-check projected volume with `vision-scanners-estimate-create` and remaining budget with
            `vision-quota-retrieve` first — the scanner resumes sweeping every 5 minutes at the new, broader scope.
        exclude_params:
            - id
            - scanner_version
            - last_swept_at
            - created_at
            - created_by
            - updated_at
        requires_ai_consent: true
        feature_flag: replay-vision
