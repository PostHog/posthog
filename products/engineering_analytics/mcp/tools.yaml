# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Engineering analytics
feature: engineering_analytics
url_prefix: /engineering_analytics
ui_apps: {}
tools:
    pr-lifecycle:
        operation: engineering_analytics_pr_lifecycle
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: PR lifecycle timeline
        description: >
            The timeline of a single pull request: a header (number, title, author, state, draft, timestamps) plus
            ordered events — opened, CI started, CI finished, and merged or closed. Use this to answer "where is this PR
            stuck and what happened to it". metric_quality is "partial" — it covers CI events only; review and comment
            events are not yet available.
        param_overrides:
            pr_number:
                description: Pull request number to inspect.
            repo:
                description: Optional 'owner/name' repository. In v1 this only labels the response.
    time-to-merge:
        operation: engineering_analytics_time_to_merge
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: PR time to merge
        description: >
            How long pull requests take from open to merge over a time window: median and p95 seconds plus a PR count,
            either overall or split per author. Bots and drafts are excluded. Use this to answer "how long are PRs
            sitting before they merge" or to compare an author's throughput to the baseline. metric_quality is "coarse"
            — it measures open-to-merge, combining draft and ready-for-review time, because the warehouse holds current
            PR state rather than a transition history.
        param_overrides:
            date_from:
                description: Start of the window — a relative string like '-7d' or an ISO8601 timestamp. Defaults to '-7d'.
            date_to:
                description: End of the window — a relative string or ISO8601 timestamp. Omit for 'now'.
            repo:
                description: Optional 'owner/name' repository. In v1 this only labels the response; it does not filter rows.
            group_by_author:
                description: Set true to split results per author handle instead of one overall bucket.
    workflow-report:
        operation: engineering_analytics_workflow_report
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: CI workflow report
        description: >
            Report on GitHub Actions workflow health over a time window: per workflow, the run count, success rate
            (0.0–1.0), median and p95 duration in seconds, and the last failure time, sorted slowest median first. Use
            this to answer "what is slow or flaky in CI right now" or to check whether a known long-pole workflow is
            holding up a pull request. metric_quality is always "precise" — computed directly from CI run records.
        param_overrides:
            date_from:
                description: Start of the window — a relative string like '-7d' or an ISO8601 timestamp. Defaults to '-7d'.
            date_to:
                description: End of the window — a relative string or ISO8601 timestamp. Omit for 'now'.
            repo:
                description: Optional 'owner/name' repository. In v1 this only labels the response; it does not filter rows.
