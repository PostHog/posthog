# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Engineering analytics
feature: engineering_analytics
url_prefix: /engineering-analytics
ui_apps: {}
tools:
    engineering-analytics-author-workflow-costs:
        operation: engineering_analytics_author_workflow_costs
        enabled: false
    engineering-analytics-ci-cards:
        operation: engineering_analytics_ci_cards
        enabled: false
    engineering-analytics-ci-failure-logs:
        operation: engineering_analytics_ci_failure_logs
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: CI failure logs for a PR
        description: >
            The thinned CI failure logs for a pull request, grouped by failed job — reach for this to answer "why did
            this PR's CI fail". Each failed job returns its failure region (the error lines plus surrounding context,
            with "... N lines omitted ..." markers) as ordered lines, and every line carries its original 1-based line
            number in the full pre-thinning log so you can locate it in the raw GitHub log. The PR is resolved to ALL
            its workflow runs across every push (via the pull_requests association, not the latest commit), so earlier
            pushes' failures are included too. logs_available is false when CI hasn't failed, the logs aged out of the
            short Logs retention, or a fork PR has no run association to resolve. Use pr-runs or workflow-jobs for the
            run/job metadata behind these logs.
    engineering-analytics-job-aggregates:
        operation: engineering_analytics_job_aggregates
        enabled: false
    engineering-analytics-master-failures:
        operation: engineering_analytics_master_failures
        enabled: false
    engineering-analytics-pr-cost:
        operation: engineering_analytics_pr_cost
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Estimated CI cost of a PR
        description: >
            Estimated CI dollar cost of one pull request, summed over the jobs of all its workflow runs, with breakdowns
            per workflow (by_workflow) and per run (by_run). Reach for this instead of summing runner minutes by hand:
            the estimate already classifies runners (billable self-hosted Linux vs free GitHub-hosted), applies the
            per-vCPU price ladder, and excludes non-Linux and provider-hosted jobs. jobs_available is false when the
            job-level source isn't synced yet — every figure is then zero/null, so check it before trusting a $0.00.
            estimated_cost_usd is null (not zero) when nothing was costable, and unsettled_jobs counts billable jobs
            still running that are left out of the estimate.
    engineering-analytics-pr-runs:
        operation: engineering_analytics_pr_runs
        enabled: false
    engineering-analytics-quarantine:
        operation: engineering_analytics_quarantine
        enabled: false
    engineering-analytics-quarantine-request:
        operation: engineering_analytics_quarantine_request
        enabled: false
    engineering-analytics-repo-overview:
        operation: engineering_analytics_repo_overview
        enabled: false
    engineering-analytics-repo-run-activity:
        operation: engineering_analytics_repo_run_activity
        enabled: false
    engineering-analytics-resolve-branch:
        operation: engineering_analytics_resolve_branch
        enabled: false
    engineering-analytics-run-failure-logs:
        operation: engineering_analytics_run_failure_logs
        enabled: false
    engineering-analytics-sources:
        operation: engineering_analytics_sources
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List connected GitHub sources
        description: >
            The team's connected GitHub data warehouse sources, oldest first, each with its id, repo (owner/name), and
            table prefix. Call this first when a team may have more than one GitHub source, then pass a chosen id as
            source_id to the pull-requests, workflow-health, ci-cards, or pr-lifecycle tools to read that specific
            source. With a single source you can skip it — the other tools default to the oldest connected source.
    engineering-analytics-workflow-jobs:
        operation: engineering_analytics_workflow_jobs
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: Jobs of a workflow run
        description: >
            The jobs of a single workflow run attempt, each with its status, conclusion, wall-clock duration_seconds,
            runner tier (runner_provider / runner_label), and estimated_cost_usd. Use this to see where a run spent its
            time and money job-by-job, or to find the slow or expensive job in a run. Scoped to one run_attempt (the
            latest unless you pass run_attempt) so a re-run's attempts don't merge. estimated_cost_usd is null for free
            GitHub-hosted, non-Linux, or unfinished jobs. Returns an empty list when the job-level source isn't synced
            yet.
    engineering-analytics-workflow-run:
        operation: engineering_analytics_workflow_run
        enabled: false
    engineering-analytics-workflow-run-activity:
        operation: engineering_analytics_workflow_run_activity
        enabled: false
    engineering-analytics-workflow-runner-costs:
        operation: engineering_analytics_workflow_runner_costs
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: Workflow cost by runner tier
        description: >
            One workflow's estimated CI cost broken down by runner tier over a window (date_from default -30d), highest
            spend first. Each row is a tier (provider + runner_label) with its job_count, billable_minutes, and
            estimated_cost_usd. Use this for "which runner tier drives this workflow's CI bill" and to spot oversized
            runners. Billable self-hosted Linux tiers carry a cost; github-hosted and non-Linux rows are null. Returns
            an empty list when the job-level source isn't synced yet.
    engineering-analytics-workflow-runs:
        operation: engineering_analytics_workflow_runs
        enabled: false
    pr-lifecycle:
        operation: engineering_analytics_pr_lifecycle
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: PR lifecycle timeline
        description: >
            The timeline of a single pull request: a header (number, title, author, state, draft, timestamps) plus
            ordered events — opened, CI started, CI finished, and merged or closed. Use this to answer "where is this PR
            stuck and what happened to it". metric_quality is "partial" — it covers CI events only; review and comment
            events are not yet available. For aggregate questions use the pull-requests and workflow-health tools.
    pull-requests:
        operation: engineering_analytics_pull_requests
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List pull requests with CI status
        description: >
            Open pull requests plus any merged or closed within the window, newest first, each with its head-SHA CI
            rollup (runs / passing / failing / pending). Use this for "which PRs are stuck", "which open PRs have
            failing or pending CI", and per-author or per-repo PR triage. open_to_merge_seconds is coarse — it is
            merged_at minus created_at and fuses draft and ready-for-review time, so report it as "open to merge", never
            "cycle time". CI counts come from the latest run per workflow on the head SHA and can lag until the
            workflow_run webhook settles a late completion. Bots and drafts are present; exclude them (is_bot, is_draft)
            for throughput questions.
        param_overrides:
            date_from:
                description: >
                    Recency floor for merged/closed PRs — relative ('-30d', '-8w') or ISO8601. Open PRs are always
                    included regardless of age. Defaults to -30d.
    workflow-health:
        operation: engineering_analytics_workflow_health
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: Per-workflow CI health
        description: >
            Per-workflow CI health over a window: run count, success rate, p50/p95 duration, and last failure time. Use
            this for "is CI getting faster or slower", "which GitHub Actions workflow is the slow or flaky long pole",
            and CI duration trends. Rates and percentiles are over completed runs only and are null for a window with no
            completed runs; to get a trend, call this over two adjacent windows and compare.
        param_overrides:
            date_from:
                description: Window start — relative ('-24h', '-7d') or ISO8601. Defaults to -24h.
            date_to:
                description: Window end — relative or ISO8601. Defaults to now.
        url_prefix: /engineering-analytics/workflows
