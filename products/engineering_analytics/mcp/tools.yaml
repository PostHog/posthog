# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# The primary surface for this product is the generic SQL/query tool over the
# curated read layer (engineering_analytics_pull_requests /
# engineering_analytics_workflow_runs), guided by the
# diagnosing-ci-and-merge-bottlenecks skill. pr-lifecycle is the one named deep
# tool — a genuine single-PR assembly the SQL surface can't express in one call.
category: Engineering analytics
feature: engineering_analytics
url_prefix: /engineering_analytics
ui_apps: {}
tools:
    pr-lifecycle:
        operation: engineering_analytics_pr_lifecycle
        enabled: true
        scopes:
            - engineering_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: PR lifecycle timeline
        description: >
            The timeline of a single pull request: a header (number, title, author, state, draft, timestamps) plus
            ordered events — opened, CI started, CI finished, and merged or closed. Use this to answer "where is this PR
            stuck and what happened to it". metric_quality is "partial" — it covers CI events only; review and comment
            events are not yet available. For aggregate questions (CI health, time to merge, throughput), query the
            engineering_analytics_pull_requests / engineering_analytics_workflow_runs views with SQL instead.
        param_overrides:
            pr_number:
                description: Pull request number to inspect.
            repo:
                description: Optional 'owner/name' repository to disambiguate when the PR number exists in more than one connected repo.
