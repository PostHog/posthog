# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: LLM analytics
feature: llm_analytics
url_prefix: /llm-analytics
ui_apps: {}
tools:
    sentiment-analyze:
        operation: llm_analytics_sentiment_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Analyze sentiment
        description: >
            Classify sentiment of LLM trace or generation user messages as positive, neutral, or negative. Pass a list
            of trace or generation IDs and an analysis_level ("trace" or "generation"). Returns per-ID sentiment labels
            with confidence scores and per-message breakdowns. Results are cached — use force_refresh to recompute.
            Rate-limited.
    trace-summarize:
        operation: llm_analytics_summarization_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Summarize trace or generation
        description: >
            Generate an AI-powered summary of an LLM trace or generation. Pass a trace_id or generation_id with a
            date_from — the backend fetches the data and returns a structured summary with title, flow diagram, summary
            bullets, and interesting notes. Results are cached. Use mode "minimal" (default) for 3-5 points or
            "detailed" for 5-10 points. Rate-limited; requires AI data processing approval for the organization.
        requires_ai_consent: true
