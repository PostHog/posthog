# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Deployments
feature: deployments
url_prefix: /deployments
ui_apps:
    deployment:
        type: detail
        view_prop: deployment
    deployment-list:
        type: list
        detail_tool: deployments-get
        detail_args: '{ id: item.id, deployment_project_id: item.deployment_project_id }'
        item_name_field: commit_message
tools:
    deployment-projects-create:
        operation: deployment_projects_create
        enabled: false
    deployment-projects-destroy:
        operation: deployment_projects_destroy
        enabled: false
    deployment-projects-get:
        operation: deployment_projects_retrieve
        enabled: true
        scopes:
            - deployment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get deployment project
        description: >
            Get a single deployment project by id. Returns full metadata including github_integration id,
            cloudflare_project_name, subdomain, and the id of the currently-live deployment.
        feature_flag: deployments
    deployment-projects-list:
        operation: deployment_projects_list
        enabled: true
        scopes:
            - deployment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List deployment projects
        description: >
            List deployment projects (the parent container of individual deployments) for a team. Each project carries
            the source repo, GitHub integration, Cloudflare Pages metadata, and a pointer to the currently-live
            deployment. Mirrors Vercel's `list_projects` for the deployment domain.
        feature_flag: deployments
    deployment-projects-partial-update:
        operation: deployment_projects_partial_update
        enabled: false
    deployment-projects-update:
        operation: deployment_projects_update
        enabled: false
    deployments-cancel:
        operation: deployment_projects_deployments_cancel_create
        enabled: false
        scopes:
            - deployment:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Cancel deployment
        description: >
            Signal cancellation to an in-flight deployment's worker. Marks the row cancelled even when no worker is
            running.
        feature_flag: deployments
    deployments-create:
        operation: deployment_projects_deployments_create
        enabled: false
        scopes:
            - deployment:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create deployment
        description: >
            Start a new deployment for a project from a specific commit. Returns 201 on success, 409 if a deployment is
            already in flight, or 502 on upstream GitHub / workflow dispatch failure.
        feature_flag: deployments
    deployments-deploy:
        operation: deployment_projects_deployments_deploy_create
        # Disabled until the backend stops returning a Deployment row in
        # ERROR status — the current stub returns 201 with an error row,
        # which agents read as success. Matches the convention used by
        # the other mutating tools (redeploy/rollback/refresh-preview/cancel),
        # all kept off until they're ready end-to-end.
        enabled: false
        scopes:
            - deployment:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Deploy
        description: >
            Trigger a deployment for a deployment project. Accepts an optional `branch`; omitting it uses the deployment
            project's default branch. Returns the created deployment id.
        feature_flag: deployments
    deployments-events:
        operation: deployment_projects_deployments_events_list
        enabled: true
        scopes:
            - deployment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: Get deployment events
        description: >
            Return the state-machine event log for a deployment. Each event has `event_type` (e.g. `status_changed`,
            `preview_captured`, `dispatched`), `payload` (shape varies by event_type), and `occurred_at`. Use this to
            trace exactly what happened during a deploy — especially failures.
        feature_flag: deployments
    deployments-get:
        operation: deployment_projects_deployments_retrieve
        enabled: true
        scopes:
            - deployment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get deployment
        description: >
            Get a single deployment by id. Returns full metadata including commit message and SHA, status,
            started/finished timestamps, duration, source repo URL, branch, deployment URL, preview image, trigger kind,
            parent deployment id, and (when status=error) `error_message` + `error_step`. Mirrors Vercel's
            `get_deployment`.
        ui_app: deployment
        feature_flag: deployments
    deployments-list:
        operation: deployment_projects_deployments_list
        enabled: true
        scopes:
            - deployment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List deployments
        description: >
            List deployments for a deployment project. Returns deployments with status, commit metadata, duration,
            author, source repo, deployment URL, preview image, and timestamps. Supports `status` (comma-separated
            filter), `author`, `search`, and `ordering`. Default ordering is `-created_at`; cancelled deployments are
            hidden by default (mirrors Vercel). Mirrors Vercel's `list_deployments`.
        ui_app: deployment-list
        feature_flag: deployments
    deployments-logs:
        operation: deployment_projects_deployments_logs_retrieve
        enabled: false
        scopes:
            - deployment:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get deployment logs
        description: >
            Retrieve build / runtime logs for a specific deployment. Mirrors Vercel's `get_deployment_build_logs` +
            `get_runtime_logs(deploymentId)`. NOTE: the backend endpoint is currently a stub returning an empty response
            — the real implementation queries `$log` PostHog events tagged with `deployment_id` once the HogQL bridge
            lands.
        feature_flag: deployments
    deployments-redeploy:
        operation: deployment_projects_deployments_redeploy_create
        enabled: false
        scopes:
            - deployment:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Redeploy
        description: >
            Trigger a redeploy from the commit of an existing deployment. Creates a new deployment with `trigger_kind =
            "redeploy"`.
        feature_flag: deployments
    deployments-refresh-preview:
        operation: deployment_projects_deployments_refresh_preview_create
        enabled: false
        scopes:
            - deployment:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Refresh preview image
        description: >
            Re-capture the preview screenshot for a deployment. Useful if the original capture failed or the deployed
            site changed after the build completed.
        feature_flag: deployments
    deployments-rollback:
        operation: deployment_projects_deployments_rollback_create
        enabled: false
        scopes:
            - deployment:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Rollback
        description: >
            Roll back to a previous deployment, making it the currently-live one. Creates a new deployment with
            `trigger_kind = "rollback"` pointing at the target.
        feature_flag: deployments
