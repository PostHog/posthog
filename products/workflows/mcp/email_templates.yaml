# MCP tool definition — curated subset file (kept out of tools.yaml so
# scaffold-yaml --sync-all doesn't prune these cross-product operations:
# the endpoints live in products/messaging but surface as workflows tools).
category: Workflows
feature: workflows
url_prefix: /workflows/library/templates
ui_apps: {}
tools:
    workflows-create-email-template:
        operation: messaging_templates_create
        enabled: true
        scopes:
            - hog_flow:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Create email template
        description: >
            Save an email template you authored to the workflows library. Provide name and content.email with subject,
            a plain-text fallback, and content.email.design (Unlayer design JSON — full schema in the
            designing-email-templates skill). The server renders the sent email from the design with Unlayer's own
            renderer, and the template opens as editable blocks in PostHog's visual editor. Liquid personalization is
            supported throughout — Liquid tags, apostrophes, and emoji are ordinary JSON characters, so pass the design
            inline in this call exactly as authored. Use the template in a workflow's function_email action.
        response:
            exclude: [content, created_by]
    workflows-get-email-template:
        operation: messaging_templates_retrieve
        enabled: true
        scopes:
            - hog_flow:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get email template
        description: >
            Get an email template by ID, including content.email (subject, text, design). Always fetch before updating
            — content is replaced as a whole and humans may have edited the design in the visual editor since you last
            saw it, so build your update payload from this response.
        response:
            exclude: [content.email.html, created_by]
    workflows-list-email-templates:
        operation: messaging_templates_list
        enabled: true
        scopes:
            - hog_flow:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        enrich_url: '{id}'
        title: List email templates
        description: >
            List email templates in the workflows library — metadata only; fetch a template's content with
            workflows-get-email-template. Templates are referenced from a workflow's function_email action.
        response:
            exclude: [content, created_by]
    workflows-update-email-template:
        operation: messaging_templates_partial_update
        enabled: true
        scopes:
            - hog_flow:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Update email template
        description: >
            Update an email template by ID. content is replaced as a whole, never merged — call
            workflows-get-email-template first (the design may carry fresh human edits from the visual editor) and send
            back the complete content.email with your edited design. The server re-renders the sent email from the
            design on save.
        response:
            exclude: [content, created_by]
