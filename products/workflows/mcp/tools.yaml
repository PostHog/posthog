# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Workflows
feature: workflows
url_prefix: /pipeline/destinations
ui_apps:
    workflow:
        type: detail
        view_prop: workflow
    workflow-list:
        type: list
        detail_tool: workflows-get
tools:
    hog-flow-templates-create:
        operation: hog_flow_templates_create
        enabled: false
    hog-flow-templates-destroy:
        operation: hog_flow_templates_destroy
        enabled: false
    hog-flow-templates-list:
        operation: hog_flow_templates_list
        enabled: false
    hog-flow-templates-logs-retrieve:
        operation: hog_flow_templates_logs_retrieve
        enabled: false
    hog-flow-templates-partial-update:
        operation: hog_flow_templates_partial_update
        enabled: false
    hog-flow-templates-retrieve:
        operation: hog_flow_templates_retrieve
        enabled: false
    hog-flow-templates-update:
        operation: hog_flow_templates_update
        enabled: false
    hog-flows-batch-jobs-create:
        operation: hog_flows_batch_jobs_create
        enabled: false
    hog-flows-batch-jobs-retrieve:
        operation: hog_flows_batch_jobs_retrieve
        enabled: false
    hog-flows-bulk-delete-create:
        operation: hog_flows_bulk_delete_create
        enabled: false
    hog-flows-create:
        operation: hog_flows_create
        enabled: false
    hog-flows-destroy:
        operation: hog_flows_destroy
        enabled: false
    hog-flows-invocations-create:
        operation: hog_flows_invocations_create
        enabled: false
    hog-flows-logs-retrieve:
        operation: hog_flows_logs_retrieve
        enabled: true
        scopes:
            - hog_flow:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get workflow logs
        description: >
            Retrieve execution logs for a specific workflow by ID. Returns log entries with timestamp, level (DEBUG,
            LOG, INFO, WARN, ERROR), and message. Use to debug why a workflow is failing or not producing expected
            results. Supports filtering by log level, text search, time range (after/before), and pagination via limit.
    hog-flows-metrics-retrieve:
        operation: hog_flows_metrics_retrieve
        enabled: true
        scopes:
            - hog_flow:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get workflow metrics
        description: >
            Retrieve execution metrics for a specific workflow by ID. Returns time-series data showing success and
            failure counts over a configurable interval (hour, day, or week). Use to understand workflow health,
            identify failure spikes, and monitor execution reliability. Supports breakdown by metric kind
            (success/failure) or name, and time range filtering.
    hog-flows-metrics-totals-retrieve:
        operation: hog_flows_metrics_totals_retrieve
        enabled: false
    hog-flows-partial-update:
        operation: hog_flows_partial_update
        enabled: false
    hog-flows-schedules-create:
        operation: hog_flows_schedules_create
        enabled: false
    hog-flows-schedules-destroy:
        operation: hog_flows_schedules_destroy
        enabled: false
    hog-flows-schedules-list:
        operation: hog_flows_schedules_list
        enabled: false
    hog-flows-schedules-partial-update:
        operation: hog_flows_schedules_partial_update
        enabled: false
    hog-flows-update:
        operation: hog_flows_update
        enabled: false
    hog-flows-user-blast-radius-create:
        operation: hog_flows_user_blast_radius_create
        enabled: false
    workflows-create:
        operation: hog_flows_create
        enabled: true
        scopes:
            - hog_flow:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: hog-{id}
        title: Create workflow
        description: >
            Create a new workflow. Requires an actions array containing exactly one action with type='trigger' whose
            config sets the trigger type (event, webhook, manual, batch, schedule, tracking_pixel). Additional actions
            define the workflow steps: function/function_email/function_sms/function_push (call a CDP template), delay
            (pause execution, e.g. '30m', '2h', '1d'), conditional_branch (if/else routing), wait_until_condition
            (pause until a condition is met). Connect actions via the edges array of {from, to, type} entries. New
            workflows default to status='draft' — set status='active' to enable live execution.
        exclude_params:
            - trigger
        ui_app: workflow
    workflows-get:
        operation: hog_flows_retrieve
        enabled: true
        scopes:
            - hog_flow:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: hog-{id}
        title: Get workflow
        description: >
            Get a specific workflow by ID. Returns the full workflow definition including trigger, edges, actions, exit
            condition, and variables.
        ui_app: workflow
    workflows-list:
        operation: hog_flows_list
        enabled: true
        scopes:
            - hog_flow:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List workflows
        description: >
            List all workflows in the project. Returns workflows with their name, description, status
            (draft/active/archived), version, trigger configuration, and timestamps.
        ui_app: workflow-list
    workflows-run:
        operation: hog_flows_invocations_create
        enabled: true
        scopes:
            - hog_flow:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Test-run workflow
        description: >
            Execute a test invocation of a saved workflow. Sends the workflow to the execution engine for a dry-run
            with the provided test event data. By default async actions (HTTP calls, emails, SMS) are mocked for
            safety — set mock_async_functions=false to actually fire side effects. Use globals to provide test event
            data matching your trigger type (typically {event, person, groups}). Optionally pass current_action_id to
            start from a specific node instead of the trigger. Returns the execution trace showing which actions ran
            and their outputs.
        exclude_params:
            - configuration
    workflows-update:
        operation: hog_flows_partial_update
        enabled: true
        scopes:
            - hog_flow:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: hog-{id}
        title: Update workflow
        description: >
            Update an existing workflow by ID. Supports partial updates for most fields (e.g. renaming, archiving,
            editing description). EXCEPTION: to transition status from 'draft' to 'active', you must re-send the full
            workflow body (actions, edges, exit_condition, etc.) along with status='active' — a status-only PATCH
            will fail with an empty validation error because publish-time validation needs the full graph. Other
            common updates: status -> archived to disable, edit actions array (must still contain exactly one trigger
            action), modify edges, change exit_condition.
        exclude_params:
            - trigger
        ui_app: workflow
