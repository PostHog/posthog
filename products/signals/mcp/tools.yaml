# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Signals
feature: signals
url_prefix: /inbox
ui_apps: {}
tools:
    inbox-processing-list:
        operation: signals_processing_list
        enabled: false
    inbox-processing-pause-destroy:
        operation: signals_processing_pause_destroy
        enabled: false
    inbox-processing-pause-update:
        operation: signals_processing_pause_update
        enabled: false
    inbox-reports-list:
        operation: signals_reports_list
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: List signal reports
        description: >
            List signal reports for the current project. A signal report is a cluster of related observations (signals)
            that PostHog has aggregated into a single issue or trend. Reports surface in the Inbox. Supports filtering
            by status (potential, candidate, in_progress, pending_input, ready, failed, suppressed), free-text search
            across title and summary, source_product (e.g. error_tracking, session_replay), and suggested_reviewers
            (PostHog user UUIDs). Results are paginated and ordered by '-is_suggested_reviewer,status,-updated_at' by
            default.
        response:
            include:
                - id
                - title
                - summary
                - status
                - priority
                - actionability
                - already_addressed
                - signal_count
                - total_weight
                - source_products
                - is_suggested_reviewer
                - implementation_pr_url
                - created_at
                - updated_at
    inbox-reports-retrieve:
        operation: signals_reports_retrieve
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get signal report
        description: >
            Get a single signal report by ID. Returns the full report including title, summary, status, priority and
            actionability judgments, signal_count, total_weight, source products, and the URL of the implementation PR
            if one has been opened. To inspect the underlying signals or judgment artefacts, follow up with a HogQL
            query (see the 'signals' skill) — those endpoints are not yet exposed via MCP.
    inbox-source-configs-create:
        operation: signals_source_configs_create
        enabled: false
    inbox-source-configs-destroy:
        operation: signals_source_configs_destroy
        enabled: false
    inbox-source-configs-list:
        operation: signals_source_configs_list
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List signal source configs
        description: >
            List the configured signal sources for the current project. A signal source ties a product (e.g.
            error_tracking, session_replay, github, linear, zendesk) and a source_type to an enabled flag and
            configuration. The 'status' field reflects the current state of the underlying data import or workflow
            (running, completed, failed) when applicable.
        response:
            include:
                - id
                - source_product
                - source_type
                - enabled
                - status
                - created_at
                - updated_at
    inbox-source-configs-partial-update:
        operation: signals_source_configs_partial_update
        enabled: false
    inbox-source-configs-retrieve:
        operation: signals_source_configs_retrieve
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get signal source config
        description: >
            Get a single signal source config by ID. Returns the full record including source_product, source_type,
            enabled flag, configuration JSON, and current status of the underlying data import or workflow.
    inbox-source-configs-update:
        operation: signals_source_configs_update
        enabled: false
    signals-scout-runs-list:
        operation: signals_scout_runs_list
        enabled: true
        scopes:
            - signal_scout:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List recent scout runs
        description: >
            Return the most recent `SignalScoutRun` summaries for this project, newest first. Used by the headless
            scout to dedupe against work other runs already covered. ILIKE matches on `summary`; results capped at
            100.
    signals-scout-runs-retrieve:
        operation: signals_scout_runs_retrieve
        enabled: true
        scopes:
            - signal_scout:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get a scout run by ID
        description: >
            Return the full `SignalScoutRun` row including `summary`, `findings`, `hypotheses_considered`,
            `run_metrics`, and `metadata`. Strictly team-scoped — a UUID belonging to another team returns 404.
    signals-scout-runs-findings-create:
        operation: signals_scout_runs_findings_create
        enabled: true
        scopes:
            - signal_scout_internal:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Emit a finding for a run
        description: >
            Persist a finding to `SignalScoutRun.findings` and fire `emit_signal` with
            `source_product = signals_scout`. Idempotent on `(run_id, finding_id)` — a second call with the same
            `finding_id` short-circuits without re-firing the pipeline. Honors the team's `shadow_mode` flag.
    signals-scout-scratchpad-list:
        operation: signals_scout_scratchpad_list
        enabled: true
        scopes:
            - signal_scout:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: Search durable scout memories
        description: >
            Return `SignalScratchpad` entries for this project. ILIKE matches on `content`; tags filter via
            Postgres array overlap. Expired `scout_inference` entries are hidden by default.
    signals-scout-scratchpad-create:
        operation: signals_scout_scratchpad_create
        enabled: true
        scopes:
            - signal_scout_internal:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Write or refresh a scout memory
        description: >
            Upsert a `scout_inference` memory keyed on `(team, key)`. Re-using a key updates the existing entry in
            place and resets its TTL. Cannot overwrite `human_confirmed` entries.
    signals-scout-scratchpad-delete:
        operation: signals_scout_scratchpad_delete
        enabled: true
        scopes:
            - signal_scout_internal:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Forget a scout memory by key
        description: >
            Delete a `scout_inference` memory entry by key. Returns `deleted=false` if no row matched — the call
            is idempotent. Cannot delete `human_confirmed` entries.
    users-signal-autonomy-create:
        operation: users_signal_autonomy_create
        enabled: false
    users-signal-autonomy-destroy:
        operation: users_signal_autonomy_destroy
        enabled: false
    users-signal-autonomy-retrieve:
        operation: users_signal_autonomy_retrieve
        enabled: false
