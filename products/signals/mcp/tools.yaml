# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Signals
feature: signals
url_prefix: /inbox
ui_apps: {}
tools:
    inbox-processing-list:
        operation: signals_processing_list
        enabled: false
    inbox-processing-pause-destroy:
        operation: signals_processing_pause_destroy
        enabled: false
    inbox-processing-pause-update:
        operation: signals_processing_pause_update
        enabled: false
    inbox-reports-list:
        operation: signals_reports_list
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: List signal reports
        description: >
            List signal reports for the current project. A signal report is a cluster of related observations (signals)
            that PostHog has aggregated into a single issue or trend. Reports surface in the Inbox. Supports filtering
            by status (potential, candidate, in_progress, pending_input, ready, failed, suppressed), free-text search
            across title and summary, source_product (e.g. error_tracking, session_replay), and suggested_reviewers
            (PostHog user UUIDs). Results are paginated and ordered by '-is_suggested_reviewer,status,-updated_at' by
            default.
        response:
            include:
                - id
                - title
                - summary
                - status
                - priority
                - actionability
                - already_addressed
                - signal_count
                - total_weight
                - source_products
                - is_suggested_reviewer
                - implementation_pr_url
                - created_at
                - updated_at
    inbox-reports-retrieve:
        operation: signals_reports_retrieve
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get signal report
        description: >
            Get a single signal report by ID. Returns the full report including title, summary, status, priority and
            actionability judgments, signal_count, total_weight, source products, and the URL of the implementation PR
            if one has been opened. To inspect the underlying signals or judgment artefacts, follow up with a HogQL
            query (see the 'signals' skill) — those endpoints are not yet exposed via MCP.
    inbox-source-configs-create:
        operation: signals_source_configs_create
        enabled: false
    inbox-source-configs-destroy:
        operation: signals_source_configs_destroy
        enabled: false
    inbox-source-configs-list:
        operation: signals_source_configs_list
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List signal source configs
        description: >
            List the configured signal sources for the current project. A signal source ties a product (e.g.
            error_tracking, session_replay, github, linear, zendesk) and a source_type to an enabled flag and
            configuration. The 'status' field reflects the current state of the underlying data import or workflow
            (running, completed, failed) when applicable.
        response:
            include:
                - id
                - source_product
                - source_type
                - enabled
                - status
                - created_at
                - updated_at
    inbox-source-configs-partial-update:
        operation: signals_source_configs_partial_update
        enabled: false
    inbox-source-configs-retrieve:
        operation: signals_source_configs_retrieve
        enabled: true
        scopes:
            - task:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get signal source config
        description: >
            Get a single signal source config by ID. Returns the full record including source_product, source_type,
            enabled flag, configuration JSON, and current status of the underlying data import or workflow.
    inbox-source-configs-update:
        operation: signals_source_configs_update
        enabled: false
    signals-agent-runs-list:
        operation: signals_agent_runs_list
        enabled: true
        scopes:
            - signal_agent:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: Search recent agent runs
        description: >
            Return recent `SignalAgentRun` summaries for the current project, newest first.
            Used by the headless Signals agent to dedupe its own work — read what other runs
            already covered before generating new hypotheses. ILIKE matches on `summary`;
            results are capped at 100 (default 20). Optional `since` window narrows to recent
            runs only.
        response:
            include:
                - run_id
                - skill_name
                - skill_version
                - status
                - started_at
                - completed_at
                - summary
                - findings_count
    signals-agent-runs-retrieve:
        operation: signals_agent_runs_retrieve
        enabled: true
        scopes:
            - signal_agent:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get an agent run by ID
        description: >
            Return the full `SignalAgentRun` row including `summary`, `findings`,
            `hypotheses_considered`, `tool_call_log`, and `metadata`. Strictly team-scoped — a
            UUID belonging to another project returns 404. Follow up to a row surfaced by
            `signals-agent-runs-list` when you need the full payload.
    signals-agent-runs-findings-create:
        operation: signals_agent_runs_findings_create
        enabled: true
        scopes:
            - signal_agent:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Emit a finding for a run
        description: >
            Persist a finding to `SignalAgentRun.findings` and fire `emit_signal` with
            `source_product = signals_agent`. Idempotent on `(run_id, finding_id)` — a second
            call with the same `finding_id` short-circuits without re-firing the pipeline.
            Honors the team's `shadow_mode` flag: when true, the finding is persisted on the
            run row but the external emit is a no-op. Use `weight` to rank, `confidence` to
            self-grade, and attach evidence citations referencing `error_tracking`,
            `session_replay`, `logs`, `feature_flags`, etc.
    signals-agent-memory-list:
        operation: signals_agent_memory_list
        enabled: true
        scopes:
            - signal_agent:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: Search durable agent memories
        description: >
            Return `SignalMemory` entries the project has accumulated — known issues, false
            positives, team steering. ILIKE matches on `content`; tags filter via Postgres
            array overlap (pass repeated `tags=` query params). Expired `agent_inference`
            entries are hidden by default; pass `include_expired=true` for audit/debug.
        response:
            include:
                - key
                - content
                - authority
                - tags
                - created_at
                - updated_at
                - expires_at
                - created_by_run_id
    signals-agent-memory-create:
        operation: signals_agent_memory_create
        enabled: true
        scopes:
            - signal_agent:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Write or refresh an agent memory
        description: >
            Upsert an `agent_inference` memory entry keyed on `(team, key)`. Re-using a key
            updates the existing entry in place and resets its TTL (default 7 days, max 90).
            Cannot overwrite `human_confirmed` entries — those are managed by humans only.
            Use this to record "already saw it" notes, dedupe keys, validated hypotheses, or
            narrow the scope of future runs.
    signals-agent-project-profile-get:
        operation: signals_agent_project_profile_get
        enabled: true
        scopes:
            - signal_agent:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get the project profile
        description: >
            Return a deterministic snapshot of "what's true about this project" — products
            in use, product intents (stuck onboardings), connected integrations, warehouse
            sources, signal source configs (split enabled/disabled), and existing inbox
            report counts. Singleton per team; the response reflects either the newest
            non-expired cached profile or a freshly-built one. Read this once at the start
            of a run (right after `skill-get`) to orient on the team in one tool call
            instead of paginating through `inbox-source-configs-list` /
            `inbox-reports-list` / `read-data-schema` / `activity-log-list`. Distinct from
            `signals-agent-memory-list`: profile is ground truth from authoritative
            tables; memory is the agent's inferred learnings.
    signals-agent-memory-delete:
        operation: signals_agent_memory_delete
        enabled: true
        scopes:
            - signal_agent:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Forget an agent memory by key
        description: >
            Delete an `agent_inference` memory entry by key. Returns `deleted=false` if no row
            matched — the call is idempotent. Cannot delete `human_confirmed` entries.
    users-signal-autonomy-create:
        operation: users_signal_autonomy_create
        enabled: false
    users-signal-autonomy-destroy:
        operation: users_signal_autonomy_destroy
        enabled: false
    users-signal-autonomy-retrieve:
        operation: users_signal_autonomy_retrieve
        enabled: false
