[pytest]
# Collect eval_*.py rather than default test_*.py - evals, differently from tests, don't pass/fail
python_files = eval_*.py
# Collect functions named eval_* rather than default test_*
python_functions = eval_*
# Collect classes named Eval* rather than default Test*
python_classes = Eval*
env =
    DEBUG=1
    TEST=1
DJANGO_SETTINGS_MODULE = posthog.settings
asyncio_mode = auto
# CLI defaults for clarity when running: disable warnings plugin, fail fast (-x), verbose (-v), no capture (-s), log INFO
addopts = -p no:warnings -xvs --log-cli-level=INFO
