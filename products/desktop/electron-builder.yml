# Packaging config for the PostHog desktop app.
# The built PostHog frontend (frontend/dist) is bundled into the app's
# Resources as `frontend-dist`, where the packaged main process expects it
# (resolveFrontendDistDir in src/main/index.ts). Sourcemaps are excluded:
# they multiply the bundle size roughly 4x and the app never serves them.
appId: com.posthog.desktop
productName: PostHog
directories:
    buildResources: build
    output: release
files:
    - dist/**
extraResources:
    - from: ../../frontend/dist
      to: frontend-dist
      filter:
          - '**/*'
          - '!**/*.map'
          - '!**/*.map.gz'
          - '!**/*.map.br'
# Everything the app runs is bundled by esbuild into dist/, so there are no
# production node_modules to rebuild or package
npmRebuild: false
# Auto-update feed. `releases/latest/download/<asset>` always serves the newest
# release's assets, so a generic provider over it works with the fork's
# `desktop-v<version>` tags (electron-updater's github provider only understands
# `v<version>` tags) and needs no API tokens. This config makes electron-builder
# embed app-update.yml into the app's resources and emit latest-mac.yml /
# latest.yml next to the artifacts; desktop-release.yml uploads those to the
# release. Artifact names are version-less on purpose: the updater reads
# versions from the yml files, and the landing page's
# /releases/latest/download/<name> links stay stable across releases.
publish:
    provider: generic
    url: https://github.com/mariusandra/posthog/releases/latest/download
mac:
    category: public.app-category.developer-tools
    icon: build/icon.png
    artifactName: PostHog-Desktop-macos-${arch}.${ext}
    # electron-updater on macOS updates from the zip (Squirrel.Mac cannot use a
    # dmg); the dmg stays the human-download format
    target:
        - target: dmg
          arch:
              - arm64
        - target: zip
          arch:
              - arm64
    # Signing is driven by env: with CSC_LINK/CSC_KEY_PASSWORD set (CI master
    # builds, or a local keychain identity) electron-builder signs with the
    # Developer ID cert and hardened runtime; without one, after-pack.cjs
    # applies an ad-hoc signature so the app can still launch on Apple Silicon
    # (which refuses fully unsigned code).
    hardenedRuntime: true
    # Notarization runs only when APPLE_API_KEY/APPLE_API_KEY_ID/APPLE_API_ISSUER
    # are present in the env; otherwise electron-builder skips it.
    notarize: true
win:
    # electron-builder generates the .ico from this 512x512 png
    icon: build/icon.png
    artifactName: PostHog-Desktop-windows-${arch}-setup.${ext}
    target:
        - target: nsis
          arch:
              - x64
afterPack: scripts/after-pack.cjs
