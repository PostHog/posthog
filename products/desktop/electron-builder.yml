# Packaging config for the PostHog desktop app.
# The built PostHog frontend (frontend/dist) is bundled into the app's
# Resources as `frontend-dist`, where the packaged main process expects it
# (resolveFrontendDistDir in src/main/index.ts). Sourcemaps are excluded:
# they multiply the bundle size roughly 4x and the app never serves them.
appId: com.posthog.desktop
productName: PostHog
directories:
    buildResources: build
    output: release
files:
    - dist/**
extraResources:
    - from: ../../frontend/dist
      to: frontend-dist
      filter:
          - '**/*'
          - '!**/*.map'
          - '!**/*.map.gz'
          - '!**/*.map.br'
# Everything the app runs is bundled by esbuild into dist/, so there are no
# production node_modules to rebuild or package
npmRebuild: false
mac:
    category: public.app-category.developer-tools
    icon: build/icon.png
    target:
        - target: dmg
          arch:
              - arm64
    # Signing is driven by env: with CSC_LINK/CSC_KEY_PASSWORD set (CI master
    # builds, or a local keychain identity) electron-builder signs with the
    # Developer ID cert and hardened runtime; without one, after-pack.cjs
    # applies an ad-hoc signature so the app can still launch on Apple Silicon
    # (which refuses fully unsigned code).
    hardenedRuntime: true
    # Notarization runs only when APPLE_API_KEY/APPLE_API_KEY_ID/APPLE_API_ISSUER
    # are present in the env; otherwise electron-builder skips it.
    notarize: true
win:
    # electron-builder generates the .ico from this 512x512 png
    icon: build/icon.png
    target:
        - target: nsis
          arch:
              - x64
afterPack: scripts/after-pack.cjs
