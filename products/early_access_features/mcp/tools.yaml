# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Early access features
feature: early_access_features
url_prefix: /early_access_features
tools:
    early-access-feature-list:
        operation: early_access_feature_list
        enabled: true
        scopes:
            - early_access_feature:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true

        title: List early access features
        description: >
            List early access features in the current project. Returns name, stage,
            description, linked feature flag, and creation date for each feature.
    early-access-feature-create:
        operation: early_access_feature_create
        enabled: true
        scopes:
            - early_access_feature:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Create early access feature
        description: >
            Create a new early access feature. A feature flag is automatically created
            unless feature_flag_id is provided. Stage determines whether opted-in
            users get the feature enabled.
        include_params:
            - name
            - description
            - stage
            - documentation_url
            - payload
            - feature_flag_id
    early-access-feature-retrieve:
        operation: early_access_feature_retrieve
        enabled: true
        scopes:
            - early_access_feature:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'

        title: Get early access feature
        description: >
            Get a single early access feature by ID. Returns full details including
            the linked feature flag configuration.
    early-access-feature-update:
        operation: early_access_feature_update
        enabled: false
    early-access-feature-partial-update:
        operation: early_access_feature_partial_update
        enabled: true
        scopes:
            - early_access_feature:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Update early access feature
        description: >
            Update an early access feature by ID. Changing the stage automatically
            updates the linked feature flag's enrollment conditions.
        include_params:
            - name
            - description
            - stage
            - documentation_url
    early-access-feature-destroy:
        operation: early_access_feature_destroy
        enabled: true
        scopes:
            - early_access_feature:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete early access feature
        description: >
            Delete an early access feature by ID. Clears enrollment conditions
            from the linked feature flag but does not delete the flag itself.
