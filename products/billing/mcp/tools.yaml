# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Billing
feature: billing
url_prefix: /organization/billing
tools:
    billing-list:
        operation: billing_list
        enabled: true
        scopes:
            - billing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get billing overview
        description: >
            Fetch the organization's current billing state: subscribed products and addons,
            available features, plan tier, usage summary against limits, spending limits, and
            trial status. Use this to understand what the customer is paying for, which features
            they have access to, or aggregate usage for the current billing period. For
            time-series breakdowns of usage call billing-usage-retrieve; for cost (spend)
            breakdowns call billing-spend-retrieve. To check whether the customer has access
            to a specific feature (e.g. group analytics, white-labelling), inspect
            `available_product_features` in the response.
        url_prefix: /organization/billing/overview
        exclude_params:
            - limit
            - offset
        response:
            exclude:
                - license
                - stripe_portal_url
                - account_owner
                - customer_trust_scores
                - never_drop_data
                - amount_off_expires_at
                - products.*.image_url
                - products.*.screenshot_url
                - products.*.headline
                - products.*.icon_key
                - products.*.plans
                - products.*.tiers
                - products.*.features
                - products.*.free_allocation
                - products.*.price_description
                - products.*.display_decimals
                - products.*.display_divisor
                - products.*.display_unit
                - products.*.contact_support
                - products.*.tiered
                - products.*.trial
                - products.*.inclusion_only
                - products.*.legacy_product
                - products.*.current_amount_usd_before_addons
                - products.*.addons.*.image_url
                - products.*.addons.*.icon_key
                - products.*.addons.*.plans
                - products.*.addons.*.tiers
                - products.*.addons.*.features
                - products.*.addons.*.free_allocation
                - products.*.addons.*.price_description
                - products.*.addons.*.display_decimals
                - products.*.addons.*.display_divisor
                - products.*.addons.*.display_unit
                - products.*.addons.*.contact_support
                - products.*.addons.*.tiered
                - products.*.addons.*.trial
                - products.*.addons.*.inclusion_only
                - products.*.addons.*.legacy_product
    billing-partial-update:
        operation: billing_partial_update
        enabled: false
    billing-activate-create:
        operation: billing_activate_create
        enabled: false
    billing-activate-authorize-create:
        operation: billing_activate_authorize_create
        enabled: false
    billing-activate-authorize-status-create:
        operation: billing_activate_authorize_status_create
        enabled: false
    billing-coupons-claim-create:
        operation: billing_coupons_claim_create
        enabled: false
    billing-coupons-overview-retrieve:
        operation: billing_coupons_overview_retrieve
        enabled: false
    billing-credits-overview-retrieve:
        operation: billing_credits_overview_retrieve
        enabled: false
    billing-credits-purchase-create:
        operation: billing_credits_purchase_create
        enabled: false
    billing-deactivate-create:
        operation: billing_deactivate_create
        enabled: false
    billing-get-invoices-retrieve:
        operation: billing_get_invoices_retrieve
        enabled: false
    billing-license-partial-update:
        operation: billing_license_partial_update
        enabled: false
    billing-portal-retrieve:
        operation: billing_portal_retrieve
        enabled: false
    billing-spend-retrieve:
        operation: billing_spend_retrieve
        enabled: true
        scopes:
            - billing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get spend breakdown
        description: >
            Fetch time-series spend (cost in USD) breakdowns for the organization across a date
            range. Same dimensional parameters as billing-usage-retrieve, but values are dollar
            amounts rather than usage volumes. Requires org admin-level access. Use this to
            investigate cost spikes, compare spend across periods, or attribute spend to specific
            products or teams.
        url_prefix: /organization/billing/spend
        param_overrides:
            start_date:
                description: Start date (YYYY-MM-DD), or "all" for earliest available data.
            end_date:
                description: End date (YYYY-MM-DD), inclusive.
            team_ids:
                description: Comma-separated team (project) IDs to filter by. Omit for all teams in the org.
            breakdowns:
                description: >
                    JSON-encoded array of dimensions to break down by, NOT a comma-separated
                    string. Valid dimensions are "type" (by usage type) and "team" (by project).
                    Pass as e.g. `["type","team"]` or `["team"]`. Omit for a single aggregate
                    series. Sending a bare string like "type,team" will fail with a 400 error.
            interval:
                description: Time bucket size, one of "day" or "week". Default "day".
    billing-startups-apply-create:
        operation: billing_startups_apply_create
        enabled: false
    billing-subscription-switch-plan-create:
        operation: billing_subscription_switch_plan_create
        enabled: false
    billing-trials-activate-create:
        operation: billing_trials_activate_create
        enabled: false
    billing-trials-cancel-create:
        operation: billing_trials_cancel_create
        enabled: false
    billing-usage-retrieve:
        operation: billing_usage_retrieve
        enabled: true
        scopes:
            - billing:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get usage breakdown
        description: >
            Fetch time-series usage breakdowns for the organization across a date range. Supports
            per-team (project) and per-usage-type dimensions. Requires org admin-level access.
            Use this to investigate usage spikes, compare periods, or attribute usage to specific
            projects. For a single-snapshot aggregate view call billing-list; for cost (spend)
            breakdowns call billing-spend-retrieve.
        url_prefix: /organization/billing/usage
        param_overrides:
            start_date:
                description: Start date (YYYY-MM-DD), or "all" for earliest available data.
            end_date:
                description: End date (YYYY-MM-DD), inclusive.
            team_ids:
                description: Comma-separated team (project) IDs to filter by. Omit for all teams in the org.
            breakdowns:
                description: >
                    JSON-encoded array of dimensions to break down by, NOT a comma-separated
                    string. Valid dimensions are "type" (by usage type) and "team" (by project).
                    Pass as e.g. `["type","team"]` or `["team"]`. Omit for a single aggregate
                    series. Sending a bare string like "type,team" will fail with a 400 error.
            interval:
                description: Time bucket size, one of "day" or "week". Default "day".
