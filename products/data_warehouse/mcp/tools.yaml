    view-list:
        operation: warehouse_saved_queries_list
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        list: true
        title: List saved queries
        description: >
            List all data warehouse saved queries (views) in the project. Returns each view's name, materialization
            status, sync frequency, column schema, latest error, and last run timestamp. Use this to discover available
            views before querying them in HogQL.
    view-create:
        operation: warehouse_saved_queries_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: ?open_view={id}
        title: Create saved query
        description: >
            Create a new data warehouse saved query (view). If a view with the same name already exists, it will be
            updated instead (upsert behavior). The query must be valid HogQL. After creation, the view can be referenced
            by name in other HogQL queries.
        exclude_params:
            - deleted
            - edited_history_id
            - soft_update
            - is_materialized
            - origin
            - status
            - latest_error
            - created_by
            - created_at
            - columns
            - last_run_at
            - managed_viewset_kind
            - latest_history_id
        param_overrides:
            name:
                description:
                    Unique name for the view. Used as the table name in HogQL queries. Must not conflict with existing table
                    names.
            query:
                description:
                    'HogQL query definition as a JSON object. Must contain a "query" key with the SQL string. Example:
                    {"query": "SELECT * FROM events LIMIT 100"}'
    view-get:
        operation: warehouse_saved_queries_retrieve
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Get saved query
        description: >
            Get a specific data warehouse saved query (view) by ID. Returns the full view definition including the HogQL
            query, column schema, materialization status, sync frequency, and run history metadata.
    warehouse-saved-queries-update:
        operation: warehouse_saved_queries_update
        enabled: false
    view-update:
        operation: warehouse_saved_queries_partial_update
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Update saved query
        description: >
            Update an existing data warehouse saved query (view). Can change the name, HogQL query, or sync frequency.
            Changing the query triggers column re-inference and sets the status to 'modified'. Use sync_frequency to
            control materialization schedule: '24hour', '12hour', '6hour', '1hour', '30min', or 'never'. IMPORTANT: when
            updating the query field, you must first retrieve the view to get its latest_history_id, then pass that
            value as edited_history_id for conflict detection.
        exclude_params:
            - deleted
            - soft_update
            - is_materialized
            - origin
            - status
            - latest_error
            - created_by
            - created_at
            - columns
            - last_run_at
            - managed_viewset_kind
            - latest_history_id
        param_overrides:
            name:
                description:
                    Unique name for the view. Used as the table name in HogQL queries. Must not conflict with existing table
                    names.
            query:
                description:
                    'HogQL query definition as a JSON object. Must contain a "query" key with the SQL string. Example:
                    {"query": "SELECT * FROM events LIMIT 100"}'
            edited_history_id:
                description:
                    Required when updating the query field. Get this from latest_history_id on the retrieve response. Used for
                    optimistic concurrency control.
    view-delete:
        operation: warehouse_saved_queries_destroy
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Delete saved query
        description: >
            Delete a data warehouse saved query (view) by ID. This is a soft delete — the view is marked as deleted and
            will no longer appear in lists or be queryable in HogQL. Any materialization schedule is also removed.
            Cannot delete views that have downstream dependencies or views from managed viewsets.
        soft_delete: true
