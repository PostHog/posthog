    saved-query-column-annotations-create:
        operation: saved_query_column_annotations_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Add a view column description
        description: >
            Add or replace a semantic description for a data-modelling view (saved query) or one of its columns. Use
            this ONLY for views — rows where table_type = 'view' in system.information_schema.tables. For
            imported/physical warehouse tables (table_type = 'data_warehouse') use warehouse-column-annotations-create
            instead. Core PostHog tables (events, persons, groups, sessions; table_type = 'posthog') cannot be
            described. Provide the saved_query id, the column_name (empty string for a view-level description), and the
            description. The annotation is recorded as user-edited, which prevents automatic enrichment from overwriting
            it. Calling this again for the same column replaces the existing description.
        param_overrides:
            column_name:
                description: Column to describe. Use an empty string to describe the view itself.
    saved-query-column-annotations-destroy:
        operation: saved_query_column_annotations_destroy
        enabled: false
    saved-query-column-annotations-list:
        operation: saved_query_column_annotations_list
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List view column descriptions
        description: >
            List semantic descriptions of data-modelling views (saved queries) and their columns. Use this for views
            (table_type = 'view' in system.information_schema.tables); for physical warehouse tables use
            warehouse-column-annotations-list. Pass ?saved_query_id=<uuid> to scope to one view. Each entry has the
            column_name (empty string = view-level description), the description, and its source (ai_generated or
            user_edited). Use this to see what a view's columns mean before writing SQL against it.
    saved-query-column-annotations-partial-update:
        operation: saved_query_column_annotations_partial_update
        enabled: false
    saved-query-column-annotations-retrieve:
        operation: saved_query_column_annotations_retrieve
        enabled: false
    saved-query-column-annotations-update:
        operation: saved_query_column_annotations_update
        enabled: false
    sql-variables-create:
        operation: insight_variables_create
        enabled: true
        scopes:
            - insight_variable:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create SQL variable
        description: >
            Create a reusable SQL variable for HogQL queries. Provide a human-readable name and type. The code_name is
            generated from the name and is referenced in SQL as {variables.code_name}. For List variables, provide
            values as the allowed options.
    sql-variables-delete:
        operation: insight_variables_destroy
        enabled: true
        scopes:
            - insight_variable:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete SQL variable
        description: >
            Delete a SQL variable by ID. Queries that reference this variable by code_name may stop working after
            deletion.
    sql-variables-update:
        operation: insight_variables_partial_update
        enabled: true
        scopes:
            - insight_variable:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update SQL variable
        description: >
            Update an existing SQL variable by ID. You can change the name, type, default_value, or allowed values for
            List variables. If the name changes, check the response for the current code_name before writing queries
            that reference it.
    view-create:
        operation: warehouse_saved_queries_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: ?open_view={id}
        title: Create saved query
        description: >
            Create a new data warehouse saved query (view). If a view with the same name already exists, it will be
            updated instead (upsert behavior). The query must be valid HogQL. After creation, the view can be referenced
            by name in other HogQL queries. Set `description` to record what the view represents (a semantic
            description surfaced to agents); per-column descriptions are set via the saved-query column annotation
            tools.
        exclude_params:
            - deleted
            - edited_history_id
            - soft_update
            - is_materialized
            - origin
            - status
            - latest_error
            - created_by
            - created_at
            - columns
            - last_run_at
            - managed_viewset_kind
            - latest_history_id
        param_overrides:
            name:
                description:
                    Unique name for the view. Used as the table name in HogQL queries. Must not conflict with existing table
                    names.
    view-delete:
        operation: warehouse_saved_queries_destroy
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Delete saved query
        description: >
            Delete a data warehouse saved query (view) by ID. This is a soft delete — the view is marked as deleted and
            will no longer appear in lists or be queryable in HogQL. Any materialization schedule is also removed.
            Cannot delete views that have downstream dependencies or views from managed viewsets.
        soft_delete: true
    view-get:
        operation: warehouse_saved_queries_retrieve
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Get saved query
        description: >
            Get a specific data warehouse saved query (view) by ID. Returns the full view definition including the HogQL
            query, column schema, materialization status, sync frequency, and run history metadata. Also returns the
            view's semantic `description` and a `description` on each entry of `columns` when set — use this to see what
            a view and its columns mean.
    view-list:
        operation: warehouse_saved_queries_list
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        list: true
        title: List saved queries
        description: >
            List all data warehouse saved queries (views) in the project. Returns each view's name, materialization
            status, sync frequency, column schema, latest error, and last run timestamp. Each view also includes its
            semantic `description` and a `description` on each entry of `columns` when set. Use this to discover
            available views and what they mean before querying them in HogQL.
    view-materialize:
        operation: warehouse_saved_queries_materialize_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Materialize saved query
        description: >
            Enable materialization for a saved query. This creates a physical table from the view's query and sets up a
            24-hour sync schedule to keep it refreshed. Materialized views are faster to query but use storage. Use
            'view-unmaterialize' to undo. Rate limited.
    view-run:
        operation: warehouse_saved_queries_run_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Run saved query
        description: >
            Trigger a manual materialization run for a saved query. This immediately refreshes the materialized table
            with the latest data. The view must already be materialized. Use 'view-run-history' to check run status.
    view-run-history:
        operation: warehouse_saved_queries_run_history_retrieve
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Get run history
        description: >
            Get the 5 most recent materialization run statuses for a saved query. Each entry includes the run status and
            timestamp. Use this to monitor whether materialization is running successfully.
    view-unmaterialize:
        operation: warehouse_saved_queries_revert_materialization_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Revert materialization
        description: >
            Undo materialization for a saved query. Deletes the materialized table and removes the sync schedule,
            reverting the view back to a virtual query that runs on each access. The view definition itself is
            preserved. Rate limited.
    view-update:
        operation: warehouse_saved_queries_partial_update
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Update saved query
        description: >
            Update an existing data warehouse saved query (view). Can change the name, HogQL query, sync frequency, or
            `description`. To set what the view represents (the semantic description surfaced to agents), pass
            `description` — an empty string clears it; per-column descriptions are set via the saved-query column
            annotation tools. Changing the query triggers column re-inference and sets the status to 'modified'. Use
            sync_frequency to control materialization schedule: '15min' (the fastest cadence), '30min', '1hour',
            '6hour', '12hour', '24hour', '7day', '30day', or 'never' to pause scheduled materialization. IMPORTANT: when
            updating the query field, you must first retrieve the view to get its latest_history_id, then pass that
            value as edited_history_id for conflict detection.
        exclude_params:
            - deleted
            - soft_update
            - is_materialized
            - origin
            - status
            - latest_error
            - created_by
            - created_at
            - columns
            - last_run_at
            - managed_viewset_kind
            - latest_history_id
        param_overrides:
            name:
                description:
                    Unique name for the view. Used as the table name in HogQL queries. Must not conflict with existing table
                    names.
            edited_history_id:
                description:
                    Required when updating the query field. Get this from latest_history_id on the retrieve response. Used for
                    optimistic concurrency control.
    warehouse-column-annotations-create:
        operation: warehouse_column_annotations_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Add a warehouse column description
        description: >
            Add a semantic description for a data warehouse table or column. Provide the table id, the column_name
            (empty string for a table-level description), and the description. The new annotation is recorded as
            user-edited, which prevents automatic enrichment from overwriting it.
        param_overrides:
            column_name:
                description: Column to describe. Use an empty string to describe the table itself.
    warehouse-column-annotations-destroy:
        operation: warehouse_column_annotations_destroy
        enabled: false
    warehouse-column-annotations-list:
        operation: warehouse_column_annotations_list
        enabled: true
        scopes:
            - external_data_source:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List warehouse column descriptions
        description: >
            List semantic descriptions of data warehouse tables and columns. Pass ?table_id=<uuid> to scope to one
            table. Each entry has the column_name (empty string = table-level description), the description, and its
            source (canonical from the source's API documentation, ai_generated, or user_edited). Use this to see what
            the imported data means before writing SQL against it.
    warehouse-column-annotations-partial-update:
        operation: warehouse_column_annotations_partial_update
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Edit a warehouse column description
        description: >
            Update the description of an existing warehouse table or column annotation by its id. The annotation is
            marked user-edited, so automatic enrichment will no longer overwrite it.
    warehouse-column-annotations-retrieve:
        operation: warehouse_column_annotations_retrieve
        enabled: false
    warehouse-column-annotations-update:
        operation: warehouse_column_annotations_update
        enabled: false
