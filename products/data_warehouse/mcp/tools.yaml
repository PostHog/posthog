# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Data warehouse
feature: data_warehouse
url_prefix: /sql
ui_apps: {}
tools:
    data-modeling-jobs-list:
        operation: data_modeling_jobs_list
        enabled: false
    data-modeling-jobs-recent-retrieve:
        operation: data_modeling_jobs_recent_retrieve
        enabled: false
    data-modeling-jobs-retrieve:
        operation: data_modeling_jobs_retrieve
        enabled: false
    data-modeling-jobs-running-retrieve:
        operation: data_modeling_jobs_running_retrieve
        enabled: false
    data-warehouse-check-database-name-retrieve:
        operation: data_warehouse_check_database_name_retrieve
        enabled: false
    data-warehouse-completed-activity-retrieve:
        operation: data_warehouse_completed_activity_retrieve
        enabled: false
    data-warehouse-data-health-issues-retrieve:
        operation: data_warehouse_data_health_issues_retrieve
        enabled: true
        scopes:
            - warehouse_view:read
            - external_data_source:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List data pipeline health issues
        description: >
            Return all failed or degraded items across the data pipeline: materialized saved queries that failed,
            external data schemas in Failed or BillingLimitReached state, sources in Error state, failed batch exports,
            and disabled/degraded transformations. Each entry includes id, name, type (materialized_view,
            external_data_sync, source, destination, transformation), status, error message, failed_at, and url. Use
            this for a one-shot audit of what's broken in a project's data warehouse.
    data-warehouse-data-ops-dashboard-retrieve:
        operation: data_warehouse_data_ops_dashboard_retrieve
        enabled: false
    data-warehouse-deprovision-create:
        operation: data_warehouse_deprovision_create
        enabled: false
    data-warehouse-job-stats-retrieve:
        operation: data_warehouse_job_stats_retrieve
        enabled: false
    data-warehouse-property-values-retrieve:
        operation: data_warehouse_property_values_retrieve
        enabled: false
    data-warehouse-provision-create:
        operation: data_warehouse_provision_create
        enabled: false
    data-warehouse-reset-password-create:
        operation: data_warehouse_reset_password_create
        enabled: false
    data-warehouse-running-activity-retrieve:
        operation: data_warehouse_running_activity_retrieve
        enabled: false
    data-warehouse-total-rows-stats-retrieve:
        operation: data_warehouse_total_rows_stats_retrieve
        enabled: false
    data-warehouse-warehouse-status-retrieve:
        operation: data_warehouse_warehouse_status_retrieve
        enabled: false
    external-data-schemas-cancel:
        operation: external_data_schemas_cancel_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Cancel running sync
        description: >
            Cancel a currently running sync job for a specific table schema. If no sync is running, returns an error.
            Use 'external-data-schemas-list' to check which schemas have status 'Running' before calling this.
    external-data-schemas-create:
        operation: external_data_schemas_create
        enabled: false
    external-data-schemas-delete-data:
        operation: external_data_schemas_delete_data_destroy
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete synced table data
        description: >
            Delete the synced table data from PostHog but keep the schema entry. The schema remains visible in the
            source and can be re-synced. Use this to clear stale or corrupt data before triggering a fresh sync.
    external-data-schemas-destroy:
        operation: external_data_schemas_destroy
        enabled: false
    external-data-schemas-incremental-fields-create:
        operation: external_data_schemas_incremental_fields_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Refresh candidate incremental fields for a schema
        description: >
            Re-inspect the source for a single table schema and return the currently available incremental fields,
            detected primary keys, column list, and which sync methods (incremental/append/cdc/webhook) are available.
            Use this when the source schema has changed, an incremental field has been dropped, or the user wants to
            switch to a different incremental_field/sync_type on an existing schema. The operation_id is
            external_data_schemas_incremental_fields_create but semantically this is a read-only refresh.
    external-data-schemas-list:
        operation: external_data_schemas_list
        enabled: true
        scopes:
            - external_data_source:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List data import schemas
        description: >
            List all table schemas across all data warehouse sources. Each schema represents one table being synced from
            an external source. Returns the schema name, sync status, sync frequency, incremental field configuration,
            and latest error. Use this to see which tables are actively syncing and their health.
    external-data-schemas-partial-update:
        operation: external_data_schemas_partial_update
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update data import schema
        description: >
            Update a table schema's sync configuration. Can change sync type, sync frequency, incremental field, primary
            key columns, CDC table mode, and enable/disable the schema.
    external-data-schemas-reload:
        operation: external_data_schemas_reload_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Trigger sync for a table schema
        description: >
            Trigger a sync for a single table schema using its configured sync method (incremental, full refresh,
            append, or CDC). Use this to manually sync a specific table without triggering all tables in the source.
    external-data-schemas-resync:
        operation: external_data_schemas_resync_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Resync table schema from scratch
        description: >
            Trigger a full resync for a table schema, discarding all previously synced data and re-importing from the
            source. This cancels any running sync first, then resets the pipeline state. Use this when data is corrupt
            or out of sync.
    external-data-schemas-retrieve:
        operation: external_data_schemas_retrieve
        enabled: true
        scopes:
            - external_data_source:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get data import schema
        description: >
            Get a single table schema by ID. Returns full details including sync status, sync frequency, incremental
            field, latest error, and the associated source and table metadata.
    external-data-schemas-update:
        operation: external_data_schemas_update
        enabled: false
    external-data-sources-bulk-update-schemas-partial-update:
        operation: external_data_sources_bulk_update_schemas_partial_update
        enabled: false
    external-data-sources-check-cdc-prerequisites-create:
        operation: external_data_sources_check_cdc_prerequisites_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Check Postgres CDC prerequisites
        description: >
            Validate that a live Postgres database meets Change Data Capture prerequisites — logical replication enabled
            (wal_level=logical), replication slot available, publication present, and required permissions.
            Postgres-only. Returns {valid, errors[]}. Use this before configuring a schema with sync_type=cdc, or to
            diagnose why an existing CDC sync has started failing.
        param_overrides:
            source_type:
                input_schema: ExternalDataSourceTypeSchema
    external-data-sources-connections-list:
        operation: external_data_sources_connections_list
        enabled: false
    external-data-sources-create:
        operation: external_data_sources_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create data warehouse source
        description: >
            Create a new external data source connection. Before calling this, use 'external-data-sources-wizard' to
            discover source types and 'external-data-sources-db-schema' to validate credentials and discover available
            tables. Present the db-schema results to the user showing each table's available sync methods, incremental
            fields, detected primary keys, and columns so they can configure before creation. The payload must include a
            'schemas' array where each entry has: name, should_sync (bool), sync_type (incremental/full_refresh/append),
            and optionally incremental_field, incremental_field_type, and primary_key_columns from the db-schema
            response.
        exclude_params:
            - client_secret
            - account_id
            - job_inputs
        param_overrides:
            source_type:
                input_schema: ExternalDataSourceTypeSchema
            payload:
                input_schema: ExternalDataSourcePayloadSchema
    external-data-sources-create-webhook-create:
        operation: external_data_sources_create_webhook_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create and register a webhook for a source
        description: >
            For sources that support real-time webhook ingestion (currently Stripe), create the HogFunction handler and
            register the webhook URL with the external service using the source's stored credentials. Requires at least
            one schema on the source with sync_type='webhook' and should_sync=true. Returns the webhook_url, success
            flag, and any error. NOT idempotent — each successful call registers a new endpoint on the external service,
            so retrying after a network error or calling twice can create duplicate webhook endpoints (e.g. duplicate
            Stripe webhook endpoints delivering the same events twice). Always check webhook-info-retrieve first and
            only re-call if `exists: false`. For Stripe the signing_secret is auto-captured from the Stripe API response
            and stored securely; if auto-registration fails (e.g. the API key lacks webhook permissions), the user must
            create the webhook manually in Stripe and submit the signing_secret via update-webhook-inputs.
    external-data-sources-db-schema:
        operation: external_data_sources_database_schema_create
        enabled: false
    external-data-sources-delete-webhook-create:
        operation: external_data_sources_delete_webhook_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete a source's webhook
        description: >
            Unregister the webhook with the external service and delete the PostHog HogFunction that was handling it.
            Any webhook-type schemas under the source will stop receiving real-time events. The source and its schemas
            are preserved — only the webhook is removed. After deletion, schemas can be switched to a polling sync_type
            (incremental/full_refresh) via external-data-schemas-partial-update, or a new webhook can be created with
            create-webhook.
    external-data-sources-destroy:
        operation: external_data_sources_destroy
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Delete data warehouse source
        description: >
            Delete a data warehouse source and all its table schemas, synced tables, and sync schedules. This is a soft
            delete. Any running syncs are cancelled first. This cannot be undone — the source must be recreated to
            resume syncing.
    external-data-sources-jobs:
        operation: external_data_sources_jobs_retrieve
        enabled: false
    external-data-sources-list:
        operation: external_data_sources_list
        enabled: true
        scopes:
            - external_data_source:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List data warehouse sources
        description: >
            List all configured data warehouse import sources in the project. Returns each source's type (Postgres,
            Stripe, Hubspot, etc.), connection status, prefix, schemas, latest error, and last sync timestamp. Use this
            to discover what external data sources are connected.
    external-data-sources-partial-update:
        operation: external_data_sources_partial_update
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update data warehouse source
        description: >
            Update an existing data warehouse source. Can change the prefix (table name prefix in HogQL), description,
            or connection credentials via job_inputs. Cannot change the source_type or access_method after creation.
    external-data-sources-refresh-schemas:
        operation: external_data_sources_refresh_schemas_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Refresh available schemas
        description: >
            Fetch the latest table list from the remote database and create schema entries for any new tables found.
            Does not trigger a data sync. Use this after adding new tables to a source database to make them available
            for syncing.
        exclude_params:
            - client_secret
            - account_id
            - prefix
            - description
            - job_inputs
    external-data-sources-reload:
        operation: external_data_sources_reload_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Trigger sync for a source
        description: >
            Trigger a sync for all enabled table schemas in the source using each table's configured sync method. If the
            source uses direct query mode, this refreshes the schema metadata instead.
        exclude_params:
            - client_secret
            - account_id
            - prefix
            - description
            - job_inputs
    external-data-sources-retrieve:
        operation: external_data_sources_retrieve
        enabled: true
        scopes:
            - external_data_source:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get data warehouse source
        description: >
            Get a single data warehouse source by ID. Returns full details including source type, connection status,
            prefix, all table schemas with their sync statuses, latest error, and last sync timestamp.
    external-data-sources-revenue-analytics-config-partial-update:
        operation: external_data_sources_revenue_analytics_config_partial_update
        enabled: false
    external-data-sources-source-prefix-create:
        operation: external_data_sources_source_prefix_create
        enabled: false
    external-data-sources-update:
        operation: external_data_sources_update
        enabled: false
    external-data-sources-update-webhook-inputs-create:
        operation: external_data_sources_update_webhook_inputs_create
        enabled: true
        scopes:
            - external_data_source:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update webhook inputs (signing secret, etc.)
        description: >
            Update the webhook-specific inputs on an already-created webhook — for example when a signing secret has
            been rotated on the source side, or when the webhook was registered manually and the signing_secret needs to
            be supplied. Only accepts keys defined in the source type's webhookFields (e.g. Stripe's signing_secret).
            Fails if no webhook has been created for this source yet — call create-webhook first.
    external-data-sources-webhook-info-retrieve:
        operation: external_data_sources_webhook_info_retrieve
        enabled: true
        scopes:
            - external_data_source:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get webhook status for a source
        description: >
            Return webhook state for a source: supports_webhooks (is this source type webhook-capable), exists (has a
            webhook been created), webhook_url (the PostHog endpoint the external service should POST to),
            schema_mapping (external event type → PostHog schema id), and external_status (what the remote service
            reports about the webhook — enabled_events, status, created_at, error). Use this to check whether a webhook
            is healthy and whether the external registration is still valid.
    external-data-sources-wizard:
        operation: external_data_sources_wizard_retrieve
        enabled: true
        scopes:
            - external_data_source:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get source type configurations
        description: >
            Return the configuration metadata for all supported data warehouse source types. Each entry describes the
            required fields (host, port, database, credentials, etc.), field types, and OAuth flows. Use this to
            discover what source types are available and what parameters are needed to create a new source.
        response:
            include:
                - '*.name'
                - '*.caption'
                - '*.docsUrl'
                - '*.featured'
                - '*.unreleasedSource'
                - '*.fields'
    fix-hogql-create:
        operation: fix_hogql_create
        enabled: false
    fix-hogql-list:
        operation: fix_hogql_list
        enabled: false
    insight-variables-list:
        operation: insight_variables_list
        enabled: false
    insight-variables-retrieve:
        operation: insight_variables_retrieve
        enabled: false
    insight-variables-update:
        operation: insight_variables_update
        enabled: false
    lineage-get-upstream-retrieve:
        operation: lineage_get_upstream_retrieve
        enabled: false
    managed-viewsets-retrieve:
        operation: managed_viewsets_retrieve
        enabled: false
    managed-viewsets-update:
        operation: managed_viewsets_update
        enabled: false
    query-tab-state-create:
        operation: query_tab_state_create
        enabled: false
    query-tab-state-destroy:
        operation: query_tab_state_destroy
        enabled: false
    query-tab-state-list:
        operation: query_tab_state_list
        enabled: false
    query-tab-state-partial-update:
        operation: query_tab_state_partial_update
        enabled: false
    query-tab-state-retrieve:
        operation: query_tab_state_retrieve
        enabled: false
    query-tab-state-update:
        operation: query_tab_state_update
        enabled: false
    query-tab-state-user-retrieve:
        operation: query_tab_state_user_retrieve
        enabled: false
    sql-variables-create:
        operation: insight_variables_create
        enabled: true
        scopes:
            - insight_variable:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create SQL variable
        description: >
            Create a reusable SQL variable for HogQL queries. Provide a human-readable name and type. The code_name is
            generated from the name and is referenced in SQL as {variables.code_name}. For List variables, provide
            values as the allowed options.
    sql-variables-delete:
        operation: insight_variables_destroy
        enabled: true
        scopes:
            - insight_variable:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete SQL variable
        description: >
            Delete a SQL variable by ID. Queries that reference this variable by code_name may stop working after
            deletion.
    sql-variables-update:
        operation: insight_variables_partial_update
        enabled: true
        scopes:
            - insight_variable:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update SQL variable
        description: >
            Update an existing SQL variable by ID. You can change the name, type, default_value, or allowed values for
            List variables. If the name changes, check the response for the current code_name before writing queries
            that reference it.
    view-create:
        operation: warehouse_saved_queries_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: ?open_view={id}
        title: Create saved query
        description: >
            Create a new data warehouse saved query (view). If a view with the same name already exists, it will be
            updated instead (upsert behavior). The query must be valid HogQL. After creation, the view can be referenced
            by name in other HogQL queries.
        exclude_params:
            - deleted
            - edited_history_id
            - soft_update
            - is_materialized
            - origin
            - status
            - latest_error
            - created_by
            - created_at
            - columns
            - last_run_at
            - managed_viewset_kind
            - latest_history_id
        param_overrides:
            name:
                description:
                    Unique name for the view. Used as the table name in HogQL queries. Must not conflict with existing table
                    names.
            query:
                description:
                    'HogQL query definition as a JSON object. Must contain a "query" key with the SQL string. Example:
                    {"query": "SELECT * FROM events LIMIT 100"}'
    view-delete:
        operation: warehouse_saved_queries_destroy
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Delete saved query
        description: >
            Delete a data warehouse saved query (view) by ID. This is a soft delete — the view is marked as deleted and
            will no longer appear in lists or be queryable in HogQL. Any materialization schedule is also removed.
            Cannot delete views that have downstream dependencies or views from managed viewsets.
        soft_delete: true
    view-get:
        operation: warehouse_saved_queries_retrieve
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Get saved query
        description: >
            Get a specific data warehouse saved query (view) by ID. Returns the full view definition including the HogQL
            query, column schema, materialization status, sync frequency, and run history metadata.
    view-list:
        operation: warehouse_saved_queries_list
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        list: true
        title: List saved queries
        description: >
            List all data warehouse saved queries (views) in the project. Returns each view's name, materialization
            status, sync frequency, column schema, latest error, and last run timestamp. Use this to discover available
            views before querying them in HogQL.
    view-materialize:
        operation: warehouse_saved_queries_materialize_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Materialize saved query
        description: >
            Enable materialization for a saved query. This creates a physical table from the view's query and sets up a
            24-hour sync schedule to keep it refreshed. Materialized views are faster to query but use storage. Use
            'view-unmaterialize' to undo. Rate limited.
    view-run:
        operation: warehouse_saved_queries_run_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Run saved query
        description: >
            Trigger a manual materialization run for a saved query. This immediately refreshes the materialized table
            with the latest data. The view must already be materialized. Use 'view-run-history' to check run status.
    view-run-history:
        operation: warehouse_saved_queries_run_history_retrieve
        enabled: true
        scopes:
            - warehouse_view:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Get run history
        description: >
            Get the 5 most recent materialization run statuses for a saved query. Each entry includes the run status and
            timestamp. Use this to monitor whether materialization is running successfully.
    view-unmaterialize:
        operation: warehouse_saved_queries_revert_materialization_create
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Revert materialization
        description: >
            Undo materialization for a saved query. Deletes the materialized table and removes the sync schedule,
            reverting the view back to a virtual query that runs on each access. The view definition itself is
            preserved. Rate limited.
    view-update:
        operation: warehouse_saved_queries_partial_update
        enabled: true
        scopes:
            - warehouse_view:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: ?open_view={id}
        title: Update saved query
        description: >
            Update an existing data warehouse saved query (view). Can change the name, HogQL query, or sync frequency.
            Changing the query triggers column re-inference and sets the status to 'modified'. Use sync_frequency to
            control materialization schedule: '24hour', '12hour', '6hour', '1hour', '30min', or 'never'. IMPORTANT: when
            updating the query field, you must first retrieve the view to get its latest_history_id, then pass that
            value as edited_history_id for conflict detection.
        exclude_params:
            - deleted
            - soft_update
            - is_materialized
            - origin
            - status
            - latest_error
            - created_by
            - created_at
            - columns
            - last_run_at
            - managed_viewset_kind
            - latest_history_id
        param_overrides:
            name:
                description:
                    Unique name for the view. Used as the table name in HogQL queries. Must not conflict with existing table
                    names.
            query:
                description:
                    'HogQL query definition as a JSON object. Must contain a "query" key with the SQL string. Example:
                    {"query": "SELECT * FROM events LIMIT 100"}'
            edited_history_id:
                description:
                    Required when updating the query field. Get this from latest_history_id on the retrieve response. Used for
                    optimistic concurrency control.
    warehouse-dag-list:
        operation: warehouse_dag_list
        enabled: false
    warehouse-model-paths-list:
        operation: warehouse_model_paths_list
        enabled: false
    warehouse-saved-queries-activity-retrieve:
        operation: warehouse_saved_queries_activity_retrieve
        enabled: false
    warehouse-saved-queries-ancestors-create:
        operation: warehouse_saved_queries_ancestors_create
        enabled: false
    warehouse-saved-queries-cancel-create:
        operation: warehouse_saved_queries_cancel_create
        enabled: false
    warehouse-saved-queries-dependencies-retrieve:
        operation: warehouse_saved_queries_dependencies_retrieve
        enabled: false
    warehouse-saved-queries-descendants-create:
