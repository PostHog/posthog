# Last-resort salvage for shapes no provider matched. `capture:` fires on match
# so brand-new shapes still surface in telemetry. Highest priority so it runs last.

id: cajole
capture: llma message normalization failed

rules:
    - on:
          content: { is: string }
      emit:
          content: $.content

    - on:
          $: { exists: true }
      emit:
          content:
              stringify: $
