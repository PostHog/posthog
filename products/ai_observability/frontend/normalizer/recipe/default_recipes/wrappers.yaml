# Single-field content wrappers (`{content}` / `{message}` / `{text}`, no role
# or type). Legacy lost the text to its stringify fallback; these salvage it.

id: wrappers
priority: 90

rules:
    - on:
          role: { exists: false }
          type: { exists: false }
          content: { is: string }
      emit:
          role: user
          content: $.content

    - on:
          role: { exists: false }
          type: { exists: false }
          content: { exists: false }
          message: { is: string }
      emit:
          role: user
          content: $.message

    - on:
          role: { exists: false }
          type: { exists: false }
          content: { exists: false }
          message: { exists: false }
          text: { is: string }
      emit:
          role: user
          content: $.text
