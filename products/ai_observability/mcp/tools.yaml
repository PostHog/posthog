# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: AI observability
feature: llm_analytics
url_prefix: /ai-observability
ui_apps:
    llm-costs:
        type: detail
        view_prop: data
        data_type: LLMCostsData
        view_component: LLMCostsView
tools:
    llm-analytics-offline-evaluations-experiment-items-create:
        operation: llm_analytics_offline_evaluations_experiment_items_create
        enabled: false
    llm-analytics-parser-recipes-create:
        operation: llm_analytics_parser_recipes_create
        enabled: false
    llm-analytics-parser-recipes-destroy:
        operation: llm_analytics_parser_recipes_destroy
        enabled: false
    llm-analytics-parser-recipes-list:
        operation: llm_analytics_parser_recipes_list
        enabled: false
    llm-analytics-parser-recipes-partial-update:
        operation: llm_analytics_parser_recipes_partial_update
        enabled: false
    llm-analytics-parser-recipes-retrieve:
        operation: llm_analytics_parser_recipes_retrieve
        enabled: false
    llma-clustering-config-get:
        operation: llm_analytics_clustering_config_list
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get clustering config
        description: >
            Retrieve the team's clustering event-filter configuration for automated AI observability clustering. New
            scheduled clustering should usually use clustering jobs, but this remains useful when auditing existing
            automation.
    llma-clustering-config-set-event-filters:
        operation: llm_analytics_clustering_config_set_event_filters_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Set clustering config filters
        description: >
            Replace the team's clustering event filters. Pass event_filters as a PostHog property-filter array, or an
            empty array to clear the filters. Prefer clustering jobs for new trace, generation, or evaluation clustering
            automation.
    llma-clustering-job-create:
        operation: llm_analytics_clustering_jobs_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create clustering job
        description: >
            Create a scheduled AI observability clustering job for the current team. Jobs define the analysis level
            (trace, generation, or evaluation), event filters that scope included items, and whether the job is enabled.
            Creating a custom job disables the migration-created default job for the same analysis level.
    llma-clustering-job-delete:
        operation: llm_analytics_clustering_jobs_destroy
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete clustering job
        description: >
            Delete a scheduled AI observability clustering job by ID. This removes future scheduled clustering for that
            job but does not delete historical $ai_trace_clusters, $ai_generation_clusters, or $ai_evaluation_clusters
            events already emitted by previous runs.
    llma-clustering-job-get:
        operation: llm_analytics_clustering_jobs_retrieve
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get clustering job
        description: >
            Retrieve a specific clustering job configuration by ID. Returns the job name, analysis level (trace,
            generation, or evaluation), event filters, enabled status, and timestamps.
    llma-clustering-job-list:
        operation: llm_analytics_clustering_jobs_list
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List clustering jobs
        description: >
            List all clustering job configurations for the current team (max 10 per team). Each job defines an analysis
            level (trace, generation, or evaluation) and event filters that scope which items are included in clustering
            runs. To inspect emitted cluster results, use the exploring LLM clusters skill and query the cluster events
            with execute-sql.
    llma-clustering-job-update:
        operation: llm_analytics_clustering_jobs_partial_update
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update clustering job
        description: >
            Partially update a scheduled AI observability clustering job. Use this to rename a job, switch enabled
            status, adjust event_filters, or change the analysis level (trace, generation, or evaluation).
    llma-clustering-job-update-full:
        operation: llm_analytics_clustering_jobs_update
        enabled: false
    llma-clustering-run-create:
        operation: llm_analytics_clustering_runs_create
        enabled: false
    llma-dataset-create:
        operation: datasets_create
        enabled: false
    llma-dataset-delete:
        operation: datasets_destroy
        enabled: false
    llma-dataset-get:
        operation: datasets_retrieve
        enabled: false
    llma-dataset-item-create:
        operation: dataset_items_create
        enabled: false
    llma-dataset-item-delete:
        operation: dataset_items_destroy
        enabled: false
    llma-dataset-item-get:
        operation: dataset_items_retrieve
        enabled: false
    llma-dataset-item-list:
        operation: dataset_items_list
        enabled: false
    llma-dataset-item-update:
        operation: dataset_items_partial_update
        enabled: false
    llma-dataset-item-update-full:
        operation: dataset_items_update
        enabled: false
    llma-dataset-list:
        operation: datasets_list
        enabled: false
    llma-dataset-update:
        operation: datasets_partial_update
        enabled: false
    llma-dataset-update-full:
        operation: datasets_update
        enabled: false
    llma-evaluation-config-get:
        operation: llm_analytics_evaluation_config_retrieve
        enabled: true
        scopes:
            - evaluation:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get evaluation config
        description: >
            Retrieve the team's evaluation config and active provider key. Call before creating an llm_judge eval to
            confirm a provider key is configured — evals should run on the team's own key. Returns the active key and
            timestamps.
    llma-evaluation-config-set-active-key:
        operation: llm_analytics_evaluation_config_set_active_key_create
        enabled: true
        scopes:
            - evaluation:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Set active evaluation provider key
        description: >
            Assign the LLM provider key used to run llm_judge evaluations team-wide. Pass key_id (UUID of an existing
            provider key whose state is 'ok'). Switching the active key affects every llm_judge evaluation that doesn't
            pin its own key. The key must already be in the 'ok' state — if it isn't, ask the user to validate it from
            the PostHog UI before retrying.
    llma-evaluation-create:
        operation: evaluations_create
        enabled: true
        scopes:
            - evaluation:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create evaluation
        description: >
            Create an evaluation. 'llm_judge': set evaluation_config.prompt and model_configuration with provider and
            model; provider_key_id may be null when no key is pinned. 'hog': evaluation_config.source (Hog returning a
            boolean). 'sentiment': output_type='sentiment', omit model_configuration, optional
            evaluation_config.source='user_messages'. When enabled, runs on new $ai_generation events; results are
            '$ai_evaluation' events.
    llma-evaluation-delete:
        operation: evaluations_destroy
        enabled: true
        scopes:
            - evaluation:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete evaluation
        description: >
            Soft-delete an AI observability evaluation. The evaluation stops running and is hidden from list views.
            Historical evaluation results ($ai_evaluation events) are preserved.
        soft_delete: true
    llma-evaluation-get:
        operation: evaluations_retrieve
        enabled: true
        scopes:
            - evaluation:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get evaluation
        description: >
            Get a specific AI observability evaluation by its UUID. Returns the full evaluation configuration including
            type, config, output type, enabled status, and model configuration.
    llma-evaluation-judge-models:
        operation: llm_analytics_models_retrieve
        enabled: true
        scopes:
            - evaluation:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List supported llm_judge models
        description: >
            List provider+model combinations supported for llm_judge. Pass `provider` (openai, anthropic, gemini,
            openrouter, fireworks, azure_openai, together_ai, minimax, zeabur); optional `key_id` scopes to a key's
            reachable deployments (mainly azure_openai). Call before creating an llm_judge eval to pick a valid combo —
            prefer a provider the team already has a key for (see llma-provider-key-list).
    llma-evaluation-list:
        operation: evaluations_list
        enabled: true
        scopes:
            - evaluation:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List evaluations
        description: >
            List all AI observability evaluations for the current project. Optionally filter by name/description search
            or enabled status. Evaluations automatically score $ai_generation events for quality, relevance, safety,
            sentiment, and other criteria. Supported types are 'llm_judge' (LLM scores outputs against a prompt), 'hog'
            (deterministic Hog code), and 'sentiment' (user-message sentiment analysis). Results are stored as
            '$ai_evaluation' events.
    llma-evaluation-report-create:
        operation: llm_analytics_evaluation_reports_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Create evaluation report config
        description: |
            Create an evaluation report configuration. Reports summarize recent evaluation runs (using AI)
            and are delivered to email or Slack targets. `frequency` selects the trigger mode and defaults
            to 'every_n' if omitted:

            - 'every_n' (count-based): a report fires once `trigger_threshold` new evaluation results have
            accumulated, but no more often than `cooldown_minutes` apart and capped by `daily_run_cap` per
            UTC day. `trigger_threshold` is required in this mode (100–10000); `cooldown_minutes` (60–1440)
            and `daily_run_cap` are optional.
            - 'scheduled' (time-based): reports fire on the daily or weekly cadence defined by `rrule`. Use
            'FREQ=DAILY' for daily reports or 'FREQ=WEEKLY;BYDAY=MO,FR' for weekly reports on selected days.
            The server sets the schedule anchor and timezone automatically.

            `delivery_targets` is a list of {type: 'email', value: '<addr>'} or {type: 'slack',
            integration_id: <int>, channel: '<channel>'} entries. Slack integrations must belong to the
            same team. Use `report_prompt_guidance` to steer the AI report's focus.
        include_params:
            - evaluation
            - frequency
            - delivery_targets
            - enabled
            - trigger_threshold
            - cooldown_minutes
            - daily_run_cap
            - rrule
            - max_sample_size
            - report_prompt_guidance
    llma-evaluation-report-delete:
        operation: llm_analytics_evaluation_reports_destroy
        enabled: false
    llma-evaluation-report-generate:
        operation: llm_analytics_evaluation_reports_generate_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Trigger evaluation report generation
        description: >
            Immediately trigger an AI-generated evaluation report for this report config. Enqueues a Temporal workflow
            that analyzes recent evaluation runs and delivers the report to configured targets (email or Slack). Returns
            202 on success. Duplicate requests within the same minute are coalesced — only one report is generated.
            Rate-limited by daily_run_cap.
    llma-evaluation-report-get:
        operation: llm_analytics_evaluation_reports_retrieve
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get evaluation report config
        description: >
            Get a specific evaluation report configuration by UUID. Returns the full config including frequency,
            delivery targets, trigger thresholds, and schedule settings.
    llma-evaluation-report-list:
        operation: llm_analytics_evaluation_reports_list
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List evaluation report configs
        description: >
            List all evaluation report configurations for the current project. Optionally filter by evaluation UUID
            using the 'evaluation' query param. Each report config controls how and when evaluation summary reports are
            generated and delivered (email or Slack).
    llma-evaluation-report-run-list:
        operation: llm_analytics_evaluation_reports_runs_list
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List evaluation report runs
        description: >
            List the run history for a specific evaluation report config. Each run record includes the generated report
            content, the evaluation period covered, delivery status ('pending', 'delivered', 'failed'), and any delivery
            error details.
    llma-evaluation-report-update:
        operation: llm_analytics_evaluation_reports_partial_update
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update evaluation report config
        description: >
            Partially update an evaluation report configuration. Toggle enabled/disabled, update delivery targets (email
            or Slack), or switch frequency between 'every_n' and 'scheduled'. For 'every_n' mode set trigger_threshold
            (100–10000) and optionally cooldown_minutes (60–1440); for 'scheduled' mode set rrule to a daily or weekly
            cadence such as 'FREQ=DAILY' or 'FREQ=WEEKLY;BYDAY=MO,FR'. Disable delivery with enabled=false; report
            configs are deleted only when their evaluation is deleted.
    llma-evaluation-report-update-full:
        operation: llm_analytics_evaluation_reports_update
        enabled: false
    llma-evaluation-run:
        operation: evaluation_runs_create
        enabled: true
        scopes:
            - evaluation:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Run evaluation
        description: >
            Manually trigger an evaluation run for a specific $ai_generation event. Enqueues a Temporal workflow that
            asynchronously executes the evaluation and stores the result as a '$ai_evaluation' event. Returns a
            workflow_id and status "started". Pair with execute-sql to query results: SELECT * FROM events WHERE event =
            '$ai_evaluation'.
    llma-evaluation-summary-create:
        operation: llm_analytics_evaluation_summary_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Summarize evaluation results
        description: >
            Generate an AI-powered summary of boolean AI observability evaluation results for a given evaluation config.
            Pass an evaluation_id and an optional filter ("all", "pass", "fail", or "na") to scope which runs are
            analyzed. Returns an overall assessment, pattern groups for passing, failing, and N/A runs (each with title,
            description, frequency, and example generation IDs), actionable recommendations, and run statistics.
            Optionally pass generation_ids to restrict the analysis to specific runs. Results are cached for one hour —
            use force_refresh to recompute. Rate-limited; requires AI data processing approval for the organization.
        requires_ai_consent: true
    llma-evaluation-test-hog:
        operation: evaluations_test_hog_create
        enabled: true
        scopes:
            - evaluation:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Test Hog evaluation code
        description: >
            Test Hog evaluation source code against a sample of recent $ai_generation events without saving. Returns
            per-event results (pass/fail/N/A), reasoning, and input/output previews. Use this to validate Hog code
            before creating or updating a 'hog' type evaluation.
    llma-evaluation-update:
        operation: evaluations_partial_update
        enabled: true
        scopes:
            - evaluation:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update evaluation
        description: >
            Partially update an AI observability evaluation. Toggle enabled, change its type or evaluation config, or
            change the model for an llm_judge. When switching to llm_judge, include model_configuration with provider and
            model. When an llm_judge remains an llm_judge, omit model_configuration to keep its current model or provide
            both fields to replace it; null is rejected for configured judges. When switching an llm_judge to hog or
            sentiment, set model_configuration to null. Legacy llm_judge evaluations without a model remain editable.
            provider_key_id may be null when no key is pinned.
    llma-evaluation-update-full:
        operation: evaluations_update
        enabled: false
    llma-personal-spend:
        operation: llm_analytics_personal_spend_list
        enabled: true
        scopes:
            - user:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get my LLM spend analysis
        description: >
            Retrieve the current user's personal LLM spend analysis across PostHog products over the last N days
            (default 30, max 90). Returns a summary plus breakdowns by product, tool, model and UTC day. The `product`
            query param is required and scopes the tool / model / day breakdowns to a single product; currently only
            `posthog_code` is supported. `by_product` always returns the cross-product view, and `by_day` is a
            day-ascending series for spend-over-time questions. Pass `refresh=true` to bypass the 5-minute cache.
    llma-prompt-archive:
        operation: llm_prompts_name_archive_create
        enabled: false
    llma-prompt-create:
        operation: llm_prompts_create
        enabled: true
        scopes:
            - llm_prompt:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create prompt
        description: >
            Create a new LLM prompt for the current team. Requires a unique name and prompt content (string or JSON
            object).
        include_params:
            - name
            - prompt
            - version_description
    llma-prompt-duplicate:
        operation: llm_prompts_name_duplicate_create
        enabled: true
        scopes:
            - llm_prompt:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Duplicate prompt
        description: >
            Duplicate an existing LLM prompt under a new name. Copies the latest version's content to create a new
            prompt at version 1. Useful for forking a prompt or as a way to rename since names are immutable after
            creation.
    llma-prompt-get:
        operation: llm_prompts_name_retrieve
        enabled: true
        scopes:
            - llm_prompt:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get prompt
        description: |
            Get a specific LLM prompt by name. Uses the cached endpoint for fast retrieval.
            The response always includes `outline`, a flat list of markdown headings parsed from the prompt — useful
            as a lightweight table of contents. Pass `content=none` to get the outline without the prompt payload,
            or `content=preview` for a short `prompt_preview` snippet instead of the full prompt.
    llma-prompt-list:
        operation: llm_prompts_list
        enabled: true
        scopes:
            - llm_prompt:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        input_schema: PromptListInputSchema
        response_type: |-
            Omit<Schemas.PaginatedLLMPromptListList, 'results'> & {
              results: (Omit<Schemas.LLMPromptList, 'prompt'> & { prompt?: unknown })[]
            }
        title: List prompts
        description: >
            List all LLM prompts stored for the current team. Optionally filter by name. Returns paginated prompt
            summaries. By default, only prompt metadata is returned, not full prompt content. Every result also includes
            `outline`, a flat list of markdown headings parsed from the prompt — use it as a lightweight table of
            contents, and pair with `content=none` to keep responses small.
    llma-prompt-resolve:
        operation: llm_prompts_resolve_name_retrieve
        enabled: false
    llma-prompt-update:
        operation: llm_prompts_name_partial_update
        enabled: true
        scopes:
            - llm_prompt:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update prompt
        description: |
            Publish a new version of an existing LLM prompt by name. Name is immutable after creation.
            You can either provide the full prompt content via 'prompt', or use 'edits' for incremental
            find/replace updates. Each edit must have 'old' (text to find, must match exactly once) and
            'new' (replacement text). Edits are applied sequentially. Only one of 'prompt' or 'edits'
            may be provided. Pass 'version_description' with a short note on what changed and why —
            it is shown in the prompt's version history.
        include_params:
            - prompt
            - edits
            - base_version
            - version_description
    llma-provider-key-assign:
        operation: llm_analytics_provider_keys_assign_create
        enabled: false
    llma-provider-key-create:
        operation: llm_analytics_provider_keys_create
        enabled: false
    llma-provider-key-delete:
        operation: llm_analytics_provider_keys_destroy
        enabled: false
    llma-provider-key-dependent-configs-get:
        operation: llm_analytics_provider_keys_dependent_configs_retrieve
        enabled: false
    llma-provider-key-get:
        operation: llm_analytics_provider_keys_retrieve
        enabled: true
        scopes:
            - llm_provider_key:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get LLM provider key
        description: >
            Fetch one LLM provider key by ID — its provider, name, and validation state, with a masked preview (never
            the secret). Use when you have a key ID to resolve, e.g. the key an evaluation references.
    llma-provider-key-list:
        operation: llm_analytics_provider_keys_list
        enabled: true
        scopes:
            - llm_provider_key:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List LLM provider keys
        description: >
            List the team's configured LLM provider keys (OpenAI, Anthropic, Azure, etc.). Returns each key's provider,
            name, validation state, and a masked preview — never the secret itself. Call this before creating an
            llm_judge evaluation to discover which providers have a usable ('ok' state) key available. Creating,
            updating, and deleting keys are intentionally UI-only.
    llma-provider-key-trial-evaluations-get:
        operation: llm_analytics_provider_keys_trial_evaluations_retrieve
        enabled: false
    llma-provider-key-update:
        operation: llm_analytics_provider_keys_partial_update
        enabled: false
    llma-provider-key-update-full:
        operation: llm_analytics_provider_keys_update
        enabled: false
    llma-provider-key-validate:
        operation: llm_analytics_provider_keys_validate_create
        enabled: false
    llma-provider-key-validation-create:
        operation: llm_analytics_provider_key_validations_create
        enabled: false
    llma-review-queue-create:
        operation: llm_analytics_review_queues_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: reviews?queue_id={id}
        title: Create review queue
        description: >
            Create a review queue for routing traces that still need review. Queue names must be unique among active
            queues in the current project.
    llma-review-queue-delete:
        operation: llm_analytics_review_queues_destroy
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete review queue
        description: >
            Delete a review queue by ID. This soft-deletes the queue and soft-deletes all active pending assignments
            that still belong to it.
    llma-review-queue-get:
        operation: llm_analytics_review_queues_retrieve
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: reviews?queue_id={id}
        title: Get review queue
        description: |
            Retrieve a review queue by ID. Returns its name, current pending_item_count, creator, and timestamps.
    llma-review-queue-item-create:
        operation: llm_analytics_review_queue_items_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: traces/{trace_id}
        title: Create review queue item
        description: >
            Add a trace to a review queue as a pending trace review assignment. Requires queue_id and trace_id. Fails if
            the trace already has an active review or is already pending in any review queue.
    llma-review-queue-item-delete:
        operation: llm_analytics_review_queue_items_destroy
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete review queue item
        description: >
            Remove a pending trace review assignment from review queues. This soft-deletes the queue item so the trace
            can be queued again later if needed.
    llma-review-queue-item-get:
        operation: llm_analytics_review_queue_items_retrieve
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: traces/{trace_id}
        title: Get review queue item
        description: >
            Retrieve a single pending trace review assignment by ID. Returns the owning queue, trace_id, creator, and
            timestamps for the pending review task.
    llma-review-queue-item-list:
        operation: llm_analytics_review_queue_items_list
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: traces/{trace_id}
        list: true
        title: List review queue items
        description: >
            List pending trace review assignments across review queues. Supports filtering by queue_id, trace_id,
            trace_id__in, search, and ordering so agents can find traces that are still queued for review.
    llma-review-queue-item-update:
        operation: llm_analytics_review_queue_items_partial_update
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: traces/{trace_id}
        title: Update review queue item
        description: >
            Move a pending trace review assignment to a different review queue by updating queue_id. Fails if the trace
            has already been reviewed and can no longer stay queued.
    llma-review-queue-list:
        operation: llm_analytics_review_queues_list
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: reviews?queue_id={id}
        list: true
        title: List review queues
        description: >
            List review queues used for trace reviews. Returns queue names, pending_item_count, creator info, and
            timestamps. Supports queue-name search and ordering.
    llma-review-queue-update:
        operation: llm_analytics_review_queues_partial_update
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: reviews?queue_id={id}
        title: Update review queue
        description: |
            Rename an existing review queue. The updated name must stay unique among active queues in the project.
    llma-score-definition-create:
        operation: llm_analytics_score_definitions_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create scorer
        description: >
            Create a new scorer (a.k.a. score definition) used by trace reviews. Pass `name`, `kind` (`categorical`,
            `numeric`, or `boolean`), and `config` matching the kind. `kind` is immutable after creation. Categorical
            scorers need an `options` array with unique keys and optional
            `selection_mode`/`min_selections`/`max_selections` (for `multiple`). Numeric scorers can set `min`, `max`,
            `step`. Boolean scorers can override `true_label`/`false_label`. Scorers always start active (not archived)
            and at version 1.
        param_overrides:
            config:
                input_schema: ScoreDefinitionConfigSchema
    llma-score-definition-get:
        operation: llm_analytics_score_definitions_retrieve
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get scorer
        description: >
            Retrieve a scorer by ID, including its current immutable `config` payload, `current_version` number, kind,
            archived state, and timestamps.
    llma-score-definition-list:
        operation: llm_analytics_score_definitions_list
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List scorers
        description: >
            List active scorers for the current project. By default only active rows are returned — pass `archived=true`
            to see only archived scorers. Other filters: `kind` (`categorical`, `numeric`, `boolean`) and `search` over
            name/description. Returns metadata plus the current config snapshot.
    llma-score-definition-new-version:
        operation: llm_analytics_score_definitions_new_version_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Bump scorer to a new version
        description: >
            Publish a new immutable `config` version for an existing scorer. Use this whenever the scoring rules change
            (add/remove categorical options, tweak numeric bounds, rename boolean labels). Existing trace reviews keep
            their snapshot of the previous version, so historical scores remain stable. The `config` shape must match
            the scorer's `kind`. Each call increments `current_version` by one. Pass `base_version` (the version number
            you observed before bumping) for optimistic concurrency — the request returns 409 if another writer already
            advanced the scorer.
        param_overrides:
            config:
                input_schema: ScoreDefinitionConfigSchema
    llma-score-definition-update:
        operation: llm_analytics_score_definitions_partial_update
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update scorer metadata
        description: >
            Update a scorer's metadata: rename via `name`, edit `description`, or toggle `archived` to hide (`true`) or
            restore (`false`). Archiving is reversible — there is no destroy endpoint. To change the scoring rules
            instead, call `llma-score-definition-new-version`. `kind` cannot be changed.
    llma-summarization-batch-check-create:
        operation: llm_analytics_summarization_batch_check_create
        enabled: false
    llma-summarization-create:
        operation: llm_analytics_summarization_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Summarize trace or generation
        description: >
            Generate an AI-powered summary of an LLM trace or generation. Pass a trace_id or generation_id with a
            date_from — the backend fetches the data and returns a structured summary with title, flow diagram, summary
            bullets, and interesting notes. Results are cached. Use mode "minimal" (default) for 3-5 points or
            "detailed" for 5-10 points. Rate-limited; requires AI data processing approval for the organization.
        requires_ai_consent: true
    llma-tagger-create:
        operation: taggers_create
        enabled: true
        scopes:
            - tagger:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Create tagger
        description: >
            Create an AI observability tagger that automatically adds custom tags to $ai_generation events. For
            tagger_type "llm", provide tagger_config.prompt plus tagger_config.tags (each with name and optional
            description); optionally set min_tags and max_tags. For tagger_type "hog", provide tagger_config.source Hog
            code that returns a tag name string, a list of tag name strings, or null; optionally provide
            tagger_config.tags as a whitelist. Use enabled=false while drafting, then update the tagger from the UI.
        url_prefix: /ai-evals/taggers
    llma-tagger-list:
        operation: taggers_list
        enabled: true
        scopes:
            - tagger:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: List taggers
        description: >
            List AI observability taggers for the current project. Supports filtering by enabled status, id__in, search,
            and ordering. Returns each tagger's name, description, enabled state, type, configuration, conditions, model
            configuration, creator, and timestamps.
        url_prefix: /ai-evals/taggers
    llma-tagger-test-hog:
        operation: taggers_test_hog_create
        enabled: true
        scopes:
            - tagger:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: false
        title: Test Hog tagger code
        description: >
            Test Hog tagger source code against recent $ai_generation events without saving a tagger. The source should
            return a tag name string, a list of tag name strings, or null. Optionally pass tags as a whitelist; returned
            tags outside the whitelist are filtered out. Results include input/output previews, selected tags, stdout
            reasoning, and any execution error for each sampled event.
    llma-text-repr-create:
        operation: llm_analytics_text_repr_create
        enabled: false
    llma-trace-review-create:
        operation: llm_analytics_trace_reviews_create
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: traces/{trace_id}
        title: Create trace review
        description: >
            Save a trace review. Supports an optional comment, an optional scores array, and an optional queue_id to
            clear a matching pending review-queue item after the review is saved.
    llma-trace-review-delete:
        operation: llm_analytics_trace_reviews_destroy
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete trace review
        description: >
            Delete a trace review by ID. This soft-deletes the review so the same trace can be reviewed again later if
            needed.
    llma-trace-review-get:
        operation: llm_analytics_trace_reviews_retrieve
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: traces/{trace_id}
        title: Get trace review
        description: >
            Retrieve a saved trace review by ID. Returns the trace_id, comment, scores, creator, reviewer, and
            timestamps.
    llma-trace-review-list:
        operation: llm_analytics_trace_reviews_list
        enabled: true
        scopes:
            - llm_analytics:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: traces/{trace_id}
        list: true
        title: List trace reviews
        description: >
            List saved trace reviews. Supports filtering by trace_id, definition_id, search, and ordering. Returns
            comments, scores, reviewers, and timestamps.
    llma-trace-review-update:
        operation: llm_analytics_trace_reviews_partial_update
        enabled: true
        scopes:
            - llm_analytics:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: traces/{trace_id}
        title: Update trace review
        description: >
            Update a trace review. Pass comment and/or the full desired scores array. You can also pass queue_id to
            clear only a matching pending queue item after the review is saved.
    llma-translate-create:
        operation: llm_analytics_translate_create
        enabled: false
    taggers-destroy:
        operation: taggers_destroy
        enabled: false
    taggers-partial-update:
        operation: taggers_partial_update
        enabled: false
    taggers-retrieve:
        operation: taggers_retrieve
        enabled: false
    taggers-update:
        operation: taggers_update
        enabled: false
