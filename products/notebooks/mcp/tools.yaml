# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Notebooks
feature: notebooks
url_prefix: /notebooks
ui_apps: {}
tools:
    notebooks-activity-retrieve:
        operation: notebooks_activity_retrieve
        enabled: false
    notebooks-activity-retrieve-2:
        operation: notebooks_activity_retrieve
        enabled: false
    notebooks-all-activity-retrieve:
        operation: notebooks_all_activity_retrieve
        enabled: false
    notebooks-collab-markdown-save-create:
        operation: notebooks_collab_markdown_save_create
        enabled: false
    notebooks-collab-presence-create:
        operation: notebooks_collab_presence_create
        enabled: false
    notebooks-collab-save-create:
        operation: notebooks_collab_save_create
        enabled: false
    notebooks-collab-stream-retrieve:
        operation: notebooks_collab_stream_retrieve
        enabled: false
    notebooks-create:
        operation: notebooks_create
        enabled: true
        scopes:
            - notebook:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{short_id}'
        title: Create notebook
        description: >
            Create a new notebook. Provide a title and content. Content is a JSON object representing the notebook's
            rich text document structure (ProseMirror-based). Returns the created notebook with its short_id.

            Embedded charts use `{type: "ph-query", attrs: {nodeId, query}}` nodes. The `query` object must be one of:
            (a) `{kind: "DataVisualizationNode", source: {kind: "HogQLQuery", query: "SELECT ..."}, display:
            "ActionsBar", chartSettings: {...}}` for SQL charts — do NOT wrap this in an InsightVizNode; (b) `{kind:
            "InsightVizNode", source: <TrendsQuery | FunnelsQuery | RetentionQuery | PathsQuery | StickinessQuery |
            LifecycleQuery>}` for product-analytics insights; or (c) `{kind: "SavedInsightNode", shortId: "..."}` to
            embed a saved insight. The server rejects other shapes and auto-corrects the common `InsightVizNode`
            wrapping a SQL chart.
        exclude_params:
            - _create_in_folder
    notebooks-destroy:
        operation: notebooks_destroy
        enabled: true
        scopes:
            - notebook:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete notebook
        description: |
            Delete a notebook by short_id. The notebook will be soft-deleted and no longer appear in lists.
        soft_delete: true
    notebooks-hogql-execute-create:
        operation: notebooks_hogql_execute_create
        enabled: false
    notebooks-kernel-config-create:
        operation: notebooks_kernel_config_create
        enabled: false
    notebooks-kernel-dataframe-retrieve:
        operation: notebooks_kernel_dataframe_retrieve
        enabled: false
    notebooks-kernel-execute-create:
        operation: notebooks_kernel_execute_create
        enabled: false
    notebooks-kernel-execute-stream-create:
        operation: notebooks_kernel_execute_stream_create
        enabled: false
    notebooks-kernel-restart-create:
        operation: notebooks_kernel_restart_create
        enabled: false
    notebooks-kernel-start-create:
        operation: notebooks_kernel_start_create
        enabled: false
    notebooks-kernel-status-retrieve:
        operation: notebooks_kernel_status_retrieve
        enabled: false
    notebooks-kernel-stop-create:
        operation: notebooks_kernel_stop_create
        enabled: false
    notebooks-list:
        operation: notebooks_list
        enabled: true
        scopes:
            - notebook:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List notebooks
        description: >
            List all notebooks in the project. Supports filtering by search term, created_by, last_modified_by,
            date_from, date_to, and contains. Returns title, short_id, and creation/modification metadata.
    notebooks-partial-update:
        operation: notebooks_partial_update
        enabled: true
        scopes:
            - notebook:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{short_id}'
        title: Update notebook
        description: >
            Update an existing notebook by short_id. Can update title, content, and deleted status. IMPORTANT: when
            updating the content field, you must provide the current version number for optimistic concurrency control.
            Retrieve the notebook first to get the latest version. If the notebook content is a single
            ph-markdown-notebook node, preserve that structure and update attrs.markdown with valid markdown instead of
            replacing it with legacy rich-text blocks.
        exclude_params:
            - _create_in_folder
        feature_flag: notebooks-collaboration
        feature_flag_behavior: disable
    notebooks-recording-comments-retrieve:
        operation: notebooks_recording_comments_retrieve
        enabled: false
    notebooks-retrieve:
        operation: notebooks_retrieve
        enabled: true
        scopes:
            - notebook:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{short_id}'
        title: Get notebook
        description: >
            Get a specific notebook by its short_id. Returns the full notebook including title, content, version, and
            creation/modification metadata.
    notebooks-run-cell:
        operation: notebooks_sql_v2_run_create
        enabled: true
        scopes:
            - notebook:write
            - query:read
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Run notebook cell
        description: >
            Dispatch an asynchronous run of a notebook SQL (HogQL) or Python cell; returns a run_id immediately. Poll
            notebooks-run-cell-result with the run_id until the status is terminal. node_id is the cell's ProseMirror
            node id from the notebook content. A cell that reads other cells' dataframes must list them in refs, and
            those cells must have completed a run first — refs resolve to each upstream cell's last completed run, so
            run cells in dependency order. The first Python cell run can take noticeably longer while the notebook's
            sandbox kernel starts.
        feature_flag: revamped-py-notebooks
    notebooks-run-cell-interrupt:
        operation: notebooks_sql_v2_runs_interrupt_create
        enabled: true
        scopes:
            - notebook:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Interrupt notebook cell run
        description: >
            Stop a running cell. Idempotent — interrupting an already-finished run returns its outcome unchanged. The
            stdout/stderr captured before the stop still arrive through notebooks-run-cell-result.
        feature_flag: revamped-py-notebooks
    notebooks-run-cell-result:
        operation: notebooks_sql_v2_runs_retrieve
        enabled: true
        scopes:
            - notebook:read
            - query:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get notebook cell run result
        description: >
            Read the durable state of a cell run: status ('running', 'done', 'failed', 'interrupted') and, once done or
            interrupted, the result envelope — columns, a capped first page of rows, stdout/stderr (a Python cell's logs
            and tracebacks), media, and error. Poll this after notebooks-run-cell, waiting a few seconds between polls,
            until the status is terminal, then use the envelope to decide the next step (fix the cell on error, or
            proceed).
        feature_flag: revamped-py-notebooks
        response:
            exclude:
                - result.media.*.data
    notebooks-update:
        operation: notebooks_update
        enabled: false
