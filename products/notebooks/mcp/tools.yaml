# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Notebooks
feature: notebooks
url_prefix: /notebooks
ui_apps: {}
tools:
    accounts-notebooks-create:
        operation: accounts_notebooks_create
        enabled: false
    accounts-notebooks-destroy:
        operation: accounts_notebooks_destroy
        enabled: false
    accounts-notebooks-list:
        operation: accounts_notebooks_list
        enabled: false
    accounts-notebooks-retrieve:
        operation: accounts_notebooks_retrieve
        enabled: false
    notebooks-activity-retrieve:
        operation: notebooks_activity_retrieve
        enabled: false
    notebooks-activity-retrieve-2:
        operation: notebooks_activity_retrieve
        enabled: false
    notebooks-all-activity-retrieve:
        operation: notebooks_all_activity_retrieve
        enabled: false
    notebooks-collab-save-create:
        operation: notebooks_collab_save_create
        enabled: false
    notebooks-collab-stream-retrieve:
        operation: notebooks_collab_stream_retrieve
        enabled: false
    notebooks-create:
        operation: notebooks_create
        enabled: true
        scopes:
            - notebook:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{short_id}'
        title: Create notebook
        description: >
            Create a new notebook. Provide a title and content. Content is a JSON object representing the notebook's
            rich text document structure (ProseMirror-based). Returns the created notebook with its short_id.
        exclude_params:
            - _create_in_folder
    notebooks-destroy:
        operation: notebooks_destroy
        enabled: true
        scopes:
            - notebook:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete notebook
        description: |
            Delete a notebook by short_id. The notebook will be soft-deleted and no longer appear in lists.
        soft_delete: true
    notebooks-hogql-execute-create:
        operation: notebooks_hogql_execute_create
        enabled: false
    notebooks-kernel-config-create:
        operation: notebooks_kernel_config_create
        enabled: false
    notebooks-kernel-dataframe-retrieve:
        operation: notebooks_kernel_dataframe_retrieve
        enabled: false
    notebooks-kernel-execute-create:
        operation: notebooks_kernel_execute_create
        enabled: false
    notebooks-kernel-execute-stream-create:
        operation: notebooks_kernel_execute_stream_create
        enabled: false
    notebooks-kernel-restart-create:
        operation: notebooks_kernel_restart_create
        enabled: false
    notebooks-kernel-start-create:
        operation: notebooks_kernel_start_create
        enabled: false
    notebooks-kernel-status-retrieve:
        operation: notebooks_kernel_status_retrieve
        enabled: false
    notebooks-kernel-stop-create:
        operation: notebooks_kernel_stop_create
        enabled: false
    notebooks-list:
        operation: notebooks_list
        enabled: false
    notebooks-partial-update:
        operation: notebooks_partial_update
        enabled: true
        scopes:
            - notebook:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{short_id}'
        title: Update notebook
        description: >
            Update notebook metadata by short_id, such as title or deleted status. Do not use this tool for notebook
            content placement or text edits; use notebooks-edit so changes go through the collaboration save path and
            preserve concurrent edits from people and agents. If you must update the full content field directly, you
            must provide the current version number for optimistic concurrency control after retrieving the latest
            notebook.
        exclude_params:
            - _create_in_folder
    notebooks-recording-comments-retrieve:
        operation: notebooks_recording_comments_retrieve
        enabled: false
    notebooks-retrieve:
        operation: notebooks_retrieve
        enabled: true
        scopes:
            - notebook:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{short_id}'
        title: Get notebook
        description: >
            Get a specific notebook by its short_id. Use this before content edits to inspect the current notebook and
            choose exact text anchors for notebooks-edit. Returns the full notebook including title, content, version,
            text_content, and creation/modification metadata.
    notebooks-sharing-list:
        operation: notebooks_sharing_list
        enabled: false
    notebooks-sharing-passwords-create:
        operation: notebooks_sharing_passwords_create
        enabled: false
    notebooks-sharing-passwords-destroy:
        operation: notebooks_sharing_passwords_destroy
        enabled: false
    notebooks-sharing-refresh-create:
        operation: notebooks_sharing_refresh_create
        enabled: false
    notebooks-update:
        operation: notebooks_update
        enabled: false
