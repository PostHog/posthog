# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Error tracking
feature: error_tracking
url_prefix: /error_tracking
ui_apps:
    error-details:
        type: detail
        view_prop: data
    error-issue:
        type: detail
        view_prop: issue
    error-issue-list:
        type: list
        detail_tool: query-error-tracking-issue
        detail_args: '{ issueId: item.id }'
        click_prop: onIssueClick
tools:
    error-tracking-assignment-rules-create:
        operation: error_tracking_assignment_rules_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create error tracking assignment rule
        description: >
            Create an error tracking assignment rule for the current project. Provide `filters` to match incoming errors
            and an `assignee` with `type` (`user` or `role`) plus the matching user ID or role UUID.
    error-tracking-assignment-rules-destroy:
        operation: error_tracking_assignment_rules_destroy
        enabled: false
    error-tracking-assignment-rules-list:
        operation: error_tracking_assignment_rules_list
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List error tracking assignment rules
        description: >
            List error tracking assignment rules for the current project. Returns rules in evaluation order with their
            filters, assignee, and disabled state. Supports pagination with `limit` and `offset`.
    error-tracking-assignment-rules-partial-update:
        operation: error_tracking_assignment_rules_partial_update
        enabled: false
    error-tracking-assignment-rules-reorder-partial-update:
        operation: error_tracking_assignment_rules_reorder_partial_update
        enabled: false
    error-tracking-assignment-rules-retrieve:
        operation: error_tracking_assignment_rules_retrieve
        enabled: false
    error-tracking-assignment-rules-update:
        operation: error_tracking_assignment_rules_update
        enabled: false
    error-tracking-bypass-rules-create:
        operation: error_tracking_bypass_rules_create
        enabled: false
    error-tracking-bypass-rules-destroy:
        operation: error_tracking_bypass_rules_destroy
        enabled: false
    error-tracking-bypass-rules-list:
        operation: error_tracking_bypass_rules_list
        enabled: false
    error-tracking-bypass-rules-partial-update:
        operation: error_tracking_bypass_rules_partial_update
        enabled: false
    error-tracking-bypass-rules-reorder-partial-update:
        operation: error_tracking_bypass_rules_reorder_partial_update
        enabled: false
    error-tracking-bypass-rules-retrieve:
        operation: error_tracking_bypass_rules_retrieve
        enabled: false
    error-tracking-bypass-rules-update:
        operation: error_tracking_bypass_rules_update
        enabled: false
    error-tracking-external-references-create:
        operation: error_tracking_external_references_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create error tracking external reference
        description: >
            Create a new external issue in GitHub, GitLab, Linear, or Jira, then link it to a PostHog error tracking
            issue as an external reference. This tool does not link an existing external issue by URL or key. Provide
            the error tracking issue id as `issue`, the connected integration as `integration_id`, and a `config` object
            with provider-specific fields. Examples: Jira config {"project_key":"ENG","title":"Checkout
            TypeError","description":"Stack trace and reproduction details"}; Linear config
            {"team_id":"team-id","title":"Checkout TypeError","description":"Stack trace and reproduction details"};
            GitHub config {"repository":"posthog","title":"Checkout TypeError","body":"Stack trace and reproduction
            details"}; GitLab config {"title":"Checkout TypeError","body":"Stack trace and reproduction details"}.
            Required `config` keys by integration kind: github -> {repository, title, body}; gitlab -> {title, body};
            linear -> {team_id, title, description}; jira -> {project_key, title, description}. Use integrations-list
            first to find the `integration_id` and kind; use integrations-jira-projects-retrieve,
            integrations-linear-teams-retrieve, or integrations-github-repos-retrieve when you need provider-specific
            IDs.
    error-tracking-external-references-destroy:
        operation: error_tracking_external_references_destroy
        enabled: false
    error-tracking-external-references-list:
        operation: error_tracking_external_references_list
        enabled: false
    error-tracking-external-references-retrieve:
        operation: error_tracking_external_references_retrieve
        enabled: false
    error-tracking-fingerprints-destroy:
        operation: error_tracking_fingerprints_destroy
        enabled: false
    error-tracking-fingerprints-list:
        operation: error_tracking_fingerprints_list
        enabled: false
    error-tracking-fingerprints-retrieve:
        operation: error_tracking_fingerprints_retrieve
        enabled: false
    error-tracking-git-provider-file-links-resolve-github-retrieve:
        operation: error_tracking_git_provider_file_links_resolve_github_retrieve
        enabled: false
    error-tracking-git-provider-file-links-resolve-gitlab-retrieve:
        operation: error_tracking_git_provider_file_links_resolve_gitlab_retrieve
        enabled: false
    error-tracking-grouping-rules-create:
        operation: error_tracking_grouping_rules_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create error tracking grouping rule
        description: >
            Create an error tracking grouping rule for the current project. Provide required `filters`, and optionally
            set `assignee` and `description` for the issues this rule creates.
    error-tracking-grouping-rules-destroy:
        operation: error_tracking_grouping_rules_destroy
        enabled: false
    error-tracking-grouping-rules-list:
        operation: error_tracking_grouping_rules_list
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List error tracking grouping rules
        description: >
            List error tracking grouping rules for the current project. Returns rules in evaluation order with their
            filters, optional assignee, description, and linked issue when available.
    error-tracking-grouping-rules-partial-update:
        operation: error_tracking_grouping_rules_partial_update
        enabled: false
    error-tracking-grouping-rules-reorder-partial-update:
        operation: error_tracking_grouping_rules_reorder_partial_update
        enabled: false
    error-tracking-grouping-rules-retrieve:
        operation: error_tracking_grouping_rules_retrieve
        enabled: false
    error-tracking-grouping-rules-update:
        operation: error_tracking_grouping_rules_update
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update error tracking grouping rule
        description: >
            Update an error tracking grouping rule's `filters` by ID. Omit `filters` to leave them unchanged. Editing
            the rule also clears any auto-disable state so the rule is re-enabled.
    error-tracking-issues-activity-retrieve:
        operation: error_tracking_issues_activity_retrieve
        enabled: false
    error-tracking-issues-all-activity-retrieve:
        operation: error_tracking_issues_all_activity_retrieve
        enabled: false
    error-tracking-issues-assign-partial-update:
        operation: error_tracking_issues_assign_partial_update
        enabled: false
    error-tracking-issues-bulk-create:
        operation: error_tracking_issues_bulk_create
        enabled: false
    error-tracking-issues-cohort-update:
        operation: error_tracking_issues_cohort_update
        enabled: false
    error-tracking-issues-destroy:
        operation: error_tracking_issues_destroy
        enabled: false
    error-tracking-issues-exists-retrieve:
        operation: error_tracking_issues_exists_retrieve
        enabled: false
    error-tracking-issues-list:
        operation: error_tracking_issues_list
        enabled: false
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: List error tracking issues
        description: >
            List all error tracking issues in the project. Returns issues with id, status, name, first seen timestamp,
            and assignee info.
        ui_app: error-issue-list
        response:
            include:
                - id
                - status
                - name
                - first_seen
                - assignee
    error-tracking-issues-merge-create:
        operation: error_tracking_issues_merge_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Merge error tracking issues
        description: >
            Merge one or more error tracking issues into an existing target issue. Provide the target issue as `id` and
            the issues to merge into it as `ids`.
    error-tracking-issues-partial-update:
        operation: error_tracking_issues_partial_update
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Update error tracking issue
        description: >
            Update an error tracking issue. Can change status (active, resolved, suppressed), assign to a user, or
            update description.
        ui_app: error-issue
    error-tracking-issues-retrieve:
        operation: error_tracking_issues_retrieve
        enabled: false
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get error tracking issue
        description: >
            Get a specific error tracking issue by ID. Returns full issue details including status, description, volume,
            and metadata. After retrieving an issue, consider using `query-session-recordings-list` with an event filter
            for `$exception` to find session recordings of users who hit this error.
        ui_app: error-issue
    error-tracking-issues-split-create:
        operation: error_tracking_issues_split_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Split error tracking issue fingerprints
        description: >
            Split one or more fingerprints out of an existing error tracking issue into new issues. Provide the source
            issue as `id` and the fingerprints to split as `fingerprints`, where each entry includes a required
            `fingerprint` and optional `name` or `description`.
    error-tracking-issues-update:
        operation: error_tracking_issues_update
        enabled: false
    error-tracking-issues-values-retrieve:
        operation: error_tracking_issues_values_retrieve
        enabled: false
    error-tracking-recommendations-dismiss-create:
        operation: error_tracking_recommendations_dismiss_create
        enabled: false
    error-tracking-recommendations-list:
        operation: error_tracking_recommendations_list
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List error tracking recommendations
        description_file: ./prompts/error-tracking-recommendations-list.md
        system_prompt_hint: Error tracking setup recommendations and how to act on each (error-tracking category)
    error-tracking-recommendations-refresh-create:
        operation: error_tracking_recommendations_refresh_create
        enabled: false
    error-tracking-recommendations-restore-create:
        operation: error_tracking_recommendations_restore_create
        enabled: false
    error-tracking-releases-create:
        operation: error_tracking_releases_create
        enabled: false
    error-tracking-releases-destroy:
        operation: error_tracking_releases_destroy
        enabled: false
    error-tracking-releases-hash-retrieve:
        operation: error_tracking_releases_hash_retrieve
        enabled: false
    error-tracking-releases-list:
        operation: error_tracking_releases_list
        enabled: false
    error-tracking-releases-partial-update:
        operation: error_tracking_releases_partial_update
        enabled: false
    error-tracking-releases-retrieve:
        operation: error_tracking_releases_retrieve
        enabled: false
    error-tracking-releases-update:
        operation: error_tracking_releases_update
        enabled: false
    error-tracking-settings-get:
        operation: error_tracking_settings_retrieve_settings_retrieve
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get error tracking settings
        description: >
            Get the error tracking ingestion settings for the current project. Returns the project-wide and per-issue
            exception rate limits, where each `*_rate_limit_value` is the maximum events ingested per bucket and each
            `*_rate_limit_bucket_size_minutes` is the bucket window. A null `*_rate_limit_value` means no limit is set.
            Read these before updating so you can preserve the fields you don't intend to change.
    error-tracking-settings-update:
        operation: error_tracking_settings_update_settings_partial_update
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Update error tracking settings
        description: >
            Update the error tracking ingestion settings for the current project. Only the fields you include are
            applied; omitted fields keep their existing values. Use this to set the project-wide rate limit
            (`project_rate_limit_value` events per `project_rate_limit_bucket_size_minutes`) and the per-issue rate
            limit (`per_issue_rate_limit_value` events per `per_issue_rate_limit_bucket_size_minutes`). Set a
            `*_rate_limit_value` to null to remove that limit. WARNING: exception events above a rate limit are dropped
            at ingestion and cannot be recovered. Lowering a limit silently discards volume — confirm the threshold with
            the user before reducing it.
    error-tracking-spike-detection-config-list:
        operation: error_tracking_spike_detection_config_list
        enabled: false
    error-tracking-spike-detection-config-update-config-partial-update:
        operation: error_tracking_spike_detection_config_update_config_partial_update
        enabled: false
    error-tracking-spike-events-list:
        operation: error_tracking_spike_events_list
        enabled: false
    error-tracking-stack-frames-batch-get-create:
        operation: error_tracking_stack_frames_batch_get_create
        enabled: false
    error-tracking-stack-frames-destroy:
        operation: error_tracking_stack_frames_destroy
        enabled: false
    error-tracking-stack-frames-list:
        operation: error_tracking_stack_frames_list
        enabled: false
    error-tracking-stack-frames-retrieve:
        operation: error_tracking_stack_frames_retrieve
        enabled: false
    error-tracking-suppression-rules-create:
        operation: error_tracking_suppression_rules_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Create error tracking suppression rule
        description: >
            Create an error tracking suppression rule for the current project. WARNING: matching errors are suppressed
            indefinitely — dropped at ingestion and will not appear as issues until the rule is disabled or deleted.
            Scope `filters` tightly to the exact exception type, message, URL, or properties you want gone. Do NOT
            create match-all rules (omitting `filters`) or broad rules — they silently swallow unrelated errors and
            cause data loss that is hard to detect after the fact. If unsure, set `sampling_rate` below `1.0` so only a
            fraction of matches are dropped (e.g. `0.5` drops half) rather than all of them. Confirm with the user
            before creating any rule that could match more than one distinct error.
    error-tracking-suppression-rules-destroy:
        operation: error_tracking_suppression_rules_destroy
        enabled: false
    error-tracking-suppression-rules-list:
        operation: error_tracking_suppression_rules_list
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List error tracking suppression rules
        description: >
            List error tracking suppression rules for the current project. Returns rules in evaluation order with their
            filters, sampling rate, and disabled state. Supports pagination with `limit` and `offset`.
    error-tracking-suppression-rules-partial-update:
        operation: error_tracking_suppression_rules_partial_update
        enabled: false
    error-tracking-suppression-rules-reorder-partial-update:
        operation: error_tracking_suppression_rules_reorder_partial_update
        enabled: false
    error-tracking-suppression-rules-retrieve:
        operation: error_tracking_suppression_rules_retrieve
        enabled: false
    error-tracking-suppression-rules-update:
        operation: error_tracking_suppression_rules_update
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Update error tracking suppression rule
        description: >
            Update an error tracking suppression rule by ID. Only the fields you include in the request body are
            applied; omitted fields keep their existing values. Supports updating `filters` and `sampling_rate`.
            WARNING: broadening `filters` will start dropping additional events at ingestion silently. Keep filters
            tightly scoped to the exact errors you want gone. Prefer raising `sampling_rate` to dampen volume over
            widening the match. Confirm with the user before changing a rule's filters in a way that could match more
            than one distinct error.
    error-tracking-symbol-sets-bulk-delete-create:
        operation: error_tracking_symbol_sets_bulk_delete_create
        enabled: false
    error-tracking-symbol-sets-bulk-finish-upload-create:
        operation: error_tracking_symbol_sets_bulk_finish_upload_create
        enabled: false
    error-tracking-symbol-sets-bulk-start-upload-create:
        operation: error_tracking_symbol_sets_bulk_start_upload_create
        enabled: false
    error-tracking-symbol-sets-destroy:
        operation: error_tracking_symbol_sets_destroy
        enabled: false
    error-tracking-symbol-sets-download-retrieve:
        operation: error_tracking_symbol_sets_download_retrieve
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Download error tracking symbol set
        description: >
            Get a presigned download URL for a source map symbol set by ID. The URL expires after one hour. Use it
            immediately, and do not echo it back unless the user explicitly asks. If you only have a symbol set
            reference, call `error-tracking-symbol-sets-list` with the exact `ref` first.
    error-tracking-symbol-sets-finish-upload-update:
        operation: error_tracking_symbol_sets_finish_upload_update
        enabled: false
    error-tracking-symbol-sets-list:
        operation: error_tracking_symbol_sets_list
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List error tracking symbol sets
        description: >
            List source map symbol sets for the current project. Supports pagination plus filtering by exact `ref` or
            upload `status` (`valid`, `invalid`, or `all`) and sorting with `order_by`. Each result includes
            `has_uploaded_file` so you can tell whether the download tool will work.
        response:
            include:
                - id
                - ref
                - created_at
                - last_used
                - failure_reason
                - has_uploaded_file
                - release
    error-tracking-symbol-sets-retrieve:
        operation: error_tracking_symbol_sets_retrieve
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get error tracking symbol set
        description: >
            Get a source map symbol set by ID. If you only have a symbol set reference, call
            `error-tracking-symbol-sets-list` with the exact `ref` first.
        response:
            include:
                - id
                - ref
                - created_at
                - last_used
                - failure_reason
                - has_uploaded_file
                - release
    query-error-tracking-issue:
        operation: error_tracking_query_issue_create
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{params.issueId}'
        title: Query error tracking issue
        description_file: ./prompts/query-error-tracking-issue.md
        system_prompt_hint: Error issue details and impact (error-tracking category)
        ui_app: error-issue
    query-error-tracking-issue-events:
        operation: error_tracking_query_issue_events_create
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{params.issueId}'
        title: Query error tracking issue events
        description_file: ./prompts/query-error-tracking-issue-events.md
        system_prompt_hint: Error event samples, stack traces, and session IDs (error-tracking category)
        ui_app: error-details
    query-error-tracking-issues-list:
        operation: error_tracking_query_issues_list_create
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: Query error tracking issues list
        description_file: ./prompts/query-error-tracking-issues-list.md
        system_prompt_hint: Error issue filtering and aggregation (error-tracking category)
        ui_app: error-issue-list
        response:
            include:
                - id
                - name
                - description
                - status
                - first_seen
                - last_seen
                - library
                - source
                - assignee
                - aggregations
