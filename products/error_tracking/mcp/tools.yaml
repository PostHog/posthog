# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Error tracking
feature: error_tracking
url_prefix: /error_tracking
ui_apps:
    error-details:
        type: detail
        view_prop: data
    error-issue:
        type: detail
        view_prop: issue
    error-issue-list:
        type: list
        detail_tool: error-tracking-issues-retrieve
        click_prop: onIssueClick
tools:
    error-tracking-assignment-rules-list:
        operation: error_tracking_assignment_rules_list
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List error tracking assignment rules
        description: >
            List error tracking assignment rules for the current project. Returns rules in evaluation order with
            their filters, assignee, and disabled state. Supports pagination with `limit` and `offset`.
    error-tracking-assignment-rules-create:
        operation: error_tracking_assignment_rules_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create error tracking assignment rule
        description: >
            Create an error tracking assignment rule for the current project. Provide `filters` to match incoming
            errors and an `assignee` with `type` (`user` or `role`) plus the matching user ID or role UUID.
    error-tracking-assignment-rules-reorder-partial-update:
        operation: error_tracking_assignment_rules_reorder_partial_update
        enabled: false
    error-tracking-external-references-list:
        operation: error_tracking_external_references_list
        enabled: false
    error-tracking-external-references-create:
        operation: error_tracking_external_references_create
        enabled: false
    error-tracking-fingerprints-list:
        operation: error_tracking_fingerprints_list
        enabled: false
    error-tracking-fingerprints-retrieve:
        operation: error_tracking_fingerprints_retrieve
        enabled: false
    error-tracking-fingerprints-destroy:
        operation: error_tracking_fingerprints_destroy
        enabled: false
    error-tracking-git-provider-file-links-resolve-github-retrieve:
        operation: error_tracking_git_provider_file_links_resolve_github_retrieve
        enabled: false
    error-tracking-git-provider-file-links-resolve-gitlab-retrieve:
        operation: error_tracking_git_provider_file_links_resolve_gitlab_retrieve
        enabled: false
    error-tracking-grouping-rules-list:
        operation: error_tracking_grouping_rules_list
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: List error tracking grouping rules
        description: >
            List error tracking grouping rules for the current project. Returns rules in evaluation order with
            their filters, optional assignee, description, and linked issue when available.
    error-tracking-grouping-rules-create:
        operation: error_tracking_grouping_rules_create
        enabled: false
    error-tracking-grouping-rules-reorder-partial-update:
        operation: error_tracking_grouping_rules_reorder_partial_update
        enabled: false
    error-tracking-issues-list:
        operation: error_tracking_issues_list
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        list: true
        title: List error tracking issues
        description: >
            List all error tracking issues in the project. Returns issues with id, status, name, first seen timestamp,
            and assignee info.
        ui_app: error-issue-list
        response:
            include:
                - id
                - status
                - name
                - first_seen
                - assignee
    error-tracking-issues-create:
        operation: error_tracking_issues_create
        enabled: false
    error-tracking-issues-retrieve:
        operation: error_tracking_issues_retrieve
        enabled: true
        scopes:
            - error_tracking:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Get error tracking issue
        description: >
            Get a specific error tracking issue by ID. Returns full issue details including status, description, volume,
            and metadata.
        ui_app: error-issue
    error-tracking-issues-update:
        operation: error_tracking_issues_update
        enabled: false
    error-tracking-issues-partial-update:
        operation: error_tracking_issues_partial_update
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Update error tracking issue
        description: >
            Update an error tracking issue. Can change status (active, resolved, suppressed), assign to a user, or
            update description.
        ui_app: error-issue
    error-tracking-issues-destroy:
        operation: error_tracking_issues_destroy
        enabled: false
    error-tracking-issues-activity-retrieve:
        operation: error_tracking_issues_activity_retrieve
        enabled: false
    error-tracking-issues-assign-partial-update:
        operation: error_tracking_issues_assign_partial_update
        enabled: false
    error-tracking-issues-cohort-update:
        operation: error_tracking_issues_cohort_update
        enabled: false
    error-tracking-issues-merge-create:
        operation: error_tracking_issues_merge_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Merge error tracking issues
        description: >
            Merge one or more error tracking issues into an existing target issue. Provide the target issue as `id` and
            the issues to merge into it as `ids`.
    error-tracking-issues-split-create:
        operation: error_tracking_issues_split_create
        enabled: true
        scopes:
            - error_tracking:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: false
        title: Split error tracking issue fingerprints
        description: >
            Split one or more fingerprints out of an existing error tracking issue into new issues. Provide the
            source issue as `id` and the fingerprints to split as `fingerprints`, where each entry includes a
            required `fingerprint` and optional `name` or `description`.
