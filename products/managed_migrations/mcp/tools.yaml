# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Managed migrations
feature: managed_migrations
url_prefix: /managed_migrations
ui_apps: {}
tools:
    managed-migrations-create:
        operation: managed_migrations_create
        enabled: false
    managed-migrations-destroy:
        operation: managed_migrations_destroy
        enabled: false
    managed-migrations-list:
        operation: managed_migrations_list
        enabled: false
    managed-migrations-partial-update:
        operation: managed_migrations_partial_update
        enabled: false
    managed-migrations-pause-create:
        operation: managed_migrations_pause_create
        enabled: false
    managed-migrations-resume-create:
        operation: managed_migrations_resume_create
        enabled: false
    managed-migrations-retrieve:
        operation: managed_migrations_retrieve
        enabled: false
    managed-migrations-support-get:
        operation: managed_migrations_support_retrieve
        enabled: true
        scopes:
            - batch_import_support:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        title: Get one batch import job with raw worker state (PostHog staff only)
        description_file: ./prompts/managed-migrations-support-get.md
    managed-migrations-support-list:
        operation: managed_migrations_support_list
        enabled: true
        scopes:
            - batch_import_support:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List batch import jobs across all teams (PostHog staff only)
        description_file: ./prompts/managed-migrations-support-list.md
    managed-migrations-update:
        operation: managed_migrations_update
        enabled: false
