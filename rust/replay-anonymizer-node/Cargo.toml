[package]
name = "replay-anonymizer-node"
version = "0.0.1"
edition = "2021"
exclude = ["index.node"]
publish = false

[lib]
# `cdylib` for the Neon `index.node` addon; `rlib` so `cargo test` can exercise the scrub logic.
crate-type = ["cdylib", "rlib"]

[dependencies]
ahash = { workspace = true }
anyhow = { workspace = true }
base64 = { workspace = true }
libdeflater = { workspace = true }
lz4 = { workspace = true }
memchr = "2"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp", "bmp"] }
# `external-buffers`: the JSONL lines cross the FFI as an externally-backed Buffer (no copy).
# Safe here: the addon only runs in PostHog's Node ingestion workers, never in V8
# sandboxed-pointer environments (Electron), where external buffers abort the VM.
neon = { workspace = true, features = ["external-buffers"] }
serde = { workspace = true }
serde_json = { workspace = true }
simd-json = { version = "0.15", features = ["serde_impl"] }
zstd = { workspace = true }

[dev-dependencies]
# flate2: tests verify reference gzip streams with an independent codec (not libdeflate), so a
# codec regression can't hide by round-tripping through itself.
flate2 = { workspace = true }
serde_json = { workspace = true }
