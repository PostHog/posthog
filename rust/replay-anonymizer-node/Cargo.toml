[package]
name = "replay-anonymizer-node"
version = "0.0.1"
edition = "2021"
exclude = ["index.node"]
publish = false

[lib]
# `cdylib` for the Neon `index.node` addon; `rlib` so `cargo test` can exercise the scrub logic.
crate-type = ["cdylib", "rlib"]

[dependencies]
ahash = { workspace = true }
anyhow = { workspace = true }
base64 = { workspace = true }
flate2 = { workspace = true }
lz4 = { workspace = true }
memchr = "2"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp", "bmp"] }
# `external-buffers`: the JSONL lines cross the FFI as an externally-backed Buffer (no copy).
# Safe here: the addon only runs in PostHog's Node ingestion workers, never in V8
# sandboxed-pointer environments (Electron), where external buffers abort the VM.
neon = { workspace = true, features = ["external-buffers"] }
serde = { workspace = true }
serde_json = { workspace = true }
simd-json = { version = "0.15", features = ["serde_impl"] }

[features]
# Compiles the MLHog v2 scrubber walk for the side-by-side benchmark and its parity test only.
mlhog-bench = []

[dev-dependencies]
# flate2: the mlhog parity test gunzips `cv` payloads to compare them semantically.
flate2 = { workspace = true }
serde_json = { workspace = true }

[[example]]
name = "anonymize_bench"
path = "dev/anonymize_bench.rs"

[[example]]
name = "prod_bench"
path = "dev/prod_bench.rs"

[[example]]
name = "mlhog_bench"
path = "dev/mlhog_bench.rs"
required-features = ["mlhog-bench"]
