[package]
name = "feature-flags"
version = "0.1.0"
edition = "2021"
publish = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
aws-config = { workspace = true, optional = true }
aws-sdk-s3 = { workspace = true, optional = true }
axum = { workspace = true }
axum-client-ip = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
clap = { workspace = true, optional = true }
common-cookieless = { path = "../common/cookieless" }
common-database = { path = "../common/database" }
common-redis = { path = "../common/redis" }
common-types = { path = "../common/types" }
envconfig = { workspace = true }
governor = { workspace = true }
limiters = { path = "../common/limiters" }
metrics = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
bytes = { workspace = true }
url = "2.5"
once_cell = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
json5 = "1.3"
thiserror = { workspace = true }
sha1 = "0.10.6"
sha2 = "0.10.8"
hex = "0.4.3"
regex.workspace = true
fancy-regex.workspace = true
base64.workspace = true
sqlx = { workspace = true, features = ["rust_decimal"] }
uuid = { workspace = true }
common-cache = { path = "../common/cache" }
common-compression = { path = "../common/compression" }
common-hypercache = { path = "../common/hypercache" }
common-s3 = { path = "../common/s3", optional = true }
common-alloc = { path = "../common/alloc" }
common-continuous-profiling = { path = "../common/continuous_profiling" }
strum = { version = "0.28", features = ["derive"] }
lifecycle = { path = "../common/lifecycle" }
common-metrics = { path = "../common/metrics" }
common-geoip = { path = "../common/geoip" }
tower = { workspace = true }
tower-http = { workspace = true }
petgraph = "0.8"
moka = { workspace = true }
dateparser = "0.2.1"
rust_decimal = "1.41.0"
rayon = "1.11.0"
percent-encoding = "2.3.1"
md5 = "0.8"
opentelemetry = { workspace = true }
opentelemetry-otlp = { workspace = true }
opentelemetry_sdk = { workspace = true }
tracing-opentelemetry = { workspace = true }
tokio-retry = "0.3"
serde-pickle = { version = "1.1.1" }
semver = "1.0.28"

[features]
# Gated to keep the AWS SDK, clap, and common-s3 out of library/server builds.
warm-flags-cache = [
  "dep:aws-config",
  "dep:aws-sdk-s3",
  "dep:clap",
  "dep:common-s3",
]

[[bin]]
name = "warm-flags-cache"
path = "src/bin/warm-flags-cache.rs"
required-features = ["warm-flags-cache"]

[lints]
workspace = true

[dev-dependencies]
rstest = "0.26"
assert-json-diff = { workspace = true }
common-s3 = { path = "../common/s3" }
reqwest = { workspace = true }
futures = "0.3.30"
test-case = "3.3.1"
tokio = { workspace = true, features = ["test-util"] }
tokio-util = { workspace = true }
metrics-util = { workspace = true }
