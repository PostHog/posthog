# Rules for the determinator crate.
#
# Custom rules are processed before default rules. Default rules already handle:
#   - .cargo/config, .cargo/config.toml → mark-changed = "all"
#   - Cargo.toml (workspace root) → mark-changed = "all"
#   - Cargo.lock → mark-changed = [] (ignored — we override below)
#   - README, LICENSE, .gitignore, etc. → mark-changed = []
#
# Paths are workspace-relative (strip the `rust/` repo prefix before passing).

use-default-rules = true

# Cargo.lock: When two graphs are available (--base-ref mode), the determinator
# diffs resolved dependency versions directly — no rule needed. When only one
# graph is available (fallback), compute_affected() handles the rebuild-all
# logic in code. Either way, this rule is not needed here.
#
# The default determinator rule for Cargo.lock is mark-changed = [] (ignore),
# which is what we want — the diff or the code handles it.

# Dockerfiles and CI image config — cross-cutting build changes.
[[path-rule]]
globs = ["Dockerfile", "Dockerfile.sqlx-migrate", "../.github/rust-images.yml"]
mark-changed = "all"

# sqlx offline query metadata — affects all sqlx-using crates.
[[path-rule]]
globs = [".sqlx/**"]
mark-changed = "all"

# CI workflow files outside the workspace — not crate source.
# (rust-images.yml is handled above as it drives image builds.)
[[path-rule]]
globs = ["../.github/**"]
mark-changed = []

# Proto files trigger the two build-script crates that read them.
[[path-rule]]
globs = ["../proto/**"]
mark-changed = ["personhog-proto", "kafka-assigner-proto", "cymbal-proto"]

# Migration directories are not cargo crates. Tell the determinator to
# ignore them (don't try ancestor-walk package matching). The sqlx-migrate
# image trigger is handled in custom code outside the determinator.
[[path-rule]]
globs = [
    "persons_migrations/**",
    "behavioral_cohorts_migrations/**",
    "cyclotron-core/migrations/**",
    "cyclotron-node-migrations/**",
    "flags_read_store_migrations/**",
    "bin/migrate-*",
]
mark-changed = []
