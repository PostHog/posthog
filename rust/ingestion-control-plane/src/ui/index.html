<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ingestion control plane</title>
    <style>
      :root {
        --bg: #14161a;
        --panel: #1c1f26;
        --panel-2: #23272f;
        --border: #2c313b;
        --text: #e6e9ef;
        --muted: #8b93a1;
        --accent: #4f7cff;
        --good: #3fb950;
        --warn: #d29922;
        --error: #f85149;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .app { display: flex; min-height: 100vh; }

      /* sidebar */
      .side {
        flex: 0 0 210px; background: var(--panel); border-right: 1px solid var(--border);
        padding: 14px 10px; position: sticky; top: 0; height: 100vh;
      }
      .side .brand { font-weight: 600; font-size: 14px; padding: 4px 10px 14px; }
      .side .nav-item {
        display: block; padding: 8px 10px; border-radius: 6px; color: var(--muted);
        cursor: pointer; margin-bottom: 2px; font-size: 13px;
      }
      .side .nav-item:hover { background: var(--panel-2); color: var(--text); }
      .side .nav-item.active { background: var(--panel-2); color: var(--text); border-left: 2px solid var(--accent); }

      /* main */
      .main { flex: 1 1 auto; padding: 16px; min-width: 0; }
      .main h1 { font-size: 16px; margin: 0 0 4px; }
      .main .desc { color: var(--muted); margin: 0 0 14px; font-size: 12px; }

      .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
      .panel > h2 {
        font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
        color: var(--muted); margin: 0; padding: 10px 14px; border-bottom: 1px solid var(--border);
        display: flex; justify-content: space-between; align-items: center; gap: 8px;
      }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px 14px; }

      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 6px 14px; border-bottom: 1px solid var(--border); font-size: 12px; }
      th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
      td.mono, th.mono { font-family: var(--mono); }
      tr.clickable:hover td { background: rgba(79,124,255,0.06); cursor: pointer; }
      tr.selected td { background: rgba(79,124,255,0.1); }
      td .bar { height: 6px; border-radius: 3px; background: var(--accent); min-width: 2px; display: inline-block; vertical-align: middle; }
      td .bar.hot { background: var(--error); }
      td .bar.warm { background: var(--warn); }

      .pill { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
      .pill.good { background: rgba(63,185,80,0.16); color: var(--good); }
      .pill.warn { background: rgba(210,153,34,0.16); color: var(--warn); }
      .pill.bad { background: rgba(248,81,73,0.16); color: var(--error); }
      .pill.muted { background: rgba(139,147,161,0.18); color: var(--muted); }
      .pill.accent { background: rgba(79,124,255,0.18); color: #a9c0ff; }

      button, select {
        background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
        border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: inherit;
      }
      button:hover { border-color: var(--accent); }
      button:disabled { opacity: 0.5; cursor: default; }
      button:disabled:hover { border-color: var(--border); }
      input.search {
        background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
        border-radius: 6px; padding: 5px 10px; font-size: 12px; font-family: inherit; width: 240px;
      }
      input.search:focus { outline: none; border-color: var(--accent); }
      .toolbar { border-bottom: 1px solid var(--border); }
      .toolbar .count { margin-left: auto; }
      .pager { border-top: 1px solid var(--border); justify-content: flex-end; }
      .ns-head {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
        margin: 0; padding: 12px 14px 6px; display: flex; align-items: baseline; gap: 8px;
      }
      .ns-head .ns { color: var(--text); font-family: var(--mono); text-transform: none; letter-spacing: 0; font-size: 12px; font-weight: 600; }
      button.small { padding: 2px 8px; font-size: 11px; }
      .muted { color: var(--muted); }
      .mono { font-family: var(--mono); }
      .empty { padding: 18px 14px; color: var(--muted); }
      .error-box { padding: 10px 14px; color: var(--error); font-family: var(--mono); font-size: 12px; white-space: pre-wrap; }

      .progress { background: var(--panel-2); border-radius: 4px; height: 8px; overflow: hidden; min-width: 160px; }
      .progress > div { background: var(--accent); height: 100%; transition: width 0.3s; }

      /* token breakdown */
      .token-block { border-bottom: 1px solid var(--border); }
      .token-head { display: flex; gap: 10px; align-items: center; padding: 9px 14px; background: var(--panel-2); flex-wrap: wrap; }
      .token-head .tok { font-family: var(--mono); cursor: pointer; }
      .token-head .tok:hover { color: #a9c0ff; }
      .token-head .share { margin-left: auto; display: flex; gap: 10px; align-items: center; }
      .token-head .bar { height: 7px; border-radius: 3px; background: var(--accent); }
      .token-cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 4px 20px; padding: 8px 14px 12px; }
      .token-cols h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 4px 0; }
      .krow { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 12px; }
      .krow .key { font-family: var(--mono); flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
      .krow .key:hover { color: #a9c0ff; }
      .krow .cnt { color: var(--muted); font-family: var(--mono); font-size: 11px; flex: 0 0 auto; margin-left: auto; }
      .krow .kbar { height: 5px; border-radius: 3px; background: var(--accent); flex: 0 0 auto; }

      .cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; padding: 12px 14px; }
      .col h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0 0 6px; }
      .hist-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 11px; }
      .hist-row .lbl { flex: 0 0 70px; text-align: right; color: var(--muted); font-family: var(--mono); }
      .hist-row .hbar { height: 10px; border-radius: 2px; background: var(--accent); }
      .hist-row .hcnt { color: var(--muted); font-family: var(--mono); }

      /* Height is driven by the embedded document (same-origin), so the panel
         expands to fit the debug UI instead of squeezing it into a viewport box. */
      iframe.debug { width: 100%; min-height: 480px; border: 0; background: var(--bg); display: block; }
    </style>
  </head>
  <body>
    <div class="app">
      <nav class="side">
        <div class="brand">Ingestion control plane</div>
        <div id="nav"></div>
      </nav>
      <main class="main" id="content"></main>
    </div>

    <script>
      "use strict";

      // ---------- helpers ----------
      const el = (tag, attrs = {}, ...children) => {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (k === "class") node.className = v;
          else if (k.startsWith("on")) node.addEventListener(k.slice(2), v);
          else if (v === false || v === null || v === undefined) continue;
          else if (v === true) node.setAttribute(k, "");
          else node.setAttribute(k, v);
        }
        for (const child of children.flat()) {
          if (child === null || child === undefined) continue;
          node.append(child.nodeType ? child : document.createTextNode(child));
        }
        return node;
      };
      const fmtInt = (n) => (n === null || n === undefined ? "–" : Number(n).toLocaleString("en-US"));
      const fmtBytes = (n) => {
        if (n === null || n === undefined) return "–";
        const units = ["B", "KB", "MB", "GB"];
        let value = Number(n), unit = 0;
        while (value >= 1024 && unit < units.length - 1) { value /= 1024; unit++; }
        return `${value >= 100 ? value.toFixed(0) : value.toFixed(1)} ${units[unit]}`;
      };
      const fetchJSON = async (url, opts) => {
        const resp = await fetch(url, opts);
        const body = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(body.error || `${resp.status} ${resp.statusText}`);
        return body;
      };
      const copy = (text) => navigator.clipboard && navigator.clipboard.writeText(text);
      const copyable = (text, cls) =>
        el("span", { class: cls, title: `${text} (click to copy)`, onclick: () => copy(text) }, text);

      // Client-side search + pagination over an in-memory row list. The search
      // input is kept stable across re-renders so typing survives refreshes.
      function listView({ placeholder, pageSize, matches, renderTable, emptyText }) {
        let rows = [];
        const state = { query: "", page: 0 };
        const body = el("div", {});
        const count = el("span", { class: "muted mono count" });
        const search = el("input", {
          type: "search", class: "search", placeholder,
          oninput: () => { state.query = search.value.trim().toLowerCase(); state.page = 0; render(); },
        });
        const toolbar = el("div", { class: "row toolbar" }, search, count);

        function render() {
          const filtered = state.query ? rows.filter((row) => matches(row, state.query)) : rows;
          const pages = Math.max(1, Math.ceil(filtered.length / pageSize));
          state.page = Math.min(state.page, pages - 1);
          const pageRows = filtered.slice(state.page * pageSize, (state.page + 1) * pageSize);
          count.textContent = state.query ? `${fmtInt(filtered.length)} of ${fmtInt(rows.length)}` : fmtInt(rows.length);
          const children = [toolbar];
          if (!pageRows.length) {
            children.push(el("div", { class: "empty" }, state.query ? "No matches." : emptyText));
          } else {
            children.push(renderTable(pageRows));
          }
          if (pages > 1) {
            children.push(el("div", { class: "row pager" },
              el("button", { class: "small", disabled: state.page === 0, onclick: () => { state.page--; render(); } }, "‹ prev"),
              el("span", { class: "muted mono" }, `page ${state.page + 1} / ${pages}`),
              el("button", { class: "small", disabled: state.page >= pages - 1, onclick: () => { state.page++; render(); } }, "next ›")));
          }
          body.replaceChildren(...children);
        }

        return {
          body,
          setRows(next) { rows = next; render(); },
          rerender: render,
          reset() { search.value = ""; state.query = ""; state.page = 0; },
        };
      }

      // Section registry: extending the tool = appending an entry here.
      const SECTIONS = [];
      let activeSection = null;

      function navigate(id) {
        const section = SECTIONS.find((s) => s.id === id) || SECTIONS[0];
        if (activeSection && activeSection.unmount) activeSection.unmount();
        activeSection = section;
        for (const item of document.querySelectorAll(".nav-item")) {
          item.classList.toggle("active", item.dataset.id === section.id);
        }
        const content = document.getElementById("content");
        content.replaceChildren(
          el("h1", {}, section.title),
          el("p", { class: "desc" }, section.description)
        );
        section.mount(content);
        location.hash = section.id;
      }

      // ---------- section: partition lag ----------
      const lagSection = {
        id: "lag",
        title: "Lagging partitions",
        description:
          "All ingestion consumer groups sorted by outstanding messages. Drill into a group, then analyze what a lagging partition contains.",
        timers: [],
        selectedTarget: null,
        currentJobId: null,
        unmount() {
          this.timers.forEach(clearInterval);
          this.timers = [];
        },
        mount(root) {
          const overviewBody = el("div", {}, el("div", { class: "empty" }, "Scanning consumer groups…"));
          const overviewFetchedAt = el("span", { class: "muted mono", style: "text-transform: none; letter-spacing: 0" });
          const partitionsTitle = el("span", {}, "Partitions");
          const partitionsBody = el("div", {}, el("div", { class: "empty" }, "Select a consumer group above."));
          const analysisTitle = el("span", {}, "Analysis");
          const analysisBody = el("div", {}, el("div", { class: "empty" }, "Start an analysis from a partition row: head reads from the group's committed offset, tail samples the newest messages."));

          this.overviewView = listView({
            placeholder: "Filter by group or topic…",
            pageSize: 25,
            matches: (row, q) => row.group.toLowerCase().includes(q) || row.topic.toLowerCase().includes(q),
            renderTable: (rows) => this.renderOverviewTable(rows),
            emptyText: "No consumer targets configured.",
          });
          this.partitionsView = listView({
            placeholder: "Filter by partition…",
            pageSize: 100,
            matches: (p, q) => String(p.partition).includes(q),
            renderTable: (rows) => this.renderPartitionsTable(rows),
            emptyText: "No partitions.",
          });

          this.ui = { overviewBody, overviewFetchedAt, partitionsTitle, partitionsBody, analysisTitle, analysisBody };

          root.append(
            el("div", { class: "panel" },
              el("h2", {}, "Consumer groups", el("span", { class: "row", style: "padding:0" }, overviewFetchedAt, el("button", { class: "small", onclick: () => this.refreshOverview() }, "Refresh"))),
              overviewBody),
            el("div", { class: "panel" },
              el("h2", {}, partitionsTitle, el("button", { class: "small", onclick: () => this.refreshPartitions() }, "Refresh")),
              partitionsBody),
            el("div", { class: "panel" }, el("h2", {}, analysisTitle), analysisBody)
          );

          this.refreshOverview();
          this.timers.push(setInterval(() => this.pollJob(), 700));
        },

        async refreshOverview() {
          const { overviewBody, overviewFetchedAt } = this.ui;
          try {
            const data = await fetchJSON("api/lag/overview");
            overviewFetchedAt.textContent = `as of ${new Date(data.fetched_at).toLocaleTimeString()}`;
            this.overviewMaxLag = Math.max(1, ...data.groups.map((r) => r.total_lag ?? 0));
            this.overviewView.setRows(data.groups);
            overviewBody.replaceChildren(this.overviewView.body);
          } catch (e) {
            overviewBody.replaceChildren(el("div", { class: "error-box" }, String(e)));
          }
        },

        // Heat bars are scaled against the full result set, not the visible page,
        // so paging/filtering does not recalibrate the colors.
        renderOverviewTable(rows) {
          const maxLag = this.overviewMaxLag;
          return el("table", {},
            el("thead", {}, el("tr", {},
              el("th", {}, "group"), el("th", {}, "topic"), el("th", {}, "partitions"),
              el("th", {}, "lagging"), el("th", {}, "total lag"), el("th", {}, ""))),
            el("tbody", {}, rows.map((row) =>
              row.error
                ? el("tr", {},
                    el("td", { class: "mono" }, row.group),
                    el("td", { class: "mono" }, row.topic),
                    el("td", { colspan: "4" }, el("span", { class: "pill bad", title: row.error }, "scan failed")))
                : el("tr", { class: `clickable ${this.selectedTarget && row.group === this.selectedTarget.group && row.topic === this.selectedTarget.topic ? "selected" : ""}`, onclick: () => this.selectTarget(row) },
                    el("td", { class: "mono" }, row.group),
                    el("td", { class: "mono" }, row.topic),
                    el("td", { class: "mono" }, fmtInt(row.partitions)),
                    el("td", {}, row.lagging_partitions > 0
                      ? el("span", { class: "pill warn" }, fmtInt(row.lagging_partitions))
                      : el("span", { class: "pill good" }, "0")),
                    el("td", { class: "mono" }, fmtInt(row.total_lag)),
                    el("td", {}, row.total_lag > 0
                      ? el("span", { class: `bar ${row.total_lag > maxLag * 0.66 ? "hot" : row.total_lag > maxLag * 0.33 ? "warm" : ""}`, style: `width:${Math.max(2, (row.total_lag / maxLag) * 140)}px` })
                      : null))
            ))
          );
        },

        selectTarget(target) {
          this.selectedTarget = { group: target.group, topic: target.topic };
          this.overviewView.rerender();
          this.partitionsView.reset();
          this.refreshPartitions();
        },

        async refreshPartitions() {
          const { partitionsTitle, partitionsBody } = this.ui;
          if (!this.selectedTarget) return;
          partitionsTitle.textContent = `Partitions — ${this.selectedTarget.group} (${this.selectedTarget.topic})`;
          partitionsBody.replaceChildren(el("div", { class: "empty" }, "Scanning…"));
          try {
            const data = await fetchJSON(`api/lag?group=${encodeURIComponent(this.selectedTarget.group)}&topic=${encodeURIComponent(this.selectedTarget.topic)}`);
            this.partitionsMaxLag = Math.max(1, ...data.partitions.map((p) => p.lag));
            this.partitionsView.setRows(data.partitions);
            partitionsBody.replaceChildren(this.partitionsView.body);
          } catch (e) {
            partitionsBody.replaceChildren(el("div", { class: "error-box" }, String(e)));
          }
        },

        renderPartitionsTable(partitions) {
          const maxLag = this.partitionsMaxLag;
          return el("table", {},
            el("thead", {}, el("tr", {},
              el("th", {}, "partition"), el("th", {}, "low"), el("th", {}, "high"),
              el("th", {}, "committed"), el("th", {}, "lag"), el("th", {}, ""), el("th", {}, "analyze"))),
            el("tbody", {}, partitions.map((p) => {
              const width = Math.max(2, Math.round((p.lag / maxLag) * 140));
              const heat = p.lag === 0 ? "" : p.lag > maxLag * 0.66 ? "hot" : p.lag > maxLag * 0.33 ? "warm" : "";
              return el("tr", {},
                el("td", { class: "mono" }, String(p.partition)),
                el("td", { class: "mono" }, fmtInt(p.low_watermark)),
                el("td", { class: "mono" }, fmtInt(p.high_watermark)),
                el("td", { class: "mono" }, p.committed_offset === null ? "–" : fmtInt(p.committed_offset)),
                el("td", { class: "mono" }, fmtInt(p.lag)),
                el("td", {}, p.lag > 0 ? el("span", { class: `bar ${heat}`, style: `width:${width}px` }) : null),
                el("td", {},
                  el("button", { class: "small", onclick: () => this.startAnalysis(p.partition, "committed") }, "head"),
                  " ",
                  el("button", { class: "small", onclick: () => this.startAnalysis(p.partition, "tail") }, "tail"))
              );
            }))
          );
        },

        // One analysis at a time: starting a new one cancels and replaces the current.
        async startAnalysis(partition, mode) {
          if (this.currentJobId) {
            fetchJSON(`api/analyses/${this.currentJobId}`, { method: "DELETE" }).catch(() => {});
          }
          try {
            const resp = await fetchJSON("api/analyses", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ ...this.selectedTarget, partition, mode }),
            });
            this.currentJobId = resp.job_id;
            this.pollJob();
          } catch (e) {
            this.ui.analysisBody.replaceChildren(el("div", { class: "error-box" }, String(e)));
          }
        },

        async pollJob() {
          if (!this.currentJobId) return;
          const { analysisTitle, analysisBody } = this.ui;
          let job;
          try {
            job = await fetchJSON(`api/analyses/${this.currentJobId}`);
          } catch {
            return;
          }
          analysisTitle.textContent = `Analysis — ${job.spec.group} p${job.spec.partition} (${job.spec.mode})`;
          if (job.state === "running") {
            const pctDone = job.progress.target ? (job.progress.fetched / job.progress.target) * 100 : 100;
            analysisBody.replaceChildren(
              el("div", { class: "row" },
                el("span", { class: "pill accent" }, "running"),
                el("div", { class: "progress" }, el("div", { style: `width:${pctDone.toFixed(0)}%` })),
                el("span", { class: "muted mono" },
                  `${fmtInt(job.progress.fetched)}/${fmtInt(job.progress.target)} messages · ${fmtBytes(job.progress.bytes_read)} · offset ${fmtInt(job.progress.current_offset)}`),
                el("button", { class: "small", onclick: () => fetchJSON(`api/analyses/${this.currentJobId}`, { method: "DELETE" }) }, "cancel"))
            );
          } else if (job.state === "failed") {
            analysisBody.replaceChildren(el("div", { class: "error-box" }, job.error || "analysis failed"));
            this.currentJobId = null;
          } else if (job.result) {
            analysisBody.replaceChildren(renderAnalysisResult(job));
            this.currentJobId = null;
          }
        },
      };

      function renderAnalysisResult(job) {
        const r = job.result;
        const chips = el(
          "div",
          { class: "row" },
          el("span", { class: "pill accent" }, `${fmtInt(r.messages_analyzed)} messages`),
          el("span", { class: "pill muted" }, `offsets ${fmtInt(job.spec.start_offset)} → ${fmtInt(r.next_offset)}`),
          el("span", { class: "pill muted" }, `${r.duration_ms} ms`),
          el("span", { class: "pill muted" }, fmtBytes(r.sizes.total_bytes)),
          r.truncated_reason ? el("span", { class: "pill warn" }, `truncated: ${r.truncated_reason}`) : null,
          r.flags.historical_migration ? el("span", { class: "pill warn" }, `historical: ${fmtInt(r.flags.historical_migration)}`) : null,
          r.flags.force_disable_person_processing ? el("span", { class: "pill muted" }, `no-person: ${fmtInt(r.flags.force_disable_person_processing)}`) : null,
          r.flags.missing_headers ? el("span", { class: "pill bad" }, `missing headers: ${fmtInt(r.flags.missing_headers)}`) : null,
          r.flags.missing_token ? el("span", { class: "pill bad" }, `missing token: ${fmtInt(r.flags.missing_token)}`) : null,
          r.token_overflow ? el("span", { class: "pill warn" }, `token overflow: ${fmtInt(r.token_overflow)}`) : null
        );

        const topList = (title, rows) => {
          const max = Math.max(1, ...rows.map((row) => row.count));
          return el("div", {},
            el("h3", {}, title),
            rows.length === 0 ? el("div", { class: "muted" }, "none") : null,
            rows.map((row) =>
              el("div", { class: "krow" },
                el("span", { class: "kbar", style: `width:${Math.max(3, (row.count / max) * 80)}px` }),
                copyable(row.key, "key"),
                el("span", { class: "cnt" }, `${fmtInt(row.count)} · ${row.pct.toFixed(1)}%`))
            )
          );
        };

        const maxTokenCount = Math.max(1, ...r.top_tokens.map((t) => t.count));
        const tokenBlocks = r.top_tokens.map((t) =>
          el("div", { class: "token-block" },
            el("div", { class: "token-head" },
              el("span", { class: t.team_id === null ? "pill muted" : "pill accent" }, t.team_id === null ? "team ?" : `team ${t.team_id}`),
              copyable(t.token, "tok"),
              el("span", { class: "share" },
                el("span", { class: "bar", style: `width:${Math.max(3, (t.count / maxTokenCount) * 160)}px` }),
                el("span", { class: "mono muted" }, `${fmtInt(t.count)} msgs · ${t.pct.toFixed(1)}% · ${fmtBytes(t.total_bytes)}`))),
            el("div", { class: "token-cols" },
              topList("events", t.top_events),
              topList(
                t.distinct_id_overflow
                  ? `distinct_ids (${fmtInt(t.distinct_ids_tracked)} tracked, ${fmtInt(t.distinct_id_overflow)} overflow)`
                  : "distinct_ids",
                t.top_distinct_ids
              ))
          )
        );

        // Cumulative histogram buckets -> per-bucket counts for display.
        let previous = 0;
        const histRows = [];
        const maxBucket = Math.max(1, ...r.sizes.histogram.map((b, i, arr) => b.count - (i ? arr[i - 1].count : 0)));
        for (const bucket of r.sizes.histogram) {
          const count = bucket.count - previous;
          previous = bucket.count;
          histRows.push(
            el("div", { class: "hist-row" },
              el("span", { class: "lbl" }, `≤ ${fmtBytes(bucket.le)}`),
              el("span", { class: "hbar", style: `width:${Math.max(1, (count / maxBucket) * 160)}px` }),
              el("span", { class: "hcnt" }, fmtInt(count)))
          );
        }
        const sizes = el("div", { class: "cols" },
          el("div", { class: "col" },
            el("h3", {}, "message size"),
            el("div", { class: "muted mono", style: "margin-bottom:6px" },
              `min ${fmtBytes(r.sizes.min)} · p50 ${fmtBytes(r.sizes.p50)} · p90 ${fmtBytes(r.sizes.p90)} · p99 ${fmtBytes(r.sizes.p99)} · max ${fmtBytes(r.sizes.max)}`),
            histRows));

        return el("div", {}, chips, ...tokenBlocks, sizes);
      }

      // ---------- section: consumer debug ----------
      const debugSection = {
        id: "debug",
        title: "Consumer debug",
        description: "Live ingestion-consumer pods; selecting one opens its full routing debug UI, backed by this service's per-pod proxy.",
        unmount() {},
        mount(root) {
          const podsBody = el("div", {}, el("div", { class: "empty" }, "Loading pods…"));
          const viewer = el("div", {});
          this.ui = { podsBody, viewer };
          root.append(
            el("div", { class: "panel" },
              el("h2", {}, "Pods", el("button", { class: "small", onclick: () => this.refreshPods() }, "Refresh")),
              podsBody),
            viewer
          );
          this.refreshPods();
        },

        async refreshPods() {
          const { podsBody } = this.ui;
          try {
            const data = await fetchJSON("api/pods");
            if (!data.pods.length) {
              podsBody.replaceChildren(el("div", { class: "empty" }, "No matching pods found."));
              return;
            }
            // One group per namespace: each ingestion lane deploys into its own.
            const byNamespace = new Map();
            for (const pod of data.pods) {
              const ns = pod.namespace || "–";
              if (!byNamespace.has(ns)) byNamespace.set(ns, []);
              byNamespace.get(ns).push(pod);
            }
            podsBody.replaceChildren(
              ...[...byNamespace.entries()].map(([ns, pods]) =>
                el("div", {},
                  el("h3", { class: "ns-head" },
                    el("span", { class: "ns" }, ns),
                    el("span", {}, `${pods.length} pod${pods.length === 1 ? "" : "s"}`)),
                  el("table", {},
                    el("thead", {}, el("tr", {}, el("th", {}, "pod"), el("th", {}, "ip"), el("th", {}, "phase"), el("th", {}, "restarts"), el("th", {}, "started"))),
                    el("tbody", {}, pods.map((pod) =>
                      el("tr", { class: `clickable ${pod.name === this.selectedPod ? "selected" : ""}`, onclick: () => this.selectPod(pod) },
                        el("td", { class: "mono" }, pod.name),
                        el("td", { class: "mono" }, pod.ip || "–"),
                        el("td", {}, el("span", { class: `pill ${pod.ready ? "good" : "warn"}` }, pod.phase || "?")),
                        el("td", { class: "mono" }, String(pod.restarts)),
                        el("td", { class: "muted mono" }, pod.started_at ? new Date(pod.started_at).toLocaleString() : "–"))
                    ))
                  )
                )
              )
            );
          } catch (e) {
            podsBody.replaceChildren(el("div", { class: "error-box" }, String(e)));
          }
        },

        selectPod(pod) {
          this.selectedPod = pod.name;
          this.refreshPods();
          const url = `pods/${encodeURIComponent(pod.namespace)}/${encodeURIComponent(pod.name)}/`;
          this.ui.viewer.replaceChildren(
            el("div", { class: "panel" },
              el("h2", {}, `Debug — ${pod.name}`,
                el("a", { href: url, target: "_blank", style: "color: var(--accent); font-size: 11px; text-transform: none; letter-spacing: 0" }, "open in new tab ↗")),
              el("iframe", { class: "debug", src: url, onload: (e) => this.autosize(e.target) }))
          );
        },

        // Grow the iframe to fit the embedded debug page (same-origin via our
        // proxy) so the outer page scrolls instead of nesting a scrollbar.
        autosize(frame) {
          const doc = frame.contentDocument;
          if (!doc || !doc.body) return;
          // Measure the body, not documentElement: the latter is floored at the
          // iframe's own height, which would let the frame grow but never shrink.
          const resize = () => {
            frame.style.height = `${Math.max(480, doc.body.scrollHeight)}px`;
          };
          // Disconnect once the frame is replaced so switching pods doesn't
          // accumulate observers retaining detached iframe documents.
          const observer = new ResizeObserver(() => {
            if (!frame.isConnected) {
              observer.disconnect();
              return;
            }
            resize();
          });
          resize();
          observer.observe(doc.body);
        },
      };

      // ---------- boot ----------
      SECTIONS.push(lagSection, debugSection);
      const nav = document.getElementById("nav");
      for (const section of SECTIONS) {
        nav.append(el("span", { class: "nav-item", "data-id": section.id, onclick: () => navigate(section.id) }, section.title));
      }
      navigate(location.hash.replace("#", "") || SECTIONS[0].id);
    </script>
  </body>
</html>
