[package]
name = "cymbal-symbolication"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
common-metrics = { path = "../../../common/metrics" }
common-types = { path = "../../../common/types" }
cymbal-domain = { path = "../domain" }
cymbal-symbol-store = { path = "../symbol-store", features = ["test-utils"] }
metrics = { workspace = true }
posthog-symbol-data = { path = "../../../common/symbol_data" }
proguard = "5.6.2"
regex = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
sourcemap = "9.0.0"
sqlx = { workspace = true }
symbolic = { version = "12.12", features = ["sourcemapcache", "demangle"] }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
mockall = { workspace = true }

[lints]
workspace = true
