[build-system]
# `maturin` is fetched into an isolated PEP-517 build environment, so no
# system install (or `cargo install maturin`) is required to build the wheel
# in CI or on a contributor's machine. The only host requirements are a
# Python interpreter, `uv` / `pip`, and a Rust toolchain. (Same arrangement
# as rust/hogql/parser.)
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "deltalite"
# Mirrors `rust/deltalite/python/Cargo.toml` (always identical); bump both together.
version = "0.1.0"
description = "Streaming partition upsert for Delta tables, replacing delta-rs SQL MERGE"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "PostHog" }]
license = "MIT"
classifiers = [
    "Development Status :: 4 - Beta",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Rust",
]

[project.urls]
Repository = "https://github.com/PostHog/posthog"
Issues = "https://github.com/PostHog/posthog/issues"

[tool.maturin]
module-name = "deltalite"
# Build using the workspace at `rust/Cargo.toml`. Maturin walks up from the
# crate's `Cargo.toml` to find it automatically.
features = ["pyo3/extension-module"]
