# napi-rs binding exposing the Rust HogVM to Node for the perf comparison (and, eventually,
# production ingestion). Its own [workspace] table keeps it out of the parent rust/ workspace
# build; build it explicitly (`cargo build --release` here) or via scripts/run_ffi.sh.
[workspace]

[package]
name = "hogvm-node"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
hogvm = { path = ".." }
napi = { version = "2", default-features = false, features = ["napi8", "serde-json"] }
napi-derive = "2"
rayon = "1.10"
serde_json = "1.0"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
