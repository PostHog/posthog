[tool.uv]
required-version = ">=0.10.2"
add-bounds = "major"
exclude-newer = "7 days"
exclude-newer-package = { hogql-parser = false, hogql-parser-rs = false, posthoganalytics = false, pixelhog = false, django = false, modal = false, posthog-hogland = false }

[tool.uv.workspace]
members = ["tools/hogli"]

[tool.uv.sources]
hogli = { workspace = true }
infi-clickhouse-orm = { git = "https://github.com/PostHog/infi.clickhouse_orm", rev = "4e3996becf66bf5c26580aff12a80425d9d56fe5" }
# pytest-split: pinned to PostHog's fork (immutable tag) for the order-preserving
# optimal_chunks split. Fork: PostHog/pytest-split (of jerry-git/pytest-split).
# To pull upstream fixes: rebase the fork's feat branch onto upstream, cut the next
# v0.11.0-posthog.N tag, and bump this pin.
pytest-split = { git = "https://github.com/PostHog/pytest-split", tag = "v0.11.0-posthog.6" }


[tool.isort]
profile = "black"

[tool.ruff]
line-length = 120
force-exclude = true
exclude = [
    ".git",
    "./.semgrep",
    "./nodejs/node_modules/",
    "./plugins/node_modules/",
    "./env",
    "./posthog/hogql/grammar",
    "products/*/skills/*/scripts",
]

[tool.ruff.lint]
ignore = [
    "B017",  # ~38: assertRaises(Exception) too broad
    "B904",  # ~488: raise without from in except
    "B905",  # ~153: zip() without strict=
    "C901",  # ~527: function too complex
    "E501",  # ~4697: line too long
    "E722",  # ~62: bare except
    "E731",  # ~185: lambda assignment
    "F541",  # ~1139: f-string missing placeholders
    "UP007",  # ~377: Union[X,Y] → X | Y (auto-fixable)
    "UP032",  # ~175: use f-string (auto-fixable)
    "UP045",  # ~3064: Optional[X] → X | None (auto-fixable)
    "UP046",  # ~39: generic class → PEP 695 (unsafe)
    "UP047",  # ~37: generic func → PEP 695 (unsafe)
    "UP042",  # ~28: str+Enum → StrEnum (unsafe: changes str()/format() output)
]
select = [
    "B",
    "C4",
    "C9",
    "DJ012",
    "E",
    "F",
    "I",
    "PLC0415",
    "RUF005",
    "RUF013",
    "RUF015",
    "RUF019",
    "T100",
    "T2",
    "TID253",
    "TRY201",
    "TRY400",
    "UP",
    "W",
]

[tool.ruff.lint.per-file-ignores]
# protoletariat generates .pyi stubs with re-exports (e.g. `from . import person_pb2`)
# that type checkers need to resolve the package structure.
# protobuf 5.x _pb2.py files have side-effect-only imports that load dependency
# descriptors into the pool before AddSerializedFile() — ruff must not strip them.
"posthog/personhog_client/proto/generated/**/*.pyi" = ["F401"]
"posthog/personhog_client/proto/generated/**/*_pb2.py" = ["F401", "E402"]
# Django settings aggregator: star imports are how settings modules merge into one namespace.
# Not portable to explicit re-exports without losing the settings-loading semantics.
"posthog/settings/**" = ["F403", "F405"]

# PLC0415 exemptions. products/ and services/llm-gateway/ have their own ruff configs.
# Run `ruff check <path> --select PLC0415 --statistics` before removing an entry.
".github/**" = ["PLC0415"]
"bin/**" = ["PLC0415"]
"common/**" = ["PLC0415"]
"ee/**" = ["PLC0415"]
"manage.py" = ["PLC0415"]
"posthog/**" = ["PLC0415"]
"scripts/**" = ["PLC0415"]
"services/stripe-mock/**" = ["PLC0415"]
"tools/**" = ["PLC0415"]

[tool.ruff.lint.flake8-tidy-imports]
# Heavy SDKs that noticeably slow startup. They must be imported lazily (inside the
# function that uses them), not at module top, so they stay off the Django app-load path.
# Only modules with a single, already-lazy call site are listed — vendor source/destination
# leaf modules legitimately import their own SDK at module level and are loaded on demand.
banned-module-level-imports = ["elevenlabs", "matplotlib", "trafilatura"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.isort]
combine-as-imports = true
force-wrap-aliases = true
length-sort-straight = true
split-on-trailing-comma = false
section-order = [
    "future",
    "standard-library",
    "testing",
    "django",
    "third-party",
    "posthog.schema",
    "posthog.hogql",
    "posthog",
    "products",
    "first-party",
    "local-folder",
]

[tool.ruff.lint.isort.sections]
"django" = ["django"] # Group all Django imports into a separate section.
"testing" = [ # Group all testing imports into a separate section.
    "freezegun",
    "pytest",
    "unittest",
    "posthog.test.base",
]
# Separate groups for our own stuff
"posthog.schema" = ["posthog.schema"]
"posthog.hogql" = ["posthog.hogql"]
"posthog" = ["posthog"]
"products" = ["products"]

[tool.dagster]
python_version = "3.13"

[tool.mypy]
python_version = "3.13"
plugins = [
    "mypy_django_plugin.main",
    "mypy_drf_plugin.main",
    "pydantic.mypy",
]
strict_optional = true
no_implicit_optional = true
warn_unused_ignores = true
check_untyped_defs = true
warn_unreachable = true
strict_equality = true
ignore_missing_imports = true
exclude_gitignore = true
# conftest.py: the root pytest bootstrap collides with services/stripe-mock/tests/conftest.py
# (both resolve to top-level module "conftest")
exclude = ["^(bin/.*|tools/.*|products/[^/]+/skills/[^/]+/scripts/.*|gunicorn\\.config\\.py|manage\\.py|conftest\\.py)$"]

[[tool.mypy.overrides]]
module = "bin.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "posthog.hogql.grammar.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "posthog.tasks.*"
disallow_untyped_defs = true
check_untyped_defs = true

[tool.django-stubs]
django_settings_module = "posthog.settings"

[tool.pyright]
venvPath = ".flox/cache"
venv = "venv"
pythonVersion = "3.13"

[tool.ty.environment]
python-version = "3.13"

[tool.ty.src]
exclude = [
    "bin/**",
    "manage.py",
    "posthog/hogql/grammar/**",
    "posthog/personhog_client/proto/generated/**",
    "posthog/schema.py",
    "posthog/schema_enums.py",
    "posthog/temporal/proxy_service/proto/**",
]

# ---------------------------------------------------------------------------
# import-linter: enforce internal product architecture
# ---------------------------------------------------------------------------
# Ensures products follow the facade pattern internally:
# presentation → facade → logic/models (not shortcuts).
# Complements tach (inter-module boundaries) with intra-product enforcement.

[tool.importlinter]
root_packages = ["products"]

# Presentation must only reach product internals through the facade.
# Forbid all backend imports, then allowlist facade + self-imports.
# This catches any new internal modules (cache.py, helpers.py, etc.)
# automatically — no blocklist to maintain.
[[tool.importlinter.contracts]]
name = "presentation must use facade"
type = "forbidden"
source_modules = ["products.*.backend.presentation"]
forbidden_modules = [
    "products.*.backend",
]
allow_indirect_imports = true
ignore_imports = [
    # Allowed: presentation can import facade and itself
    "products.**.backend.presentation.** -> products.**.backend.facade.**",
    "products.**.backend.presentation.** -> products.**.backend.presentation.**",
    # TODO: existing violations — fix by routing through facade
    "products.agent_platform.backend.presentation.serializers -> products.agent_platform.backend.models",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.db",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.logic.internal_jwt",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.logic.janitor_client",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.logic.kernel_skills",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.logic.posthog_identity_app",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.logic.skill_editing",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.logic.skill_resolution",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.logic.spec_schema",
    "products.agent_platform.backend.presentation.views -> products.agent_platform.backend.models",
    "products.mcp_analytics.backend.presentation.views -> products.mcp_analytics.backend.logic",
    "products.mcp_analytics.backend.presentation.views -> products.mcp_analytics.backend.models",
    "products.mcp_analytics.backend.presentation.serializers -> products.mcp_analytics.backend.models",
    "products.mcp_store.backend.presentation.views -> products.mcp_store.backend.models",
    "products.mcp_store.backend.presentation.views -> products.mcp_store.backend.oauth",
    "products.mcp_store.backend.presentation.views -> products.mcp_store.backend.proxy",
    "products.mcp_store.backend.presentation.views -> products.mcp_store.backend.tasks",
    "products.mcp_store.backend.presentation.views -> products.mcp_store.backend.tools",
    "products.notifications.backend.presentation.views -> products.notifications.backend.cache",
    "products.notifications.backend.presentation.views -> products.notifications.backend.models",
    "products.tracing.backend.presentation.views -> products.tracing.backend.logic",
    "products.tracing.backend.presentation.views -> products.tracing.backend.sparkline_query_runner",
    "products.tracing.backend.presentation.views -> products.tracing.backend.has_spans_query_runner",
    # Saved-views ModelViewSet needs the model class for its serializer; same accepted pattern as
    # logs' views_api. TODO: route through facade with the broader presentation cleanup.
    "products.tracing.backend.presentation.views_api -> products.tracing.backend.models",
    "products.user_interviews.backend.presentation.views -> products.user_interviews.backend.models",
    "products.user_interviews.backend.presentation.views -> products.user_interviews.backend.invite_email",
    "products.user_interviews.backend.presentation.webhooks -> products.user_interviews.backend.models",
    # logs presentation isolation (temporary): the moved viewsets still reach in-product
    # internals directly. Removed by the follow-up that thins each viewset to go through
    # the facade.
    "products.logs.backend.presentation.views.api -> products.logs.backend.count_query_runner",
    "products.logs.backend.presentation.views.api -> products.logs.backend.count_ranges_query_runner",
    "products.logs.backend.presentation.views.api -> products.logs.backend.group_by_query_runner",
    "products.logs.backend.presentation.views.api -> products.logs.backend.has_logs_query_runner",
    "products.logs.backend.presentation.views.api -> products.logs.backend.log_attributes_query_runner",
    "products.logs.backend.presentation.views.api -> products.logs.backend.log_facet_values_query_runner",
    "products.logs.backend.presentation.views.api -> products.logs.backend.log_values_query_runner",
    "products.logs.backend.presentation.views.api -> products.logs.backend.logs_query_runner",
    "products.logs.backend.presentation.views.api -> products.logs.backend.patterns_query_runner",
