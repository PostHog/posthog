[sandbox_workspace_write]
# Flox and dependency managers keep mutable caches outside the worktree.
writable_roots = [
    "~/.cache/flox",
    "~/.cache/node",
    "~/.cache/uv",
    "~/.local/share/flox",
    "~/.local/share/pnpm",
    "~/Library/pnpm",
]
network_access = false

[shell_environment_policy]
# Codex can inherit Flox from the source checkout that spawned its worktree.
# Commands should activate this worktree instead of trusting those markers.
exclude = [
    "CONDA_*",
    "DIRENV_*",
    "FLOX_*",
    "PYTHONPATH",
    "UV_PROJECT_ENVIRONMENT",
    "VIRTUAL_ENV*",
    "_FLOX_*",
]
# xdist opens a loopback socket even without parallel workers, which the
# Codex sandbox blocks.
set = { PYTEST_ADDOPTS = "-p no:xdist" }

[mcp_servers.phrocs]
command = "bash"
args = [".codex/with-flox", "uv", "run", "--no-sync", "python", "tools/phrocs/mcp_server.py"]
startup_timeout_sec = 120

[mcp_servers.posthog-local]
url = "http://localhost:8787/mcp"
