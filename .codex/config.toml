developer_instructions = """
Run commands that depend on PostHog's development environment through
`bash "$(git rev-parse --show-toplevel)/.codex/with-flox" run <command> [args...]`.
This includes hogli, Python, Node.js, Rust, and Go commands. Use the `deps` mode
for commands that install or update dependencies, including uv and pnpm add,
install, lock, sync, and update commands. Use the `stack` mode for commands that
need Docker or local service access, including hogli up, down, wait,
services:ready, dev:reset, and docker:* commands. Basic filesystem, Git, and
GitHub commands can run directly. Never use a dependency executable inherited
from another checkout. If the wrapper reports that a mode needs elevated
execution, rerun that exact wrapper command with elevated permissions.
"""

[sandbox_workspace_write]
# Flox and dependency managers keep mutable caches outside the worktree.
writable_roots = [
    "~/.cache/flox",
    "~/.cache/node",
    "~/.cache/uv",
    "~/.local/share/flox",
    "~/.local/share/pnpm",
    "~/Library/pnpm",
]
network_access = false

[shell_environment_policy]
# Keep another checkout's Flox, virtualenv, and compiler paths out of commands.
inherit = "core"
# xdist opens a loopback socket even without parallel workers, which the
# Codex sandbox blocks.
set = { PATH = "/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin", PYTEST_ADDOPTS = "-p no:xdist" }

[mcp_servers.phrocs]
command = "bash"
args = [".codex/with-flox", "mcp", "python", "tools/phrocs/mcp_server.py"]
cwd = ".."
startup_timeout_sec = 120

[mcp_servers.posthog-local]
url = "http://localhost:8787/mcp"
