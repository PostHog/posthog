<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Dev knowledge graph — the system that builds the systems</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #131015; color: #eee; font: 13px/1.45 -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  canvas { display: block; cursor: grab; }
  canvas.dragging { cursor: grabbing; }
  #hud { position: fixed; top: 0; left: 0; padding: 12px 16px; pointer-events: none; }
  #hud h1 { margin: 0 0 2px; font-size: 15px; }
  #hud .sub { color: #999; font-size: 11px; }
  #controls { position: fixed; top: 12px; right: 12px; width: 240px; background: #1d1a20cc; border: 1px solid #333; border-radius: 8px; padding: 10px 12px; backdrop-filter: blur(6px); }
  #controls input[type="search"], #controls select { width: 100%; box-sizing: border-box; background: #131015; color: #eee; border: 1px solid #444; border-radius: 5px; padding: 5px 8px; margin-bottom: 8px; }
  #controls label { display: flex; align-items: center; gap: 6px; padding: 2px 0; cursor: pointer; }
  #controls .section { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin: 6px 0 2px; }
  .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .count { color: #777; font-variant-numeric: tabular-nums; margin-left: auto; }
  #panel { position: fixed; bottom: 12px; left: 12px; max-width: 480px; max-height: 60vh; overflow: auto; background: #1d1a20ee; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; display: none; }
  #panel h2 { margin: 0 0 4px; font-size: 14px; }
  #panel .meta { color: #999; font-size: 11px; margin-bottom: 6px; }
  #panel .detail { color: #ccc; }
  #panel .detail p { margin: 6px 0; }
  #panel .detail ul { margin: 6px 0; padding-left: 18px; }
  #panel .detail code { background: #2a2630; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  #panel a { color: #f7a501; }
  #hint { position: fixed; bottom: 12px; right: 12px; color: #777; font-size: 11px; pointer-events: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <h1>Dev knowledge graph</h1>
  <div class="sub" id="stats"></div>
</div>
<div id="controls">
  <input id="search" type="search" placeholder="Search the map…" />
  <select id="userFilter"></select>
  <div id="filters"></div>
</div>
<div id="panel"></div>
<div id="hint">click to drill in / back out · drag to pan · scroll to zoom</div>
<script>
const GRAPH = /*__GRAPH_DATA__*/null;
const LAYERS = GRAPH.layers;
const KIND_COLORS = { learning: "#e0407b", skill: "#bfb6cc", task: "#5a83a8" };
const ROW_H = 30;
const COL_W = 230;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
}
window.addEventListener("resize", resize);
resize();

const nodes = GRAPH.nodes.map((n) => ({ ...n, x: 0, y: 0, tx: 0, ty: 0, placed: false, side: 1 }));
const byId = new Map(nodes.map((n) => [n.id, n]));

// Tree structure: every node gets ONE primary parent so the layout is a real
// mind map. A learning's extra concepts (and a skill's extra learnings) are
// shown in the detail panel, not as crossing lines.
const treeChildren = new Map(); // id -> [node] in insertion order
function addChild(parentId, node) {
  if (node.treeParent) return;
  node.treeParent = parentId;
  if (!treeChildren.has(parentId)) treeChildren.set(parentId, []);
  treeChildren.get(parentId).push(node);
}
const alsoAbout = new Map(); // node id -> [labels of secondary parents]
for (const n of nodes) {
  if (n.kind === "concept" && n.parent) addChild(n.parent, n);
}
for (const e of GRAPH.edges) {
  const s = byId.get(e.source), t = byId.get(e.target);
  if (!s || !t) continue;
  if (e.kind === "about") {
    if (s.treeParent) (alsoAbout.get(s.id) || alsoAbout.set(s.id, []).get(s.id)).push(t.label);
    else addChild(t.id, s);
  }
  if (e.kind === "encoded-in" || e.kind === "evidenced-by") {
    if (t.treeParent) (alsoAbout.get(t.id) || alsoAbout.set(t.id, []).get(t.id)).push(s.label);
    else addChild(s.id, t);
  }
}
const topLevel = nodes.filter((n) => n.kind === "concept" && !n.parent);

// --- visibility state ---
const expanded = new Set();
const enabledLayers = new Set(Object.keys(LAYERS));
const enabledKinds = new Set(["learning", "skill", "task"]);
let searchTerm = "";
let userFilter = "all";
let selected = null;

function matches(n) { return searchTerm && n.label.toLowerCase().includes(searchTerm); }
function authorOk(n) { return userFilter === "all" || !n.author || n.author === userFilter; }
function nodeAllowed(n) {
  if (!authorOk(n)) return false;
  if (n.kind === "concept") return enabledLayers.has(n.layer);
  return enabledKinds.has(n.kind);
}
function visibleChildren(n) {
  if (!expanded.has(n.id)) return [];
  return (treeChildren.get(n.id) || []).filter(nodeAllowed);
}
function expandableCount(n) {
  return (treeChildren.get(n.id) || []).filter(nodeAllowed).length;
}

// --- tidy-tree mind map layout ---
// Two halves around a virtual center root; within a side, rows are assigned
// leaf-first (parents centered on their children) so edges never cross.
const root = { id: "__root__", kind: "root", label: "PostHog", x: 0, y: 0, tx: 0, ty: 0, placed: true, side: 0 };
let laidOut = [];
function layout() {
  laidOut = [];
  const visible = topLevel.filter(nodeAllowed);
  // Balance sides by visible subtree size, preserving definition order per side.
  const sizes = new Map(visible.map((n) => [n.id, subtreeLeaves(n)]));
  const right = [], left = [];
  let rightSum = 0, leftSum = 0;
  for (const n of visible) {
    if (rightSum <= leftSum) { right.push(n); rightSum += sizes.get(n.id); }
    else { left.push(n); leftSum += sizes.get(n.id); }
  }
  for (const [sideNodes, sign] of [[right, 1], [left, -1]]) {
    let row = 0;
    const rows = [];
    for (const n of sideNodes) row = placeSubtree(n, 1, sign, row, rows);
    const offset = ((row - 1) / 2) * ROW_H;
    for (const [node, r] of rows) {
      node.tx = node.side * COL_W * node.col;
      node.ty = r * ROW_H - offset;
      if (!node.placed) {
        const from = node.treeParent && byId.get(node.treeParent) ? byId.get(node.treeParent) : root;
        node.x = from.x; node.y = from.y; node.placed = true;
      }
      laidOut.push(node);
    }
  }
}
function subtreeLeaves(n) {
  const kids = visibleChildren(n);
  if (!kids.length) return 1;
  return kids.reduce((sum, k) => sum + subtreeLeaves(k), 0);
}
function placeSubtree(n, col, sign, row, rows) {
  n.side = sign; n.col = col;
  const kids = visibleChildren(n);
  if (!kids.length) {
    rows.push([n, row]);
    return row + 1;
  }
  const start = row;
  for (const k of kids) row = placeSubtree(k, col + 1, sign, row, rows);
  rows.push([n, (start + row - 1) / 2]);
  return row;
}
layout();

function radiusOf(n) {
  if (n.kind === "root") return 9;
  if (n.kind === "concept") return n.col === 1 ? 8 : 6;
  return { learning: 6, skill: 5, task: 3.5 }[n.kind] || 5;
}
function colorOf(n) {
  if (n.kind === "root") return "#888";
  if (n.kind === "concept") return (LAYERS[n.layer] || {}).color || "#888";
  return KIND_COLORS[n.kind];
}

// --- render ---
let panX, panY, zoom = 1;
panX = W / 2; panY = H / 2;
function drawNodes() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);
  const drawn = [root, ...laidOut];
  // animate toward targets
  for (const n of drawn) {
    n.x += (n.tx - n.x) * 0.25;
    n.y += (n.ty - n.y) * 0.25;
  }
  // edges as horizontal beziers parent -> child
  ctx.lineWidth = 1 / zoom;
  for (const n of laidOut) {
    const p = n.treeParent && byId.get(n.treeParent) && laidOut.includes(byId.get(n.treeParent)) ? byId.get(n.treeParent) : root;
    const dim = searchTerm && !matches(n) && !subtreeHasMatch(n);
    ctx.strokeStyle = dim ? "#ffffff10" : "#ffffff2e";
    const x1 = p.x + Math.sign(n.tx - p.tx || 1) * radiusOf(p);
    const x2 = n.x - Math.sign(n.tx - p.tx || 1) * (radiusOf(n) + 2);
    const mx = (x1 + x2) / 2;
    ctx.beginPath();
    ctx.moveTo(x1, p.y);
    ctx.bezierCurveTo(mx, p.y, mx, n.y, x2, n.y);
    ctx.stroke();
  }
  for (const n of drawn) {
    const r = radiusOf(n);
    const isMatch = searchTerm && matches(n);
    const dim = searchTerm && !isMatch;
    ctx.globalAlpha = dim ? 0.25 : n.kind === "skill" && n.status === "proposed" ? 0.8 : 1;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, 7);
    ctx.fillStyle = colorOf(n);
    ctx.fill();
    if (n.kind === "skill" && n.status === "proposed") {
      ctx.setLineDash([3 / zoom, 3 / zoom]);
      ctx.strokeStyle = KIND_COLORS.skill; ctx.lineWidth = 1.2 / zoom;
      ctx.stroke(); ctx.setLineDash([]);
    }
    if (n === selected || isMatch) {
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5 / zoom;
      ctx.beginPath(); ctx.arc(n.x, n.y, r + 1.5, 0, 7); ctx.stroke();
    }
    // label, side-aware; collapsed nodes get a muted +N suffix
    const bold = n.kind === "root" || (n.kind === "concept" && n.col === 1);
    const size = bold ? 12.5 : 11.5;
    ctx.font = `${bold ? "600 " : ""}${size}px -apple-system, sans-serif`;
    const text = n.label.length > 46 ? n.label.slice(0, 45) + "…" : n.label;
    const extra = expandableCount(n) > 0 && !expanded.has(n.id) ? ` +${expandableCount(n)}` : "";
    const rightSide = n.side >= 0;
    ctx.fillStyle = n.kind === "concept" || n.kind === "root" ? "#eee" : "#b9b3c2";
    if (rightSide) {
      ctx.textAlign = "left";
      ctx.fillText(text, n.x + r + 5, n.y + 3.5);
      if (extra) { ctx.fillStyle = "#8a8494"; ctx.fillText(extra, n.x + r + 5 + ctx.measureText(text).width, n.y + 3.5); }
    } else {
      ctx.textAlign = "right";
      if (extra) { ctx.fillStyle = "#8a8494"; ctx.fillText(extra, n.x - r - 5, n.y + 3.5); }
      ctx.fillStyle = n.kind === "concept" ? "#eee" : "#b9b3c2";
      ctx.fillText(text, n.x - r - 5 - (extra ? ctx.measureText(extra).width : 0), n.y + 3.5);
    }
    ctx.textAlign = "start";
    ctx.globalAlpha = 1;
  }
}
function subtreeHasMatch(n) {
  if (matches(n)) return true;
  return (treeChildren.get(n.id) || []).some((k) => nodeAllowed(k) && subtreeHasMatch(k));
}
function loop() { drawNodes(); requestAnimationFrame(loop); }

// --- interaction: pan, zoom, click to drill ---
let panning = false, lastX = 0, lastY = 0, startX = 0, startY = 0;
function pick(mx, my) {
  const x = (mx - panX) / zoom, y = (my - panY) / zoom;
  let best = null, bestD = 1e9;
  for (const n of [root, ...laidOut]) {
    const d = Math.hypot(n.x - x, n.y - y);
    // generous horizontal hit area over the label too
    const labelHit = Math.abs(n.y - y) < ROW_H / 2 && (n.side >= 0 ? x >= n.x - 8 && x <= n.x + 170 : x <= n.x + 8 && x >= n.x - 170);
    if ((d < radiusOf(n) + 8 || labelHit) && d < bestD) { best = n; bestD = d; }
  }
  return best;
}
function collapseRecursive(id) {
  expanded.delete(id);
  for (const child of treeChildren.get(id) || []) collapseRecursive(child.id);
}
function activate(n) {
  if (n.kind === "root") return;
  if (expandableCount(n) > 0) {
    if (expanded.has(n.id)) collapseRecursive(n.id);
    else expanded.add(n.id);
    layout();
  }
  select(n);
}
canvas.addEventListener("mousedown", (ev) => {
  startX = lastX = ev.clientX; startY = lastY = ev.clientY;
  panning = true;
  canvas.classList.add("dragging");
});
window.addEventListener("mousemove", (ev) => {
  const dx = ev.clientX - lastX, dy = ev.clientY - lastY;
  lastX = ev.clientX; lastY = ev.clientY;
  if (panning) { panX += dx; panY += dy; }
});
window.addEventListener("mouseup", (ev) => {
  panning = false;
  canvas.classList.remove("dragging");
  if (Math.hypot(ev.clientX - startX, ev.clientY - startY) < 3) {
    const n = pick(ev.clientX, ev.clientY);
    if (n) activate(n);
  }
});
canvas.addEventListener("wheel", (ev) => {
  ev.preventDefault();
  const factor = Math.exp(-ev.deltaY * 0.0015);
  const nz = Math.min(Math.max(zoom * factor, 0.2), 6);
  panX = ev.clientX - ((ev.clientX - panX) / zoom) * nz;
  panY = ev.clientY - ((ev.clientY - panY) / zoom) * nz;
  zoom = nz;
}, { passive: false });

// --- detail panel with minimal markdown (escape first, then re-introduce) ---
function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function md(src) {
  return src.split(/\n{2,}/).map((block) => {
    const lines = block.split("\n").filter((l) => l.trim());
    const isList = lines.length > 0 && lines.every((l) => l.trim().startsWith("- "));
    const inline = (t) => esc(t)
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, (m, text, url) => `<a href="${url}" target="_blank" rel="noopener">${text}</a>`);
    if (isList) return "<ul>" + lines.map((l) => "<li>" + inline(l.trim().slice(2)) + "</li>").join("") + "</ul>";
    return "<p>" + inline(block) + "</p>";
  }).join("");
}
const panel = document.getElementById("panel");
function select(n) {
  selected = n;
  const layerLabel = n.kind === "concept" ? (LAYERS[n.layer] || {}).label : null;
  const also = alsoAbout.get(n.id) || [];
  panel.style.display = "block";
  panel.innerHTML = `
    <h2>${esc(n.label)}</h2>
    <div class="meta">${layerLabel ? esc(layerLabel) : n.kind}${n.status ? " · " + n.status : ""}${n.date ? " · " + n.date : ""}${n.author && n.author !== "unknown" ? " · by " + esc(n.author) : ""}${n.evidence_count ? ` · from ${n.evidence_count} conversations` : ""}
      ${n.url ? ` · <a href="${esc(n.url)}" target="_blank">open</a>` : ""}</div>
    ${n.markdown ? `<div class="detail">${md(n.markdown)}</div>` : ""}
    ${also.length ? `<div class="meta" style="margin-top:8px">also relates to: ${also.map(esc).join(" · ")}</div>` : ""}`;
}

// --- controls ---
const filters = document.getElementById("filters");
function addFilterSection(title) {
  const div = document.createElement("div");
  div.className = "section"; div.textContent = title;
  filters.appendChild(div);
}
addFilterSection("System areas");
for (const [layerId, layer] of Object.entries(LAYERS)) {
  const count = nodes.filter((x) => x.kind === "concept" && x.layer === layerId).length;
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" checked><span class="swatch" style="background:${layer.color}"></span>${esc(layer.label)}<span class="count">${count}</span>`;
  label.querySelector("input").addEventListener("change", (ev) => {
    ev.target.checked ? enabledLayers.add(layerId) : enabledLayers.delete(layerId);
    layout();
  });
  filters.appendChild(label);
}
addFilterSection("Knowledge");
for (const kind of Object.keys(KIND_COLORS)) {
  const count = nodes.filter((x) => x.kind === kind).length;
  if (kind === "task" && count === 0) continue;
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" checked><span class="swatch" style="background:${KIND_COLORS[kind]}"></span>${kind}<span class="count">${count}</span>`;
  label.querySelector("input").addEventListener("change", (ev) => {
    ev.target.checked ? enabledKinds.add(kind) : enabledKinds.delete(kind);
    layout();
  });
  filters.appendChild(label);
}
document.getElementById("search").addEventListener("input", (ev) => {
  searchTerm = ev.target.value.trim().toLowerCase();
  if (searchTerm) {
    // reveal matches by expanding every ancestor of a matching node
    for (const n of nodes) {
      if (!matches(n) || !nodeAllowed(n)) continue;
      let cursor = n;
      while (cursor.treeParent) {
        expanded.add(cursor.treeParent);
        cursor = byId.get(cursor.treeParent);
        if (!cursor) break;
      }
    }
  }
  layout();
});
const userSelect = document.getElementById("userFilter");
const authors = [...new Set(nodes.map((n) => n.author).filter((a) => a && a !== "unknown"))].sort();
userSelect.innerHTML = `<option value="all">Everyone</option>` + authors.map((a) => `<option value="${esc(a)}">${esc(a)}</option>`).join("");
userSelect.addEventListener("change", (ev) => { userFilter = ev.target.value; layout(); });
document.getElementById("stats").textContent =
  `${nodes.filter((n) => n.kind === "concept").length} concepts · ${nodes.filter((n) => n.kind === "learning").length} learnings · generated ${GRAPH.generated_at.slice(0, 16).replace("T", " ")} UTC`;
loop();
</script>
</body>
</html>
