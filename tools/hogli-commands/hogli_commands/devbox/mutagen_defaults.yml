sync:
    defaults:
        mode: one-way-safe
        ignore:
            vcs: true
            paths:
                # `vcs: true` ignores the `.git/` *directory*, but a git worktree
                # checkout (e.g. `/wt`) has `.git` as a *file* (gitdir pointer),
                # which it doesn't catch -- it would conflict with the remote's
                # real `.git` directory on every sync. Ignore the name outright.
                - '.git'

                # Per-language deps -- OS-incompatible, prewarmed on remote AMI.
                - 'node_modules'
                - '.venv'
                # PostHog's Python venv lives under `.flox/cache/venv` (flox), not
                # `.venv`; the whole `.flox/` tree is machine/OS-native and
                # per-box, so it must never propagate macOS binaries to the box.
                - '.flox'
                - '**/__pycache__'
                - '*.pyc'
                - '*.egg-info'
                - '.pnpm-store'
                - 'target'
                - 'rust/target'
                - 'funnel-udf/target'

                # Generated source (don't round-trip).
                - 'posthog/hogql/grammar/HogQLLexer.py'
                - 'posthog/hogql/grammar/HogQLLexer.interp'
                - 'posthog/hogql/grammar/HogQLLexer.tokens'
                - 'posthog/hogql/grammar/HogQLParser.py'
                - 'posthog/hogql/grammar/HogQLParser.interp'
                - 'posthog/hogql/grammar/HogQLParser.tokens'
                - 'posthog/hogql/grammar/HogQLParserVisitor.py'
                - 'common/hogql_parser'
                - 'frontend/types'
                - 'frontend/dist'
                - 'frontend/.cache'

                # Build outputs.
                - '.next'
                - 'dist'
                - 'build'
                - '.turbo'
                - '.parcel-cache'

                # Runtime / user-local state.
                - '.posthog/.generated'
                - '.dagster_home'
                - 'mprocs.log'
                - 'bin/start.lock'
                - '.env.local'

                # Editor / OS.
                - '.idea'
                - '.vscode'
                - '.cursor'
                - '.DS_Store'
