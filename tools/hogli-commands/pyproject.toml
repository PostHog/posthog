[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hogli-commands"
version = "0.0.0"
description = "Internal: PostHog-specific Click commands and boot hooks for the hogli framework. Not for distribution."
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "PostHog", email = "engineering@posthog.com" }
]
# `Private :: Do Not Upload` is the conventional guard against accidental
# PyPI uploads — the index rejects any package carrying it. This package is
# tightly coupled to the PostHog monorepo (hardcoded paths, internal tooling)
# and is consumed only as a uv workspace member.
classifiers = [
    "Private :: Do Not Upload",
    "Development Status :: 7 - Inactive",
    "Environment :: Console",
    "Programming Language :: Python :: 3",
]
# Base deps are deliberately light: click + pyyaml are enough to import every
# module listed in `config.boot_modules` before lazy command resolution.
# Heavy deps (pydantic for devenv, requests for telemetry, etc.) live in the
# `full` extra so partial CI installs (e.g. lint:workflows) don't pull them in.
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "hogli",
]

[project.optional-dependencies]
full = [
    "pydantic>=2.0",
    "requests>=2.28",
]

[tool.hatch.build.targets.wheel]
packages = ["hogli_commands"]
