[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hogli-commands"
version = "0.1.0"
description = "PostHog-specific Click commands and boot hooks for the hogli framework"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "PostHog", email = "engineering@posthog.com" }
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]
# Base deps are deliberately light: click + pyyaml are enough to import every
# module listed in `config.boot_modules` plus any lazy-loaded command stub.
# Heavy deps (pydantic for devenv, requests for telemetry, etc.) live in the
# `full` extra so partial CI installs (e.g. lint:workflows) don't pull them in.
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "hogli",
]

[project.optional-dependencies]
full = [
    "pydantic>=2.0",
    "requests>=2.28",
]

[tool.hatch.build.targets.wheel]
packages = ["hogli_commands"]
