        SurveySerializerCreateUpdateOnly:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                    readOnly: true
                name:
                    type: string
                    maxLength: 400
                description:
                    type: string
                type:
                    $ref: '#/components/schemas/SurveyType'
