        Property:
            type: object
            properties:
                type:
                    allOf:
                        - $ref: '#/components/schemas/PropertyGroupOperator'
                    default: AND
                    description: |2-

             You can use a simplified version:
            ```json
            {
                "properties": [
                    {
                        "key": "email",
                        "value": "x@y.com",
                        "operator": "exact",
                        "type": "event"
                    }
                ]
            }
            ```

            Or you can create more complicated queries with AND and OR:
            ```json
            {
                "properties": {
                    "type": "AND",
                    "values": [
                        {
                            "type": "OR",
                            "values": [
                                {"key": "email", ...},
                                {"key": "email", ...}
                            ]
                        },
                        {
                            "type": "AND",
                            "values": [
                                {"key": "email", ...},
                                {"key": "email", ...}
                            ]
                        }
                    ]
                ]
            }
            ```


            * `AND` - AND
            * `OR` - OR
