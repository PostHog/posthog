                        * `none` - none
                        * `umap` - umap
                        * `pca` - pca
                dimensionality_reduction_ndims:
                    type: integer
                    maximum: 500
                    minimum: 2
                    default: 100
                    description: Target dimensions for dimensionality reduction (ignored if
                        method is 'none')
                clustering_method:
                    allOf:
                        - $ref: '#/components/schemas/ClusteringMethodEnum'
                    default: hdbscan
                    description: |-
                        Clustering algorithm: 'hdbscan' (density-based, auto-determines k) or 'kmeans' (centroid-based)

                        * `hdbscan` - hdbscan
                        * `kmeans` - kmeans
                min_cluster_size_fraction:
                    type: number
                    format: double
                    maximum: 0.5
                    minimum: 0.02
                    default: 0.02
                    description: Minimum cluster size as fraction of total samples (e.g., 0.02
                        = 2%)
