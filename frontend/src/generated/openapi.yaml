                    type: integer
                    maximum: 100
                    minimum: 1
                    default: 5
                    description: HDBSCAN min_samples parameter (higher = more conservative clustering)
                kmeans_min_k:
                    type: integer
                    maximum: 50
                    minimum: 2
                    default: 2
                    description: Minimum number of clusters to try for k-means
                kmeans_max_k:
                    type: integer
                    maximum: 100
                    minimum: 2
                    default: 20
                    description: Maximum number of clusters to try for k-means
                run_label:
                    type: string
                    default: ''
