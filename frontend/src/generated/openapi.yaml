    /api/projects/{project_id}/persons/properties_at_time/:
        get:
            operationId: persons_properties_at_time_retrieve
            description: |-
                Get person properties as they existed at a specific point in time.

                This endpoint reconstructs person properties by querying ClickHouse events
                for $set and $set_once operations up to the specified timestamp.

                Query parameters:
                - distinct_id: The distinct_id of the person
                - timestamp: ISO datetime string for the point in time (e.g., "2023-06-15T14:30:00Z")
                - include_set_once: Whether to handle $set_once operations (default: false)
                - debug: Whether to include debug information with raw events (default: false)
            parameters:
                - in: query
                  name: debug
                  schema:
                      type: boolean
                  description: 'Whether to include debug information with raw events (only works
                      when DEBUG=True, default: false)'
                - in: query
                  name: distinct_id
                  schema:
                      type: string
                  description: The distinct_id of the person (mutually exclusive with person_id)
                - in: query
                  name: format
                  schema:
                      type: string
                      enum:
                          - csv
                          - json
                - in: query
                  name: include_set_once
                  schema:
                      type: boolean
                  description: 'Whether to handle $set_once operations (default: false)'
                - in: query
                  name: person_id
                  schema:
                      type: string
                  description: The person_id (UUID) to build properties for (mutually exclusive
                      with distinct_id)
                - in: path
                  name: project_id
                  required: true
                  schema:
                      type: string
                  description: Project ID of the project you're trying to access. To find the
                      ID of the project, make a call to /api/projects/.
                - in: query
                  name: timestamp
                  schema:
                      type: string
                  description: ISO datetime string for the point in time (e.g., '2023-06-15T14:30:00Z')
                  required: true
            tags:
                - persons
                - persons
            security:
                - PersonalAPIKeyAuth:
                      - person:read
            responses:
                '200':
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PersonPropertiesAtTimeResponse'
                        text/csv:
                            schema:
                                $ref: '#/components/schemas/PersonPropertiesAtTimeResponse'
                    description: ''
                '400':
                    content:
                        application/json:
                            schema:
                                description: Bad request - invalid parameters
                        text/csv:
                            schema:
                                description: Bad request - invalid parameters
                    description: ''
                '404':
