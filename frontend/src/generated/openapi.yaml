    /api/environments/{project_id}/llm_analytics/summarization/:
        post:
            operationId: llm_analytics_summarization_create
            description: "\nGenerate an AI-powered summary of an LLM trace or event.\n\n\
                This endpoint analyzes the provided trace/event, generates a line-numbered\
                \ text\nrepresentation, and uses an LLM to create a concise summary with line\
                \ references.\n\n**Summary Format:**\n- 5-10 bullet points covering main flow\
                \ and key decisions\n- \"Interesting Notes\" section for failures, successes,\
                \ or unusual patterns\n- Line references in [L45] or [L45-52] format pointing\
                \ to relevant sections\n\n**Use Cases:**\n- Quick understanding of complex\
                \ traces\n- Identifying key events and patterns\n- Debugging with AI-assisted\
                \ analysis\n- Documentation and reporting\n\nThe response includes the summary\
                \ text and optional metadata.\n        "
            parameters:
                - in: path
                  name: project_id
                  required: true
                  schema:
                      type: string
                  description: Project ID of the project you're trying to access. To find the
                      ID of the project, make a call to /api/projects/.
            tags:
                - LLM Analytics
                - llm_analytics
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SummarizeRequest'
                        examples:
                            TraceSummarization:
                                value:
                                    summarize_type: trace
                                    data:
                                        trace:
                                            id: trace_123
                                            properties:
                                                $ai_span_name: ChatBot Interaction
                                        hierarchy:
                                            - event:
                                                  id: gen_1
                                                  event: $ai_generation
                                                  properties:
                                                      $ai_input:
                                                          - role: user
                                                            content: Hello
                                                      $ai_output_choices:
                                                          - message:
                                                                role: assistant
                                                                content: Hi there!
                                              children: []
                                summary: Trace Summarization
                                description: Summarize a full trace with hierarchy
                            EventSummarization:
                                value:
                                    summarize_type: event
                                    data:
                                        event:
                                            id: gen_456
                                            event: $ai_generation
                                            properties:
                                                $ai_input:
                                                    - role: user
                                                      content: Explain Python
                                                $ai_output_choices:
                                                    - message:
                                                          role: assistant
                                                          content: Python is...
                                summary: Event Summarization
                                description: Summarize a single generation event
                    application/x-www-form-urlencoded:
                        schema:
                            $ref: '#/components/schemas/SummarizeRequest'
                    multipart/form-data:
                        schema:
                            $ref: '#/components/schemas/SummarizeRequest'
                required: true
            security:
                - PersonalAPIKeyAuth:
                      - llm_analytics:write
            responses:
                '200':
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SummarizeResponse'
                            examples:
                                SuccessResponse:
                                    value:
                                        summary: |-
                                            ## Summary
                                            - User initiated conversation with greeting [L5-8]
                                            - Assistant responded with friendly message [L12-15]

                                            ## Interesting Notes
                                            - Standard greeting pattern with no errors
                                        metadata:
                                            text_repr_length: 450
                                            model: gpt-4.1
                                    summary: Success Response
                    description: ''
                '400':
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                    description: ''
                '403':
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                    description: ''
                '500':
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                    description: ''
            x-explicit-tags:
                - LLM Analytics
                - llm_analytics
