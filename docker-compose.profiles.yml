# Docker Compose profile overlay — historical backwards-compatibility layer.
#
# This file exists only to retroactively gate services that were added to
# docker-compose.dev.yml before per-service `profiles:` was adopted there.
# It shadows those service definitions with a `profiles:` constraint so that
# `hogli dev:start` and CI can start only what's needed without breaking
# users who run `docker compose -f docker-compose.dev.yml up` directly
# (they get all services, same as before).
#
# DO NOT add new services here. New profile-gated services should define
# `profiles:` directly in docker-compose.dev.yml (see capture, plugins,
# ingestion-* for examples of the current pattern).
#
# Usage (legacy, for services still listed below):
#   docker compose -f docker-compose.dev.yml -f docker-compose.profiles.yml \
#     --profile temporal up
#
# Services not listed here have no profile constraint and always start.

services:
    # Temporal capability - workflow orchestration
    temporal:
        profiles: [temporal]
    temporal-ui:
        profiles: [temporal]
    temporal-admin-tools:
        profiles: [temporal]
    elasticsearch:
        profiles: [temporal]

    # Observability capability - tracing and logging
    otel-collector:
        profiles: [observability]
    jaeger:
        profiles: [observability]
    capture-logs:
        profiles: [observability]

    # Dev tools - debugging and monitoring UIs
    kafka_ui:
        profiles: [dev_tools]
    flower:
        profiles: [dev_tools]
    maildev:
        profiles: [dev_tools]
    webhook-tester:
        profiles: [dev_tools]

    # Replay capability - session recording storage
    seaweedfs:
        profiles: [replay]

    # Cloud provider emulators
    localstack:
        profiles: [localstack]
    objectstorage-azure:
        profiles: [azure]

    # Coordination - etcd for PersonHog and Kafka partition assignment
    etcd:
        profiles: [etcd]

    # DuckDB query server
    duckgres:
        profiles: [duckgres]

# Core services NOT listed = always start:
# - proxy, db, redis7, clickhouse, zookeeper, kafka, objectstorage, feature-flags
