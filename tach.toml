# Facade + views: the canonical public surface for all isolated products.

[[interfaces]]
expose = [
    "backend\\.facade.*",
    "backend\\.presentation\\.views.*",
    "backend\\.routes.*",
]
from = [
    "products\\.(customer_analytics|data_modeling|data_warehouse|demo|endpoints|error_tracking|experiments|mcp_analytics|mcp_store|metrics|notebooks|notifications|streamlit_apps|tasks|tracing|user_interviews|visual_review|warehouse_sources)",
]

# TODO: Experiments-specific temporary interface
# Remove this block once all ViewSets are migrated to products/experiments/backend/presentation/views.py

[[interfaces]]
expose = [
    "backend\\.presentation\\.experiments.*",
    "backend\\.presentation\\.saved_metrics.*",
]
from = [
    "products.experiments",
]

# Experiments is the first isolated product to register a Temporal workflow, so the canonical interface
# doesn't cover the registration surface yet. Narrowly expose the symbols core imports (worker registration,
# schedule registration, and the worker interceptor) rather than widening every isolated product's surface.

[[interfaces]]
expose = [
    "backend\\.temporal\\.ACTIVITIES",
    "backend\\.temporal\\.EXPERIMENT_CANARY_ACTIVITIES",
    "backend\\.temporal\\.EXPERIMENT_CANARY_WORKFLOWS",
    "backend\\.temporal\\.WORKFLOWS",
    "backend\\.temporal\\.recalculation_metrics.*",
    "backend\\.temporal\\.schedule\\.create_experiment_precompute_canary_schedule",
]
from = [
    "products.experiments",
]

# user_interviews exposes Vapi webhook handlers that are routed directly from posthog/urls.py.

[[interfaces]]
expose = [
    "backend\\.presentation\\.webhooks.*",
]
from = [
    "products.user_interviews",
]

# Legacy leaks — core (posthog/ee) imports these internals directly.
# Each block below should shrink as imports migrate to the facade.
# These products have had backend:contract-check removed from package.json
# so CI treats them as non-isolated until the leaks are cleaned up.

[[interfaces]]
expose = [
    "backend\\.analysis_health.*",
    "backend\\.experiment_saved_metric_service.*",
    "backend\\.experiment_service.*",
    "backend\\.hogql_queries.*",
    "backend\\.llm_metric_templates.*",
    "backend\\.max_tools.*",
    "backend\\.metric_utils.*",
    "backend\\.models.*",
    "stats\\..*",
]
from = [
    "products.experiments",
]

[[interfaces]]
expose = [
    "backend\\.admin.*",
    "backend\\.models.*",
    "backend\\.oauth.*",
]
from = [
    "products.mcp_store",
]

# warehouse_sources — facade landed (Phase 1 merge base); core (posthog/ee), sibling
# products, and data_warehouse still import its models, shared types, and temporal
# internals directly. Shrinks as the team-sliced read sweeps land and the deferred
# temporal couplings (HogQL direct-SQL, Google Search Console, the salesforce migration)
# move behind the facade. Keeps backend:contract-check off package.json (the temporal
# coupling is permanent). Also hosts the shared warehouse-table test helpers
# (test.utils, tests.api) that many products' tests use to build warehouse tables.
[[interfaces]]
expose = [
    "backend\\.models.*",
    "backend\\.types.*",
    "backend\\.temporal.*",
    "backend\\.test.*",
    "backend\\.tests.*",
]
from = [
    "products.warehouse_sources",
]

# data_modeling — facade landed; external consumers route through backend.facade.* now.
# This leak exposes its models only to frozen Django migrations (core + the data_warehouse
# model-migration) that reference the historical model classes directly and cannot route
# through a facade. Permanent (migrations are immutable), so backend:contract-check stays off.
[[interfaces]]
expose = [
    "backend\\.models.*",
]
from = [
    "products.data_modeling",
]


# legal_documents has a non-standard public surface — posthog/urls registers its pandadoc
# webhook (presentation.webhook), not the canonical presentation.views — so it gets a dedicated
# block rather than joining the canonical alternation above.
[[interfaces]]
expose = [
    "backend\\.facade.*",
    "backend\\.presentation.*",
    "backend\\.routes.*",
]
from = [
    "products.legal_documents",
]

# error_tracking exposes its ClickHouse DDL (sql / embedding / indexed_embedding) to
# core's ClickHouse schema + frozen migrations, and its models / remote_config to core
# model-class consumers (product_intent, remote_config, team deletion) and test fixtures.
# The frozen-migration coupling cannot be rerouted, so this block is permanent rather than
# shrinking to zero — which is why backend:contract-check stays off for this product.

[[interfaces]]
expose = [
    "backend\\.embedding.*",
    "backend\\.indexed_embedding.*",
    "backend\\.models.*",
    "backend\\.remote_config.*",
    "backend\\.sql.*",
]
from = [
    "products.error_tracking",
]

[[interfaces]]
expose = [
    "backend\\.logic.*",
]
from = [
    "products.tracing",
]

# TODO: legacy leaks — posthog/temporal/mcp_analytics/* and the dashboard
# integration import models / dashboard_templates / intent_clustering directly.
# Move those into the product (and through the facade) so this interface can
# shrink back to the isolated default.

[[interfaces]]
expose = [
    "backend\\.dashboard_templates.*",
    "backend\\.intent_clustering.*",
    "backend\\.models.*",
]
from = [
    "products.mcp_analytics",
]

