interfaces = []
layers = [
    "products",
    "non_isolated",
]
exclude = [
    ".*__pycache__",
    ".*egg-info",
    "docs",
    "tests",
]
source_roots = [
    ".",
]

[[modules]]
path = "<root>"
depends_on = [
    "ee",
    "posthog",
    "products.error_tracking",
    "products.event_definitions",
    "products.llm_analytics",
    "products.logs",
]

