# Facade + views: the canonical public surface for all isolated products.
[[interfaces]]
expose = [
    "backend\\.facade.*",
    "backend\\.presentation\\.views.*",
]
from = [
    "products\\.(experiments|mcp_analytics|mcp_store|metrics|notifications|tracing|user_interviews|visual_review)",
]

# TODO: Experiments-specific temporary interface
# Remove this block once all ViewSets are migrated to products/experiments/backend/presentation/views.py
[[interfaces]]
expose = [
    "backend\\.presentation\\.experiments.*",
    "backend\\.presentation\\.saved_metrics.*",
]
from = [
    "products.experiments",
]

# user_interviews exposes Vapi webhook handlers that are routed directly from posthog/urls.py.
[[interfaces]]
expose = [
    "backend\\.presentation\\.webhooks.*",
]
from = [
    "products.user_interviews",
]

# Legacy leaks — core (posthog/ee) imports these internals directly.
# Each block below should shrink as imports migrate to the facade.
# These products have had backend:contract-check removed from package.json
# so CI treats them as non-isolated until the leaks are cleaned up.

[[interfaces]]
expose = [
    "backend\\.analysis_health.*",
    "backend\\.experiment_saved_metric_service.*",
    "backend\\.experiment_service.*",
    "backend\\.llm_metric_templates.*",
    "backend\\.max_tools.*",
    "backend\\.metric_utils.*",
    "backend\\.models.*",
    "stats\\..*",
]
from = [
    "products.experiments",
]

[[interfaces]]
expose = [
    "backend\\.admin.*",
    "backend\\.models.*",
    "backend\\.oauth.*",
]
from = [
    "products.mcp_store",
]

[[interfaces]]
expose = [
    "backend\\.logic.*",
]
from = [
    "products.tracing",
]

# TODO: legacy leaks — posthog/temporal/mcp_analytics/* and the dashboard
# integration import models / dashboard_templates directly. Move those into
# the product (and through the facade) so this interface can shrink back to
# the isolated default.
[[interfaces]]
expose = [
    "backend\\.dashboard_templates.*",
    "backend\\.models.*",
]
from = [
    "products.mcp_analytics",
]

