              - 'products/error_tracking/backend/logic/recommendations/__init__.py'
              - 'products/error_tracking/backend/logic/tools/__init__.py'
              - 'products/legal_documents/backend/logic/__init__.py'
              - 'products/posthog_ai/backend/api/__init__.py'
              - 'products/posthog_ai/eval_harness/scorers/__init__.py'
              - 'products/product_analytics/backend/api/__init__.py'
              - 'products/product_tours/backend/api/__init__.py'
              - 'products/product_tours/backend/generate_tour_content/__init__.py'
              - 'products/product_tours/backend/llm/__init__.py'
              - 'products/revenue_analytics/backend/views/schemas/__init__.py'
              - 'products/revenue_analytics/backend/views/sources/events/__init__.py'
              - 'products/revenue_analytics/backend/views/sources/stripe/__init__.py'
              - 'products/surveys/backend/llm/__init__.py'
              - 'products/surveys/backend/summarization/__init__.py'
              - 'products/surveys/backend/summarization/llm/__init__.py'
              - 'products/web_analytics/backend/api/__init__.py'
              - 'products/wizard/backend/logic/__init__.py'
              - 'products/workflows/backend/providers/__init__.py'
      # Column-0 anchor: only flag eager, top-level re-exports. Indented ones (TYPE_CHECKING,
      # try/except ImportError, function-local) are already lazy and intentionally skipped.
      pattern-regex: '(?m)^from\s+\.'
      metadata:
          category: best-practice
          subcategory:
              - audit
