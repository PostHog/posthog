rules:
    - id: no-environments-router-register
      message: |
          Direct `environments_router.register(...)` is banned. `/api/projects/` is
          the canonical path; `/api/environments/` exists only as a back-compat
          alias for clients that integrated against it before the project↔environment
          split was rolled back.

          For new team-nested endpoints, register directly under `projects_router`
          with no env alias:

              projects_router.register(
                  r"my_thing", MyThingViewSet, "project_my_thing", ["team_id"],
              )

          `register_legacy_dual_route_team_nested_viewset(...)` in
          `posthog/api/__init__.py` exists only to preserve dual-route surfaces
          that already shipped — it is NOT a default for new endpoints. After
          the rollback there's no legitimate reason to register a new endpoint
          env-only; doing so means the project path is never generated by Orval
          and consumers are pinned to the deprecated surface.

          If you have a genuine edge case (e.g. an endpoint where the env-side
          and project-side need different parent lookups), add
          `# nosemgrep: no-environments-router-register` on the line with a
          short comment explaining why the helper doesn't fit.
      severity: ERROR
      languages: [python]
      paths:
          include:
              - 'posthog/api/__init__.py'
      patterns:
          - pattern: environments_router.register(...)
          # Exempt the helper's body by name. Listed explicitly so the
          # exemption can't be widened by wrapping a registration in any random
          # function.
          - pattern-not-inside: |
                def register_legacy_dual_route_team_nested_viewset(...):
                    ...
      metadata:
          category: best-practice
          subcategory:
              - audit
