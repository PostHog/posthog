# Warehouse-source HTTP calls must go through `make_tracked_session()` so they
# participate in HTTP logging, metrics, and sample capture (see
# posthog/temporal/data_imports/sources/common/http/). Direct `requests.<verb>`
# / `requests.Session()` / `httpx.Client(...)` calls bypass the transport.
# Type and exception imports (`from requests import Response`,
# `from requests.exceptions import ...`) remain allowed — only the network-call
# patterns are banned.
rules:
    - id: data-imports-http-transport-requests-session
      pattern: requests.Session(...)
      message: |
          Use `make_tracked_session(...)` from
          `posthog.temporal.data_imports.sources.common.http` instead of
          `requests.Session()`. The tracked session attaches `team_id`,
          `source_type`, schema/job IDs to logs and metrics for every
          outbound request, and participates in opt-in sample capture.

          If a vendor SDK constructs its own `Session` and exposes no hook
          to inject ours, add `# nosemgrep: data-imports-http-transport-requests-session`
          on the line above with a brief reason.
      languages: [python]
      severity: ERROR
      metadata:
          category: best-practice
          subcategory: audit
          confidence: HIGH
      paths:
          include:
              - '**/posthog/temporal/data_imports/sources/**'
          exclude:
              - '**/posthog/temporal/data_imports/sources/common/http/**'
              - '**/test/**'
              - '**/tests/**'
              - '**/test_*.py'

    - id: data-imports-http-transport-requests-verb
      pattern-either:
          - pattern: requests.get(...)
          - pattern: requests.post(...)
          - pattern: requests.put(...)
          - pattern: requests.patch(...)
          - pattern: requests.delete(...)
          - pattern: requests.head(...)
          - pattern: requests.options(...)
          - pattern: requests.request(...)
      message: |
          Use `make_tracked_session(...)` from
          `posthog.temporal.data_imports.sources.common.http` instead of the
          module-level `requests.<verb>` shortcut. Each tracked session
          participates in HTTP logging, metrics, and sample capture.

          If a vendor SDK constructs its own client and exposes no hook to
          inject our session, add `# nosemgrep: data-imports-http-transport-requests-verb`
          on the line above with a brief reason.
      languages: [python]
      severity: ERROR
      metadata:
          category: best-practice
          subcategory: audit
          confidence: HIGH
      paths:
          include:
              - '**/posthog/temporal/data_imports/sources/**'
          exclude:
              - '**/posthog/temporal/data_imports/sources/common/http/**'
              - '**/test/**'
              - '**/tests/**'
              - '**/test_*.py'

    - id: data-imports-http-transport-httpx-client
      pattern-either:
          - pattern: httpx.Client(...)
          - pattern: httpx.AsyncClient(...)
          - pattern: httpx.get(...)
          - pattern: httpx.post(...)
          - pattern: httpx.put(...)
          - pattern: httpx.patch(...)
          - pattern: httpx.delete(...)
          - pattern: httpx.head(...)
          - pattern: httpx.options(...)
          - pattern: httpx.request(...)
      message: |
          `httpx` is not currently routed through the warehouse-source
          tracked transport. Use `make_tracked_session(...)` (a
          `requests.Session`) from
          `posthog.temporal.data_imports.sources.common.http` instead.

          If you must use `httpx` here for some reason, add a
          `# nosemgrep: data-imports-http-transport-httpx-client` comment
          and explain the reason.
      languages: [python]
      severity: ERROR
      metadata:
          category: best-practice
          subcategory: audit
          confidence: HIGH
      paths:
          include:
              - '**/posthog/temporal/data_imports/sources/**'
          exclude:
              - '**/posthog/temporal/data_imports/sources/common/http/**'
              - '**/test/**'
              - '**/tests/**'
              - '**/test_*.py'
