rules:
    - id: no-module-level-aws-session
      languages: [python]
      severity: ERROR
      message: |
          Do not construct an AWS SDK session/client at import time (module or class scope).

          `boto3.Session()` / `aioboto3.Session()` (and `.client()` / `.resource()`) eagerly
          resolve botocore config — including the active AWS profile from `~/.aws/config` —
          the moment they are constructed. At module/class scope that runs during import, i.e.
          during Django/granian startup for any module on the boot import path. A developer
          whose `AWS_PROFILE` points at a profile missing from their local `~/.aws/config`
          then crashes boot with `botocore.exceptions.ProfileNotFound`, even though no AWS
          call was intended.

          Build it lazily instead — inside the function/activity that uses it, or behind a
          cached accessor:

              @functools.cache
              def _get_session() -> boto3.Session:
                  return boto3.Session()

          See products/batch_exports/backend/temporal/destinations/s3_batch_export.py for the
          per-instance lazy pattern. If a module-scope construction is genuinely safe (the
          module is never imported on a request/boot path), suppress on the line with
          `# nosemgrep: no-module-level-aws-session -- <reason>`.
      patterns:
          - pattern-either:
                - pattern: boto3.Session(...)
                - pattern: aioboto3.Session(...)
                - pattern: boto3.client(...)
                - pattern: boto3.resource(...)
                - pattern: aioboto3.client(...)
                - pattern: aioboto3.resource(...)
          - pattern-not-inside: |
                def $F(...):
                    ...
          - pattern-not-inside: |
                async def $F(...):
                    ...
      paths:
          exclude:
              - '**/tests/**'
              - '**/test/**'
              - 'test_*.py'
              - '*_test.py'
              - 'conftest.py'
      metadata:
          category: best-practice
          subcategory:
              - audit
          references:
              - https://github.com/PostHog/posthog/pull/61570
