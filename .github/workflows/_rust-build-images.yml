name: Build rust container images

# Reusable workflow — not triggered directly.
# Called by rust-docker-build.yml (production) and
# rust-smoke-test-build.yml (smoke tests).
# Image list lives in .github/rust-images.yml.

on:
    workflow_call:
        inputs:
            tag-rules:
                description: 'Docker metadata tag rules (newline-separated)'
                required: true
                type: string
            checkout-ref:
                description: 'Git ref for checkout (leave empty for default)'
                type: string
                default: ''
            timeout-minutes:
                description: 'Per-image build timeout'
                type: number
                default: 60
            event-name:
                description: 'PostHog event name for failure reporting'
                type: string
                default: 'posthog-rust-image-build'
            extra-failure-props:
                description: 'Additional JSON properties for failure reporting (without outer braces)'
                type: string
                default: ''
            image-filter:
                description: 'Comma-separated list of images to build (empty = all)'
                type: string
                default: ''
        outputs:
            digests:
                description: 'JSON object mapping image name to digest'
                value: ${{ jobs.collect.outputs.digests }}

jobs:
    load-matrix:
        name: load image matrix
        runs-on: posthog-hetzner
        timeout-minutes: 2
        permissions:
            contents: read
        outputs:
            matrix: ${{ steps.set.outputs.matrix }}
        steps:
            - name: Check out rust-images.yml
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  sparse-checkout: .github/rust-images.yml
                  sparse-checkout-cone-mode: false

            - name: Read and filter matrix
              id: set
              env:
                  IMAGE_FILTER: ${{ inputs.image-filter }}
              run: |
                  full=$(yq -o=json -I=0 '.' .github/rust-images.yml)
                  if [ -n "$IMAGE_FILTER" ]; then
                      matrix=$(echo "$full" | jq -c --arg f "$IMAGE_FILTER" \
                        '[.[] | select(.image as $img | ($f | split(",") | map(ltrimstr(" ") | rtrimstr(" ")) | index($img)) != null)]')
                  else
                      matrix="$full"
                  fi
                  if [ "$matrix" = "[]" ]; then
                      echo "::error::image-filter '$IMAGE_FILTER' matched no images in rust-images.yml"
                      exit 1
                  fi
                  echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

    build:
        name: build ${{ matrix.image }}
        needs: load-matrix
        strategy:
            matrix:
                include: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
        runs-on: posthog-hetzner
        timeout-minutes: ${{ inputs.timeout-minutes }}
        permissions:
            id-token: write
            contents: read
            packages: write

        defaults:
            run:
                working-directory: rust

        steps:
            - name: Check Out Repo
              # Use sparse checkout to only select files in rust directory
              # Turning off cone mode ensures that files in the project root are not included during checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ inputs.checkout-ref || '' }}
                  sparse-checkout: |
                      rust/
                      proto/
                  sparse-checkout-cone-mode: false

            - name: Copy proto files into rust build context
              working-directory: .
              run: cp -r proto rust/proto

            - name: Login to ghcr.io
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
              with:
                  images: ghcr.io/posthog/posthog/${{ matrix.image }}
                  tags: ${{ inputs.tag-rules }}

            - name: Set up Docker Buildx
              id: setup-buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Cache Rust BuildKit cache mounts
              id: rust-buildkit-cache
              uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: .buildkit-rust-cache/${{ matrix.image }}
                  # actions/cache entries are immutable, so key by SHA and restore the latest per-image branch/master cache.
                  key: buildkit-rust-${{ matrix.image }}-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      buildkit-rust-${{ matrix.image }}-${{ github.ref_name }}-
                      buildkit-rust-${{ matrix.image }}-master-

            - name: Restore Rust Docker cache mounts
              uses: reproducible-containers/buildkit-cache-dance@2925f5cfd92896e0f5a155899ff2ed2922b575c6 # v3.4.0
              with:
                  builder: ${{ steps.setup-buildx.outputs.name }}
                  cache-map: |
                      {
                        ".buildkit-rust-cache/${{ matrix.image }}/cargo-registry": "/usr/local/cargo/registry",
                        ".buildkit-rust-cache/${{ matrix.image }}/cargo-git": "/usr/local/cargo/git",
                        ".buildkit-rust-cache/${{ matrix.image }}/sccache": "/sccache"
                      }
                  skip-extraction: ${{ steps.rust-buildkit-cache.outputs.cache-hit }}

            - name: Build and push image
              id: docker_build
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
              with:
                  context: ./rust/
                  file: ${{ matrix.dockerfile }}
                  target: ${{ matrix.target || '' }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64
                  build-args: |
                      SCCACHE_LOG=debug
                      SCCACHE_NO_DAEMON=1
                      BIN=${{ matrix.bin || matrix.image }}
                      BUILD_FEATURES=${{ matrix.features || '' }}
                  cache-from: |
                      type=gha,scope=rust-${{ matrix.image }}-${{ github.ref_name }}
                      type=gha,scope=rust-${{ matrix.image }}
                  cache-to: ${{ github.ref == 'refs/heads/master' && format('type=gha,scope=rust-{0},mode=max', matrix.image) || format('type=gha,scope=rust-{0}-{1},mode=max', matrix.image, github.ref_name) }}

            - name: Build failure properties
              if: failure()
              id: failure-props
              env:
                  EXTRA: ${{ inputs.extra-failure-props }}
              run: |
                  props='{"status": "failure", "commit_hash": "${{ github.sha }}", "image": "${{ matrix.image }}"'
                  if [ -n "$EXTRA" ]; then
                      props="$props, $EXTRA"
                  fi
                  echo "json=${props}}" >> "$GITHUB_OUTPUT"

            - name: Report failure
              if: failure() && github.event_name != 'pull_request'
              uses: PostHog/posthog-github-action@58dea254b598fb5d469c0699c98af8288a7f7650 # v1.2.0
              with:
                  posthog-token: ${{ secrets.POSTHOG_API_TOKEN }}
                  event: ${{ inputs.event-name }}
                  properties: ${{ steps.failure-props.outputs.json }}
            - name: Report failure to DevEx PostHog
              if: failure() && github.event_name != 'pull_request'
              continue-on-error: true
              uses: PostHog/posthog-github-action@58dea254b598fb5d469c0699c98af8288a7f7650 # v1.2.0
              with:
                  posthog-token: ${{ secrets.POSTHOG_DEVEX_PROJECT_API_TOKEN }}
                  event: ${{ inputs.event-name }}
                  properties: ${{ steps.failure-props.outputs.json }}

            - name: Container image digest
              env:
                  DIGEST: ${{ steps.docker_build.outputs.digest }}
              run: echo "$DIGEST" > /tmp/digest-${{ matrix.image }}.txt

            - name: Upload digest
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: digest-${{ matrix.image }}
                  path: /tmp/digest-${{ matrix.image }}.txt
                  retention-days: 1

    collect:
        name: collect digests
        needs: [load-matrix, build]
        runs-on: posthog-hetzner
        timeout-minutes: 2
        permissions:
            contents: read
        outputs:
            digests: ${{ steps.aggregate.outputs.digests }}
        steps:
            - name: Download all digest artifacts
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  pattern: digest-*
                  path: /tmp/digests
                  merge-multiple: true

            - name: Aggregate digests
              id: aggregate
              run: |
                  shopt -s nullglob
                  echo "Contents of /tmp/digests/:"
                  ls -laR /tmp/digests/ 2>/dev/null || echo "/tmp/digests/ does not exist"
                  digests='{}'
                  found=0
                  for file in /tmp/digests/digest-*.txt; do
                      found=1
                      name="${file##*/digest-}"
                      name="${name%.txt}"
                      digest=$(cat "$file")
                      if [ -z "$digest" ]; then
                          echo "::error::Empty digest for $name (file: $file)"
                          exit 1
                      fi
                      digests=$(echo "$digests" | jq -c --arg k "$name" --arg v "$digest" '. + {($k): $v}')
                  done
                  if [ "$found" -eq 0 ]; then
                      echo "::error::No digest artifacts found under /tmp/digests/"
                      exit 1
                  fi
                  echo "digests=$digests" >> "$GITHUB_OUTPUT"
