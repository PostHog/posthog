name: Build rust container images

# Reusable workflow — not triggered directly.
# Called by rust-docker-build.yml (production) and
# rust-smoke-test-build.yml (smoke tests).
# Image list lives in .github/rust-images.yml.

on:
    workflow_call:
        inputs:
            tag-rules:
                description: 'Docker metadata tag rules (newline-separated)'
                required: true
                type: string
            checkout-ref:
                description: 'Git ref for checkout (leave empty for default)'
                type: string
                default: ''
            timeout-minutes:
                description: 'Per-image build timeout'
                type: number
                default: 30
            event-name:
                description: 'PostHog event name for failure reporting'
                type: string
                default: 'posthog-rust-image-build'
            extra-failure-props:
                description: 'Additional JSON properties for failure reporting (without outer braces)'
                type: string
                default: ''
            image-filter:
                description: 'Comma-separated list of images to build (empty = all)'
                type: string
                default: ''
            push:
                description: 'Whether to push built images to the registry'
                type: boolean
                default: true
        secrets:
            POSTHOG_API_TOKEN:
                required: false
            POSTHOG_DEVEX_PROJECT_API_TOKEN:
                required: false
        outputs:
            digests:
                description: 'JSON object mapping image name to digest'
                value: ${{ jobs.collect.outputs.digests }}

jobs:
    load-matrix:
        name: load image matrix
        runs-on: ubuntu-latest
        timeout-minutes: 2
        permissions:
            contents: read
        outputs:
            matrix: ${{ steps.set.outputs.matrix }}
        steps:
            - name: Check out rust-images.yml
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  sparse-checkout: .github/rust-images.yml
                  sparse-checkout-cone-mode: false

            - name: Read and filter matrix
              id: set
              env:
                  IMAGE_FILTER: ${{ inputs.image-filter }}
              run: |
                  full=$(yq -o=json -I=0 '.' .github/rust-images.yml)
                  if [ -n "$IMAGE_FILTER" ]; then
                      matrix=$(echo "$full" | jq -c --arg f "$IMAGE_FILTER" \
                        '[.[] | select(.image as $img | ($f | split(",") | map(ltrimstr(" ") | rtrimstr(" ")) | index($img)) != null)]')
                  else
                      matrix="$full"
                  fi
                  if [ "$matrix" = "[]" ]; then
                      echo "::error::image-filter '$IMAGE_FILTER' matched no images in rust-images.yml"
                      exit 1
                  fi
                  echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

    build:
        name: build ${{ matrix.image }}
        needs: load-matrix
        strategy:
            matrix:
                include: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
        runs-on: depot-ubuntu-22.04
        timeout-minutes: ${{ inputs.timeout-minutes }}
        permissions:
            id-token: write
            contents: read
            packages: write

        defaults:
            run:
                working-directory: rust

        steps:
            - name: Check Out Repo
              # Use sparse checkout to only select files in rust directory
              # Turning off cone mode ensures that files in the project root are not included during checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ inputs.checkout-ref || '' }}
                  sparse-checkout: |
                      rust/
                      proto/
                  sparse-checkout-cone-mode: false

            - name: Copy proto files into rust build context
              working-directory: .
              run: cp -r proto rust/proto

            - name: Set up Depot CLI
              uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1.7.1

            - name: Set up QEMU
              uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
              with:
                  image: tonistiigi/binfmt:qemu-v10.2.1@sha256:7c76af7ed8714b80e3fc6d6d1c748ebcac867ad6b631167d0a6d3d92952151ea
                  platforms: all

            - name: Login to ghcr.io
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
              with:
                  images: ghcr.io/posthog/posthog/${{ matrix.image }}
                  tags: ${{ inputs.tag-rules }}

            - name: Set up Docker Buildx
              id: buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Retrieve sccache configuration
              id: sccache
              env:
                  IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
              run: |
                  echo "cache-key-prefix=cargo-${{ hashFiles('rust/Cargo.lock') }}" >> "$GITHUB_OUTPUT"
                  if [ "$IS_FORK_PR" = "true" ]; then
                      echo "Fork PR — skipping sccache credentials (build runs without remote cache)"
                      exit 0
                  fi
                  echo "endpoint=$SCCACHE_WEBDAV_ENDPOINT" >> "$GITHUB_OUTPUT"
                  echo "::add-mask::$SCCACHE_WEBDAV_TOKEN"
                  echo "token=$SCCACHE_WEBDAV_TOKEN" >> "$GITHUB_OUTPUT"

            - name: Build and push image
              id: docker_build
              uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
              env:
                  DEPOT_PROJECT: ${{ matrix.project }}
                  BUILD_CONTEXT: ./rust/
                  DOCKERFILE: ${{ matrix.dockerfile }}
                  BUILD_TARGET: ${{ matrix.target || '' }}
                  PUSH_FLAG: ${{ inputs.push }}
                  BUILD_TAGS: ${{ steps.meta.outputs.tags }}
                  BUILD_LABELS: ${{ steps.meta.outputs.labels }}
                  BUILD_BIN: ${{ matrix.bin || matrix.image }}
                  BUILD_FEATURES: ${{ matrix.features || '' }}
                  EXTRA_RUSTFLAGS: ${{ matrix.extra_rustflags || '' }}
                  EXTRA_CFLAGS: ${{ matrix.extra_cflags || '' }}
                  SCCACHE_WEBDAV_KEY_PREFIX: ${{ steps.sccache.outputs.cache-key-prefix }}
                  SCCACHE_WEBDAV_ENDPOINT: ${{ steps.sccache.outputs.endpoint }}
                  SCCACHE_WEBDAV_TOKEN: ${{ steps.sccache.outputs.token }}
              with:
                  timeout_minutes: 25
                  max_attempts: 3
                  retry_wait_seconds: 30
                  command: |
                      set -euo pipefail

                      args=(
                          --project "$DEPOT_PROJECT"
                          --context "$BUILD_CONTEXT"
                          --file "$DOCKERFILE"
                          --platform linux/arm64,linux/amd64
                          --metadata-file /tmp/depot-metadata.json
                          --build-arg "SCCACHE_LOG=debug"
                          --build-arg "SCCACHE_NO_DAEMON=1"
                          --build-arg "BIN=$BUILD_BIN"
                          --build-arg "BUILD_FEATURES=$BUILD_FEATURES"
                          --build-arg "EXTRA_RUSTFLAGS=$EXTRA_RUSTFLAGS"
                          --build-arg "EXTRA_CFLAGS=$EXTRA_CFLAGS"
                          --build-arg "SCCACHE_WEBDAV_KEY_PREFIX=$SCCACHE_WEBDAV_KEY_PREFIX"
                          --secret "id=SCCACHE_WEBDAV_ENDPOINT,env=SCCACHE_WEBDAV_ENDPOINT"
                          --secret "id=SCCACHE_WEBDAV_TOKEN,env=SCCACHE_WEBDAV_TOKEN"
                      )

                      if [ -n "$BUILD_TARGET" ]; then
                          args+=(--target "$BUILD_TARGET")
                      fi

                      if [ "$PUSH_FLAG" = "true" ]; then
                          args+=(--push)
                      fi

                      # Add tags
                      while IFS= read -r tag; do
                          [ -n "$tag" ] && args+=(--tag "$tag")
                      done <<< "$BUILD_TAGS"

                      # Add labels
                      while IFS= read -r label; do
                          [ -n "$label" ] && args+=(--label "$label")
                      done <<< "$BUILD_LABELS"

                      depot build "${args[@]}"

                      # Extract digest and export as step output
                      digest=$(jq -r '."containerimage.digest"' /tmp/depot-metadata.json)
                      echo "digest=$digest" >> "$GITHUB_OUTPUT"

            - name: Build failure properties
              if: failure()
              id: failure-props
              env:
                  EXTRA: ${{ inputs.extra-failure-props }}
              run: |
                  props='{"status": "failure", "commit_hash": "${{ github.sha }}", "image": "${{ matrix.image }}"'
                  if [ -n "$EXTRA" ]; then
                      props="$props, $EXTRA"
                  fi
                  echo "json=${props}}" >> "$GITHUB_OUTPUT"

            - name: Report failure
              if: failure() && github.event_name != 'pull_request'
              uses: PostHog/posthog-github-action@58dea254b598fb5d469c0699c98af8288a7f7650 # v1.2.0
              with:
                  posthog-token: ${{ secrets.POSTHOG_API_TOKEN }}
                  event: ${{ inputs.event-name }}
                  properties: ${{ steps.failure-props.outputs.json }}
            - name: Report failure to DevEx PostHog
              if: failure() && github.event_name != 'pull_request'
              continue-on-error: true
              uses: PostHog/posthog-github-action@58dea254b598fb5d469c0699c98af8288a7f7650 # v1.2.0
              with:
                  posthog-token: ${{ secrets.POSTHOG_DEVEX_PROJECT_API_TOKEN }}
                  event: ${{ inputs.event-name }}
                  properties: ${{ steps.failure-props.outputs.json }}

            - name: Container image digest
              env:
                  DIGEST: ${{ steps.docker_build.outputs.digest }}
              run: echo "$DIGEST" > /tmp/digest-${{ matrix.image }}.txt

            - name: Upload digest
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: digest-${{ matrix.image }}
                  path: /tmp/digest-${{ matrix.image }}.txt
                  retention-days: 1

    collect:
        name: collect digests
        needs: [load-matrix, build]
        runs-on: ubuntu-latest
        timeout-minutes: 2
        permissions:
            contents: read
        outputs:
            digests: ${{ steps.aggregate.outputs.digests }}
        steps:
            - name: Download all digest artifacts
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  pattern: digest-*
                  path: /tmp/digests
                  merge-multiple: true

            - name: Aggregate digests
              id: aggregate
              run: |
                  shopt -s nullglob
                  echo "Contents of /tmp/digests/:"
                  ls -laR /tmp/digests/ 2>/dev/null || echo "/tmp/digests/ does not exist"
                  digests='{}'
                  found=0
                  for file in /tmp/digests/digest-*.txt; do
                      found=1
                      name="${file##*/digest-}"
                      name="${name%.txt}"
                      digest=$(cat "$file")
                      if [ -z "$digest" ]; then
                          echo "::error::Empty digest for $name (file: $file)"
                          exit 1
                      fi
                      digests=$(echo "$digests" | jq -c --arg k "$name" --arg v "$digest" '. + {($k): $v}')
                  done
                  if [ "$found" -eq 0 ]; then
                      echo "::error::No digest artifacts found under /tmp/digests/"
                      exit 1
                  fi
                  echo "digests=$digests" >> "$GITHUB_OUTPUT"
