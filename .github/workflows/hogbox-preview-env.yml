# Hogbox Preview Environment (per-PR PostHog on a hogland hogbox)
#
# Restores the pre-baked "preview golden" snapshot (PostHog already migrated +
# seeded on the :master image), mounts the PR's backend source over the image's
# /code, runs only the delta migrations, and posts the reachable URL on the PR.
# Tear-down on close.
#
# This is the productionised successor to ci-hogbox-preview.yml (the connectivity
# probe). It drives tools/hogbox-preview — the layer (hogland) is swappable; the
# stack recipe is not. See tools/hogbox-preview/README.md.
#
# --- WHY MOUNT (not build / not a per-PR image) ---------------------------------
# The golden is baked ONCE (a hogland-side setup script: docker pull
# ghcr.io/posthog/posthog:master, migrate pg+CH, seed demo data), so its DB is
# already migrated AND seeded on the master image. A per-PR run restores that,
# bind-mounts the PR's checkout (posthog/ee/products) over the image's /code so
# the BACKEND runs the PR code with NO per-PR build or pull, and runs `migrate` —
# applying only the PR's *unapplied* migrations on top of the seeded DB. That
# keeps each preview off both the cold 20-min build and the heavy full-migrate
# path (the load that destabilised boxes — see hogland
# docs/agent-memory/observation_box_corruption_under_heavy_io). The frontend stays
# at the image's version (frontend hot-mount is a later iteration). If a PR's
# migrations are incompatible with the baseline, fall back to --reset-db.
#
# --- PREREQS (tracked out of band) ----------------------------------------------
#   - vars.TS_HOGLAND_CI_CLIENT_ID / TS_HOGLAND_CI_AUDIENCE  (tailnet join)
#   - the golden is referenced by its global alias `posthog-preview-golden`
#     (hogplane resolves alias:<name> server-side), so the bake re-points the
#     alias and CI follows automatically — no per-snapshot CI var to keep current
#   - target hogland deploy has HOG_GITHUB_OIDC_AUDIENCE + a github_oidc
#     TrustMapping for PostHog/posthog on prod-us
#   - PRs opt in with the `hogbox-preview` label (mirrors hobby's label gate)
# The box is driven entirely by the posthog-hogland SDK (pip-installable, keyless
# over hogplane's HTTP API) — no `hogland` CLI binary and no box SSH key needed.

name: Hogbox Preview Environment

on:
    pull_request:
        types: [opened, synchronize, reopened, labeled, closed]
    workflow_dispatch:
        inputs:
            pr_number:
                description: PR number to (re)build a preview for
                required: true

concurrency:
    group: hogbox-preview-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
    cancel-in-progress: true

permissions:
    contents: read
    id-token: write # mint OIDC for the tailnet join AND the hogplane token
    pull-requests: write # sticky preview comment

env:
    # prod-us: the golden lives here and the box edge is live here.
    HOG_HOST: https://hogland.hedgehog-kitefin.ts.net
    HOG_OIDC_AUDIENCE: hogland.prod-us.posthog.dev
    PR: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

jobs:
    # ----------------------------------------------------------------------------
    preview:
        name: build preview
        # Opt-in via label; skip the close event (that's the cleanup job).
        if: >-
            github.event.action != 'closed' &&
            (github.event_name == 'workflow_dispatch' ||
             contains(github.event.pull_request.labels.*.name, 'hogbox-preview'))
        runs-on: ubuntu-24.04
        timeout-minutes: 40
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Connect to Tailscale (tag:hogland-ci)
              uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
              with:
                  oauth-client-id: ${{ vars.TS_HOGLAND_CI_CLIENT_ID }}
                  audience: ${{ vars.TS_HOGLAND_CI_AUDIENCE }}
                  tags: tag:hogland-ci

            - name: Mint hogland OIDC token
              run: |
                  token=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                    "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${HOG_OIDC_AUDIENCE}" | jq -r '.value')
                  [ -n "$token" ] && [ "$token" != "null" ] || { echo "::error::OIDC mint failed"; exit 1; }
                  echo "::add-mask::$token"
                  echo "HOG_TOKEN=$token" >> "$GITHUB_ENV"

            - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: '3.12'

            # The tool drives the box via the SDK over hogplane's HTTP API
            # (HOG_TOKEN + --host) — no binary to fetch, no SSH key to mount.
            - name: Install hogland SDK
              run: pip install --disable-pip-version-check ./tools/hogbox-preview/vendor/posthog_hogland-0.1.2-py3-none-any.whl

            - name: Bring up preview
              id: build
              run: |
                  # Restore the golden, check out the PR, mount its backend source
                  # (posthog/ee/products) over the :master image's /code, delta-migrate.
                  # No per-PR build or pull — the tool defaults to the :master image and
                  # the mount swaps the code. (--image "" is the build escape hatch.)
                  out=$(python -m hogbox_preview \
                    --host "$HOG_HOST" \
                    --name "preview-pr-${PR}" \
                    --snapshot "alias:posthog-preview-golden" \
                    --cpus 8 --memory-mib 16384 --disk-gib 100 \
                    up --branch "pull/${PR}/head" --no-seed)   # restore -> mount PR -> delta-migrate
                  echo "$out"
                  echo "url=$(echo "$out" | sed -n 's/^url=//p')" >> "$GITHUB_OUTPUT"
              working-directory: tools/hogbox-preview

            - name: Comment preview URL
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
              with:
                  script: |
                      const marker = '<!-- hogbox-preview-comment -->';
                      const url = '${{ steps.build.outputs.url }}';
                      const body = `${marker}\n### 🦔 Hogbox preview\n\nPostHog for this PR is up at ${url}\n\n` +
                        `Log in: \`test@posthog.com\` / \`12345678\` (demo data). Tailnet only.`;
                      const { data: comments } = await github.rest.issues.listComments(
                        { ...context.repo, issue_number: process.env.PR });
                      const existing = comments.find(c => c.body.includes(marker));
                      if (existing) await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
                      else await github.rest.issues.createComment({ ...context.repo, issue_number: process.env.PR, body });

    # ----------------------------------------------------------------------------
    cleanup:
        name: tear down preview
        if: github.event.action == 'closed'
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Connect to Tailscale (tag:hogland-ci)
              uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
              with:
                  oauth-client-id: ${{ vars.TS_HOGLAND_CI_CLIENT_ID }}
                  audience: ${{ vars.TS_HOGLAND_CI_AUDIENCE }}
                  tags: tag:hogland-ci
            - name: Mint hogland OIDC token
              run: |
                  token=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                    "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${HOG_OIDC_AUDIENCE}" | jq -r '.value')
                  echo "::add-mask::$token"; echo "HOG_TOKEN=$token" >> "$GITHUB_ENV"
            - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: '3.12'
            - name: Install hogland SDK
              run: pip install --disable-pip-version-check ./tools/hogbox-preview/vendor/posthog_hogland-0.1.2-py3-none-any.whl
            - name: Destroy preview box
              working-directory: tools/hogbox-preview
              # Resolve the box by its deterministic name and tear it down.
              run: python -m hogbox_preview --host "$HOG_HOST" --name "preview-pr-${PR}" destroy
