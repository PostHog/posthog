# ReviewHog label trigger.
#
# When a maintainer adds the `reviewhog` label to a non-fork PR (or pushes to an already-labeled one),
# this makes ONE authenticated call to the PostHog `review_hog` trigger endpoint, which starts the
# review Temporal workflow server-side and publishes the review back to the PR. Unlike Stamphog, the
# agent does NOT run in CI: there is no checkout, no app token, no Anthropic key here — the only secret
# is the shared trigger token. Publishing happens server-side via the PostHog GitHub App installation
# token.
#
# Safety: `pull_request` (not `pull_request_target`) means fork PRs receive no secrets, so they cannot
# trigger; the `if:` also hard-gates forks, drafts, and bots; and applying the label needs write access.
name: ReviewHog

on:
    pull_request:
        types: [labeled, ready_for_review, synchronize]

# No GitHub permissions needed — the job only makes an outbound authenticated request; the review is
# fetched and published server-side via the PostHog GitHub App installation token.
permissions: {}

concurrency:
    group: reviewhog-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    trigger:
        name: Trigger ReviewHog review
        runs-on: ubuntu-latest
        timeout-minutes: 5
        # Run only for the `reviewhog` label on a non-fork, non-draft, human-authored PR. On `labeled`
        # the label name is on the event; on `synchronize`/`ready_for_review` it must already be present.
        if: >-
            !github.event.pull_request.draft
            && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
            && github.event.pull_request.user.type != 'Bot'
            && !contains(github.event.pull_request.user.login, '[bot]')
            && github.event.pull_request.user.login != 'posthog-bot'
            && (
                github.event.label.name == 'reviewhog'
                || (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'reviewhog'))
            )
        steps:
            - name: Trigger ReviewHog review
              env:
                  REVIEWHOG_TRIGGER_TOKEN: ${{ secrets.REVIEWHOG_TRIGGER_TOKEN }}
                  ENDPOINT: ${{ vars.REVIEWHOG_ENDPOINT_URL || 'https://us.posthog.com/api/review_hog/trigger/' }}
                  REPO: ${{ github.repository }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  if [ -z "$REVIEWHOG_TRIGGER_TOKEN" ]; then
                    echo "::error::REVIEWHOG_TRIGGER_TOKEN secret is not set (or unavailable on a fork PR)." >&2
                    exit 1
                  fi
                  payload="$(jq -n --arg repo "$REPO" --argjson pr "$PR_NUMBER" '{repo: $repo, pr_number: $pr}')"
                  # Retries are safe: the trigger dedups via Temporal USE_EXISTING, so a
                  # double-delivered trigger joins the in-flight review instead of starting another.
                  curl --fail-with-body --silent --show-error \
                    --retry 3 --retry-delay 2 --max-time 30 --connect-timeout 10 \
                    -X POST "$ENDPOINT" \
                    -H "Authorization: Bearer $REVIEWHOG_TRIGGER_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "$payload"
