name: Survey SDK Version Check

on:
    pull_request:
        paths:
            - 'frontend/src/scenes/surveys/**'
            - 'docs/published/surveys/**'
            - 'frontend/bin/docs/build-survey-sdk-docs.ts'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read
    pull-requests: write

jobs:
    check-sdk-requirements:
        name: Check for SDK version requirements
        runs-on: ubuntu-24.04
        timeout-minutes: 5

        steps:
            - name: Check for SDK-related changes
              id: sdk-check
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  # Check added lines for SDK version patterns
                  if gh pr diff ${{ github.event.pull_request.number }} \
                      | grep '^+' | grep -v '^+++' \
                      | grep -qiE 'posthog-js|posthog-react-native|posthog-ios|posthog-android|[0-9]+\.[0-9]+\.[0-9]+'; then
                      echo "found=true" >> $GITHUB_OUTPUT
                  fi

            - name: Checkout for CI report poster
              if: steps.sdk-check.outputs.found == 'true'
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  sparse-checkout: |
                      .github/scripts
                      frontend/bin/ci-report

            - name: Post reminder comment
              if: steps.sdk-check.outputs.found == 'true'
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  message_body='### Surveys SDK version check reminder

                  This PR modifies survey code and may include SDK-dependent features.

                  **If adding a feature that requires a minimum SDK version**, please update:
                  `frontend/src/scenes/surveys/surveyVersionRequirements.ts`

                  This ensures users see warnings when launching surveys their SDK does not support.'

                  if [ -f .github/scripts/post-reminder-section.mjs ]; then
                      BODY="$message_body" node .github/scripts/post-reminder-section.mjs survey-sdk info "check SDK version requirements"
                  else
                      echo "Skipping survey-sdk section — script not present on this checkout"
                  fi

    check-docs-generated:
        name: Check SDK docs are up to date
        uses: ./.github/workflows/ci-docs-check.yml
        with:
            source_file: frontend/src/scenes/surveys/surveyVersionRequirements.ts
            additional_source_files: frontend/bin/docs/build-survey-sdk-docs.ts
            build_command: pnpm --filter=@posthog/frontend build:survey-sdk-docs
            output_file: docs/published/docs/surveys/sdk-feature-support.mdx
            fail_on_outdated: true
