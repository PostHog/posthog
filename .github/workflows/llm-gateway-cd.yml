name: LLM Gateway CD

on:
    workflow_dispatch:
    push:
        branches:
            - master
        paths:
            - 'services/llm-gateway/**'
            - '.github/workflows/llm-gateway-cd.yml'

jobs:
    build:
        runs-on: posthog-hetzner
        timeout-minutes: 10

        permissions:
            contents: read
            packages: write
            id-token: write

        outputs:
            sha: ${{ steps.push.outputs.digest }}

        steps:
            - name: Check out llm-gateway code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  sparse-checkout: |
                      services/llm-gateway/
                      .github/actions/docker-meta/
                  sparse-checkout-cone-mode: false

            - name: Docker meta and registry login
              id: docker-meta
              uses: ./.github/actions/docker-meta
              with:
                  image-name: llm-gateway
                  aws-role-to-assume: ${{ secrets.AWS_ECR_PUBLISH_IAM_ROLE }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  dockerhub-username: ${{ secrets.DOCKERHUB_USER }}
                  dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
                  # Legacy path — remove once Helm charts are updated to ghcr.io/posthog/<image>
                  legacy-images: ghcr.io/posthog/posthog/llm-gateway

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Build and push Docker image
              id: push
              if: github.ref == 'refs/heads/master'
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
              with:
                  context: ./services/llm-gateway/
                  file: services/llm-gateway/Dockerfile
                  push: true
                  platforms: linux/amd64
                  tags: ${{ steps.docker-meta.outputs.tags }}
                  labels: ${{ steps.docker-meta.outputs.labels }}
                  cache-from: |
                      type=gha,scope=llm-gateway-${{ github.ref_name }}
                      type=gha,scope=llm-gateway
                  cache-to: ${{ github.ref == 'refs/heads/master' && 'type=gha,scope=llm-gateway,mode=max' || format('type=gha,scope=llm-gateway-{0},mode=max', github.ref_name) }}

    deploy:
        runs-on: posthog-hetzner
        timeout-minutes: 5
        needs: build
        permissions: {}
        steps:
            - name: get deployer token
              id: deployer
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_CHARTS_DEPLOYER_APP_ID }}
                  private-key: ${{ secrets.GH_APP_CHARTS_DEPLOYER_PRIVATE_KEY }}
                  owner: PostHog
                  repositories: charts

            - name: Trigger llm-gateway deployment
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ needs.build.outputs.sha }}"
                          }
                        },
                        "release": "llm-gateway",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": [],
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }
