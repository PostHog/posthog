name: Container Images CI

on:
    pull_request:
        # Mirror ci-hobby.yml's trigger types so the `hobby-preview` label can
        # retroactively kick off a build. ci-hobby.yml omits `reopened`, so we
        # do too — otherwise reopens would build an image with no consumer.
        types: [opened, synchronize, labeled, unlabeled]
    merge_group:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    changes:
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        # Runs on merge_group too so the lint job below (a required check) can consume
        # its changed-Dockerfile list there. should_build is ignored on merge_group —
        # posthog_build forces a build regardless via its own `if`.
        if: github.repository == 'PostHog/posthog'
        name: Determine need to run Docker checks
        permissions:
            contents: read
            pull-requests: read
        outputs:
            # The image is only consumed by ci-hobby.yml. Skip the ~20 min build
            # when ci-hobby would also skip, plus on changes to inputs that can
            # only break inside the Docker build (workflow self-edits, frontend
            # lockfile bumps that ci-hobby's filter ignores).
            should_build: >-
                ${{
                    steps.filter.outputs.hobby == 'true'
                    || steps.filter.outputs.build_inputs == 'true'
                    || contains(github.event.pull_request.labels.*.name, 'hobby-preview')
                }}
            dockerignore_changed: ${{ steps.filter.outputs.dockerignore }}
            # Drives the Dockerfile lint job: a boolean plus the shell-escaped, space-separated
            # list of changed Dockerfiles to hand straight to hadolint.
            dockerfiles_changed: ${{ steps.filter.outputs.dockerfiles }}
            dockerfiles_files: ${{ steps.filter.outputs.dockerfiles_files }}
        steps:
            # paths-filter uses the GitHub API on pull_request, but falls back to git for
            # merge_group — so the repo must be checked out for the merge-queue run.
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              id: app-token
              if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_PATHS_FILTER_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_PATHS_FILTER_PRIVATE_KEY }}
            - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
              id: filter
              with:
                  token: ${{ steps.app-token.outputs.token || github.token }}
                  # Emit `<filter>_files` lists (shell-escaped, space-separated) so the
                  # lint job can feed changed Dockerfiles straight to hadolint.
                  list-files: shell
                  filters: |
                      # Keep `hobby:` in sync with the same-named filter in ci-hobby.yml —
                      # drift means hobby waits for an image we never build (or vice versa).
                      hobby:
                        - Dockerfile
                        - docker-compose.base.yml
                        - docker-compose.hobby.yml
                        - 'bin/deploy-hobby'
                        - 'bin/hobby-ci.py'
                        - 'bin/upgrade-hobby'
                        - 'bin/migrate-*-hobby'
                        - 'bin/docker'
                        - 'bin/docker-worker'
                        - 'bin/docker-worker-beat'
                        - 'bin/docker-worker-celery'
                        - 'bin/docker-server'
                        - 'bin/docker-server-unit'
                        - 'bin/celery-queues.env'
                        - 'bin/migrate'
                        - 'bin/migrate-check'
                        - 'bin/posthog-node'
                        - 'bin/hobby-installer/**'
                        - 'docker/**'
                        - uv.lock
                        - .github/workflows/ci-hobby.yml
                      # Inputs that can break inside the Docker build but aren't covered
                      # by the `hobby:` filter — workflow self-edits, `.dockerignore`
                      # (silently changes the build context), and `pnpm-lock.yaml` so
                      # Renovate-style dep bumps are exercised on PR (otherwise they'd
                      # only fail at merge_group / master push).
                      build_inputs:
                        - .github/workflows/container-images-ci.yml
                        - .github/actions/build-n-cache-image/**
                        - .dockerignore
                        - pnpm-lock.yaml
                      # Drives the fast PR-time guard below (models `COPY . .`, so it only reacts
                      # to .dockerignore — Dockerfile COPY changes are covered by the image boot check).
                      dockerignore:
                        - .dockerignore
                      # Drives the hadolint lint job below — the matched paths are passed straight
                      # to hadolint via the `dockerfiles_files` output.
                      dockerfiles:
                        - '**/Dockerfile'
                        - '**/*.Dockerfile'
                        - '**/Dockerfile.*'

    dockerignore_guard:
        needs: changes
        name: Guard against dropped image files
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        # PR-time only (event == pull_request), so it's skipped on merge_group. Needs no secrets or
        # docker login — unlike the image build below, it runs on fork PRs too.
        if: github.event_name == 'pull_request' && needs.changes.outputs.dockerignore_changed == 'true'
        permissions:
            contents: read
        steps:
            - name: Check out
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Fetch base ref for comparison
              run: git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            - name: Check for non-test files dropped from the image
              run: bin/dockerignore-drop-check "${{ github.event.pull_request.base.sha }}"

    posthog_build:
        needs: changes
        name: Build Docker image
        # run these on 4, if they're RAM constrained the FE build will fail randomly in Docker build
        runs-on: depot-ubuntu-latest-4
        timeout-minutes: 30
        permissions:
            id-token: write # allow issuing OIDC tokens for this workflow run
            contents: read # allow at least reading the repo contents, add other permissions if necessary
        # Only on PostHog/posthog, as there's no docker login on forks
        if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name  == github.repository && needs.changes.outputs.should_build == 'true') || github.event_name == 'merge_group' }}

        outputs:
            digest: ${{ steps.build.outputs.digest }}

        steps:
            - name: Check out
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Build and cache Docker image in Depot
              id: build
              uses: ./.github/actions/build-n-cache-image
              with:
                  actions-id-token-request-url: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
                  push-image: ${{ github.repository == 'PostHog/posthog' }} # Don't push on forks due to lack of credentials
                  aws-role-to-assume: ${{ secrets.AWS_ECR_PUBLISH_IAM_ROLE }}
                  dockerhub-username: ${{ secrets.DOCKERHUB_USER }}
                  dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
                  pr-number: ${{ github.event.number }}
                  no-cache: ${{ contains(github.event.pull_request.labels.*.name, 'no-depot-docker-cache') }}

            - name: Container image digest
              env:
                  IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
                  IMAGE_REGISTRY: ${{ steps.build.outputs.registry }}
              run: |
                  echo "Image digest: $IMAGE_DIGEST"
                  echo "## Container image built :rocket:" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Image reference:** \`$IMAGE_REGISTRY/posthog-cloud@$IMAGE_DIGEST\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Image SHA:** \`${{ github.sha }}@$IMAGE_DIGEST\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- Digest: \`$IMAGE_DIGEST\`" >> $GITHUB_STEP_SUMMARY

    lint:
        needs: changes
        name: Lint changed Dockerfiles
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        permissions:
            contents: read
        steps:
            - name: Check out
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            # Changed-Dockerfile list comes from the shared paths-filter in `changes`, so no
            # second changed-files action or full-history checkout. The job still always runs
            # (only the hadolint step is gated) to keep its required-check status reporting.
            - name: Lint changed Dockerfile(s) with Hadolint
              if: needs.changes.outputs.dockerfiles_changed == 'true'
              uses: jbergstroem/hadolint-gh-action@2b00b87f8a56783930b6a4749837d7c45c567ff2 # v1.13.0
              with:
                  dockerfile: '${{ needs.changes.outputs.dockerfiles_files }}'
