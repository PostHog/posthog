name: Release hogql-parser npm

on:
    pull_request:
        paths:
            - common/hogql_parser/**
            - .github/workflows/build-hogql-parser-npm.yml

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    check-package-version:
        name: Check npm package version
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        outputs:
            committed-version: ${{ steps.check-package-version.outputs.committed-version }}
            published-version: ${{ steps.check-package-version.outputs.published-version }}
            is-new-version: ${{ steps.check-package-version.outputs.is-new-version }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  filter: blob:none

            - name: Check if common/hogql_parser/ has changed
              id: changed-files
              uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47.0.5
              with:
                  files_yaml: |
                      parser:
                      - common/hogql_parser/**

            - name: Check package version and detect an update
              id: check-package-version
              uses: PostHog/check-package-version@f540540cb12d45ec3c58d42dbf1d60070ed2d268 # v2.1.1
              with:
                  path: common/hogql_parser

            - name: Comment on PR if version not bumped
              if: steps.changed-files.outputs.parser_any_changed == 'true' && steps.check-package-version.outputs.is-new-version == 'false'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  COMMITTED_VERSION: ${{ steps.check-package-version.outputs.committed-version }}
                  IS_FORK: ${{ github.event.pull_request.head.repo.full_name != 'PostHog/posthog' }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  message_body="It looks like the code of \`@posthog/hogql-parser\` (npm) changed in this PR, but its version stayed the same at $COMMITTED_VERSION. 👀"
                  message_body+=$'\n'"Make sure to resolve this in \`common/hogql_parser/package.json\` before merging!"
                  if [[ "$IS_FORK" == 'true' ]]; then
                    message_body+=$'\n'"This needs to be performed on a branch created on the PostHog/posthog repo itself. A PostHog team member will assist with this."
                  fi
                  # Post once, then edit in place on subsequent pushes
                  existing=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | test("hogql-parser.*npm.*version stayed the same")) | .id' | tail -1)
                  if [[ -n "$existing" ]]; then
                    gh api "repos/${{ github.repository }}/issues/comments/$existing" -X PATCH -f body="$message_body"
                  else
                    gh pr comment "$PR_NUMBER" --body "$message_body"
                  fi

    build-wasm:
        name: Build WASM
        needs: check-package-version
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        if: needs.check-package-version.outputs.is-new-version == 'true' &&
            github.event.pull_request.head.repo.full_name == 'PostHog/posthog'
        steps:
            - uses: actions/checkout@v6

            - name: Setup Emscripten for WASM build
              uses: ./.github/actions/setup-emsdk

            - name: Install Ninja
              run: sudo apt-get install -y ninja-build

            - name: Build WASM package
              run: cd common/hogql_parser && npm run build

            - name: Upload dist artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: hogql-parser-dist
                  path: common/hogql_parser/dist/
                  if-no-files-found: error

    publish-npm:
        name: Publish on npm
        needs: build-wasm
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6

            - name: Download dist artifact
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  name: hogql-parser-dist
                  path: common/hogql_parser/dist

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version-file: .nvmrc
                  registry-url: https://registry.npmjs.org

            - name: Publish package to npm
              run: cd common/hogql_parser && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ''
                  NPM_CONFIG_PROVENANCE: true

            # Use GitHub app token so Actions run after committing changes
            - name: Get app token
              id: app-token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_TESTS_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_TESTS_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  token: ${{ steps.app-token.outputs.token }}

            - name: Install pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version-file: .nvmrc
                  cache: 'pnpm'

            - name: Install uv
              id: setup-uv
              uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
              with:
                  version: '0.10.2' # pinned: unpinned setup-uv calls GH API on every job, exhausts rate limit

            - name: Update @posthog/hogql-parser in frontend
              shell: bash
              env:
                  RETRIES: 20
              run: |
                  VERSION=$(node -p "require('./common/hogql_parser/package.json').version")
                  for i in $(seq 1 $RETRIES); do
                      if pnpm --filter=@posthog/frontend add "@posthog/hogql-parser@$VERSION"; then
                          break
                      fi
                      if [[ $i -eq $RETRIES ]]; then
                        echo "Failed to update @posthog/hogql-parser in frontend"
                        exit 1
                      fi
                      sleep 0.5
                  done

            - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
              with:
                  add: |
                      frontend/package.json
                      pnpm-lock.yaml
                  commit: '--no-verify'
                  message: 'Use new @posthog/hogql-parser npm version'
                  default_author: github_actions
                  github_token: ${{ steps.app-token.outputs.token }}
