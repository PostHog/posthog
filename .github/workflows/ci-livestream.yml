name: Livestream

on:
    push:
        branches:
            - master
    pull_request:
        paths:
            - '.github/workflows/ci-livestream.yml'
            - 'livestream/**'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-24.04
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Mint setup-action GitHub token
              id: setup-gh-token
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              continue-on-error: true
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_DEVEX_GENERAL_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_DEVEX_GENERAL_PRIVATE_KEY }}

            - name: Set up Go
              uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
              with:
                  go-version: '1.25.5'
                  token: ${{ steps.setup-gh-token.outputs.token || github.token }}

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
              with:
                  version: latest
                  working-directory: livestream
                  args: --timeout=5m

            - name: Check easyjson generated code is up to date
              working-directory: livestream
              run: |
                  go run github.com/mailru/easyjson/easyjson@v0.9.0 events/kafka.go
                  go run github.com/mailru/easyjson/easyjson@v0.9.0 events/filter.go
                  git diff --exit-code -- events/*_easyjson.go || {
                    echo "::error::easyjson generated files are out of date. Run 'easyjson events/kafka.go && easyjson events/filter.go' in livestream/ and commit the result."
                    exit 1
                  }

            - name: Run tests
              run: cd livestream && go test -v
