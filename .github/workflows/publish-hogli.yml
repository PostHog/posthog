name: Publish hogli to PyPI

on:
    push:
        tags:
            - 'hogli-v*'

permissions:
    contents: read

concurrency:
    group: publish-hogli-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        name: Build and publish
        runs-on: ubuntu-22.04
        timeout-minutes: 10
        environment: pypi-hogli
        permissions:
            id-token: write
            contents: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: '3.12'

            - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
              with:
                  version: '0.10.2'

            - name: Verify tag matches package version
              shell: bash
              env:
                  TAG_REF: ${{ github.ref_name }}
              run: |
                  tag_version="${TAG_REF#hogli-v}"
                  pkg_version=$(python -c "import tomllib; print(tomllib.load(open('tools/hogli/pyproject.toml','rb'))['project']['version'])")
                  if [[ "$tag_version" != "$pkg_version" ]]; then
                      echo "::error::tag version ($tag_version) does not match tools/hogli/pyproject.toml version ($pkg_version)"
                      exit 1
                  fi

            - name: Build sdist and wheel
              run: uv build tools/hogli --out-dir dist

            - name: Validate metadata
              run: uvx twine check dist/*

            - name: Generate build provenance attestation
              uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
              with:
                  subject-path: 'dist/*'

            - name: Publish to PyPI
              run: uv publish dist/*

            - name: Create GitHub Release
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
              with:
                  files: dist/*
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
