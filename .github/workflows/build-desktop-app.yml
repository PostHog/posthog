name: Build Desktop App

on:
    pull_request:
        paths:
            - 'products/desktop/**'
            - '.github/workflows/build-desktop-app.yml'
    push:
        branches:
            - master
        paths:
            - 'products/desktop/**'
            - '.github/workflows/build-desktop-app.yml'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    package-macos:
        name: Package macOS DMG (arm64)
        # Depot macOS is a fixed FIFO pool (Startup+ plan); if it's unavailable,
        # swap runs-on for `macos-14`.
        runs-on: depot-macos-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install dependencies
              uses: ./.github/actions/pnpm-install

            - name: Build workspace dependencies
              run: bin/turbo --filter=@posthog/frontend prepare

            - name: Build frontend
              run: |
                  pnpm --filter=@posthog/frontend build:products
                  pnpm --filter=@posthog/frontend build

            # PR builds stay unsigned (ad-hoc signature from after-pack.cjs):
            # signing secrets must never be reachable from PR-modified workflow
            # code, and fork PRs don't get them anyway. Master pushes and manual
            # dispatches produce the signed + notarized DMG. If the signing
            # secrets aren't configured, non-PR builds degrade to unsigned
            # instead of failing.
            - name: Package desktop app (unsigned)
              if: github.event_name == 'pull_request' || secrets.DESKTOP_MACOS_SIGNING_CERT == ''
              env:
                  CSC_IDENTITY_AUTO_DISCOVERY: 'false'
              run: pnpm --filter=@posthog/desktop package

            - name: Package desktop app (signed + notarized)
              if: github.event_name != 'pull_request' && secrets.DESKTOP_MACOS_SIGNING_CERT != ''
              env:
                  # Base64-encoded Developer ID Application .p12 + its password;
                  # electron-builder accepts base64 data directly in CSC_LINK
                  CSC_LINK: ${{ secrets.DESKTOP_MACOS_SIGNING_CERT }}
                  CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_MACOS_SIGNING_CERT_PASSWORD }}
                  # App Store Connect API key for notarization; electron-builder
                  # expects APPLE_API_KEY to be a path to the .p8 file
                  APPLE_API_KEY_B64: ${{ secrets.DESKTOP_APPLE_API_KEY }}
                  APPLE_API_KEY_ID: ${{ secrets.DESKTOP_APPLE_API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.DESKTOP_APPLE_API_ISSUER }}
              run: |
                  export APPLE_API_KEY="$RUNNER_TEMP/apple_api_key.p8"
                  printf '%s' "$APPLE_API_KEY_B64" | base64 --decode > "$APPLE_API_KEY"
                  pnpm --filter=@posthog/desktop package
                  rm -f "$APPLE_API_KEY"

            - name: Upload DMG
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: posthog-desktop-macos-arm64
                  path: products/desktop/release/*.dmg
                  if-no-files-found: error
                  # The DMG is already compressed; recompressing ~500 MB is pure waste
                  compression-level: 0
                  retention-days: 14
