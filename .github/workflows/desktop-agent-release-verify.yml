name: Desktop Agent Release Verify

permissions:
    contents: read

on:
    pull_request:
        branches:
            - master
        paths:
            - 'products/desktop/packages/agent/**'
            - 'products/desktop/packages/enricher/**'
            - 'products/desktop/packages/git/**'
            - 'products/desktop/packages/harness/**'
            - 'products/desktop/packages/shared/**'
            - '.github/actions/desktop-build-agent-release/**'
            - '.github/workflows/desktop-agent-release.yml'
            - '.github/workflows/desktop-agent-release-verify.yml'
            - 'products/desktop/pnpm-lock.yaml'
            - 'products/desktop/pnpm-workspace.yaml'

jobs:
    verify:
        name: Verify agent release build
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
            run:
                working-directory: products/desktop
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
              with:
                  package_json_file: products/desktop/package.json

            - name: Set up Node 24
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24

            - name: Get pnpm store path
              id: pnpm-store
              run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

            # Restore-only: desktop-warm-caches.yml seeds this on master pushes.
            - name: Restore pnpm store
              uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: ${{ steps.pnpm-store.outputs.path }}
                  key: desktop-pnpm-${{ runner.os }}-${{ hashFiles('products/desktop/pnpm-lock.yaml') }}
                  restore-keys: desktop-pnpm-${{ runner.os }}-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build and test agent release
              uses: ./.github/actions/desktop-build-agent-release
