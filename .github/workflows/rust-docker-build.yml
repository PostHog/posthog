name: Build and deploy rust container images

# Production build + deploy for Rust services on master.
# Uses selective builds: only images affected by changed files are built and deployed.
# workflow_dispatch always builds all images (escape hatch).
#
# Image list: .github/rust-images.yml
# Build steps: .github/workflows/_rust-build-images.yml
# Affected-set computation: rust/affected-services (Rust binary crate)

on:
    workflow_dispatch:
    push:
        paths:
            - 'rust/**'
            - 'proto/**'
            - '.github/workflows/rust-docker-build.yml'
            - '.github/workflows/_rust-build-images.yml'
            - '.github/rust-images.yml'
        branches:
            - 'master'
    pull_request:
        paths:
            - 'rust/**'
            - 'proto/**'
            - '.github/workflows/rust-docker-build.yml'
            - '.github/workflows/_rust-build-images.yml'
            - '.github/rust-images.yml'
        branches:
            - 'master'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    affected:
        name: compute affected images
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        # Skip on workflow_dispatch — always build everything (escape hatch)
        if: >-
            github.event_name != 'workflow_dispatch' &&
            (github.event_name != 'pull_request' ||
             github.event.pull_request.head.repo.full_name == github.repository)
        permissions:
            contents: read
        outputs:
            image-filter: ${{ steps.compute.outputs.images }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  sparse-checkout: |
                      rust/
                      proto/
                      .github/rust-images.yml
                      .github/actions/rust-compute-affected/
                  sparse-checkout-cone-mode: false
                  clean: false

            - name: Install rust
              uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.91.1

            - name: Compute affected images
              id: compute
              uses: ./.github/actions/rust-compute-affected
              with:
                  event-name: ${{ github.event_name }}
                  pr-base-sha: ${{ github.event.pull_request.base.sha }}
                  push-before-sha: ${{ github.event.before }}

    build-images:
        needs: affected
        # always() is required because 'affected' may be skipped (workflow_dispatch),
        # and GitHub Actions treats skipped dependencies as failures by default.
        # !cancelled() prevents running after manual workflow cancellation.
        # Run unless affected explicitly found zero images ('none') or failed.
        if: |
            always() && !cancelled() &&
            (github.event_name != 'pull_request' ||
             github.event.pull_request.head.repo.full_name == github.repository) &&
            needs.affected.result != 'failure' &&
            needs.affected.outputs.image-filter != 'none'
        uses: ./.github/workflows/_rust-build-images.yml
        with:
            # Only the canonical deploy repo pushes prod images on master; PRs still push for validation.
            push: ${{ github.event_name == 'pull_request' || vars.CD_DEPLOY_ENABLED == 'true' }}
            image-filter: ${{ needs.affected.outputs.image-filter || '' }}
            tag-rules: |
                type=ref,event=pr
                type=ref,event=branch
                type=semver,pattern={{version}}
                type=semver,pattern={{major}}.{{minor}}
                type=sha
            timeout-minutes: 30
        secrets:
            POSTHOG_API_TOKEN: ${{ secrets.POSTHOG_API_TOKEN }}
            POSTHOG_DEVEX_PROJECT_API_TOKEN: ${{ secrets.POSTHOG_DEVEX_PROJECT_API_TOKEN }}
            # Deliberately reuses the frontend sourcemap upload key: sourcemaps and
            # native symbols go through the same symbol-set upload API on the same
            # internal project, so there is no separate org secret to create.
            # Rotating POSTHOG_UPLOAD_SOURCEMAPS_CLI_API_KEY affects both uploads.
            POSTHOG_UPLOAD_SYMBOLS_CLI_API_KEY: ${{ secrets.POSTHOG_UPLOAD_SOURCEMAPS_CLI_API_KEY }}
        permissions:
            id-token: write
            contents: read
            packages: write

    deploy:
        name: deploy ${{ matrix.release }}
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        needs: build-images
        if: github.repository_owner == 'PostHog' && vars.CD_DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/master'
        strategy:
            # fail-fast false so one missing digest doesn't cancel other deploys
            fail-fast: false
            matrix:
                include:
                    - release: capture
                      digest_key: capture
                      values_key: image
                    - release: capture-replay
                      digest_key: capture
                      values_key: image
                    - release: cyclotron
                      digest_key: cyclotron-janitor
                      values_key: janitor_image
                    - release: property-defs-rs
                      digest_key: property-defs-rs
                      values_key: image
                    - release: property-vals-rs
                      digest_key: property-vals-rs
                      values_key: image
                    - release: feature-flags
                      digest_key: feature-flags
                      values_key: image
                    - release: flags-cache-jumphost
                      digest_key: flags-cache-warmer
                      values_key: image
                    - release: flags-cache-builder
                      digest_key: flags-cache-builder
                      values_key: image
                    - release: flags-consumer
                      digest_key: flags-consumer
                      values_key: image
                    - release: cohort-event-shuffler
                      digest_key: cohort-event-shuffler
                      values_key: image
                    - release: cohort-stream-processor
                      digest_key: cohort-stream-processor
                      values_key: image
                    - release: batch-import-worker
                      digest_key: batch-import-worker
                      values_key: image
                    - release: cymbal
                      digest_key: cymbal
                      values_key: image
                    - release: embedding-worker
                      digest_key: embedding-worker
                      values_key: image
                    - release: capture-logs
                      digest_key: capture-logs
                      values_key: image
                    - release: ingestion-consumer
                      digest_key: ingestion-consumer
                      values_key: image
                    - release: kafka-deduplicator
                      digest_key: kafka-deduplicator
                      values_key: image
                    - release: sqlx-migrate
                      digest_key: sqlx-migrate
                      values_key: image
                    - release: personhog-leader
                      digest_key: personhog-leader
                      values_key: image
                    - release: personhog-replica
                      digest_key: personhog-replica
                      values_key: image
                    - release: personhog-router
                      digest_key: personhog-router
                      values_key: image
                    - release: personhog-writer
                      digest_key: personhog-writer
                      values_key: image
                    - release: kafka-assigner
                      digest_key: kafka-assigner
                      values_key: image
                    - release: hypercache-server
                      digest_key: hypercache-server
                      values_key: image
        steps:
            - name: check if image was built
              id: check
              env:
                  DIGESTS: ${{ needs.build-images.outputs.digests }}
                  KEY: ${{ matrix.digest_key }}
              run: |
                  digest=$(echo "$DIGESTS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('$KEY',''))")
                  if [ -n "$digest" ]; then
                      echo "skip=false" >> "$GITHUB_OUTPUT"
                      echo "digest=$digest" >> "$GITHUB_OUTPUT"
                  else
                      echo "Skipping ${{ matrix.release }} — image not in this build"
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: get deployer token
              if: steps.check.outputs.skip != 'true'
              id: deployer
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_CHARTS_DEPLOYER_APP_ID }}
                  private-key: ${{ secrets.GH_APP_CHARTS_DEPLOYER_PRIVATE_KEY }}
                  owner: PostHog
                  repositories: charts

            - name: trigger ${{ matrix.release }} deployment
              if: steps.check.outputs.skip != 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {"${{ matrix.values_key }}": {"sha": "${{ steps.check.outputs.digest }}"}},
                        "release": "${{ matrix.release }}",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": [],
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }
