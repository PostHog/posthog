name: Import secrets and variables to Depot CI
on: push

permissions:
  id-token: write
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_INFERENCE_CREDENTIAL: ${{ secrets.AZURE_INFERENCE_CREDENTIAL }}
          AZURE_INFERENCE_ENDPOINT: ${{ secrets.AZURE_INFERENCE_ENDPOINT }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INKEEP_API_KEY: ${{ secrets.INKEEP_API_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          unset DEPOT_TOKEN
          depot ci secrets add ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" AZURE_INFERENCE_CREDENTIAL="$AZURE_INFERENCE_CREDENTIAL" AZURE_INFERENCE_ENDPOINT="$AZURE_INFERENCE_ENDPOINT" FIREWORKS_API_KEY="$FIREWORKS_API_KEY" GEMINI_API_KEY="$GEMINI_API_KEY" INKEEP_API_KEY="$INKEEP_API_KEY" MODAL_TOKEN_ID="$MODAL_TOKEN_ID" MODAL_TOKEN_SECRET="$MODAL_TOKEN_SECRET" OPENAI_API_KEY="$OPENAI_API_KEY" OPENROUTER_API_KEY="$OPENROUTER_API_KEY" --repo PostHog/posthog
  variables:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import variables
        env:
          OIDC_RSA_FAKE_PRIVATE_KEY: ${{ vars.OIDC_RSA_FAKE_PRIVATE_KEY }}
        run: |
          unset DEPOT_TOKEN
          depot ci vars add OIDC_RSA_FAKE_PRIVATE_KEY="$OIDC_RSA_FAKE_PRIVATE_KEY" --repo PostHog/posthog
