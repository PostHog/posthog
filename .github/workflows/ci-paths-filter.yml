name: Vendored paths-filter action

on:
    pull_request:
        paths:
            - '.github/actions/paths-filter/**'
            - '.github/workflows/ci-paths-filter.yml'
    merge_group:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read

jobs:
    verify:
        name: Test and verify committed bundle
        runs-on: ubuntu-latest
        timeout-minutes: 10
        defaults:
            run:
                working-directory: .github/actions/paths-filter
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version-file: .nvmrc
                  token: ${{ github.token }}
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npx jest
            # The action runs the committed dist/index.js. Rebuild from src and fail if it
            # drifted — a stale bundle would silently run old matching logic in CI.
            - name: Verify dist/index.js matches src
              run: |
                  npx ncc build src/main.ts -o dist_check
                  if ! diff -q dist_check/index.js dist/index.js; then
                      echo "::error::dist/index.js is out of date. Run 'npx ncc build src/main.ts -o dist' in .github/actions/paths-filter and commit the result."
                      exit 1
                  fi
