name: actionlint spike

# Diagnostic spike: count actionlint findings (with and without shellcheck
# integration) to size the rollout. Both jobs continue-on-error so the spike
# never blocks merges. Delete this file once data is captured.

on:
    pull_request:
        paths:
            - .github/workflows/_actionlint-spike.yml

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    ACTIONLINT_VERSION: 1.7.12
    ACTIONLINT_SCRIPT_REF: 914e7df21a07ef503a81201c76d2b11c789d3fca

jobs:
    actionlint-strict:
        name: actionlint (shellcheck on)
        runs-on: ubuntu-latest
        timeout-minutes: 5
        continue-on-error: true
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  sparse-checkout: .github
                  sparse-checkout-cone-mode: false

            - name: Install actionlint (pinned)
              run: |
                  set -euo pipefail
                  mkdir -p ./.bin
                  curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/${ACTIONLINT_SCRIPT_REF}/scripts/download-actionlint.bash" \
                      | bash -s -- "${ACTIONLINT_VERSION}" ./.bin
                  ./.bin/actionlint -version

            - name: Run actionlint (default; shellcheck on if available)
              # No -e: actionlint exits non-zero when findings exist; we still want the JSON.
              run: |
                  set -uo pipefail
                  ./.bin/actionlint -format '{{json .}}' > actionlint.json

            - name: Summarize findings by kind
              run: |
                  set -euo pipefail
                  {
                      echo "# actionlint (shellcheck on)"
                      echo
                      echo "**actionlint:** v${ACTIONLINT_VERSION}"
                      echo "**Total findings:** $(jq length actionlint.json)"
                      echo
                      echo "| kind | count |"
                      echo "|---|---|"
                      jq -r 'group_by(.kind) | map({kind: .[0].kind, count: length}) | sort_by(-.count) | .[] | "| `\(.kind)` | \(.count) |"' actionlint.json
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload findings JSON
              if: always()
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: actionlint-strict-findings
                  path: actionlint.json
                  retention-days: 14

    actionlint-no-shellcheck:
        name: actionlint (shellcheck off)
        runs-on: ubuntu-latest
        timeout-minutes: 5
        continue-on-error: true
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  sparse-checkout: .github
                  sparse-checkout-cone-mode: false

            - name: Install actionlint (pinned)
              run: |
                  set -euo pipefail
                  mkdir -p ./.bin
                  curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/${ACTIONLINT_SCRIPT_REF}/scripts/download-actionlint.bash" \
                      | bash -s -- "${ACTIONLINT_VERSION}" ./.bin
                  ./.bin/actionlint -version

            - name: Run actionlint (-shellcheck= disabled)
              # No -e: actionlint exits non-zero when findings exist; we still want the JSON.
              run: |
                  set -uo pipefail
                  ./.bin/actionlint -shellcheck= -format '{{json .}}' > actionlint.json

            - name: Summarize findings by kind
              run: |
                  set -euo pipefail
                  {
                      echo "# actionlint (shellcheck off)"
                      echo
                      echo "**actionlint:** v${ACTIONLINT_VERSION}"
                      echo "**Total findings:** $(jq length actionlint.json)"
                      echo
                      echo "| kind | count |"
                      echo "|---|---|"
                      jq -r 'group_by(.kind) | map({kind: .[0].kind, count: length}) | sort_by(-.count) | .[] | "| `\(.kind)` | \(.count) |"' actionlint.json
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload findings JSON
              if: always()
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: actionlint-no-shellcheck-findings
                  path: actionlint.json
                  retention-days: 14
