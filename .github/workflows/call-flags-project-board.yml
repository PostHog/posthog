# This workflow manages pull requests on project boards for the Feature Flags teams.
# It uses a team-to-board mapping (TEAM_BOARDS) to route PRs to the correct boards.
# When a member of a mapped team is added as a reviewer to a PR, the workflow will:
# - Add the PR to that team's project board
# - Set the status of the PR to 'In Review'
# When a PR is converted to draft mode, the workflow will:
# - Set the status of the PR to 'In Progress'
# When a PR is marked ready for review, the workflow will:
# - Set the status of the PR to 'In Review'
# When changes are requested on a PR review, the workflow will:
# - Set the status of the PR to 'In Progress'
# A single PR can be added to multiple boards if reviewers from multiple teams are requested.
#
# Previously this called PostHog/.github/.github/workflows/flags-project-board.yml@main
# but was inlined to add error handling for team lookups (listMembersInOrg).

name: Call Feature Flags Project Workflow

env:
    ORG_NAME: PostHog
    TEAM_BOARDS: |
        team-feature-flags=PVT_kwDOA5iQ-M4AroCF
        team-flags-platform=PVT_kwDOA5iQ-M4BPB59
        clickhouse=PVT_kwDOA5iQ-M4ARqEU

on:
    pull_request:
        types: [opened, ready_for_review, review_requested, synchronize, converted_to_draft, reopened]

permissions: {}

jobs:
    add-to-project-board:
        runs-on: ubuntu-latest
        # Only on PostHog/posthog, as there's no GitHub token on forks
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        steps:
            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ secrets.PROJECT_BOARD_BOT_APP_ID }}
                  private-key: ${{ secrets.PROJECT_BOARD_BOT_PRIVATE_KEY }}
                  owner: ${{ env.ORG_NAME }}

            - name: Determine PR status and matching boards
              id: check
              uses: actions/github-script@v7
              env:
                  ORG_NAME: '${{ env.ORG_NAME }}'
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const teamBoardConfig = process.env.TEAM_BOARDS
                          .trim().split('\n')
                          .filter(line => line.trim() && !line.startsWith('#'))
                          .map(line => {
                              const [teamSlug, projectId] = line.trim().split('=');
                              return { team_slug: teamSlug, project_v2_id: projectId };
                          });

                      const pr = context.payload.pull_request;
                      const isDraft = pr.draft;
                      const nodeId = pr.node_id;
                      const owner = process.env.ORG_NAME;
                      const repo = pr.base.repo.name;
                      const prNumber = pr.number;

                      core.info(`Evaluating PR #${prNumber} (draft: ${isDraft})`);

                      const requestedTeams = pr.requested_teams || [];
                      const requestedReviewers = pr.requested_reviewers || [];

                      const matchingBoards = [];

                      for (const config of teamBoardConfig) {
                          const teamSlug = config.team_slug;
                          core.info(`Checking team '${teamSlug}'…`);

                          const isTeamRequested = requestedTeams.some(t => t.slug === teamSlug);
                          let isMemberRequested = false;

                          if (isTeamRequested) {
                              core.info(`'${teamSlug}' is requested as a reviewer`);
                          } else if (requestedReviewers.length > 0) {
                              core.info(`'${teamSlug}' is not requested directly. Checking if any reviewer is a member…`);
                              let teamMembers = [];
                              try {
                                  const { data } = await github.rest.teams.listMembersInOrg({
                                      org: owner,
                                      team_slug: teamSlug,
                                      per_page: 100
                                  });
                                  teamMembers = data;
                              } catch (err) {
                                  if (err.status === 404 || err.status === 403) {
                                      core.warning(`Team '${teamSlug}' not found or not accessible (HTTP ${err.status}) — skipping member check`);
                                  } else {
                                      throw err;
                                  }
                              }
                              isMemberRequested = requestedReviewers.some(reviewer =>
                                  teamMembers.some(member => member.login === reviewer.login)
                              );
                          } else {
                              core.info(`No reviewers requested. Skipping team '${teamSlug}'.`);
                          }

                          if (isTeamRequested || isMemberRequested) {
                              const desiredStatus = isDraft ? 'In Progress' : 'In Review';
                              core.info(`${isDraft ? 'Draft ' : ''}PR #${prNumber} has a reviewer from '${teamSlug}'. Setting status to '${desiredStatus}'.`);

                              matchingBoards.push({
                                  team_slug: teamSlug,
                                  project_v2_id: config.project_v2_id,
                                  desired_status: desiredStatus
                              });
                          } else {
                              core.info(`PR #${prNumber} is not relevant to team '${teamSlug}'. Skipping.`);
                          }
                      }

                      core.info(`Matched ${matchingBoards.length} board(s).`);
                      core.setOutput('has_matches', (matchingBoards.length > 0).toString());
                      core.setOutput('matching_boards', JSON.stringify({
                          boards: matchingBoards,
                          pr_number: prNumber.toString(),
                          pr_title: pr.title || `#${prNumber}`
                      }));
                      core.setOutput('pr_node_id', nodeId);

            - name: Update Project Boards
              if: steps.check.outputs.has_matches == 'true'
              uses: actions/github-script@v7
              env:
                  MATCHING_BOARDS: '${{ steps.check.outputs.matching_boards }}'
                  PR_NODE_ID: ${{ steps.check.outputs.pr_node_id }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const data = JSON.parse(process.env.MATCHING_BOARDS);
                      const matchingBoards = data.boards;
                      const contentId = process.env.PR_NODE_ID;
                      const prNumber = data.pr_number;
                      const prTitle = data.pr_title;

                      const errors = [];

                      for (const board of matchingBoards) {
                          const projectId = board.project_v2_id;

                          try {
                              const projectQuery = `
                                query($projectId: ID!) {
                                  node(id: $projectId) {
                                    ... on ProjectV2 {
                                      title
                                      fields(first: 10) {
                                        nodes {
                                          ... on ProjectV2SingleSelectField {
                                            id
                                            name
                                            options {
                                              id
                                              name
                                            }
                                          }
                                        }
                                      }
                                    }
                                  }
                                }
                              `;

                              const projectResult = await github.graphql(projectQuery, { projectId });
                              const project = projectResult.node;

                              const statusField = project.fields.nodes.find(
                                  f => f.name?.toLowerCase() === 'status'
                              );
                              if (!statusField) {
                                  throw new Error(
                                      `No 'Status' field found in project '${project.title}'. ` +
                                      `Available fields: ${project.fields.nodes.map(f => f.name).filter(Boolean).join(', ')}`
                                  );
                              }

                              const statusOption = statusField.options.find(
                                  o => o.name?.toLowerCase() === board.desired_status.toLowerCase()
                              );
                              if (!statusOption) {
                                  throw new Error(
                                      `No '${board.desired_status}' option in Status field of project '${project.title}'. ` +
                                      `Available options: ${statusField.options.map(o => o.name).join(', ')}`
                                  );
                              }

                              const fieldId = statusField.id;
                              const optionId = statusOption.id;
                              core.info(`Discovered Status field (ID: ${fieldId}) with option '${statusOption.name}' (ID: ${optionId}).`);

                              core.info(`Checking if PR #${prNumber} (${prTitle}) is already in project '${project.title}'…`);

                              const itemsQuery = `
                                query($projectId: ID!) {
                                  node(id: $projectId) {
                                    ... on ProjectV2 {
                                      items(first: 100) {
                                        nodes {
                                          id
                                          content {
                                            ... on PullRequest {
                                              id
                                            }
                                          }
                                        }
                                      }
                                    }
                                  }
                                }
                              `;

                              const result = await github.graphql(itemsQuery, { projectId });
                              const items = result.node.items.nodes;
                              let existingItemId = items.find(item => item.content?.id === contentId)?.id || null;

                              if (existingItemId) {
                                  core.info(`PR #${prNumber} (${prTitle}) already exists in project '${project.title}'. Updating status to '${statusOption.name}'…`);
                              } else {
                                  core.info(`Adding PR #${prNumber} (${prTitle}) to project '${project.title}'…`);
                                  const addItemMutation = `
                                    mutation($projectId: ID!, $contentId: ID!) {
                                      addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                                        item {
                                          id
                                        }
                                      }
                                    }
                                  `;

                                  const response = await github.graphql(addItemMutation, { projectId, contentId });
                                  existingItemId = response.addProjectV2ItemById.item.id;
                                  core.info(`Added PR #${prNumber} (${prTitle}) to project '${project.title}'.`);
                              }

                              const updateStatusMutation = `
                                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                                  updateProjectV2ItemFieldValue(input: {
                                    projectId: $projectId,
                                    itemId: $itemId,
                                    fieldId: $fieldId,
                                    value: { singleSelectOptionId: $optionId }
                                  }) {
                                    projectV2Item {
                                      id
                                    }
                                  }
                                }
                              `;

                              await github.graphql(updateStatusMutation, {
                                  projectId,
                                  itemId: existingItemId,
                                  fieldId,
                                  optionId
                              });
                              core.info(`Updated PR #${prNumber} (${prTitle}) status to '${statusOption.name}' in project '${project.title}'.`);
                          } catch (error) {
                              const msg = `Failed to update board for team '${board.team_slug}': ${error.message}`;
                              core.error(msg);
                              errors.push(msg);
                          }
                      }

                      if (errors.length > 0) {
                          core.setFailed(`${errors.length} board update(s) failed:\n${errors.join('\n')}`);
                      }
