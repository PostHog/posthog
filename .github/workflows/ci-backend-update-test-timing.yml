name: Backend & Dagster CI - Update test timing

on:
    workflow_dispatch:
        inputs:
            backend_run_id:
                description: 'Backend CI run ID (leave empty to use latest successful run)'
                required: false
                type: string
            dagster_run_id:
                description: 'Dagster CI run ID (leave empty to use latest successful run)'
                required: false
                type: string
    schedule:
        # Daily: merge the latest CI timing artifacts and refresh the Actions cache that
        # ci-backend / ci-dagster restore for sharding. This is the day-to-day freshness.
        - cron: '0 3 * * *'
        # Monthly (1st): same merge, but this run also commits the .test_durations fallback
        # via PR. The committed file is only the cold-start / cache-miss floor, so it doesn't
        # need a daily commit. Distinguished from the daily run via github.event.schedule
        # below — keep this string in sync with the should_commit check.
        - cron: '0 4 1 * *'

permissions:
    contents: write
    actions: read
    pull-requests: write

jobs:
    collect-and-merge:
        name: Collect timing data from CI artifacts
        runs-on: depot-ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Get app token
              id: app-token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_TESTS_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_TESTS_PRIVATE_KEY }}

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  # For PRs: checkout PR head; for schedule/dispatch: checkout branch by name (not SHA)
                  ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
                  repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
                  token: ${{ steps.app-token.outputs.token }}

            - name: Install uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
              with:
                  version: '0.11.14' # pinned: unpinned setup-uv calls GH API on every job, exhausts rate limit

            - name: Find Backend CI run to use
              id: find-backend-run
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  INPUT_RUN_ID: ${{ inputs.backend_run_id }}
              run: |
                  if [ -n "$INPUT_RUN_ID" ]; then
                      echo "run_id=$INPUT_RUN_ID" >> $GITHUB_OUTPUT
                      echo "Using provided Backend CI run: $INPUT_RUN_ID"
                      exit 0
                  fi

                  # Find a recent successful ci-backend.yml run with timing artifacts
                  # Most runs skip tests due to path filtering (~20 sec), so filter by duration first
                  # Runs that actually execute tests take 15+ minutes
                  # Only consider runs from the past 14 days to ensure artifacts haven't expired
                  echo "Searching for Backend CI run with timing artifacts..."

                  # Calculate date 14 days ago in ISO 8601 format
                  cutoff_date=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-14d +%Y-%m-%dT%H:%M:%SZ)
                  # Get runs that took more than 5 minutes (300 seconds) - likely ran tests
                  # Filter to runs created in the past 14 days to avoid expired artifacts
                  run_id=$(gh api "repos/${{ github.repository }}/actions/workflows/ci-backend.yml/runs?status=success&branch=master&per_page=100&created=>=$cutoff_date" \
                      --jq '.workflow_runs[] | select(
                          (.updated_at | fromdateiso8601) - (.run_started_at | fromdateiso8601) > 300
                      ) | .id' | head -5 | \
                      while read id; do
                          count=$(gh api "repos/${{ github.repository }}/actions/runs/$id/artifacts?per_page=100" \
                              --jq '[.artifacts[] | select(.name | startswith("timing_data-")) | select(.expired == false)] | length' 2>/dev/null)
                          echo "Run $id has $count timing artifacts" >&2
                          if [ "$count" -ge "38" ]; then
                              echo "$id"
                              break
                          fi
                      done)

                  if [ -z "$run_id" ]; then
                      echo "::error::No suitable Backend CI run found with timing artifacts"
                      exit 1
                  fi

                  echo "run_id=$run_id" >> $GITHUB_OUTPUT
                  echo "Found Backend CI run: $run_id"

            - name: Find Dagster CI run to use
              id: find-dagster-run
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  INPUT_RUN_ID: ${{ inputs.dagster_run_id }}
              run: |
                  if [ -n "$INPUT_RUN_ID" ]; then
                      echo "run_id=$INPUT_RUN_ID" >> $GITHUB_OUTPUT
                      echo "Using provided Dagster CI run: $INPUT_RUN_ID"
                      exit 0
                  fi

                  # Find a recent successful ci-dagster.yml run with timing artifacts
                  # Only consider runs from the past 14 days to ensure artifacts haven't expired
                  echo "Searching for Dagster CI run with timing artifacts..."

                  # Calculate date 14 days ago in ISO 8601 format
                  cutoff_date=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-14d +%Y-%m-%dT%H:%M:%SZ)
                  # Get runs that took more than 5 minutes (300 seconds) - likely ran tests
                  run_id=$(gh api "repos/${{ github.repository }}/actions/workflows/ci-dagster.yml/runs?status=success&branch=master&per_page=100&created=>=$cutoff_date" \
                      --jq '.workflow_runs[] | select(
                          (.updated_at | fromdateiso8601) - (.run_started_at | fromdateiso8601) > 300
                      ) | .id' | head -5 | \
                      while read id; do
                          count=$(gh api "repos/${{ github.repository }}/actions/runs/$id/artifacts?per_page=100" \
                              --jq '[.artifacts[] | select(.name | startswith("timing_data-Dagster-")) | select(.expired == false)] | length' 2>/dev/null)
                          echo "Run $id has $count Dagster timing artifacts" >&2
                          # Expect at least 3 Dagster shards
                          if [ "$count" -ge "3" ]; then
                              echo "$id"
                              break
                          fi
                      done)

                  if [ -z "$run_id" ]; then
                      echo "::warning::No suitable Dagster CI run found with timing artifacts - skipping Dagster"
                      echo "run_id=" >> $GITHUB_OUTPUT
                  else
                      echo "run_id=$run_id" >> $GITHUB_OUTPUT
                      echo "Found Dagster CI run: $run_id"
                  fi

            - name: Download timing artifacts
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  BACKEND_RUN_ID: ${{ steps.find-backend-run.outputs.run_id }}
                  DAGSTER_RUN_ID: ${{ steps.find-dagster-run.outputs.run_id }}
              run: |
                  # Download backend timing artifacts. Use segment-specific patterns
                  # so we don't accidentally pull Dagster artifacts here when the same
                  # run ID is provided for both jobs (they share the timing_data- prefix
                  # and would otherwise collide on extraction into the same dir).
                  gh run download "$BACKEND_RUN_ID" \
                      --pattern "timing_data-Core-*" \
                      --pattern "timing_data-Temporal-*" \
                      --pattern "timing_data-Products-*" \
                      --dir timing_artifacts

                  # JUnit artifacts power precise per-shard carrier detection.
                  # Without these, optimize_test_durations.py silently takes the
                  # statistical fallback and the JUnit-arg becomes a no-op.
                  gh run download "$BACKEND_RUN_ID" \
                      --pattern "junit-results-backend-core-*" \
                      --pattern "junit-results-backend-temporal-*" \
                      --dir junit_artifacts || \
                      echo "::warning::No JUnit artifacts found — falling back to statistical carrier detection"

                  # Download dagster timing artifacts if available
                  if [ -n "$DAGSTER_RUN_ID" ]; then
                      gh run download "$DAGSTER_RUN_ID" --pattern "timing_data-Dagster-*" --dir timing_artifacts
                      echo "Downloaded Dagster timing artifacts"
                  else
                      echo "Skipping Dagster timing artifacts (no suitable run found)"
                  fi

            - name: Process timing data
              env:
                  DAGSTER_RUN_ID: ${{ steps.find-dagster-run.outputs.run_id }}
              run: |
                  # Process each segment separately with migration tax correction, then merge.
                  # Core/Temporal use JUnit for precise carrier detection.
                  # Products lack JUnit artifacts, so use statistical detection (--shard-count).
                  uv run .github/scripts/optimize_test_durations.py timing_artifacts /tmp/core_durations \
                      --segment Core --junit-dir junit_artifacts
                  uv run .github/scripts/optimize_test_durations.py timing_artifacts /tmp/temporal_durations \
                      --segment Temporal --junit-dir junit_artifacts
                  uv run .github/scripts/optimize_test_durations.py timing_artifacts /tmp/products_durations \
                      --segment Products

                  # Process Dagster segment if available
                  if [ -n "$DAGSTER_RUN_ID" ]; then
                      uv run .github/scripts/optimize_test_durations.py timing_artifacts /tmp/dagster_durations \
                          --segment Dagster
                      echo "Processed Dagster timing data"
                  fi

                  # Outlier-merge across per-segment outputs. Single implementation
                  # in optimize_test_durations.py (outlier_merge_durations) is shared
                  # with per-segment artifact processing and covered by tests next
                  # to the script — see test_optimize_test_durations.py.
                  uv run .github/scripts/optimize_test_durations.py .test_durations \
                      --merge-files /tmp/core_durations /tmp/temporal_durations /tmp/products_durations /tmp/dagster_durations

                  # Additionally emit nodeid-clean per-segment files for
                  # --split-granularity=file. The shared .test_durations above is a union
                  # across every CI job, so a Core file-mode plan scoped to it budgets weight
                  # for tests that never run in Core (other segments' param variants,
                  # product-routed files) — that mis-scoping is the imbalance file-mode hit.
                  # --scope-to-junit trims each file to exactly the nodeids that segment's
                  # JUnit saw run; the run-set is already in the artifacts, so this adds no
                  # collection. The union above is untouched (item-mode + turbo-discover still
                  # read it); these are purely additive, cached per-segment below.
                  uv run .github/scripts/optimize_test_durations.py timing_artifacts .test_durations.core \
                      --segment Core --junit-dir junit_artifacts --scope-to-junit
                  uv run .github/scripts/optimize_test_durations.py timing_artifacts .test_durations.temporal \
                      --segment Temporal --junit-dir junit_artifacts --scope-to-junit

                  # Also drop junit_artifacts — ghcommit-action defaults file_pattern
                  # to "." and chokes on leftover download dirs ("read junit_artifacts/:
                  # is a directory"). The commit steps below also pin file_pattern as a
                  # belt-and-braces guard.
                  rm -rf timing_artifacts junit_artifacts /tmp/core_durations /tmp/temporal_durations /tmp/products_durations /tmp/dagster_durations

            - name: Compute cache key and monthly-commit flag
              id: durations-meta
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  REF: ${{ github.ref }}
                  SCHEDULE: ${{ github.event.schedule }}
              run: |
                  # Per-day cache key → one new entry per day. Restores match by prefix and only
                  # ever touch the newest entry, so each prior day's entry ages out 7 days after
                  # it stops being newest: up to ~7 daily entries (~1 MB zstd each, ~7 MB total)
                  # coexist before eviction. Tiny, self-pruning, no shared-budget pressure.
                  TODAY=$(date -u +%F)
                  echo "date=$TODAY" >> "$GITHUB_OUTPUT"
                  echo "cache_key=posthog-test-durations-$TODAY" >> "$GITHUB_OUTPUT"
                  # Every run refreshes the cache; only the monthly cron (or a manual dispatch)
                  # also commits the repo fallback, so the daily runs don't churn the 11 MB file.
                  # SCHEDULE is the cron that triggered the run — keep it in sync with the monthly
                  # entry under `on.schedule`. Gated to master so a workflow_dispatch on another
                  # branch can't reset chore/update-test-timings to a non-master SHA and open a PR
                  # full of unrelated diffs (the cache still saves on any branch).
                  if [ "$REF" = "refs/heads/master" ] && { [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$SCHEDULE" = "0 4 1 * *" ]; }; then
                      echo "should_commit=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "should_commit=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Save test durations to Actions cache
              # The merged file is the source of truth for PR + master sharding (ci-backend and
              # ci-dagster restore it by the posthog-test-durations- prefix). Scheduled/dispatch
              # runs are on master, so the cache is readable from every branch. Saved every run;
              # a same-day key is an immutable no-op.
              uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              continue-on-error: true
              with:
                  path: .test_durations
                  key: ${{ steps.durations-meta.outputs.cache_key }}

            - name: Save per-segment durations to Actions cache
              # Nodeid-clean per-segment files for --split-granularity=file. ci-backend
              # restores these by the posthog-test-durations-core- / -temporal- prefixes so a
              # segment's file-mode plan is scoped to what it actually runs. Same per-day key
              # shape as the union above; a miss falls back to the union (still correct, just
              # the pre-fix balance). continue-on-error so a cache hiccup never fails the merge.
              uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              continue-on-error: true
              with:
                  path: |
                      .test_durations.core
                      .test_durations.temporal
                  key: posthog-test-durations-segment-${{ steps.durations-meta.outputs.date }}

            - name: Check for changes
              id: check-changes
              run: |
                  if git diff --quiet .test_durations; then
                      echo "No changes to test durations"
                      echo "changed=false" >> $GITHUB_OUTPUT
                  else
                      echo "Test durations updated"
                      echo "changed=true" >> $GITHUB_OUTPUT
                      git diff --stat .test_durations
                  fi

            # On PR: commit directly to the PR branch (signed via GitHub API)
            - name: Commit to PR branch (signed)
              if: steps.check-changes.outputs.changed == 'true' && github.event_name == 'pull_request'
              uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
              with:
                  commit_message: 'chore(ci): update backend and dagster test timings'
                  repo: ${{ github.repository }}
                  branch: ${{ github.event.pull_request.head.ref }}
                  file_pattern: .test_durations
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

            # On schedule/dispatch: clean up stale branch if no changes. Gated to the monthly
            # commit window so a mid-month "no diff" day can't close the open monthly PR.
            - name: Clean up stale branch
              if: steps.check-changes.outputs.changed == 'false' && github.event_name != 'pull_request' && steps.durations-meta.outputs.should_commit == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "chore/update-test-timings" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    gh pr close "$existing_pr" --delete-branch || true
                    echo "Closed stale PR #$existing_pr and deleted branch"
                  fi

            - name: Reset branch to checked-out SHA
              # Force-reset the branch to the SHA this job was pinned to so each run is
              # independent of any unmerged commits from prior runs. Using `github.sha`
              # (instead of looking up master's current tip) guarantees the branch tip
              # matches workspace HEAD — otherwise a merge to master during the run could
              # leave ghcommit-action with a parent mismatch and the same
              # "Expected branch to point to X but it did not" failure mode.
              if: steps.check-changes.outputs.changed == 'true' && github.event_name != 'pull_request' && steps.durations-meta.outputs.should_commit == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  TARGET_SHA: ${{ github.sha }}
              run: |
                  if gh api repos/${{ github.repository }}/git/ref/heads/chore/update-test-timings >/dev/null 2>&1; then
                    gh api -X PATCH repos/${{ github.repository }}/git/refs/heads/chore/update-test-timings \
                      -f sha="$TARGET_SHA" -F force=true
                    echo "Force-reset branch to $TARGET_SHA (superseding any prior unmerged commits)"
                  else
                    gh api repos/${{ github.repository }}/git/refs -f ref=refs/heads/chore/update-test-timings -f sha="$TARGET_SHA"
                    echo "Created branch at $TARGET_SHA"
                  fi

            # On schedule/dispatch: commit to a branch and create a PR
            - name: Commit via GitHub API (signed)
              if: steps.check-changes.outputs.changed == 'true' && github.event_name != 'pull_request' && steps.durations-meta.outputs.should_commit == 'true'
              uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
              with:
                  commit_message: 'chore(ci): update backend and dagster test timings'
                  repo: ${{ github.repository }}
                  branch: chore/update-test-timings
                  file_pattern: .test_durations
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Create pull request
              if: steps.check-changes.outputs.changed == 'true' && github.event_name != 'pull_request' && steps.durations-meta.outputs.should_commit == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  BACKEND_RUN_ID: ${{ steps.find-backend-run.outputs.run_id }}
                  DAGSTER_RUN_ID: ${{ steps.find-dagster-run.outputs.run_id }}
                  REPO: ${{ github.repository }}
              run: |
                  existing_pr=$(gh pr list --head "chore/update-test-timings" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    echo "PR #$existing_pr already exists — updated by commit"
                  else
                    body="Automated update of test timing data.

                  **Sources:**
                  - Backend CI: [${BACKEND_RUN_ID}](https://github.com/${REPO}/actions/runs/${BACKEND_RUN_ID})"
                    if [ -n "$DAGSTER_RUN_ID" ]; then
                      body+="
                  - Dagster CI: [${DAGSTER_RUN_ID}](https://github.com/${REPO}/actions/runs/${DAGSTER_RUN_ID})"
                    fi
                    body+="

                  This keeps pytest-split sharding balanced."

                    gh pr create \
                      --title "chore(ci): update backend and dagster test timings" \
                      --body "$body" \
                      --base master \
                      --head chore/update-test-timings \
                      --reviewer "PostHog/team-devex"
                  fi
