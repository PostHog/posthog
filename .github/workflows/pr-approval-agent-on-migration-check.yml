name: Stamphog Migration Check Bridge

# Re-triggers pr-approval-agent.yml when the `Migration risk` check completes
# on a stamphog-labeled PR. This closes the timing race where stamphog runs
# before CI's migration analyzer has classified the head commit:
#   - First run: stamphog sees no Migration risk check → returns WAITING
#     (label stays, no review posted).
#   - CI completes the analyzer → posts the Migration risk check.
#   - This bridge fires on check_run:completed → bounces the stamphog label
#     → pr-approval-agent.yml's `labeled` trigger re-runs the review with the
#     check now visible.
#
# The bridge is intentionally minimal. It doesn't decide anything substantive
# — that's stamphog's job. It just turns "Migration risk completed" into a
# plain `labeled` event that the existing review pipeline already handles.

on:
    check_run:
        types: [completed]

permissions:
    contents: read
    pull-requests: write

concurrency:
    # Share the per-PR group with pr-approval-agent.yml so a bounce queued
    # behind an in-flight review waits rather than racing it. Fallback when
    # the check has no associated PRs — concurrency evaluates before the
    # job's `if`, so without this, all PR-less runs would collapse into one
    # malformed group and queue against each other.
    group: pr-approval-${{ github.event.check_run.pull_requests[0].number || 'no-pr' }}
    cancel-in-progress: false

jobs:
    bounce-label:
        if: >-
            github.event.check_run.name == 'Migration risk'
            && github.event.check_run.pull_requests[0] != null
        runs-on: ubuntu-latest
        timeout-minutes: 3

        steps:
            - name: Bounce stamphog label on eligible PRs
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  PRS_JSON: ${{ toJSON(github.event.check_run.pull_requests) }}
              run: |
                  set -euo pipefail

                  # Iterate the PRs linked to this check (typically one, but a
                  # commit can be the head of multiple PRs). For each, only
                  # retrigger when there's something to retrigger:
                  #   - PR not draft (draft PRs aren't reviewed)
                  #   - Has stamphog label (signal that review is wanted)
                  #   - No current github-actions[bot] approval (re-running
                  #     wouldn't change the outcome and burns API + LLM budget)
                  for number in $(jq -r '.[].number' <<< "$PRS_JSON"); do
                      pr=$(gh api "repos/$REPO/pulls/$number")

                      if [ "$(jq -r '.draft' <<< "$pr")" = "true" ]; then
                          echo "PR #$number is draft, skipping"
                          continue
                      fi

                      if ! jq -e 'any(.labels[]; .name == "stamphog")' <<< "$pr" >/dev/null; then
                          echo "PR #$number not stamphog-labeled, skipping"
                          continue
                      fi

                      approval_count=$(gh api "repos/$REPO/pulls/$number/reviews" --paginate \
                          --jq '[.[] | select(.user.login == "github-actions[bot]" and .state == "APPROVED")] | length')
                      if [ "$approval_count" -gt 0 ]; then
                          echo "PR #$number already approved by stamphog, skipping"
                          continue
                      fi

                      echo "PR #$number eligible — bouncing stamphog label to retrigger review"
                      gh pr edit "$number" --remove-label stamphog --repo "$REPO"
                      gh pr edit "$number" --add-label stamphog --repo "$REPO"
                  done
