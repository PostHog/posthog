name: CI CLI
permissions:
    contents: read
on:
    pull_request:
        paths:
            - 'cli/**'
            - '.github/workflows/ci-cli.yml'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    tests:
        name: Run tests
        runs-on: posthog-hetzner
        timeout-minutes: 10
        defaults:
            run:
                working-directory: cli
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install rust
              uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
              with:
                  toolchain: 1.91.1
                  rust-src-dir: cli
                  cache-workspaces: cli
                  cache-shared-key: v2-rust-cli
                  cache-save-if: ${{ github.ref == 'refs/heads/master' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
                  rustflags: ''

            - name: Check Cargo.lock is up to date
              run: |
                  cargo update --workspace --locked
                  git diff --exit-code Cargo.lock

            - name: Run tests
              run: cargo test --all-features

    clippy:
        name: Clippy
        runs-on: posthog-hetzner
        timeout-minutes: 10
        defaults:
            run:
                working-directory: cli
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install rust
              uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
              with:
                  toolchain: 1.91.1
                  components: clippy
                  rust-src-dir: cli
                  cache-workspaces: cli
                  cache-shared-key: v2-rust-cli
                  cache-save-if: ${{ github.ref == 'refs/heads/master' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
                  rustflags: ''

            - name: Run clippy
              run: cargo clippy --all-targets --all-features -- -D warnings

    format:
        name: Format
        runs-on: posthog-hetzner
        timeout-minutes: 5
        defaults:
            run:
                working-directory: cli
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install rust
              uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
              with:
                  toolchain: 1.91.1
                  components: rustfmt
                  rust-src-dir: cli
                  cache-workspaces: cli
                  cache-shared-key: v2-rust-cli
                  cache-save-if: ${{ github.ref == 'refs/heads/master' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
                  rustflags: ''

            - name: Check formatting
              run: cargo fmt --all -- --check
