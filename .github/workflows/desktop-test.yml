name: Desktop Tests

on:
    pull_request:
    push:
        branches: [master]
        paths:
            - 'products/desktop/**'
            - '.github/workflows/desktop-test.yml'
    # Required so `Desktop Tests Pass` (a required status check) reports on merge
    # queue entries — without it the queue would wait for the check until timeout.
    # The jobs themselves skip on merge_group (the suite already ran in full on
    # the PR) and the aggregator treats skipped as success.
    merge_group:

concurrency:
    group: desktop-test-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        if: github.event_name != 'merge_group'
        permissions:
            pull-requests: read
        outputs:
            # On master pushes the filter step is skipped and everything runs.
            code: ${{ steps.filter.outputs.code || 'true' }}
            workflow: ${{ steps.filter.outputs.workflow || 'true' }}
            packages: ${{ steps.filter.outputs.packages }}
        steps:
            - name: Detect relevant changes
              id: filter
              if: github.event_name == 'pull_request'
              uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
              with:
                  predicate-quantifier: every
                  filters: |
                      # Wider excludes than desktop-quality.yml, which keeps .vscode and
                      # .claude in scope because Biome lints them.
                      code:
                        - "products/desktop/**"
                        - "!products/desktop/**/*.md"
                        - "!products/desktop/docs/**"
                        - "!products/desktop/.vscode/**"
                        - "!products/desktop/.claude/**"
                        - "!products/desktop/.husky/**"
                        - "!products/desktop/LICENSE"
                        - "!products/desktop/.gitignore"
                        - "!products/desktop/.env.example"
                      workflow:
                        - ".github/workflows/desktop-test.yml"
                      packages:
                        - "products/desktop/packages/**"

    unit-test:
        needs: changes
        # Fail closed: if change detection itself failed, run instead of skipping.
        if: ${{ !cancelled() && github.event_name != 'merge_group' && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true' || needs.changes.outputs.workflow == 'true') }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
        defaults:
            run:
                working-directory: products/desktop
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
              with:
                  package_json_file: products/desktop/package.json

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22

            - name: Get pnpm store path
              id: pnpm-store
              run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

            # Explicit restore/save instead of setup-node's `cache: pnpm`: that
            # auto-saves on every run (PRs included, ungatable), which the workflow
            # lint forbids. Saves are gated to master pushes below.
            - name: Restore pnpm store
              uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: ${{ steps.pnpm-store.outputs.path }}
                  key: desktop-pnpm-${{ runner.os }}-${{ hashFiles('products/desktop/pnpm-lock.yaml') }}
                  restore-keys: desktop-pnpm-${{ runner.os }}-

            # Only dependency builds are cached, tests themselves always run.
            - name: Restore turbo cache
              uses: ./.github/actions/desktop-restore-turbo-cache

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              env:
                  # The Electron-ABI rebuild would be undone by the Node rebuild below.
                  SKIP_ELECTRON_REBUILD: '1'

            - name: Rebuild native modules for Node
              run: node scripts/rebuild-better-sqlite3-node.mjs

            - name: Run tests
              run: pnpm test

            - name: Upload test results to Trunk
              # Run even when tests fail so flaky/failed results are still reported,
              # but never let an upload problem fail the job.
              if: ${{ !cancelled() }}
              continue-on-error: true
              uses: trunk-io/analytics-uploader@385f1ccdf345b4532dc4b6c665dd432b702b8e28 # v2.1.2
              with:
                  # Scope to each package root. A bare **/junit.xml glob descends into
                  # node_modules, where pnpm symlinks workspace packages, and uploads
                  # every report many times over.
                  junit-paths: 'products/desktop/apps/*/junit.xml,products/desktop/packages/*/junit.xml'
                  org-slug: posthog-inc
                  token: ${{ secrets.TRUNK_API_TOKEN }}

    integration-test:
        needs: changes
        # Fail closed: if change detection itself failed, run instead of skipping.
        if: ${{ !cancelled() && github.event_name != 'merge_group' && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true' || needs.changes.outputs.workflow == 'true') }}
        runs-on: macos-latest
        timeout-minutes: 45
        permissions:
            contents: read
        defaults:
            run:
                working-directory: products/desktop
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
              with:
                  package_json_file: products/desktop/package.json

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22

            - name: Get pnpm store path
              id: pnpm-store
              run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

            # Explicit restore/save instead of setup-node's `cache: pnpm`: that
            # auto-saves on every run (PRs included, ungatable), which the workflow
            # lint forbids. Saves are gated to master pushes below.
            - name: Restore pnpm store
              uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: ${{ steps.pnpm-store.outputs.path }}
                  key: desktop-pnpm-${{ runner.os }}-${{ hashFiles('products/desktop/pnpm-lock.yaml') }}
                  restore-keys: desktop-pnpm-${{ runner.os }}-

            - name: Restore Playwright browsers cache
              uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              id: playwright-cache
              with:
                  path: ~/Library/Caches/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('products/desktop/pnpm-lock.yaml') }}
                  restore-keys: |
                      playwright-${{ runner.os }}-

            - name: Restore Electron binary cache
              uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: ~/Library/Caches/electron
                  key: electron-${{ runner.os }}-${{ hashFiles('products/desktop/pnpm-lock.yaml') }}
                  restore-keys: |
                      electron-${{ runner.os }}-

            # Seeded on Linux; turbo artifacts are plain JS, so cross-OS restore is fine.
            - name: Restore turbo cache
              uses: ./.github/actions/desktop-restore-turbo-cache

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build packages
              run: pnpm run build:deps

            - name: Package Electron app
              run: pnpm --filter code run package
              env:
                  NODE_OPTIONS: '--max-old-space-size=6144'

            - name: Install Playwright
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm --filter code exec playwright install --with-deps chromium

            - name: Run E2E smoke tests
              run: pnpm --filter code run test:e2e
              env:
                  CI: true

            - name: Upload test results to Trunk
              # Run even when E2E tests fail so flaky/failed results are still
              # reported, but never let an upload problem fail the job.
              if: ${{ !cancelled() }}
              continue-on-error: true
              uses: trunk-io/analytics-uploader@385f1ccdf345b4532dc4b6c665dd432b702b8e28 # v2.1.2
              with:
                  junit-paths: 'products/desktop/apps/code/tests/e2e/junit.xml'
                  org-slug: posthog-inc
                  token: ${{ secrets.TRUNK_API_TOKEN }}

            - name: Upload Playwright report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: playwright-report
                  path: products/desktop/apps/code/playwright-report/
                  retention-days: 7

            # Web host e2e: a plain SPA over the Vite dev server (Playwright starts it),
            # no Electron packaging. Reuses the cached Chromium above. Runs even if the
            # desktop suite failed so both hosts report independently.
            - name: Run web E2E smoke tests
              if: ${{ !cancelled() }}
              run: pnpm run test:e2e:web
              env:
                  CI: true

            - name: Upload web test results to Trunk
              if: ${{ !cancelled() }}
              continue-on-error: true
              uses: trunk-io/analytics-uploader@385f1ccdf345b4532dc4b6c665dd432b702b8e28 # v2.1.2
              with:
                  junit-paths: 'products/desktop/apps/web/tests/e2e/junit.xml'
                  org-slug: posthog-inc
                  token: ${{ secrets.TRUNK_API_TOKEN }}

            - name: Upload web Playwright report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: web-playwright-report
                  path: products/desktop/apps/web/playwright-report/
                  retention-days: 7

    e2e:
        # Live-model e2e for the @posthog/agent adapters (claude + codex). Runs only
        # after the unit + integration jobs pass — a red tree never reaches the
        # gateway — and only when a products/desktop/packages/ file changed. Each arm still
        # self-skips unless the POSTHOG_CODE_E2E_GATEWAY_PERSONAL_API_KEY secret is
        # present (fork PRs never see it) and POSTHOG_CODE_E2E_GATEWAY_URL points at
        # a runner-reachable gateway. Drives cheap models (claude-haiku-4-5 /
        # gpt-5-mini), so a run is a handful of short turns.
        needs: [changes, unit-test, integration-test]
        # Always run on any products/desktop/packages/ change (or a change to this workflow),
        # once unit-test + integration-test have passed. There is intentionally NO
        # gate on the gateway config being present: if the POSTHOG_CODE_E2E_*
        # secret/vars are missing, the fail-loud guard
        # (products/desktop/packages/agent/e2e/guard.e2e.test.ts) REDS the run rather than
        # skipping to green. Only fork PRs are skipped, since they never receive the
        # gateway secret and would red spuriously.
        if: ${{ (needs.changes.outputs.packages == 'true' || needs.changes.outputs.workflow == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
        defaults:
            run:
                working-directory: products/desktop
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
              with:
                  package_json_file: products/desktop/package.json

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 22

            - name: Get pnpm store path
              id: pnpm-store
              run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

            # Explicit restore/save instead of setup-node's `cache: pnpm`: that
            # auto-saves on every run (PRs included, ungatable), which the workflow
            # lint forbids. Saves are gated to master pushes below.
            - name: Restore pnpm store
              uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: ${{ steps.pnpm-store.outputs.path }}
                  key: desktop-pnpm-${{ runner.os }}-${{ hashFiles('products/desktop/pnpm-lock.yaml') }}
                  restore-keys: desktop-pnpm-${{ runner.os }}-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Save pnpm store
              if: github.ref == 'refs/heads/master'
              uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: ${{ steps.pnpm-store.outputs.path }}
                  key: desktop-pnpm-${{ runner.os }}-${{ hashFiles('products/desktop/pnpm-lock.yaml') }}

            - name: Build agent dependencies
              run: |
                  pnpm --filter @posthog/shared run build
                  pnpm --filter @posthog/git run build
                  pnpm --filter @posthog/enricher run build

            - name: Download native codex binary
              # Non-fatal at the STEP so a failure surfaces as the fail-loud binary guard
              # (guard.e2e.test.ts) with a clear message rather than an opaque download
              # error. A missing binary then REDS the run (the guard fails when a token is
              # set) instead of letting the codex arm silently skip to green.
              run: node apps/code/scripts/download-binaries.mjs || echo "codex binary download failed; the binary guard test will red the run"

            - name: Run live e2e (both adapters)
              run: pnpm --filter agent run test:e2e
              # The suite reads these POSTHOG_CODE_E2E_* names directly
              # (products/desktop/packages/agent/e2e/config.ts). The personal API key is an org
              # secret; the URL and model/environment overrides are org vars.
              env:
                  POSTHOG_CODE_E2E_GATEWAY_PERSONAL_API_KEY: ${{ secrets.POSTHOG_CODE_E2E_GATEWAY_PERSONAL_API_KEY }}
                  # Accept the URL from either an org var or an org secret — it has ended
                  # up in both places, and vars.* can't see secrets.
                  POSTHOG_CODE_E2E_GATEWAY_URL: ${{ vars.POSTHOG_CODE_E2E_GATEWAY_URL || secrets.POSTHOG_CODE_E2E_GATEWAY_URL }}
                  POSTHOG_CODE_E2E_CLAUDE_MODEL: ${{ vars.POSTHOG_CODE_E2E_CLAUDE_MODEL }}
                  POSTHOG_CODE_E2E_CODEX_MODEL: ${{ vars.POSTHOG_CODE_E2E_CODEX_MODEL }}
                  # Optional: set vars.POSTHOG_CODE_E2E_ENVIRONMENT=cloud to exercise the
                  # cloud code path (sandbox/permission-profile gating). Unset = local. The
                  # OS-sandbox enforcement test is macOS-gated, so it doesn't red this linux
                  # runner.
                  POSTHOG_CODE_E2E_ENVIRONMENT: ${{ vars.POSTHOG_CODE_E2E_ENVIRONMENT }}

    # Collation job for the required status check; must be registered as the
    # required check instead of the individual jobs.
    desktop-tests-pass:
        needs: [changes, unit-test, integration-test, e2e]
        name: Desktop Tests Pass
        runs-on: ubuntu-latest
        timeout-minutes: 5
        if: always()
        steps:
            - name: Check results
              run: |
                  if [[ "${{ github.event_name }}" == "merge_group" ]]; then
                    echo "Merge queue entry: the suite already ran on the PR."
                    exit 0
                  fi
                  for result in "${{ needs.unit-test.result }}" "${{ needs.integration-test.result }}" "${{ needs.e2e.result }}"; do
                    if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
                      echo "A required desktop job did not succeed: $result"
                      exit 1
                    fi
                  done
                  echo "All desktop jobs passed or were skipped."
