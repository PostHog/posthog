name: Update Bot IPs

on:
    schedule:
        # Run daily at 2 AM UTC
        - cron: '0 2 * * *'
    workflow_dispatch: # Allow manual triggering

permissions:
    contents: read

jobs:
    update-bot-ips:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Get app token
              id: app-token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_SCHEDULED_ACTIONS_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_SCHEDULED_ACTIONS_PRIVATE_KEY }}

            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}

            - name: Run update script
              run: |
                  ./bin/update-bots-list

            - name: Check for changes
              id: check-changes
              run: |
                  if git diff --quiet nodejs/assets/bot-ips.txt; then
                    echo "changes=false" >> $GITHUB_OUTPUT
                    echo "No changes detected in bot IPs"
                  else
                    echo "changes=true" >> $GITHUB_OUTPUT
                    echo "Changes detected in bot IPs"
                    git diff --stat nodejs/assets/bot-ips.txt
                  fi

            - name: Clean up stale branch
              if: steps.check-changes.outputs.changes == 'false'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "chore/update-bot-ips" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    gh pr close "$existing_pr" --delete-branch || true
                    echo "Closed stale PR #$existing_pr and deleted branch"
                  fi

            - name: Reset branch to checked-out SHA
              # Force-reset the branch to the SHA this job was pinned to so each run is
              # independent of any unmerged commits from prior runs. Using `github.sha`
              # (instead of looking up master's current tip) guarantees the branch tip
              # matches workspace HEAD — otherwise a merge to master during the run could
              # leave ghcommit-action with a parent mismatch and the same
              # "Expected branch to point to X but it did not" failure mode.
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  TARGET_SHA: ${{ github.sha }}
              run: |
                  if gh api repos/${{ github.repository }}/git/ref/heads/chore/update-bot-ips >/dev/null 2>&1; then
                    gh api -X PATCH repos/${{ github.repository }}/git/refs/heads/chore/update-bot-ips \
                      -f sha="$TARGET_SHA" -F force=true
                    echo "Force-reset branch to $TARGET_SHA (superseding any prior unmerged commits)"
                  else
                    gh api repos/${{ github.repository }}/git/refs -f ref=refs/heads/chore/update-bot-ips -f sha="$TARGET_SHA"
                    echo "Created branch at $TARGET_SHA"
                  fi

            - name: Commit via GitHub API (signed)
              if: steps.check-changes.outputs.changes == 'true'
              uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
              with:
                  commit_message: 'Update bot IPs from GoodBots repository'
                  repo: ${{ github.repository }}
                  branch: chore/update-bot-ips
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Create pull request
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "chore/update-bot-ips" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    echo "PR #$existing_pr already exists — updated by commit"
                  else
                    gh pr create \
                      --title "chore(ci): Update bot IPs from GoodBots repository" \
                      --body "$(cat <<'BODY'
                  This PR updates the bot IPs list from the [GoodBots repository](https://github.com/AnTheMaker/GoodBots).

                  **Changes:**
                  - Updated `nodejs/assets/bot-ips.txt` with latest bot IPs

                  **Source:** https://raw.githubusercontent.com/AnTheMaker/GoodBots/main/all.ips

                  This is an automated update that runs daily.
                  BODY
                  )" \
                      --base master \
                      --head chore/update-bot-ips \
                      --label "automated" --label "bot-ips" --label "dependencies" \
                      --reviewer "PostHog/team-workflows" --reviewer "PostHog/team-ingestion"
                  fi
