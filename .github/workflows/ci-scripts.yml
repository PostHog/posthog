name: Script tests

# Unit tests for the helper scripts in .github/scripts that gate CI decisions
# (e.g. schema-impact narrowing). Without this, a regression in the narrowing
# logic could silently skip affected product tests.
on:
    pull_request:
        paths:
            - .github/scripts/**
            - .github/workflows/ci-scripts.yml

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read

jobs:
    script-tests:
        name: .github/scripts unit tests
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Mint setup-action GitHub token
              id: setup-gh-token
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              continue-on-error: true
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_DEVEX_GENERAL_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_DEVEX_GENERAL_PRIVATE_KEY }}

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version-file: .nvmrc
                  token: ${{ steps.setup-gh-token.outputs.token || github.token }}

            - name: Setup Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version-file: pyproject.toml
                  token: ${{ steps.setup-gh-token.outputs.token || github.token }}

            - name: Install pytest
              run: python -m pip install --quiet pytest

            # `-c /dev/null` skips the repo pytest.ini (its --reuse-db addopt needs
            # pytest-django, which we don't install here).
            - name: Schema-usage scanner tests (Python)
              run: python -m pytest .github/scripts/test_schema_usage_scan.py -v -c /dev/null -p no:cacheprovider

            # Shells out to schema_usage_scan.py via python3 (preinstalled on ubuntu).
            - name: Schema-impact tests (Node)
              run: node --test .github/scripts/schema-impact.test.js

            - name: Master CI alerts tests (Node)
              run: node --test .github/scripts/ci-alerts-devex.test.js
