name: OpenAPI Codegen

on:
    push:
        branches:
            - master
    pull_request:
        paths:
            - '.github/workflows/ci-openapi-codegen.yml'
            - 'tools/openapi-codegen/**'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read

jobs:
    test:
        name: OpenAPI codegen tests
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install pnpm dependencies
              uses: ./.github/actions/pnpm-install
              with:
                  install-command: pnpm --filter=@posthog/openapi-codegen install --frozen-lockfile

            - name: Run tests
              run: pnpm --filter=@posthog/openapi-codegen test
