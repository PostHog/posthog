name: Publish posthog-symbol-data to crates.io

on:
    push:
        tags:
            - 'posthog-symbol-data/v*'

env:
    CARGO_TERM_COLOR: always

jobs:
    publish:
        name: Publish to crates.io
        runs-on: posthog-hetzner
        timeout-minutes: 5
        if: github.repository == 'PostHog/posthog'

        permissions:
            contents: read
            id-token: write

        defaults:
            run:
                working-directory: rust

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install Rust
              uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
              with:
                  toolchain: 1.91.1
                  rust-src-dir: rust
                  cache-workspaces: rust
                  cache-shared-key: v2-rust-symbol-data
                  cache-save-if: ${{ github.ref_type == 'tag' }}
                  rustflags: ''

            - name: Verify tag matches crate version
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#posthog-symbol-data/v}"
                  CRATE_VERSION=$(grep '^version' common/symbol_data/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
                  if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
                      echo "::error::Tag version ($TAG_VERSION) does not match crate version ($CRATE_VERSION)"
                      exit 1
                  fi
                  echo "Publishing posthog-symbol-data v$CRATE_VERSION"

            - name: Authenticate with crates.io
              id: auth
              uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

            - name: Publish to crates.io
              env:
                  CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
              run: cargo publish -p posthog-symbol-data
