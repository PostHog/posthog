# phrocs Build Workflow
#
# Triggers:
#   - Push to master (paths: tools/phrocs/**) → creates versioned + phrocs-latest releases

name: Build phrocs

on:
    push:
        branches:
            - master
        paths:
            - 'tools/phrocs/**'
            - '!tools/phrocs/README.md'
            - '.github/workflows/build-phrocs.yml'

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-24.04

        steps:
            - name: Set version
              id: version
              run: echo "value=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.25.5'
                  cache: true
                  cache-dependency-path: tools/phrocs/go.sum

            - name: Build all platform binaries
              run: cd tools/phrocs && make build-all VERSION="${{ steps.version.outputs.value }}"

            - name: Generate checksums
              run: |
                  cd tools/phrocs/dist
                  sha256sum phrocs-* > checksums.txt

            - name: Create versioned release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "phrocs-${{ steps.version.outputs.value }}" \
                      tools/phrocs/dist/phrocs-linux-amd64 \
                      tools/phrocs/dist/phrocs-linux-arm64 \
                      tools/phrocs/dist/phrocs-darwin-amd64 \
                      tools/phrocs/dist/phrocs-darwin-arm64 \
                      tools/phrocs/dist/checksums.txt \
                      --title "phrocs-${{ steps.version.outputs.value }}" \
                      --notes "Built from commit ${{ github.sha }}" \
                      --latest=false

            - name: Update latest release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release delete phrocs-latest --yes || true
                  git push origin :refs/tags/phrocs-latest || true
                  gh release create phrocs-latest \
                      tools/phrocs/dist/phrocs-linux-amd64 \
                      tools/phrocs/dist/phrocs-linux-arm64 \
                      tools/phrocs/dist/phrocs-darwin-amd64 \
                      tools/phrocs/dist/phrocs-darwin-arm64 \
                      tools/phrocs/dist/checksums.txt \
                      --title "phrocs-latest" \
                      --notes "Latest build (same as phrocs-${{ steps.version.outputs.value }})" \
                      --latest=false
