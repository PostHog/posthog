name: Desktop Agent Release

on:
    push:
        tags:
            - 'agent-v*'

concurrency:
    group: desktop-agent-release
    cancel-in-progress: false

jobs:
    release:
        name: Publish agent to npm
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            id-token: write
        defaults:
            run:
                working-directory: products/desktop
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
              with:
                  package_json_file: products/desktop/package.json

            - name: Set up Node 24
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: 'pnpm'
                  cache-dependency-path: products/desktop/pnpm-lock.yaml

            - name: Extract version from tag
              id: version
              run: |
                  TAG_VERSION="${GITHUB_REF#refs/tags/agent-v}"
                  echo "Version: $TAG_VERSION"
                  echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

            - name: Set version in package.json
              env:
                  APP_VERSION: ${{ steps.version.outputs.version }}
              run: |
                  jq --arg v "$APP_VERSION" '.version = $v' packages/agent/package.json > tmp.json && mv tmp.json packages/agent/package.json
                  echo "Set packages/agent/package.json version to $APP_VERSION"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build and test agent release
              uses: ./.github/actions/desktop-build-agent-release

            - name: Publish the package to npm registry
              working-directory: products/desktop/packages/agent
              run: pnpm publish --access public --no-git-checks
              env:
                  NPM_CONFIG_PROVENANCE: true

    rebuild-sandbox-images:
        name: Rebuild tasks sandbox base images
        needs: release
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
            actions: write
        steps:
            # Same-repo dispatch: the agent now lives in this repository, so the
            # cross-repo GH_APP_POSTHOG_WORKFLOW_TRIGGER app is retired and the
            # ambient token dispatches the rebuild directly.
            - name: Dispatch sandbox image rebuild
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  echo "Dispatching sandbox base image rebuild for $GITHUB_REF_NAME"
                  gh workflow run cd-sandbox-base-image.yml \
                    --repo PostHog/posthog \
                    --ref master
