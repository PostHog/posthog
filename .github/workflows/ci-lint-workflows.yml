name: Lint workflows

on:
    pull_request:
        paths:
            - .github/workflows/**

jobs:
    check-timeouts:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
            - run: pip install pyyaml
            - run: python .github/scripts/check-ci-timeouts.py
