name: Lint workflows

on:
    pull_request:
        paths:
            - .github/workflows/**

permissions:
    contents: read

jobs:
    check-timeouts:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v6
            - run: uv run .github/scripts/check-ci-timeouts.py
