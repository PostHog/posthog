name: Release hogql-parser

on:
    pull_request:
        paths:
            - common/hogql_parser/**
            - .github/workflows/build-hogql-parser.yml

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    check-version:
        name: Check version legitimacy
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        outputs:
            parser-release-needed: ${{ steps.version.outputs.parser-release-needed }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Fetching all for comparison since last push (not just last commit)
                  filter: blob:none

            - name: Check if common/hogql_parser/ has changed
              id: changed-files
              uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47.0.5
              with:
                  files_yaml: |
                      parser:
                      - common/hogql_parser/**

            - name: Check if version was bumped
              shell: bash
              id: version
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PARSER_CHANGED: ${{ steps.changed-files.outputs.parser_any_changed }}
                  IS_FORK: ${{ github.event.pull_request.head.repo.full_name != 'PostHog/posthog' }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  parser_release_needed='false'
                  if [[ "$PARSER_CHANGED" == 'true' ]]; then
                    published=$(curl -fSsl https://pypi.org/pypi/hogql-parser/json | jq -r '.info.version')
                    local=$(python common/hogql_parser/setup.py --version)
                    if [[ "$published" != "$local" ]]; then
                      parser_release_needed='true'
                    else
                      message_body="It looks like the code of \`hogql-parser\` changed in this PR, but its version stayed the same at $local. 👀"
                      message_body+=$'\n'"Make sure to resolve this in \`common/hogql_parser/setup.py\` before merging!"
                      if [[ "$IS_FORK" == 'true' ]]; then
                        message_body+=$'\n'"This needs to be performed on a branch created on the PostHog/posthog repo itself. A PostHog team member will assist with this."
                      fi
                      # Post once, then edit in place on subsequent pushes
                      existing=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | test("hogql-parser.*version stayed the same.*👀")) | .id' | tail -1)
                      if [[ -n "$existing" ]]; then
                        gh api "repos/${{ github.repository }}/issues/comments/$existing" -X PATCH -f body="$message_body"
                      else
                        gh pr comment "$PR_NUMBER" --body "$message_body"
                      fi
                    fi
                  fi
                  echo "parser-release-needed=$parser_release_needed" >> $GITHUB_OUTPUT

    build-wheels:
        name: Build wheels on ${{ matrix.os }}
        needs: check-version
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        if: needs.check-version.outputs.parser-release-needed == 'true' &&
            github.event.pull_request.head.repo.full_name == 'PostHog/posthog'
        strategy:
            matrix:
                os: [ubuntu-22.04, ubuntu-22.04-arm, macos-14, macos-15-intel]
                include:
                    - os: macos-14
                      cibw_archs_macos: arm64
                      MACOSX_DEPLOYMENT_TARGET: 14
                    - os: macos-15-intel
                      cibw_archs_macos: x86_64
                      MACOSX_DEPLOYMENT_TARGET: 15
                    - os: ubuntu-22.04
                      cibw_archs_linux: x86_64
                      MACOSX_DEPLOYMENT_TARGET: ''
                    - os: ubuntu-22.04-arm
                      cibw_archs_linux: aarch64
                      MACOSX_DEPLOYMENT_TARGET: ''

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: '3.12.10' # There is no 3.12.11/3.12.12 binary for mac/darwin architectures yet

            - name: Build sdist
              if: matrix.os == 'ubuntu-22.04' # Only build the sdist once
              run: |
                  pip install setuptools==80.9.0
                  cd common/hogql_parser && python setup.py sdist

            - name: Install cibuildwheel
              run: pip install cibuildwheel==2.23.*

            - name: Build wheels
              run: cd common/hogql_parser && python -m cibuildwheel --output-dir dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos }}
                  CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
                  MACOSX_DEPLOYMENT_TARGET: ${{ matrix.MACOSX_DEPLOYMENT_TARGET }}

            - name: Upload wheels artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: wheels-${{ matrix.os }}
                  path: |
                      common/hogql_parser/dist/*.whl
                      common/hogql_parser/dist/*.tar.gz
                  if-no-files-found: error

    publish:
        name: Publish on PyPI
        needs: build-wheels
        environment: pypi-hogql-parser
        permissions:
            id-token: write
        runs-on: ubuntu-22.04
        timeout-minutes: 10
        steps:
            - name: Download wheels from ubuntu-22.04
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  name: wheels-ubuntu-22.04
                  path: dist

            - name: Download wheels from ubuntu-22.04-arm
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  name: wheels-ubuntu-22.04-arm
                  path: dist

            - name: Download wheels from macos-14
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  name: wheels-macos-14
                  path: dist

            - name: Download wheels from macos-15-intel
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  name: wheels-macos-15-intel
                  path: dist

            - name: Publish package to PyPI
              uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

            # Use GitHub app token so Actions run after commiting changes
            - name: Get app token
              id: app-token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_TESTS_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_TESTS_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  token: ${{ steps.app-token.outputs.token }}

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: 3.12.12

            - name: Install uv
              id: setup-uv
              uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
              with:
                  version: '0.10.2' # pinned: unpinned setup-uv calls GH API on every job, exhausts rate limit
                  enable-cache: true
                  cache-dependency-glob: uv.lock
                  save-cache: ${{ github.ref == 'refs/heads/master' }}

            - name: Update hogql-parser in requirements
              shell: bash
              env:
                  RETRIES: 20
              run: |
                  # setuptools isn't installed by default after actions/setup-python, but
                  # `python setup.py --version` needs it. Mirrors the sdist step above.
                  pip install setuptools==80.9.0
                  VERSION=$(python common/hogql_parser/setup.py --version)
                  # In case the version is not available yet, try up to $RETRIES times
                  for i in $(seq 1 "$RETRIES"); do
                      if uv add "hogql-parser==$VERSION"; then
                          break
                      fi
                      if [[ $i -eq $RETRIES ]]; then
                        echo "Failed to update hogql-parser in requirements"
                        exit 1
                      fi
                      sleep 0.5
                  done

            - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
              id: commit-pin
              with:
                  add: |
                      pyproject.toml
                      uv.lock
                  message: 'Use new hogql-parser version'
                  default_author: github_actions
                  github_token: ${{ steps.app-token.outputs.token }}

            - name: Fail if pin update produced no commit
              shell: bash
              env:
                  PUSHED: ${{ steps.commit-pin.outputs.pushed }}
              run: |
                  if [[ "$PUSHED" != "true" ]]; then
                    echo "::error::hogql-parser wheel was published to PyPI but pyproject.toml pin was not updated."
                    echo "Check the 'Update hogql-parser in requirements' step above for why uv add did not produce a diff."
                    exit 1
                  fi
