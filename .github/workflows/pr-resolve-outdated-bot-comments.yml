name: Resolve outdated bot comments

on:
    pull_request:
        types: [synchronize]

permissions:
    contents: read

concurrency:
    group: resolve-bot-comments-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    resolve-outdated:
        name: Resolve outdated bot review comments
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'

        steps:
            - name: Get app token
              id: app-token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_REVIEW_COMMENT_RESOLVER_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_REVIEW_COMMENT_RESOLVER_PRIVATE_KEY }}

            - name: Resolve outdated bot threads
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPO: ${{ github.repository }}
              run: |
                  # $owner/$repo/$cursor/$id below are GraphQL variables, not shell expansions.
                  # shellcheck disable=SC2016
                  set -euo pipefail

                  BOTS="copilot-pull-request-reviewer greptile-apps chatgpt-codex-connector graphite-app cursor claude claude-code-action claude-review"

                  OWNER="${REPO%/*}"
                  REPO_NAME="${REPO#*/}"

                  QUERY='
                    query($owner: String!, $repo: String!, $pr: Int!, $cursor: String) {
                      repository(owner: $owner, name: $repo) {
                        pullRequest(number: $pr) {
                          reviewThreads(first: 100, after: $cursor) {
                            pageInfo { hasNextPage endCursor }
                            nodes {
                              id
                              isOutdated
                              isResolved
                              comments(first: 1) {
                                totalCount
                                nodes { author { login } }
                              }
                            }
                          }
                        }
                      }
                    }'

                  # Collect every outdated, unresolved, single-comment thread authored by a known bot.
                  # Paginate so PRs with more than 100 review threads are still fully covered.
                  thread_ids=()
                  cursor=""
                  while :; do
                    if [ -z "$cursor" ]; then
                      page=$(gh api graphql -f query="$QUERY" -f owner="$OWNER" -f repo="$REPO_NAME" -F pr="$PR_NUMBER")
                    else
                      page=$(gh api graphql -f query="$QUERY" -f owner="$OWNER" -f repo="$REPO_NAME" -F pr="$PR_NUMBER" -f cursor="$cursor")
                    fi

                    while IFS= read -r id; do
                      [ -n "$id" ] && thread_ids+=("$id")
                    done < <(echo "$page" | jq -r --arg bots "$BOTS" '
                      .data.repository.pullRequest.reviewThreads.nodes[]
                      | select(.isOutdated == true and .isResolved == false and .comments.totalCount == 1)
                      | select(.comments.nodes[0].author.login as $author | ($bots | split(" ") | any(. == $author)))
                      | .id
                    ')

                    [ "$(echo "$page" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')" = "true" ] || break
                    cursor=$(echo "$page" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
                  done

                  if [ "${#thread_ids[@]}" -eq 0 ]; then
                    echo "No outdated bot threads to resolve"
                    exit 0
                  fi

                  echo "Resolving ${#thread_ids[@]} outdated bot thread(s)"
                  for thread_id in "${thread_ids[@]}"; do
                    echo "Resolving thread $thread_id"
                    gh api graphql -f query='
                      mutation($id: ID!) {
                        resolveReviewThread(input: { threadId: $id }) {
                          thread { isResolved }
                        }
                      }' -f id="$thread_id"
                  done
