name: CI infra retry

on:
    workflow_run:
        workflows:
            - Backend CI
            - Python CI
            - Frontend CI
            - MCP CI
            - Security
        types: [completed]

concurrency:
    group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
    cancel-in-progress: false

permissions:
    actions: write
    contents: read

jobs:
    retry-infra-cancellation:
        name: Rerun recognized infra cancellations
        if: >
            vars.CI_INFRA_RETRY_ENABLED == 'true'
            && (github.event.workflow_run.conclusion == 'failure'
            || github.event.workflow_run.conclusion == 'cancelled'
            || github.event.workflow_run.conclusion == 'timed_out')
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            GH_TOKEN: ${{ github.token }}
            CI_INFRA_RETRY_ENABLED: ${{ vars.CI_INFRA_RETRY_ENABLED || 'false' }}
            CI_INFRA_RETRY_MAX_RERUNS: ${{ vars.CI_INFRA_RETRY_MAX_RERUNS || '1' }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Classify and rerun infra cancellations
              run: python .github/scripts/ci_infra_retry.py
