name: Desktop Fork Sync

# Fork-only (mariusandra/posthog): merges PostHog/posthog master AND the open
# desktop PR branch into the fork's `desktop` branch daily, with the OpenAI
# Codex CLI resolving conflicts and merge fallout per
# .agents/skills/syncing-desktop-fork/SKILL.md. Inert in PostHog/posthog.
#
# Fork setup: enable Actions on the fork, enable this (scheduled workflows in
# forks start disabled), and add the OPENAI_API_KEY secret.

on:
    schedule:
        - cron: '23 5 * * *'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

jobs:
    sync:
        name: Merge upstream master into desktop
        if: github.repository == 'mariusandra/posthog'
        runs-on: ubuntu-latest
        timeout-minutes: 120
        permissions:
            contents: write
            # to dispatch desktop-release.yml (a GITHUB_TOKEN push can't trigger it)
            actions: write
        steps:
            # Merging needs history; blobs fetch lazily as the merge touches them
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: desktop
                  fetch-depth: 0
                  filter: blob:none

            - name: Merge upstream master and desktop PR branch
              id: merge
              env:
                  # Ongoing desktop development happens on this PR branch in
                  # PostHog/posthog. It's merged in alongside master so the fork
                  # tracks it. Optional: once the PR merges to master and the
                  # branch is deleted, master alone carries the work and this is
                  # skipped. Clear it (or delete the branch) to stop tracking.
                  DESKTOP_PR_BRANCH: posthog-code/desktop-electron-app
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git remote add upstream https://github.com/PostHog/posthog.git

                  # Merge master first (PostHog updates), then the desktop PR
                  # branch (desktop dev). Only fetch/merge the PR branch if it
                  # still exists upstream.
                  git fetch --filter=blob:none upstream master
                  refs="upstream/master"
                  if [ -n "$DESKTOP_PR_BRANCH" ] && git fetch --filter=blob:none upstream "$DESKTOP_PR_BRANCH" 2>/dev/null; then
                      refs="$refs upstream/$DESKTOP_PR_BRANCH"
                  else
                      echo "Desktop PR branch not tracked or not found; merging master only"
                  fi

                  state=up-to-date
                  for ref in $refs; do
                      if git merge-base --is-ancestor "$ref" HEAD; then
                          echo "Already up to date with $ref"
                          continue
                      fi
                      if git merge --no-edit "$ref"; then
                          if [ "$state" = up-to-date ]; then state=merged; fi
                      else
                          echo "Conflicts merging $ref"
                          state=conflicts
                          break
                      fi
                  done
                  echo "state=$state" >> "$GITHUB_OUTPUT"

            # Node comes from setup-node inside the composite; skip the pnpm
            # install here when conflicted — manifests may hold conflict markers,
            # the agent installs after resolving instead.
            - name: Install desktop dependencies
              if: steps.merge.outputs.state == 'merged'
              uses: ./.github/actions/pnpm-install
              with:
                  install-command: pnpm install --frozen-lockfile --filter=@posthog/desktop

            - name: Set up Node.js (conflicted merge)
              if: steps.merge.outputs.state == 'conflicts'
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version-file: .nvmrc
                  token: ${{ github.token }}

            - name: Desktop tests
              id: tests
              if: steps.merge.outputs.state == 'merged'
              continue-on-error: true
              run: pnpm --filter=@posthog/desktop test

            - name: Resolve with Codex
              if: steps.merge.outputs.state == 'conflicts' || steps.tests.outcome == 'failure'
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  MERGE_STATE: ${{ steps.merge.outputs.state }}
              run: |
                  npm install -g @openai/codex pnpm
                  codex exec --dangerously-bypass-approvals-and-sandbox "You are running inside the desktop-sync workflow on the mariusandra/posthog fork. Merge state: $MERGE_STATE (either an in-progress conflicted merge of upstream master or the desktop PR branch, or a completed merge whose desktop tests fail). Read .agents/skills/syncing-desktop-fork/SKILL.md and follow it: finish the merge, fix what the merge broke, and leave the working tree committed and clean. Do not push."

            - name: Verify merge concluded
              run: |
                  if [ -f .git/MERGE_HEAD ]; then
                      echo "::error::Merge is still in progress"
                      exit 1
                  fi
                  git diff --check
                  if [ -n "$(git status --porcelain)" ]; then
                      echo "::error::Working tree is not clean"
                      git status --porcelain
                      exit 1
                  fi

            - name: Desktop tests (final gate)
              if: steps.merge.outputs.state != 'up-to-date'
              run: |
                  pnpm install --frozen-lockfile --filter=@posthog/desktop
                  pnpm --filter=@posthog/desktop test

            - name: Push
              if: steps.merge.outputs.state != 'up-to-date'
              run: git push origin HEAD:desktop

            # A GITHUB_TOKEN push doesn't fire push-triggered workflows, so kick
            # the release check explicitly; it no-ops unless the version changed
            - name: Dispatch release check
              if: steps.merge.outputs.state != 'up-to-date'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh workflow run desktop-release.yml --ref desktop --repo "$GITHUB_REPOSITORY"
