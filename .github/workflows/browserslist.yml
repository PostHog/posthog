name: Browserslist

on:
    schedule:
        - cron: '0 12 * * MON'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    update-browserslist-database:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            HUSKY: 0
        steps:
            - name: Get app token
              id: app-token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_SCHEDULED_ACTIONS_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_SCHEDULED_ACTIONS_PRIVATE_KEY }}

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  token: ${{ steps.app-token.outputs.token }}

            - name: Install pnpm dependencies
              uses: ./.github/actions/pnpm-install
              with:
                  install-command: pnpm install

            - name: Update Browserslist database
              env:
                  NO_COLOR: '1'
              run: npx --yes update-browserslist-db@latest 2>&1 | tee /tmp/browserslist-output.txt

            - name: Check for changes
              id: check-changes
              run: |
                  if git diff --quiet pnpm-lock.yaml; then
                    echo "changes=false" >> $GITHUB_OUTPUT
                    echo "No Browserslist updates available"
                  else
                    echo "changes=true" >> $GITHUB_OUTPUT
                    git diff --stat pnpm-lock.yaml
                  fi

            - name: Build PR body
              if: steps.check-changes.outputs.changes == 'true'
              run: |
                  {
                    echo "Automated weekly update of the Browserslist database (\`caniuse-lite\`)."
                    echo
                    echo '```'
                    cat /tmp/browserslist-output.txt
                    echo '```'
                  } > /tmp/pr-body.md

            - name: Reset branch to checked-out SHA
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  TARGET_SHA: ${{ github.sha }}
              run: |
                  if gh api repos/${{ github.repository }}/git/ref/heads/browserslist-update >/dev/null 2>&1; then
                    gh api -X PATCH repos/${{ github.repository }}/git/refs/heads/browserslist-update \
                      -f sha="$TARGET_SHA" -F force=true
                  else
                    gh api repos/${{ github.repository }}/git/refs -f ref=refs/heads/browserslist-update -f sha="$TARGET_SHA"
                  fi

            - name: Commit
              if: steps.check-changes.outputs.changes == 'true'
              uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
              with:
                  commit_message: 'build: update Browserslist db'
                  repo: ${{ github.repository }}
                  branch: browserslist-update
                  file_pattern: 'pnpm-lock.yaml'
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Create or update pull request
              id: pr
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "browserslist-update" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    gh pr edit "$existing_pr" --body-file /tmp/pr-body.md
                    echo "pr_number=$existing_pr" >> $GITHUB_OUTPUT
                  else
                    pr_url=$(gh pr create \
                      --title "build: update Browserslist db" \
                      --body-file /tmp/pr-body.md \
                      --base master \
                      --head browserslist-update \
                      --label "dependencies")
                    echo "pr_number=$(basename "$pr_url")" >> $GITHUB_OUTPUT
                  fi

            - name: Enable automerge
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
              run: |
                  gh pr merge "$PR_NUMBER" --auto --squash
