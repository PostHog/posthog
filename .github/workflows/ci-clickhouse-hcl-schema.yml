name: ClickHouse HCL Schema Guard

# Deterministic, offline guard for the declarative ClickHouse HCL schema
# (posthog/clickhouse/hcl/). For each environment it validates that cross-object
# references resolve and that the layered source still reproduces the vendored
# golden cluster dump with zero drift. No live cluster is contacted.

on:
    push:
        branches:
            - master
    pull_request:
        paths:
            - 'posthog/clickhouse/hcl/**'
            - '.github/workflows/ci-clickhouse-hcl-schema.yml'
    merge_group:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read
    packages: read

env:
    # Pin to a published chschema image. Override via repo variable if needed.
    HCLEXP_IMAGE: ${{ vars.HCLEXP_IMAGE || 'ghcr.io/posthog/chschema:latest' }}

jobs:
    ops-hcl-guard:
        name: Validate + diff OPS HCL against golden dumps
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Log in to ghcr.io
              uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Pull hclexp image
              run: docker pull "$HCLEXP_IMAGE"

            - name: OPS schema guard (validate + drift)
              run: bash posthog/clickhouse/hcl/ops/check.sh
