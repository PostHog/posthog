name: ClickHouse HCL Schema Guard

# Deterministic, offline guard for the declarative ClickHouse HCL schema
# (posthog/clickhouse/hcl/). For each environment it validates that cross-object
# references resolve and that the layered source still reproduces the vendored
# golden cluster dump with zero drift. No live cluster is contacted.

on:
    push:
        branches:
            - master
        paths:
            - 'posthog/clickhouse/hcl/**'
            - '.github/workflows/ci-clickhouse-hcl-schema.yml'
    pull_request:
        paths:
            - 'posthog/clickhouse/hcl/**'
            - '.github/workflows/ci-clickhouse-hcl-schema.yml'
    merge_group:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read
    packages: read

env:
    # Pin to a concrete chschema build (not :latest) for reproducibility. sha-bf84186
    # has `introspect -exclude` (#79) for the live gate, retains file()/heredoc query
    # refs (#68/#69) so a query authored as file("sql/x.sql") compares equal to its
    # golden and the modifier-aware diff (#59), and fixes the layer-order drop of
    # dictionaries/views (#80). Override via repo variable.
    HCLEXP_IMAGE: ${{ vars.HCLEXP_IMAGE || 'ghcr.io/posthog/chschema:sha-bf84186' }}

jobs:
    ops-hcl-guard:
        name: Validate + diff OPS HCL against golden dumps
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        # Informational only while the declarative-HCL pilot stabilizes: the guard
        # runs and reports drift, but a failure must not block PRs. Remove once the
        # OPS/LOGS managed set is trusted and we want it enforced.
        continue-on-error: true
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Log in to ghcr.io
              uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Pull hclexp image
              run: docker pull "$HCLEXP_IMAGE"

            - name: HCL schema guard (validate + drift)
              run: bash posthog/clickhouse/hcl/check.sh
