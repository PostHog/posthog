name: Update AI Costs

on:
    workflow_dispatch: # Allow manual triggering
    schedule:
        # Run at 10am UTC and 8pm UTC on weekdays (Monday-Friday)
        - cron: '0 10 * * 1-5' # 10am UTC
        - cron: '0 20 * * 1-5' # 8pm UTC

permissions:
    contents: read

jobs:
    update-ai-costs:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Get app token
              id: app-token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_SCHEDULED_ACTIONS_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_SCHEDULED_ACTIONS_PRIVATE_KEY }}

            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}

            - name: Install pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

            - name: Fix node-gyp permissions
              run: chmod +x ~/setup-pnpm/node_modules/.pnpm/pnpm@*/node_modules/pnpm/dist/node_modules/node-gyp/gyp/gyp_main.py

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version-file: .nvmrc
                  cache: 'pnpm'

            - name: Install dependencies
              env:
                  HUSKY: 0
              run: |
                  cd nodejs
                  pnpm install --frozen-lockfile --ignore-scripts

            - name: Update AI costs
              run: |
                  cd nodejs
                  pnpm update-ai-costs

            - name: Format generated files
              run: |
                  cd nodejs
                  pnpm prettier --write src/ingestion/ai/costs/providers/canonical-providers.ts src/ingestion/ai/costs/providers/llm-costs.json

            - name: Check for changes
              id: check-changes
              run: |
                  if git diff --quiet nodejs/src/ingestion/ai/costs/providers/canonical-providers.ts nodejs/src/ingestion/ai/costs/providers/llm-costs.json; then
                    echo "changes=false" >> $GITHUB_OUTPUT
                    echo "No changes detected in AI costs"
                  else
                    echo "changes=true" >> $GITHUB_OUTPUT
                    echo "Changes detected in AI costs"
                    git diff --stat nodejs/src/ingestion/ai/costs/providers/canonical-providers.ts nodejs/src/ingestion/ai/costs/providers/llm-costs.json
                  fi

            - name: Clean up stale branch
              if: steps.check-changes.outputs.changes == 'false'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "chore/llma-update-ai-costs" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    gh pr close "$existing_pr" --delete-branch || true
                    echo "Closed stale PR #$existing_pr and deleted branch"
                  fi

            - name: Reset branch to checked-out SHA
              # Force-reset the branch to the SHA this job was pinned to so each run is
              # independent of any unmerged commits from prior runs. Using `github.sha`
              # (instead of looking up master's current tip) guarantees the branch tip
              # matches workspace HEAD — otherwise a merge to master during the run could
              # leave ghcommit-action with a parent mismatch and the same
              # "Expected branch to point to X but it did not" failure mode.
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  TARGET_SHA: ${{ github.sha }}
              run: |
                  if gh api repos/${{ github.repository }}/git/ref/heads/chore/llma-update-ai-costs >/dev/null 2>&1; then
                    gh api -X PATCH repos/${{ github.repository }}/git/refs/heads/chore/llma-update-ai-costs \
                      -f sha="$TARGET_SHA" -F force=true
                    echo "Force-reset branch to $TARGET_SHA (superseding any prior unmerged commits)"
                  else
                    gh api repos/${{ github.repository }}/git/refs -f ref=refs/heads/chore/llma-update-ai-costs -f sha="$TARGET_SHA"
                    echo "Created branch at $TARGET_SHA"
                  fi

            - name: Commit via GitHub API (signed)
              if: steps.check-changes.outputs.changes == 'true'
              uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
              with:
                  commit_message: 'chore(llma): update LLM costs'
                  repo: ${{ github.repository }}
                  branch: chore/llma-update-ai-costs
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Create pull request
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "chore/llma-update-ai-costs" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    echo "PR #$existing_pr already exists — updated by commit"
                  else
                    gh pr create \
                      --title "chore(llma): Update LLM costs" \
                      --body "$(cat <<'BODY'
                  This is an automated PR to update LLM pricing models.

                  ## Reviewer checklist

                  Please verify that there aren't any odd changes in the pricing by checking against the official pricing pages:

                  - [Anthropic Pricing](https://claude.com/pricing#api)
                  - [OpenAI Pricing](https://openai.com/api/pricing/)
                  - [Google AI (Gemini) Pricing](https://ai.google.dev/pricing)
                  - [Mistral AI Pricing](https://mistral.ai/pricing#api-pricing)
                  BODY
                  )" \
                      --base master \
                      --head chore/llma-update-ai-costs \
                      --label "automated" --label "llm-analytics" \
                      --reviewer "PostHog/team-llm-analytics"
                  fi

            - name: Alert Slack on failure
              if: failure()
              uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
              with:
                  method: chat.postMessage
                  token: ${{ secrets.SLACK_BOT_TOKEN }}
                  payload: |
                      channel: "C0A006STKHR"
                      text: ":warning: Update AI Costs workflow failed"
                      blocks:
                        - type: "section"
                          text:
                            type: "mrkdwn"
                            text: ":warning: *Update AI Costs workflow failed*\n\nLLM cost data is not being updated. This causes `not_found` rates to climb in cost processing.\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>"
