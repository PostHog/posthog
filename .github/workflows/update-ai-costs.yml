name: Update AI Costs

on:
    workflow_dispatch: # Allow manual triggering
    schedule:
        # Run at 10am UTC and 8pm UTC on weekdays (Monday-Friday)
        - cron: '0 10 * * 1-5' # 10am UTC
        - cron: '0 20 * * 1-5' # 8pm UTC

permissions:
    contents: read

concurrency:
    group: update-ai-costs
    cancel-in-progress: false

jobs:
    update-ai-costs:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Get app token
              id: app-token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
              with:
                  client-id: ${{ secrets.GH_APP_POSTHOG_SCHEDULED_ACTIONS_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_SCHEDULED_ACTIONS_PRIVATE_KEY }}

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  token: ${{ steps.app-token.outputs.token }}

            - name: Install pnpm dependencies
              uses: ./.github/actions/pnpm-install
              with:
                  working-directory: nodejs
                  # --ignore-scripts already skips husky's prepare hook (no need for HUSKY=0)
                  install-command: pnpm install --frozen-lockfile --ignore-scripts

            - name: Update AI costs
              run: |
                  cd nodejs
                  pnpm update-ai-costs

            - name: Format generated files
              run: |
                  cd nodejs
                  pnpm prettier --write src/ingestion/pipelines/ai/costs/providers/canonical-providers.ts src/ingestion/pipelines/ai/costs/providers/llm-costs.json

            - name: Check for changes
              id: check-changes
              run: |
                  if git diff --quiet nodejs/src/ingestion/pipelines/ai/costs/providers/canonical-providers.ts nodejs/src/ingestion/pipelines/ai/costs/providers/llm-costs.json; then
                    echo "changes=false" >> $GITHUB_OUTPUT
                    echo "No changes detected in AI costs"
                  else
                    echo "changes=true" >> $GITHUB_OUTPUT
                    echo "Changes detected in AI costs"
                    git diff --stat nodejs/src/ingestion/pipelines/ai/costs/providers/canonical-providers.ts nodejs/src/ingestion/pipelines/ai/costs/providers/llm-costs.json
                  fi

            - name: Clean up stale branch
              if: steps.check-changes.outputs.changes == 'false'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "chore/llma-update-ai-costs" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    gh pr comment "$existing_pr" --body "Closing — a fresh run found no cost changes against master, so this PR is no longer needed. A new PR will open automatically the next time pricing drifts." || true
                    gh pr close "$existing_pr" --delete-branch || true
                    echo "Closed stale PR #$existing_pr and deleted branch"
                  fi

            - name: Capture any open PR before branch reset
              # Force-resetting the branch below can auto-close the previously open PR
              # (GitHub closes a PR when its head branch no longer contains any commits
              # beyond the base). Remember the PR number now so we can cross-link the
              # old and new PRs later if a new one gets created.
              id: previous-pr
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  pr=$(gh pr list --head "chore/llma-update-ai-costs" --state open --json number --jq '.[0].number' 2>/dev/null || true)
                  echo "number=$pr" >> "$GITHUB_OUTPUT"
                  if [ -n "$pr" ]; then
                    echo "Captured open PR #$pr before branch reset"
                  fi

            - name: Reset branch to checked-out SHA
              # Force-reset the branch to the SHA this job was pinned to so each run is
              # independent of any unmerged commits from prior runs. Using `github.sha`
              # (instead of looking up master's current tip) guarantees the branch tip
              # matches workspace HEAD — otherwise a merge to master during the run could
              # leave ghcommit-action with a parent mismatch and the same
              # "Expected branch to point to X but it did not" failure mode.
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  TARGET_SHA: ${{ github.sha }}
              run: |
                  if gh api repos/${{ github.repository }}/git/ref/heads/chore/llma-update-ai-costs >/dev/null 2>&1; then
                    gh api -X PATCH repos/${{ github.repository }}/git/refs/heads/chore/llma-update-ai-costs \
                      -f sha="$TARGET_SHA" -F force=true
                    echo "Force-reset branch to $TARGET_SHA (superseding any prior unmerged commits)"
                  else
                    gh api repos/${{ github.repository }}/git/refs -f ref=refs/heads/chore/llma-update-ai-costs -f sha="$TARGET_SHA"
                    echo "Created branch at $TARGET_SHA"
                  fi

            - name: Commit via GitHub API (signed)
              if: steps.check-changes.outputs.changes == 'true'
              uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
              with:
                  commit_message: 'chore(llma): update LLM costs'
                  repo: ${{ github.repository }}
                  branch: chore/llma-update-ai-costs
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Create pull request
              if: steps.check-changes.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  PREVIOUS_PR: ${{ steps.previous-pr.outputs.number }}
              run: |
                  existing_pr=$(gh pr list --head "chore/llma-update-ai-costs" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    echo "PR #$existing_pr already exists — updated by commit"
                    exit 0
                  fi

                  new_pr_url=$(gh pr create \
                    --title "chore(llma): Update LLM costs" \
                    --body "$(cat <<'BODY'
                  This is an automated PR to update LLM pricing models.

                  ## Reviewer checklist

                  Please verify that there aren't any odd changes in the pricing by checking against the official pricing pages:

                  - [Anthropic Pricing](https://claude.com/pricing#api)
                  - [OpenAI Pricing](https://openai.com/api/pricing/)
                  - [Google AI (Gemini) Pricing](https://ai.google.dev/pricing)
                  - [Mistral AI Pricing](https://mistral.ai/pricing#api-pricing)
                  BODY
                  )" \
                    --base master \
                    --head chore/llma-update-ai-costs \
                    --label "automated" \
                    --reviewer "PostHog/team-ai-gateway")
                  echo "Created $new_pr_url"

                  # If the previously open PR on this branch got auto-closed by the
                  # force-reset above, cross-link it with the new PR so reviewers
                  # have a trail from the closed one to the replacement.
                  if [ -n "$PREVIOUS_PR" ] && [ -n "$new_pr_url" ]; then
                    prev_state=$(gh pr view "$PREVIOUS_PR" --json state --jq '.state' 2>/dev/null || echo "")
                    if [ "$prev_state" = "CLOSED" ]; then
                      gh pr comment "$PREVIOUS_PR" --body "Superseded by $new_pr_url" || true
                      current_body=$(gh pr view "$new_pr_url" --json body --jq '.body')
                      printf '%s\n\nSupersedes #%s.\n' "$current_body" "$PREVIOUS_PR" \
                        | gh pr edit "$new_pr_url" --body-file - || true
                    fi
                  fi

            - name: Alert Slack on failure
              if: failure()
              uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
              with:
                  method: chat.postMessage
                  token: ${{ secrets.SLACK_BOT_TOKEN }}
                  payload: |
                      channel: "C0A006STKHR"
                      text: ":warning: Update AI Costs workflow failed"
                      blocks:
                        - type: "section"
                          text:
                            type: "mrkdwn"
                            text: ":warning: *Update AI Costs workflow failed*\n\nLLM cost data is not being updated. This causes `not_found` rates to climb in cost processing.\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>"
