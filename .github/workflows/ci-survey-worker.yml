name: Survey Worker CI

on:
    push:
        branches: [master]
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read
    pull-requests: read

jobs:
    changes:
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        name: Determine need to run survey worker checks
        outputs:
            survey_worker: ${{ steps.filter.outputs.survey_worker || 'true' }}
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
              id: filter
              if: github.event_name != 'push'
              with:
                  filters: |
                      survey_worker:
                        - 'services/survey-worker/**'
                        - '.github/workflows/ci-survey-worker.yml'
    build:
        name: Build and typecheck
        runs-on: ubuntu-latest
        needs: changes
        if: needs.changes.outputs.survey_worker == 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install dependencies
              run: cd services/survey-worker && pnpm install --frozen-lockfile

            - name: Type check
              run: cd services/survey-worker && pnpm typecheck

            - name: Test
              run: cd services/survey-worker && pnpm test

    collation:
        name: Survey Worker CI
        needs: [changes, build]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Check outcomes
              run: |
                  if [ "${{ needs.changes.result }}" != "success" ]; then
                    echo "Changes job failed"
                    exit 1
                  fi
                  if [ "${{ needs.build.result }}" != "success" ] && [ "${{ needs.build.result }}" != "skipped" ]; then
                    echo "Build job failed"
                    exit 1
                  fi
                  echo "All checks passed"
