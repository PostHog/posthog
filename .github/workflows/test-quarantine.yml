name: Test quarantine

on:
    pull_request:
        paths:
            - .test_quarantine.json
            - tools/hogli-commands/hogli_commands/quarantine/**
            - .github/workflows/test-quarantine.yml

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read

jobs:
    check-quarantine:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version-file: 'pyproject.toml'

            - name: Install uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
              with:
                  version: '0.11.14' # pinned: unpinned setup-uv calls GH API on every job, exhausts rate limit

            - name: Check quarantine file
              # Same as `hogli test:quarantine check`, without installing the dev
              # environment: the quarantine core is stdlib-only and the CLI needs
              # only click, so quarantine PRs stay decoupled from lockfile health.
              run: PYTHONPATH=tools/hogli-commands uv run --no-project --with click python -m hogli_commands.quarantine.cli check
