name: Check Generated Docs

on:
    workflow_call:
        inputs:
            source_file:
                description: 'File that triggers doc regeneration when changed'
                required: true
                type: string
            additional_source_files:
                description: 'Extra files (newline-separated) that also trigger regeneration, e.g. the generator script'
                required: false
                type: string
                default: ''
            build_command:
                description: 'Command to regenerate the docs'
                required: true
                type: string
            output_file:
                description: 'Generated doc file to check for changes'
                required: true
                type: string
            fail_on_outdated:
                description: 'Whether to fail the workflow if docs are out of date'
                required: false
                type: boolean
                default: false

permissions:
    contents: read
    pull-requests: write

jobs:
    check-docs-generated:
        name: Check docs are up to date
        runs-on: ubuntu-24.04
        timeout-minutes: 10

        steps:
            - name: Check if source file changed
              id: source-check
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  SOURCE_FILE: ${{ inputs.source_file }}
                  ADDITIONAL_SOURCE_FILES: ${{ inputs.additional_source_files }}
              run: |
                  # Regenerate when the data file OR any additional source (e.g. the generator) changes,
                  # so a generator-only edit can't pass without validating the committed output.
                  # --repo is required because this step runs before checkout, so gh has no
                  # local git remote to infer the repo from (otherwise: "not a git repository").
                  changed_files=$(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --name-only)
                  if printf '%s\n' "$changed_files" \
                      | grep -qFf <(printf '%s\n' "$SOURCE_FILE" "$ADDITIONAL_SOURCE_FILES" | grep -v '^$'); then
                      echo "changed=true" >> $GITHUB_OUTPUT
                  fi

            - name: Checkout
              if: steps.source-check.outputs.changed == 'true'
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install pnpm dependencies
              if: steps.source-check.outputs.changed == 'true'
              uses: ./.github/actions/pnpm-install

            - name: Generate docs
              if: steps.source-check.outputs.changed == 'true'
              env:
                  BUILD_COMMAND: ${{ inputs.build_command }}
              run: $BUILD_COMMAND

            - name: Check for uncommitted changes
              id: docs-check
              if: steps.source-check.outputs.changed == 'true'
              env:
                  OUTPUT_FILE: ${{ inputs.output_file }}
              run: |
                  if git diff --exit-code "$OUTPUT_FILE"; then
                      echo "outdated=false" >> $GITHUB_OUTPUT
                  else
                      echo "outdated=true" >> $GITHUB_OUTPUT
                  fi

            - name: Post reminder comment
              if: steps.docs-check.outputs.outdated == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  SOURCE_FILE: ${{ inputs.source_file }}
                  BUILD_COMMAND: ${{ inputs.build_command }}
                  OUTPUT_FILE: ${{ inputs.output_file }}
              run: |
                  # Check if reminder comment already exists
                  if gh pr view "$PR_NUMBER" --json comments \
                      --jq '.comments[].body' | grep -q 'Generated Docs Update Required'; then
                      echo "Comment already exists, skipping"
                      exit 0
                  fi

                  gh pr comment "$PR_NUMBER" --body "### 📄 Generated Docs Update Required

                  You updated \`${SOURCE_FILE}\` but the generated docs are out of date.

                  Please run:
                  \`\`\`
                  ${BUILD_COMMAND}
                  \`\`\`

                  Then commit the updated \`${OUTPUT_FILE}\` file."

            - name: Fail if docs outdated
              if: steps.docs-check.outputs.outdated == 'true' && inputs.fail_on_outdated
              env:
                  BUILD_COMMAND: ${{ inputs.build_command }}
              run: |
                  echo "::error::Generated docs are out of date. Run '${BUILD_COMMAND}' and commit the changes."
                  exit 1
