version: 1
owners: []
rules:
    - match: '/auto-assign-labels.json'
      owners: [team-feature-flags]
    - match: '/dependabot.yml'
      owners: [team-devex]
    - match: '/pull_request_template.md'
      owners: [team-devex]
    - match: '/CODEOWNERS'
      owners: [team-devex]
    # owners.yaml can't live in workflows/ (Actions/actionlint parse every YAML
    # there as a workflow), so the workflow ownership is folded in here instead.
    - match: '/workflows/'
      owners: [team-devex]
    - match: '/workflows/ci-llm-gateway.yml'
      owners: [team-devex, team-ai-gateway]
    - match: '/workflows/llm-gateway-cd.yml'
      owners: [team-devex, team-ai-gateway]
    - match: '/workflows/update-ai-costs.yml'
      owners: [team-devex, team-ai-gateway]
    - match: '/workflows/cd-llm-analytics-image.yml'
      owners: [team-devex, team-ai-observability]
