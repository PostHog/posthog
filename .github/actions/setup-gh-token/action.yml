name: Mint setup-action GitHub token
description: Mint a short-lived GitHub App token so actions/setup-* resolve version manifests off a dedicated rate-limit bucket. Fails open to github.token when the app secrets are absent.

# Why: actions/setup-* resolve their version manifest from the GitHub API using the shared per-repo
# GITHUB_TOKEN. A dedicated App token gives those lookups their own rate-limit bucket.
#
# Fails open: when the app secrets are absent (forks, or before the app is provisioned), minting is
# skipped and the empty `token` output lets callers fall back to github.token.
#
# Usage — gate the caller step so forks skip minting, then OR the output with github.token:
#
#     - id: setup-gh-token
#       if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
#       uses: ./.github/actions/setup-gh-token
#       with:
#           client-id: ${{ secrets.GH_APP_POSTHOG_DEVEX_GENERAL_APP_ID }}
#           private-key: ${{ secrets.GH_APP_POSTHOG_DEVEX_GENERAL_PRIVATE_KEY }}
#     - uses: actions/setup-node@...
#       with:
#           token: ${{ steps.setup-gh-token.outputs.token || github.token }}

inputs:
    client-id:
        description: GitHub App client ID (the GH_APP_POSTHOG_DEVEX_GENERAL_APP_ID secret).
        required: false
    private-key:
        description: GitHub App private key (the GH_APP_POSTHOG_DEVEX_GENERAL_PRIVATE_KEY secret).
        required: false

outputs:
    token:
        description: Minted installation token; empty string when minting was skipped or failed.
        value: ${{ steps.mint.outputs.token }}

runs:
    using: composite
    steps:
        # continue-on-error keeps a missing/empty secret from failing the job — the empty output
        # then drives the caller's `|| github.token` fallback.
        - name: Mint token
          id: mint
          continue-on-error: true
          uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
          with:
              client-id: ${{ inputs.client-id }}
              private-key: ${{ inputs.private-key }}
