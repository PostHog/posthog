name: Docker meta and registry login
description: Log in to GHCR, DockerHub, and ECR, then generate standardized Docker image tags and labels.

inputs:
    image-name:
        required: true
        description: 'Image name without registry prefix (e.g., posthog-node, capture, llm-gateway)'
    aws-role-to-assume:
        required: true
        description: 'AWS IAM role ARN for ECR access'
    github-token:
        required: true
        description: 'GitHub token for GHCR login'
    dockerhub-username:
        required: true
        description: 'DockerHub username'
    dockerhub-password:
        required: true
        description: 'DockerHub password/token'
    ecr-image-name:
        required: false
        default: ''
        description: 'ECR image name if different from image-name (e.g., posthog-cloud). Defaults to image-name.'
    legacy-images:
        required: false
        default: ''
        description: 'Additional legacy image destinations (newline-separated) to publish to during migration. Remove once consumers are updated to the standard paths.'
    push-to-dockerhub:
        required: false
        default: 'false'
        description: 'Whether to also push to DockerHub as posthog/<image-name>. Only needed for the main posthog-cloud image.'
    push-to-ghcr:
        required: false
        default: 'true'
        description: 'Whether to push to ghcr.io. Set to false to skip GHCR publishing.'

outputs:
    tags:
        description: 'Docker metadata tags'
        value: ${{ steps.meta.outputs.tags }}
    labels:
        description: 'Docker metadata labels'
        value: ${{ steps.meta.outputs.labels }}
    ecr-registry:
        description: 'ECR registry URL'
        value: ${{ steps.aws-ecr.outputs.registry }}

runs:
    using: 'composite'
    steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
          with:
              role-to-assume: ${{ inputs.aws-role-to-assume }}
              aws-region: us-east-1

        - name: Login to Amazon ECR
          id: aws-ecr
          uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2.1.2

        - name: Login to ghcr.io
          uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
          with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ inputs.github-token }}
              logout: false

        - name: Login to DockerHub
          uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
          with:
              username: ${{ inputs.dockerhub-username }}
              password: ${{ inputs.dockerhub-password }}

        # Build the images list: standard paths + any legacy paths for backwards compatibility
        - name: Build images list
          id: images
          shell: bash
          run: |
              {
                echo "list<<EOF"
                if [ "$PUSH_TO_GHCR" = "true" ]; then
                  echo "ghcr.io/posthog/$IMAGE_NAME"
                fi
                if [ "$PUSH_TO_DOCKERHUB" = "true" ]; then
                  echo "posthog/$IMAGE_NAME"
                fi
                echo "$ECR_REGISTRY/${ECR_IMAGE_NAME:-$IMAGE_NAME}"
                if [ -n "$LEGACY_IMAGES" ]; then
                  echo "$LEGACY_IMAGES"
                fi
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
          env:
              IMAGE_NAME: ${{ inputs.image-name }}
              ECR_REGISTRY: ${{ steps.aws-ecr.outputs.registry }}
              LEGACY_IMAGES: ${{ inputs.legacy-images }}
              ECR_IMAGE_NAME: ${{ inputs.ecr-image-name }}
              PUSH_TO_DOCKERHUB: ${{ inputs.push-to-dockerhub }}
              PUSH_TO_GHCR: ${{ inputs.push-to-ghcr }}

        - name: Docker meta
          id: meta
          uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
          with:
              images: ${{ steps.images.outputs.list }}
              tags: |
                  type=ref,event=pr
                  type=ref,event=branch
                  type=sha
                  type=raw,value=${{ github.sha }}
                  type=raw,value=latest,enable={{is_default_branch}}
