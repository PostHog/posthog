name: Restore pnpm BuildKit cache
description: Restore and persist a pnpm BuildKit cache mount through GitHub Actions cache.

inputs:
    builder:
        required: true
        description: Buildx builder name from docker/setup-buildx-action.
    cache-scope:
        required: true
        description: Stable cache scope for this Docker image.
    cache-target:
        required: false
        default: /tmp/pnpm-store-v24
        description: Target path of the pnpm BuildKit cache mount in the Dockerfile.
    cache-id:
        required: false
        default: pnpm
        description: BuildKit cache mount ID from the Dockerfile.

runs:
    using: composite
    steps:
        - name: Restore pnpm cache mount
          id: pnpm-cache
          uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
          with:
              path: .buildkit-pnpm-cache/${{ inputs.cache-scope }}
              key: buildkit-pnpm-${{ inputs.cache-scope }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
              restore-keys: |
                  buildkit-pnpm-${{ inputs.cache-scope }}-${{ github.ref_name }}-
                  buildkit-pnpm-${{ inputs.cache-scope }}-master-

        - name: Inject pnpm cache mount
          uses: reproducible-containers/buildkit-cache-dance@2925f5cfd92896e0f5a155899ff2ed2922b575c6 # v3.4.0
          with:
              builder: ${{ inputs.builder }}
              cache-map: |
                  {
                    ".buildkit-pnpm-cache/${{ inputs.cache-scope }}": {
                      "target": "${{ inputs.cache-target }}",
                      "id": "${{ inputs.cache-id }}"
                    }
                  }
              skip-extraction: ${{ steps.pnpm-cache.outputs.cache-hit }}
