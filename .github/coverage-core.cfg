# Coverage config used only by the core (posthog/ee) PR coverage runs via --cov-config.
# relative_files: store repo-relative paths (posthog/..., ee/...) instead of source-stripped
#   ones, so diff-cover matches them against git diff paths and posthog/ vs ee/ don't collide.
# omit: the Core test segment --ignores temporal/dags (they run in the Temporal/Dagster
#   segments), so excluding them keeps changed lines there from showing as false-uncovered.
[run]
relative_files = True
omit =
    posthog/temporal/*
    posthog/dags/*
