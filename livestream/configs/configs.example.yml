debug: true
consumers:
    event:
        enabled: true
        brokers: 'localhost:9092,localhost:9093'
        topic: 'events_topic'
        security_protocol: 'PLAINTEXT'
        group_id: 'livestream-dev'
    session_recording:
        enabled: true
        brokers: 'localhost:9092,localhost:9093'
        topic: 'session_recording_snapshot_item_events'
        security_protocol: 'SSL'
        group_id: 'livestream-dev-session-recordings'
    notification:
        enabled: false
        brokers: 'localhost:9092,localhost:9093'
        topic: 'notification_events'
        security_protocol: 'PLAINTEXT'
        group_id: 'livestream-dev-notifications'
mmdb:
    path: 'mmdb.db'
jwt:
    secret: '<randomly generated secret key>'
    # Previous secrets still accepted for verification during key rotation
    secret_fallbacks:
        - '<previous secret key>'
cors_allow_origins:
    - "https://example.com"
    - "https://sub.example.com"
parallelism: 7
