# tmux server config for the sandbox container.
# Loaded via `tmux -L sandbox -f /etc/tmux.sandbox.conf`.

# --- Beginner-friendly defaults -----------------------------------------

# Mouse mode: click to select panes/windows, drag to resize, scroll with
# the mouse wheel. This is the single biggest UX win for tmux newcomers.
set -g mouse on

# Intuitive split keys: | for vertical, - for horizontal.
# The defaults (" and %) are hard to remember.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch panes with Alt+arrow — no prefix key needed.
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Start window numbering at 1 (matches keyboard layout).
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed so there are no gaps.
set -g renumber-windows on

# More scrollback history (default is 2000).
set -g history-limit 10000

# Reduce escape delay so vim/nano feel responsive.
set -sg escape-time 10

# Quick config reload with prefix + r.
bind r source-file /etc/tmux.sandbox.conf \; display "Config reloaded"

# --- Status bar ---------------------------------------------------------

# Surface setup progress in the status line so every window sees it.
# /tmp/sandbox-status is written by the setup process at each phase.
set -g status-interval 2
set -g status-right '#(cat /tmp/sandbox-status 2>/dev/null || echo booting...)'
set -g status-right-length 120

# Show basic navigation hints in the left status area.
set -g status-left '[#S] '
set -g status-left-length 40

# --- Crash recovery -----------------------------------------------------

# Claude crash recovery: if claude dies, respawn it in the same pane so
# detach/reattach brings the user back to a live claude. Scoped via window-name
# check so the setup/phrocs windows are not affected — their `remain-on-exit`
# is left off and they close normally.
set-hook -g pane-died 'if-shell -F "#{==:#{window_name},claude}" "respawn-pane -k claude"'
