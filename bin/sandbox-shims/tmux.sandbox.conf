# tmux server config for the sandbox container.
# Loaded via `tmux -L sandbox -f /etc/tmux.sandbox.conf`.

# Surface setup progress in the status line so every window sees it.
# /tmp/sandbox-status is written by the setup process at each phase.
set -g status-interval 2
set -g status-right '#(cat /tmp/sandbox-status 2>/dev/null || echo booting...)'
set -g status-right-length 120

# Claude crash recovery: if claude dies, respawn the launcher so detach/reattach
# brings the user back to a live spinner (or a live claude if the restart has
# already finished). Scoped via window-name check so the setup/phrocs windows
# are not affected — their `remain-on-exit` is left off and they close normally.
set-hook -g pane-died 'if-shell -F "#{==:#{window_name},claude}" "respawn-pane -k \"/usr/local/bin/claude-wait.sh\""'
