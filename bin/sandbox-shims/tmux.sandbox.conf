# tmux server config for the sandbox container.
# Loaded via `tmux -L sandbox -f /etc/tmux.sandbox.conf`.

# --- Truecolor (24-bit RGB) ---------------------------------------------

# What tmux reports to programs running inside it.
set -g default-terminal "tmux-256color"

# Advertise RGB for attaching clients so truecolor passes through. Wildcard
# because this server is attached from many different terminals, and virtually
# every modern emulator supports RGB. Scope to a specific $TERM if you must.
set -as terminal-features ",*:RGB"

# --- Beginner-friendly defaults -----------------------------------------

# Mouse mode: click to select panes/windows, drag to resize, scroll with
# the mouse wheel. This is the single biggest UX win for tmux newcomers.
set -g mouse on

# Intuitive split keys: | for vertical, - for horizontal.
# The defaults (" and %) are hard to remember.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Start window numbering at 1 (matches keyboard layout).
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed so there are no gaps.
set -g renumber-windows on

# More scrollback history (default is 2000).
set -g history-limit 10000

# Reduce escape delay so vim/nano feel responsive.
set -sg escape-time 10

# Quick config reload with prefix + r.
bind r source-file /etc/tmux.sandbox.conf \; display "Config reloaded"

# --- Status bar ---------------------------------------------------------

# Dark bar with light text. Without this, tmux defaults to a green bar, and
# the gray inactive-tab text (below) is unreadable on green.
set -g status-style 'bg=colour236,fg=colour250'

# Surface setup progress in the status line so every window sees it.
# /tmp/sandbox-status is written by the setup process at each phase.
set -g status-interval 2
set -g status-right '#(cat /tmp/sandbox-status 2>/dev/null || echo booting...)'
set -g status-right-length 120

# Show basic navigation hints in the left status area.
set -g status-left '[#S] '
set -g status-left-length 40

# Make the active tab visually obvious: bold near-black text on a bright blue
# background. Inactive tabs are dim gray so the active one pops.
set -g window-status-current-style 'bg=colour39,fg=colour16,bold'
set -g window-status-current-format ' #I:#W '
set -g window-status-style 'fg=colour245'
set -g window-status-format ' #I:#W '
